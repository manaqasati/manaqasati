<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>مناقصة — المدير</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f9fafb;--bg3:#f3f4f6;--br:#e5e7eb;--br2:#d1d5db;--t:#111827;--t2:#374151;--t3:#6b7280;--t4:#9ca3af;--p:#4f46e5;--pl:#eef2ff;--pm:#c7d2fe;--g:#059669;--gl:#ecfdf5;--gm:#a7f3d0;--r:#dc2626;--rl:#fef2f2;--rm:#fecaca;--a:#d97706;--al:#fffbeb;--am:#fde68a;--b:#2563eb;--bl:#eff6ff;--bm:#bfdbfe;--sb:240px;--r6:6px;--r8:8px;--r10:10px;--r12:12px}
html,body{height:100%;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--t);background:var(--bg2);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:99px}
.main{flex:1;margin-right:var(--sb);display:flex;flex-direction:column;min-height:100vh}
.sb{position:fixed;top:0;right:0;bottom:0;width:var(--sb);background:var(--bg);border-left:1px solid var(--br);display:flex;flex-direction:column;z-index:100}
.sb-head{height:56px;display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:1px solid var(--br);flex-shrink:0}
.sb-mark{width:30px;height:30px;border-radius:var(--r6);background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-name{font-size:16px;font-weight:800;color:var(--t)}.sb-name span{color:var(--p)}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:9px;flex-shrink:0}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--pl);border:1px solid var(--pm);color:var(--p);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:700;color:var(--t);line-height:1.2}.sb-urole{font-size:11px;color:var(--t4)}
.sb-nav{flex:1;overflow-y:auto;padding:8px;scrollbar-width:none}.sb-nav::-webkit-scrollbar{display:none}
.sb-sec{font-size:10px;font-weight:700;color:var(--t4);letter-spacing:.8px;text-transform:uppercase;padding:12px 8px 4px}
.ni{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:var(--r6);font-size:13px;font-weight:500;color:var(--t3);transition:all .12s;cursor:pointer;text-align:right;margin-bottom:1px}
.ni:hover{background:var(--bg2);color:var(--t2)}.ni.on{background:var(--pl);color:var(--p);font-weight:700}
.ni-ic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni-ic svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{flex:1}
.ni-b{font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:99px;background:var(--r);color:#fff;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.ni-b.am{background:var(--a)}
.sb-foot{border-top:1px solid var(--br);padding:8px;flex-shrink:0}
.topbar{height:56px;background:var(--bg);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px;font-size:13px}.bc-h{color:var(--t4)}.bc-s{color:var(--br2)}.bc-c{color:var(--t);font-weight:700}
.clk{font-size:12px;font-weight:600;color:var(--t3);font-variant-numeric:tabular-nums}
.pg{padding:24px;flex:1}
.pghd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.pg-t{font-size:20px;font-weight:800;color:var(--t);letter-spacing:-.4px}.pg-s{font-size:13px;color:var(--t4);margin-top:2px}
.pghd-r{display:flex;gap:8px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--bg);border:1px solid var(--br);border-radius:var(--r10);padding:16px;transition:box-shadow .15s}.sc:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sc-ic{width:32px;height:32px;border-radius:var(--r6);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sc-ic svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.sc-v{font-size:24px;font-weight:800;color:var(--t);letter-spacing:-.5px;line-height:1;margin-bottom:3px}.sc-l{font-size:11px;color:var(--t4)}
.card{background:var(--bg);border:1px solid var(--br);border-radius:var(--r10);overflow:hidden;margin-bottom:12px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--br);gap:10px;flex-wrap:wrap}
.ch-l{display:flex;align-items:center;gap:9px}
.ch-ic{width:28px;height:28px;border-radius:var(--r6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.ch-t{font-size:13px;font-weight:700;color:var(--t)}.ch-s{font-size:11px;color:var(--t4)}
.cb{padding:16px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r6);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:inherit;border:1px solid transparent}
.btn:active{transform:scale(.97)}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:#4338ca}
.btn-s{background:var(--gl);color:var(--g);border-color:var(--gm)}.btn-s:hover{background:#d1fae5}
.btn-e{background:var(--rl);color:var(--r);border-color:var(--rm)}.btn-e:hover{background:#fee2e2}
.btn-w{background:var(--al);color:var(--a);border-color:var(--am)}.btn-w:hover{background:#fef3c7}
.btn-i{background:var(--bl);color:var(--b);border-color:var(--bm)}.btn-i:hover{background:#dbeafe}
.btn-gh{background:var(--bg);color:var(--t2);border-color:var(--br)}.btn-gh:hover{background:var(--bg2);border-color:var(--br2)}
.btn-sm{padding:5px 10px;font-size:11px;gap:4px}.btn-sm svg{width:11px;height:11px}
.btn-xs{padding:3px 8px;font-size:10px;gap:3px}.btn-xs svg{width:10px;height:10px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.bdg::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-pe{background:var(--al);color:#92400e;border:1px solid var(--am)}.b-pe::before{background:var(--a)}
.b-op{background:var(--gl);color:#065f46;border:1px solid var(--gm)}.b-op::before{background:var(--g)}
.b-pr{background:var(--bl);color:#1e40af;border:1px solid var(--bm)}.b-pr::before{background:var(--b)}
.b-dn{background:var(--pl);color:#3730a3;border:1px solid var(--pm)}.b-dn::before{background:var(--p)}
.b-rj{background:var(--rl);color:#991b1b;border:1px solid var(--rm)}.b-rj::before{background:var(--r)}
.b-ac{background:var(--gl);color:#065f46;border:1px solid var(--gm)}.b-ac::before{background:var(--g)}
.b-of{background:var(--bg2);color:var(--t4);border:1px solid var(--br)}.b-of::before{background:var(--br2)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;background:var(--bg2);border:1px solid var(--br);font-size:10px;color:var(--t3)}
.chip svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.sbox{flex:1;min-width:190px;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--br);border-radius:var(--r6);padding:0 11px;transition:.12s}
.sbox:focus-within{border-color:var(--p)}
.sbox svg{width:13px;height:13px;stroke:var(--t4);fill:none;stroke-width:1.75;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.sbox input{border:none;background:transparent;font-size:12px;padding:8px 0;flex:1;color:var(--t)}.sbox input::placeholder{color:var(--t4)}
.fsel{padding:8px 10px;border:1px solid var(--br);border-radius:var(--r6);font-size:11px;background:var(--bg);color:var(--t2);cursor:pointer;font-family:inherit}.fsel:focus{border-color:var(--p)}
.pc{background:var(--bg);border:1px solid var(--br);border-radius:var(--r8);padding:14px 16px;margin-bottom:8px;transition:box-shadow .12s;border-right:3px solid transparent}
.pc:hover{box-shadow:0 2px 6px rgba(0,0,0,.06)}
.pc-pe{border-right-color:var(--a)}.pc-op{border-right-color:var(--g)}.pc-pr{border-right-color:var(--b)}.pc-dn{border-right-color:var(--p)}.pc-rj{border-right-color:var(--r)}
.pc-num{font-size:9px;font-weight:600;color:var(--t4);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.pc-tit{font-size:14px;font-weight:700;color:var(--t);line-height:1.3;margin-bottom:8px}
.pc-meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.pc-desc{font-size:12px;color:var(--t3);line-height:1.7;padding:8px 11px;background:var(--bg2);border-radius:var(--r6);border-right:2px solid var(--pm);margin-bottom:10px}
.pc-acts{display:flex;gap:5px;flex-wrap:wrap}
.tw{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;min-width:600px}
.tbl thead th{text-align:right;padding:9px 13px;font-size:10px;font-weight:700;color:var(--t4);background:var(--bg2);border-bottom:1px solid var(--br);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.tbl tbody td{padding:11px 13px;border-bottom:1px solid var(--br);vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}.tbl tbody tr:hover td{background:var(--bg2)}
.tav{width:28px;height:28px;border-radius:var(--r6);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.25);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
.ov.show{display:flex}
.modal{background:var(--bg);border:1px solid var(--br);border-radius:var(--r12);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.1);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--br);position:sticky;top:0;background:var(--bg);z-index:2}
.mh-l{display:flex;align-items:center;gap:9px}
.m-ic{width:28px;height:28px;border-radius:var(--r6);display:flex;align-items:center;justify-content:center}
.m-ic svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.m-tit{font-size:14px;font-weight:700;color:var(--t)}
.m-cls{width:26px;height:26px;border-radius:var(--r6);background:var(--bg2);color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:.12s;border:none}
.m-cls:hover{background:var(--rl);color:var(--r)}
.mb{padding:18px}.mf{display:flex;gap:6px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--br);background:var(--bg2)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:var(--t2)}.fh{color:var(--t4);font-weight:400}
.fi{padding:8px 11px;border:1px solid var(--br);border-radius:var(--r6);font-size:13px;background:var(--bg);color:var(--t);transition:.12s;width:100%;font-family:inherit}.fi:focus{border-color:var(--p)}
.fis{padding:8px 11px;border:1px solid var(--br);border-radius:var(--r6);font-size:13px;background:var(--bg);color:var(--t);width:100%;font-family:inherit;cursor:pointer}.fis:focus{border-color:var(--p)}
.fta{padding:8px 11px;border:1px solid var(--br);border-radius:var(--r6);font-size:13px;resize:vertical;min-height:76px;width:100%;color:var(--t);line-height:1.6;font-family:inherit;background:var(--bg)}.fta:focus{border-color:var(--p)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fsec{font-size:10px;font-weight:700;color:var(--p);letter-spacing:.5px;text-transform:uppercase;padding:10px 0 6px;border-bottom:1px solid var(--pl);margin:4px 0 12px}
.specs-wr{border:1px solid var(--br);border-radius:var(--r8);overflow:hidden}
.specs-hd{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.specs-hl{font-size:12px;font-weight:600;color:var(--t2)}.specs-ct{font-size:10px;font-weight:600;color:var(--p)}
.specs-gr{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:5px;max-height:170px;overflow-y:auto}
.spc{display:flex;align-items:center;gap:5px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r6);cursor:pointer;transition:.12s;background:var(--bg)}
.spc:hover{border-color:var(--br2);background:var(--bg2)}.spc.on{border-color:var(--pm);background:var(--pl)}
.spc input{width:12px;height:12px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.spc label{font-size:11px;cursor:pointer;color:var(--t3)}.spc.on label{color:var(--p);font-weight:600}
.alt{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:var(--r6);margin-bottom:10px;font-size:12px;line-height:1.5;font-weight:500}
.alt svg{width:13px;height:13px;flex-shrink:0;margin-top:1px;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.alt-i{background:var(--bl);border:1px solid var(--bm);color:var(--b)}.alt-i svg{stroke:var(--b)}
.alt-e{background:var(--rl);border:1px solid var(--rm);color:var(--r)}.alt-e svg{stroke:var(--r)}
.alt-s{background:var(--gl);border:1px solid var(--gm);color:var(--g)}.alt-s svg{stroke:var(--g)}
.alt-w{background:var(--al);border:1px solid var(--am);color:var(--a)}.alt-w svg{stroke:var(--a)}
.ib-bl{background:var(--bg2);border-radius:var(--r8);padding:11px;margin-bottom:10px;border:1px solid var(--br)}
.ib-t{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--br)}.ir:last-child{border-bottom:none}
.ik{font-size:12px;color:var(--t3)}.iv{font-size:12px;font-weight:600;color:var(--t2)}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.pr-l{font-size:12px;color:var(--t3);min-width:100px;text-align:right}
.pr-tr{flex:1;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden}
.pr-br{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}.pr-n{font-size:12px;font-weight:600;color:var(--t3);min-width:22px}
.li{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--br)}.li:last-child{border-bottom:none}
.li-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}.li-b{flex:1}
.li-a{font-size:12px;font-weight:600;color:var(--t)}.li-dt{font-size:10px;color:var(--t4);margin-top:1px}
.li-t{font-size:9px;color:var(--t4);flex-shrink:0;font-variant-numeric:tabular-nums}
.rvc{border:1px solid var(--br);border-radius:var(--r8);padding:14px;margin-bottom:7px;background:var(--bg)}.rvc.flag{border-color:var(--rm);background:var(--rl)}
.rv-body{font-size:12px;color:var(--t3);background:var(--bg2);padding:8px 11px;border-radius:var(--r6);line-height:1.7;border-right:2px solid var(--pm);margin-bottom:9px}
.adm-rp{background:var(--pl);border:1px solid var(--pm);border-radius:var(--r6);padding:8px 11px;margin-bottom:9px}
.rp-lb{font-size:9px;font-weight:700;color:var(--p);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}.rp-bd{font-size:11px;color:var(--t2);line-height:1.6}
.dc{border:1px solid var(--br);border-radius:var(--r8);padding:14px;margin-bottom:8px;background:var(--bg);border-right:3px solid var(--r)}.dc.res{border-right-color:var(--g)}
.dc-pt{display:grid;grid-template-columns:1fr 32px 1fr;align-items:center;gap:6px;background:var(--bg2);border-radius:var(--r8);padding:11px;margin-bottom:11px;border:1px solid var(--br)}
.set-r{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--br)}.set-r:last-child{border-bottom:none}
.set-i{flex:1}.set-t{font-size:13px;font-weight:600;color:var(--t);margin-bottom:1px}.set-d{font-size:11px;color:var(--t4)}
.tgl{position:relative;cursor:pointer;flex-shrink:0}.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-tr{width:34px;height:19px;border-radius:99px;background:var(--br2);transition:.15s;position:relative;border:1px solid var(--br)}
.tgl input:checked+.tgl-tr{background:var(--g);border-color:var(--g)}
.tgl-th{position:absolute;top:2px;right:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:right .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.tgl input:checked+.tgl-tr .tgl-th{right:17px}
.tgts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tgt{padding:5px 13px;border-radius:99px;border:1px solid var(--br);font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:.12s;background:var(--bg);font-family:inherit}
.tgt:hover{border-color:var(--br2);color:var(--t2)}.tgt.on{border-color:var(--p);background:var(--pl);color:var(--p);font-weight:600}
.c2{display:grid;grid-template-columns:1.35fr 1fr;gap:14px}
.ls{display:flex;flex-direction:column;align-items:center;padding:48px}
.spin{width:24px;height:24px;border:2px solid var(--bg3);border-top-color:var(--p);border-radius:50%;animation:sp .65s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}.ls-t{font-size:12px;color:var(--t4)}
.es{display:flex;flex-direction:column;align-items:center;padding:44px;text-align:center}
.es-ic{width:40px;height:40px;border-radius:var(--r8);background:var(--bg2);border:1px dashed var(--br2);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.es-ic svg{width:18px;height:18px;stroke:var(--t4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.es-t{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:3px}.es-s{font-size:12px;color:var(--t4)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--t);color:#fff;padding:9px 16px;border-radius:var(--r8);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .18s;pointer-events:none;display:flex;align-items:center;gap:7px;box-shadow:0 8px 20px rgba(0,0,0,.18);white-space:nowrap;font-family:'Tajawal',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.t-ic{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.t-s{background:var(--g)}.t-e{background:var(--r)}.t-i{background:#6b7280}
.mob-btn{display:none;position:fixed;top:10px;left:10px;z-index:200;width:34px;height:34px;border-radius:var(--r6);background:var(--p);border:none;cursor:pointer;align-items:center;justify-content:center}

<script>
const API='https://manaqasati-production.up.railway.app';
const token=localStorage.getItem('token');
const me=JSON.parse(localStorage.getItem('user')||'{}');
if(!token||me.role!=='admin')location.href='auth.html';

// ===== البيانات الكاملة محفوظة في متغيرات global =====
let allReqs=[],allProviders=[],allClients=[],allRevs=[],allDisps=[],actLog=[];
// كاش بيانات المستخدمين المفردين
let _userCache={};

const CATS=['تبريد وتكييف','كهرباء','سباكة','نجارة','تنظيف','نقل عفش','حدادة','ألمنيوم','مسابح','كاميرات مراقبة','شبكات وإنترنت','مظلات وسواتر','عزل حراري','أبواب','جبس وطباشير','مكافحة حشرات','أخرى'];
const CITIES=['الرياض','جدة','مكة المكرمة','المدينة المنورة','الدمام','الخبر','الظهران','الأحساء','الطائف','تبوك','بريدة','خميس مشيط','أبها','نجران','جيزان','حائل','ينبع','الجبيل','القطيف','سكاكا','عرعر','الباحة','الرس','رابغ','بيشة','وادي الدواسر','الزلفي','القريات'];
const AVC=['#4f46e5','#2563eb','#059669','#d97706','#dc2626','#0891b2','#7c3aed','#b45309'];
const SL={pending_review:'قيد المراجعة',open:'مفتوح',in_progress:'قيد التنفيذ',completed:'مكتمل',rejected:'مرفوض'};
const SBC={pending_review:'b-pe',open:'b-op',in_progress:'b-pr',completed:'b-dn',rejected:'b-rj'};
const PCC={pending_review:'pc-pe',open:'pc-op',in_progress:'pc-pr',completed:'pc-dn',rejected:'pc-rj'};
const BDGS={none:{l:'بدون',i:'—'},verified:{l:'موثق',i:'✓'},star:{l:'متميز',i:'⭐'},partner:{l:'شريك',i:'💎'},top:{l:'الأفضل',i:'🏆'}};

document.getElementById('sbAv').textContent=(me.name||'م')[0];
document.getElementById('sbNm').textContent=me.name||'المدير';
setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('ar-SA',{hour12:false})},1000);

// ===== دالة API محسّنة مع error handling =====
async function api(path,opts={}){
  try{
    const r=await fetch(API+path,{headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},...opts});
    if(!r.ok)return opts._arr?[]:null;
    const ct=r.headers.get('content-type')||'';
    if(ct.includes('application/json'))return await r.json();
    return {};
  }catch(e){console.error(path,e);return opts._arr?[]:null}
}

let _tT;
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  document.getElementById('tIc').textContent=type==='success'?'✓':type==='error'?'✕':'i';
  document.getElementById('tIc').className='t-ic t-'+(type==='success'?'s':type==='error'?'e':'i');
  document.getElementById('tMsg').textContent=msg;
  el.classList.add('show');clearTimeout(_tT);_tT=setTimeout(()=>el.classList.remove('show'),3200)
}

function openM(t,body,foot,iHtml,iBg='var(--pl)'){
  document.getElementById('mTit').textContent=t;
  document.getElementById('mBd').innerHTML=body;
  document.getElementById('mFt').innerHTML=foot||'';
  const ic=document.getElementById('mIc');
  ic.innerHTML=iHtml||'';ic.style.background=iBg;
  if(iHtml){const s=ic.querySelector('svg');if(s)s.style.cssText='width:13px;height:13px;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round'}
  document.getElementById('ov').classList.add('show')
}
function closeM(){document.getElementById('ov').classList.remove('show')}
function setPage(h){document.getElementById('pg').innerHTML=h}
function loading(){setPage('<div class="ls"><div class="spin"></div><div class="ls-t">جاري التحميل…</div></div>')}
function openSb(){document.getElementById('sb').classList.add('open');document.getElementById('mobOv').classList.add('show')}
function closeSb(){document.getElementById('sb').classList.remove('open');document.getElementById('mobOv').classList.remove('show')}
function logout(){localStorage.clear();location.href='auth.html'}
function lg(a,d,c='var(--p)'){actLog.unshift({a,d,c,t:new Date().toLocaleTimeString('ar-SA',{hour12:false})});if(actLog.length>200)actLog.pop()}

const TITLES={home:'الرئيسية',pending:'بانتظار المراجعة',projects:'كل المشاريع',providers:'مزودو الخدمة',clients:'العملاء',reviews:'التقييمات',disputes:'النزاعات',notifs:'إرسال إشعارات',reports:'التقارير',log:'سجل النشاط',settings:'الإعدادات'};
function go(page,btn){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  if(btn)btn.classList.add('on');
  else{const el=document.querySelector(`.ni[data-page="${page}"]`);if(el)el.classList.add('on')}
  document.getElementById('pgT').textContent=TITLES[page]||page;
  ({home:pgHome,pending:pgPend,projects:pgProjs,providers:pgProviders,clients:pgClients,reviews:pgRevs,disputes:pgDisps,notifs:pgNotifs,reports:pgReports,log:pgLog,settings:pgSettings})[page]?.();
  closeSb()
}

const S=(p,c='currentColor')=>`<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const I={
  proj:`<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>`,
  send:`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,

  trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>`,
  map:`<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>`,

  dol:`<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>`,
  cal:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
  alrt:`<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  info:`<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`,
  plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  bars:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
  save:`<path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>`,
  usr:`<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
  bell:`<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>`,
  zap:`<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
  shield:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
  key:`<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>`
};

function ac(id){return AVC[(Math.abs(id||0))%AVC.length]}
function al(n){return(n||'؟')[0]}
function sts(n){return[1,2,3,4,5].map(i=>`<span style="color:${i<=Math.round(n)?'#d97706':'#d1d5db'}">★</span>`).join('')}
function fdt(d){return d?new Date(d).toLocaleDateString('ar-SA'):'—'}
function fpr(p){return p?Number(p).toLocaleString('ar-SA')+' ر.س':'—'}
function stCard(lbl,val,ip,color,bg){return`<div class="sc"><div class="sc-ic" style="background:${bg};color:${color}">${S(ip,color)}</div><div class="sc-v">${val}</div><div class="sc-l">${lbl}</div></div>`}
function cityOpts(s=''){return'<option value="">اختر المدينة</option>'+CITIES.map(c=>`<option value="${c}"${c===s?' selected':''}>${c}</option>`).join('')}
function catOpts(s=''){return'<option value="">اختر التصنيف</option>'+CATS.map(c=>`<option value="${c}"${c===s?' selected':''}>${c}</option>`).join('')}
function specsH(sel=[]){return`<div class="specs-wr"><div class="specs-hd"><span class="specs-hl">التخصصات</span><span class="specs-ct" id="spCt">${sel.length} محدد</span></div><div class="specs-gr">${CATS.map((c,i)=>{const on=sel.includes(c);return`<div class="spc${on?' on':''}" onclick="togSpc(this)"><input type="checkbox" id="sp${i}" value="${c}"${on?' checked':''} onchange="updSpCt()"><label for="sp${i}">${c}</label></div>`}).join('')}</div></div>`}
function togSpc(el){el.classList.toggle('on');el.querySelector('input').checked=el.classList.contains('on');updSpCt()}
function updSpCt(){const c=document.querySelectorAll('.spc.on').length;const el=document.getElementById('spCt');if(el)el.textContent=`${c} محدد`}
function getSpc(){return[...document.querySelectorAll('.spc.on input')].map(i=>i.value)}

// ========== الرئيسية ==========
async function pgHome(){
  loading();
  const results=await Promise.allSettled([
    fetch(API+'/api/admin/stats',{headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.ok?r.json():{}),
    fetch(API+'/api/admin/requests',{headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.ok?r.json():[])
  ]);
  const s=(results[0].value&&typeof results[0].value==='object')?results[0].value:{};
  allReqs=Array.isArray(results[1].value)?results[1].value:[];
  const pend=allReqs.filter(r=>r.status==='pending_review');

// ✅ إصلاح الفلترة: مقارنة صحيحة بدون مشاكل encoding
function filterProjs(){
  const q=(document.getElementById('pQ')?.value||'').trim().toLowerCase();
  const st=document.getElementById('pSt')?.value||'';
  const cat=document.getElementById('pCat')?.value||'';
  const cit=document.getElementById('pCit')?.value||'';
  const f=allReqs.filter(r=>{
    const mq=!q||(r.title||'').toLowerCase().includes(q)||(r.project_number||'').toLowerCase().includes(q);
    const ms=!st||r.status===st;
    const mc=!cat||(r.category||'')===(cat);
    const mi=!cit||(r.city||'')===(cit);
    return mq&&ms&&mc&&mi;
  });
  const el=document.getElementById('pList');
  if(el)el.innerHTML=renderProjs(f);
}

function renderProjs(list){
  if(!list.length)return`<div class="es"><div class="es-ic">${S(I.proj)}</div><div class="es-t">لا يوجد نتائج</div></div>`;
  return list.map(r=>projCard(r,r.status==='pending_review')).join('')
}

// ✅ إصلاح فلترة العملاء
function filterClients(){
  const q=(document.getElementById('clQ')?.value||'').trim().toLowerCase();
  const cit=document.getElementById('clCit')?.value||'';
  const st=document.getElementById('clSt')?.value||'';
  const f=allClients.filter(u=>{
    const mq=!q||(u.name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q);
    const mc=!cit||(u.city||'')===cit;
    const ms=!st||(st==='active'?u.is_active!==false:u.is_active===false);
    return mq&&mc&&ms;
  });
  const el=document.getElementById('cliBd');
  if(el)el.innerHTML=renderClients(f)
}

async function verifyProvider(id,verify){
  // منح وسام verified أو إزالته
  const badge=verify?'verified':'none';
  await api(`/api/admin/users/${id}/badge`,{method:'PUT',body:JSON.stringify({badge})});
  if(_userCache[id])_userCache[id].badge=badge;
  toast(verify?'تم توثيق المزود ✓':'تم إلغاء التوثيق',verify?'success':'info');
  lg(verify?'توثيق مزود':'إلغاء توثيق',`#${id}`,verify?'var(--g)':'var(--r)');
  closeM();pgProviders()
}
async function savePermission(id,perm,val){
  await api(`/api/admin/users/${id}/permissions`,{method:'PUT',body:JSON.stringify({[perm]:val})});
  if(_userCache[id])_userCache[id][perm]=val;
  toast('تم تحديث الصلاحية','success')
}

async function toggleUser(id,isActive,role){
  await api(`/api/admin/users/${id}/toggle`,{method:'PUT',body:JSON.stringify({active:!isActive})});
  toast(isActive?'تم إيقاف الحساب':'تم تفعيل الحساب',isActive?'error':'success');
  role==='provider'?pgProviders():pgClients()
}
async function deleteUser(id,role){
  if(!confirm('حذف هذا المستخدم نهائياً؟'))return;
  await api(`/api/admin/users/${id}`,{method:'DELETE'});
  toast('تم الحذف','error');
  role==='provider'?pgProviders():pgClients()
}

function filterRevs(){

          <div style="font-size:13px;letter-spacing:1px">${sts(r.rating)}</div>
          <div style="font-size:9px;color:var(--t4);margin-top:2px">${fdt(r.created_at)}</div>

async function pgDisps(){
  loading();
  const data=await fetch(API+'/api/admin/disputes',{headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.ok?r.json():[]).catch(()=>[]);
  allDisps=Array.isArray(data)?data:[];
  const open=allDisps.filter(d=>d.status==='open').length;
  const nb=document.getElementById('nbD');if(nb){nb.style.display=open?'':'none';nb.textContent=open}
  setPage(`<div class="pghd"><div><div class="pg-t">النزاعات</div><div class="pg-s">${open} نزاع مفتوح من ${allDisps.length}</div></div>
  <div class="pghd-r"><select class="fsel" id="dFSt" onchange="filterDisps()"><option value="">كل الحالات</option><option value="open">مفتوحة</option><option value="resolved">محلولة</option></select></div></div>
  <div id="dispList">${renderDisps(allDisps)}</div>`);
}
function filterDisps(){
  const st=document.getElementById('dFSt')?.value||'';
  const f=st?allDisps.filter(d=>d.status===st):allDisps;
  const el=document.getElementById('dispList');if(el)el.innerHTML=renderDisps(f)
}

  return list.map(d=>{
    const bg1=ac(d.client_id||1);const bg2=ac((d.provider_id||2)+3);
    return`<div class="dc${d.status==='resolved'?' res':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:5px">
        <div><div style="font-size:13px;font-weight:700;color:var(--t);margin-bottom:2px">${d.title||'نزاع'}</div>
        <div style="font-size:10px;color:var(--t4)">${d.project_number||'#'+d.request_id} • ${fdt(d.created_at)}</div></div>
        <span class="bdg ${d.status==='open'?'b-rj':'b-op'}">${d.status==='open'?'مفتوح':'محلول'}</span>
      </div>
      ${d.description?`<div style="font-size:12px;color:var(--t3);background:var(--bg2);padding:8px 11px;border-radius:var(--r6);margin-bottom:10px;line-height:1.7">${d.description}</div>`:''}
      <div class="dc-pt">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:28px;height:28px;border-radius:var(--r6);background:${bg1};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">${al(d.client_name)}</div>
          <div><div style="font-size:12px;font-weight:600;color:var(--t)">${d.client_name||'—'}</div><div style="font-size:10px;color:var(--t4)">العميل</div></div>
        </div>
        <div style="text-align:center;font-size:14px;color:var(--t4)">⇔</div>
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:28px;height:28px;border-radius:var(--r6);background:${bg2};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">${al(d.provider_name)}</div>
          <div><div style="font-size:12px;font-weight:600;color:var(--t)">${d.provider_name||'—'}</div><div style="font-size:10px;color:var(--t4)">المزود</div></div>
        </div>
      </div>
      ${d.resolution?`<div style="background:var(--gl);border:1px solid var(--gm);border-radius:var(--r6);padding:8px 11px;margin-bottom:10px;font-size:12px;color:var(--g)">✓ القرار: ${d.resolution}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${d.status==='open'?`<button class="btn btn-s btn-sm" onclick="resolveDispModal(${d.id})">${S(I.chk)} حل النزاع</button><button class="btn btn-i btn-sm" onclick="notifyBothModal(${d.client_id||0},${d.provider_id||0})">${S(I.bell)} إشعار الطرفين</button>`:''}
        <button class="btn btn-gh btn-sm" onclick="viewProjModal(${d.request_id})">${S(I.proj)} المشروع</button>
      </div>
    </div>`
  }).join('')
}
function resolveDispModal(id){
  openM('حل النزاع',
    `<div class="fg"><label class="fl">القرار <span style="color:var(--r)">*</span></label><select class="fis" id="rdSide"><option value="client">لصالح العميل</option><option value="provider">لصالح المزود</option><option value="mutual">تسوية مشتركة</option></select></div>
    <div class="fg"><label class="fl">التفاصيل</label><textarea class="fta" id="rdRes" placeholder="اشرح القرار…"></textarea></div>`,
    `<button class="btn btn-gh" onclick="closeM()">إلغاء</button><button class="btn btn-s" onclick="confirmResolveDisp(${id})">${S(I.chk)} تأكيد الحل</button>`,
    `<svg viewBox="0 0 24 24" stroke="var(--g)">${I.chk}</svg>`,'var(--gl)')
}
async function confirmResolveDisp(id){
  const side=document.getElementById('rdSide')?.value;
  const resolution=document.getElementById('rdRes')?.value?.trim()||side;
  await api(`/api/admin/disputes/${id}/resolve`,{method:'PUT',body:JSON.stringify({resolution,decision:side})});
  closeM();toast('تم حل النزاع','success');
  // ✅ تحديث السجل المحلي بدلاً من إزالة النزاع
  const idx=allDisps.findIndex(d=>d.id===id);
  if(idx>-1){allDisps[idx].status='resolved';allDisps[idx].resolution=resolution}
  pgDisps()
}
function notifyBothModal(cId,pId){
  openM('إشعار الطرفين',`<div class="fg"><label class="fl">العنوان <span style="color:var(--r)">*</span></label><input type="text" class="fi" id="nbTi"></div><div class="fg"><label class="fl">النص <span style="color:var(--r)">*</span></label><textarea class="fta" id="nbBd"></textarea></div>`,
    `<button class="btn btn-gh" onclick="closeM()">إلغاء</button><button class="btn btn-p" onclick="confirmNotifyBoth(${cId},${pId})">${S(I.send)} إرسال</button>`,
    `<svg viewBox="0 0 24 24" stroke="var(--p)">${I.bell}</svg>`,'var(--pl)')
}
async function confirmNotifyBoth(cId,pId){
  const title=document.getElementById('nbTi')?.value?.trim();const body=document.getElementById('nbBd')?.value?.trim();
  if(!title||!body){toast('اكمل البيانات','error');return}
  await Promise.all([
    api('/api/admin/notify',{method:'POST',body:JSON.stringify({user_id:cId,title,body,type:'admin'})}),
    api('/api/admin/notify',{method:'POST',body:JSON.stringify({user_id:pId,title,body,type:'admin'})})
  ]);
  closeM();toast('تم الإرسال','success')
}

// ========== التقارير ==========
async function pgReports(){
  loading();
  const results=await Promise.allSettled([
    fetch(API+'/api/admin/stats',{headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.ok?r.json():{}),
    fetch(API+'/api/admin/requests',{headers:{'Authorization':`Bearer ${token}`}}).then(r=>r.ok?r.json():[])
  ]);
  const s=results[0].value||{};const rq=Array.isArray(results[1].value)?results[1].value:[];
  const cityC={},catC={};
  rq.forEach(r=>{if(r.city)cityC[r.city]=(cityC[r.city]||0)+1;if(r.category)catC[r.category]=(catC[r.category]||0)+1});
  const topCi=Object.entries(cityC).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topCat=Object.entries(catC).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mxC=topCi[0]?.[1]||1;const mxCat=topCat[0]?.[1]||1;
  const cRate=rq.length?Math.round((s.completed||0)/rq.length*100):0;
  setPage(`<div class="pghd"><div><div class="pg-t">التقارير</div></div></div>
  <div class="sg" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
    ${[['معدل الإكمال',cRate+'%','var(--g)','var(--gl)'],['متوسط عروض/مشروع',rq.length?Math.round((s.total_bids||0)/rq.length):0,'var(--p)','var(--pl)'],['مشاريع نشطة',(s.open||0)+(s.in_progress||0),'var(--b)','var(--bl)'],['إجمالي المشاريع',rq.length,'var(--a)','var(--al)']].map(([l,v,c,bg])=>`<div class="sc"><div class="sc-ic" style="background:${bg};color:${c}">${S(I.zap,c)}</div><div class="sc-v">${v}</div><div class="sc-l">${l}</div></div>`).join('')}
  </div>
  <div class="c2">
    <div class="card"><div class="ch"><div class="ch-l"><div class="ch-ic" style="background:var(--bl);color:var(--b)">${S(I.bars,'var(--b)')}</div><div class="ch-t">أكثر المدن طلباً</div></div></div>
    <div class="cb">${topCi.map(([city,count])=>`<div class="pr"><div class="pr-l">${city}</div><div class="pr-tr"><div class="pr-br" style="width:${Math.round(count/mxC*100)}%;background:var(--b)"></div></div><div class="pr-n">${count}</div></div>`).join('')||`<div class="es" style="padding:16px"><div class="es-s">لا يوجد بيانات</div></div>`}</div></div>
    <div class="card"><div class="ch"><div class="ch-l"><div class="ch-ic" style="background:var(--pl);color:var(--p)">${S(I.bars,'var(--p)')}</div><div class="ch-t">أكثر التصنيفات طلباً</div></div></div>
    <div class="cb">${topCat.map(([cat,count])=>`<div class="pr"><div class="pr-l" style="min-width:110px">${cat}</div><div class="pr-tr"><div class="pr-br" style="width:${Math.round(count/mxCat*100)}%;background:var(--p)"></div></div><div class="pr-n">${count}</div></div>`).join('')||`<div class="es" style="padding:16px"><div class="es-s">لا يوجد بيانات</div></div>`}</div></div>
  </div>
  <div class="card"><div class="ch"><div class="ch-t">توزيع الحالات</div></div><div class="cb">
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;text-align:center">
      ${[{l:'قيد المراجعة',k:'pending_review',c:'var(--a)',bg:'var(--al)'},{l:'مفتوح',k:'open',c:'var(--g)',bg:'var(--gl)'},{l:'قيد التنفيذ',k:'in_progress',c:'var(--b)',bg:'var(--bl)'},{l:'مكتمل',k:'completed',c:'var(--p)',bg:'var(--pl)'},{l:'مرفوض',k:'rejected',c:'var(--r)',bg:'var(--rl)'}].map(it=>`<div style="background:${it.bg};border-radius:var(--r8);padding:16px 10px;border:1px solid ${it.c}33"><div style="font-size:26px;font-weight:800;color:${it.c};margin-bottom:4px">${rq.filter(r=>r.status===it.k).length}</div><div style="font-size:10px;font-weight:600;color:var(--t3)">${it.l}</div><div style="font-size:9px;color:var(--t4);margin-top:2px">${rq.length?Math.round(rq.filter(r=>r.status===it.k).length/rq.length*100):0}%</div></div>`).join('')}
    </div>
  </div></div>`);
}
