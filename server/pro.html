<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ملف المزود — مناقصة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#374151;--muted:#8896AA;--hint:#B0BDD0;
  --border:#E6E2D9;--bg:#F0F2F5;--white:#FFFFFF;
  --green:#16A34A;--green-l:#DCFCE7;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--p);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.back{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;border:none;background:none;font-family:inherit;cursor:pointer;padding:6px 10px;border-radius:8px;transition:.15s}
.back:hover{background:rgba(255,255,255,.1);color:#fff}
.logo{font-size:17px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px;text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.nav-in{padding:7px 16px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
.nav-in:hover{background:var(--gold-d)}
.cover{height:180px;background:linear-gradient(135deg,#0D1829 0%,#16213E 40%,#1e3560 100%);position:relative;overflow:hidden}
.cover-net{position:absolute;inset:0;opacity:.12}
.cover-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.profile-sec{max-width:680px;margin:0 auto;padding:0 16px}
.profile-top{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-50px;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.av-wrap{position:relative;flex-shrink:0}
.av{width:110px;height:110px;border-radius:50%;border:4px solid var(--white);background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:var(--gold-d);overflow:hidden;box-shadow:var(--shadow-md)}
.av img{width:100%;height:100%;object-fit:cover}
.ver-dot{position:absolute;bottom:6px;left:6px;width:26px;height:26px;background:#2563EB;border-radius:50%;border:3px solid var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,.4)}
.profile-actions{display:flex;gap:8px;padding-bottom:8px;flex-wrap:wrap}
.btn-call{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--gold);color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 2px 8px rgba(201,146,10,.3);transition:.15s}
.btn-call:hover{background:var(--gold-d);transform:translateY(-1px)}
.btn-wa{display:flex;align-items:center;gap:6px;padding:10px 20px;background:#16A34A;color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 2px 8px rgba(22,163,74,.25);transition:.15s}
.btn-wa:hover{background:#15803D;transform:translateY(-1px)}
.btn-msg{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--white);color:var(--p);border:1.5px solid var(--p);border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
.btn-msg:hover{background:var(--p);color:#fff}
.btn-share{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--white);color:var(--muted);border:1.5px solid var(--border);border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-share:hover{border-color:var(--p);color:var(--p)}
.profile-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.pname{font-size:24px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:4px}
.pbiz{font-size:15px;font-weight:700;color:var(--gold-d);margin-bottom:6px}
.phead{font-size:14px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.pinfo-row{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);margin-bottom:4px}
.pinfo-row svg{flex-shrink:0}
.ver-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.15);color:#2563EB;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.apill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800}
.a-now{background:var(--green-l);color:var(--green)}
.a-rec{background:var(--gold-l);color:var(--gold-d)}
.a-old{background:var(--bg);color:var(--muted)}
.rat-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.stars{font-size:16px;letter-spacing:1px}
.rat-n{font-size:16px;font-weight:900;color:var(--text)}
.rat-c{font-size:12px;color:var(--muted)}
.stats-card{background:var(--white);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden}
.stat{background:var(--white);padding:14px 8px;text-align:center}
.sv{font-size:24px;font-weight:900;color:var(--text);line-height:1}
.sv.gold{color:var(--gold)}
.sl{font-size:10px;color:var(--muted);font-weight:600;margin-top:4px}
.specs-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title-ic{width:28px;height:28px;border-radius:8px;background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.specs-list{display:flex;gap:8px;flex-wrap:wrap}
.spec-tag{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg);border:1px solid var(--border);border-radius:22px;font-size:12px;font-weight:700;color:var(--text)}
.spec-tag svg{flex-shrink:0;stroke:var(--gold)}
.bio-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.bio-text{font-size:13px;color:var(--text2);line-height:2;white-space:pre-line}
.exp-tag{display:inline-flex;align-items:center;gap:6px;background:var(--gold-l);border:1px solid var(--gold-soft);color:var(--gold-d);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:12px}
.social-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.social-link{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:12px;text-decoration:none;margin-bottom:8px;font-size:13px;font-weight:800;transition:.15s}
.social-link:last-child{margin-bottom:0}
.social-link:hover{transform:translateY(-1px);filter:brightness(1.05)}
.social-link span{display:flex;align-items:center;gap:9px}
.social-wa{background:#25D366;color:#fff}
.social-yt{background:#FF0000;color:#fff}
.social-ig{background:linear-gradient(135deg,#E1306C,#833AB4);color:#fff}
.social-tw{background:#000;color:#fff}
.social-sn{background:#FFFC00;color:#1a1a1a}
.social-tt{background:#010101;color:#fff}
.social-map{background:#1A73E8;color:#fff}
.social-web{background:var(--p);color:#fff}
.port-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.port-img{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;position:relative;background:var(--bg)}
.port-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.port-img:hover img{transform:scale(1.06)}
.port-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:.2s;display:flex;align-items:center;justify-content:center}
.port-img:hover .port-img-overlay{background:rgba(0,0,0,.25)}
.port-zoom{opacity:0;transition:.2s;color:#fff;font-size:22px}
.port-img:hover .port-zoom{opacity:1}
.rev-card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.rev-summary{display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg);border-radius:12px;margin-bottom:16px}
.rev-big-num{font-size:48px;font-weight:900;color:var(--text);line-height:1}
.rev-stars-big{font-size:22px;letter-spacing:3px;margin-bottom:4px}
.rev-based{font-size:11px;color:var(--muted)}
.rev{padding:14px 0;border-bottom:1px solid var(--border)}
.rev:last-child{border-bottom:none;padding-bottom:0}
.rev-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rev-av{width:38px;height:38px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--p);flex-shrink:0;overflow:hidden}
.rev-av img{width:100%;height:100%;object-fit:cover}
.rev-name{font-size:13px;font-weight:800;color:var(--text)}
.rev-date{font-size:10px;color:var(--muted);margin-top:1px}
.rev-stars{margin-right:auto;font-size:13px;color:var(--gold);letter-spacing:1px}
.rev-req{font-size:11px;color:var(--hint);margin-top:2px}
.rev-comment{font-size:13px;color:var(--text2);line-height:1.9;padding-right:48px;margin-top:6px}
.rev-imgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-right:48px}
.rev-img{width:60px;height:60px;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.rev-img img{width:100%;height:100%;object-fit:cover}
.rev-reply{margin-top:8px;margin-right:48px;background:var(--gold-l);border-radius:10px;padding:9px 13px;border-right:3px solid var(--gold)}
.rev-reply-label{font-size:10px;font-weight:800;color:var(--gold-d);margin-bottom:3px}
.rev-reply-text{font-size:12px;color:var(--text2);line-height:1.7}
.cta-card{background:linear-gradient(135deg,var(--p3),var(--p));border-radius:16px;padding:24px 20px;margin-bottom:14px;text-align:center;border-bottom:3px solid var(--gold);box-shadow:var(--shadow-md)}
.cta-logo{font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.cta-text{font-size:13px;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:16px}
.cta-btn{display:inline-block;padding:13px 32px;background:var(--gold);color:#fff;border:none;border-radius:22px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 4px 14px rgba(201,146,10,.4);transition:.15s}
.cta-btn:hover{background:var(--gold-d);transform:translateY(-1px)}
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:16px}
.viewer.on{display:flex}
.viewer img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.vcl{position:absolute;top:14px;right:14px;width:40px;height:40px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.vcl:hover{background:rgba(255,255,255,.2)}
.sk{background:linear-gradient(90deg,#eef2f8 25%,#e2eaf4 50%,#eef2f8 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
.wrap{max-width:680px;margin:0 auto;padding:12px 16px 40px}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:12px}
@media(max-width:560px){.cover{height:140px}.av{width:90px;height:90px;font-size:32px}.pname{font-size:20px}.profile-actions{gap:6px}.btn-call,.btn-wa,.btn-msg,.btn-share{padding:9px 14px;font-size:12px}}
</style>
</head>

var API='https://manaqasati-production.up.railway.app';
function getId(){var slug=location.pathname.split('/').pop();var m=slug.match(/(\d+)$/);if(m)return m[1];return new URLSearchParams(location.search).get('id')||'';}
function oImg(s){document.getElementById('vi').src=s;document.getElementById('viewer').classList.add('on');document.body.style.overflow='hidden';}
function cImg(){document.getElementById('viewer').classList.remove('on');document.body.style.overflow='';}
function mkStars(n,col,sz){var h='',c=col||'#C9920A',s=sz||'15px';for(var i=1;i<=5;i++)h+='<span style="color:'+(i<=Math.round(n)?c:'#E6E2D9')+';font-size:'+s+'">&#9733;</span>';return h;}
function pill(d){var m=d?Math.floor((Date.now()-new Date(d))/60000):9999;if(m<60)return '<span class="apill a-now">&#9679; نشط الآن</span>';if(m<1440)return '<span class="apill a-rec">&#9679; نشط منذ '+Math.floor(m/60)+' ساعة</span>';return '<span class="apill a-old">&#9679; آخر نشاط منذ '+Math.floor(m/1440)+' يوم</span>';}
function ph966(p){if(!p)return'';var n=p.replace(/\D/g,'');if(n.startsWith('966'))return n;if(n.startsWith('0'))return '966'+n.slice(1);return '966'+n;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ago(d){if(!d)return'';var m=Math.floor((Date.now()-new Date(d))/60000);if(m<2)return'نشط الآن';if(m<60)return'منذ '+m+' د';var h=Math.floor(m/60);if(h<24)return'منذ '+h+' ساعة';return'منذ '+Math.floor(h/24)+' يوم';}

function openExternal(e,url){
  try{
    var w=window.open(url,'_blank','noopener,noreferrer');
    if(w){e.preventDefault();return false;}
  }catch(err){}
  // لو window.open فشل (WebView)، نترك السلوك الافتراضي (target=_blank)
  return true;
}
