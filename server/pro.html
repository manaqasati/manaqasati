<style>
:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#374151;--muted:#8896AA;--hint:#B0BDD0;
  --border:#E6E2D9;--bg:#F5F5F0;--white:#FFFFFF;
  --green:#16A34A;--green-l:#DCFCE7;
  --shadow:0 2px 12px rgba(15,23,42,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.nav{background:var(--p);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.back-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif}
.back-btn:hover{color:#fff}
.logo{font-size:17px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px;text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.nav-reg{padding:7px 14px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif}

/* HERO BANNER */
.hero-banner{background:linear-gradient(135deg,var(--p3),var(--p));padding:28px 16px 70px;position:relative;overflow:hidden}
.hero-banner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero-net{position:absolute;inset:0;pointer-events:none;opacity:.08}

/* PROFILE FLOAT */
.profile-float{max-width:500px;margin:-52px auto 0;padding:0 16px;position:relative;z-index:10}
.profile-card{background:var(--white);border-radius:20px;padding:20px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(15,23,42,.12);text-align:center}
.av-wrap{position:relative;display:inline-block;margin-bottom:12px}
.av{width:90px;height:90px;border-radius:50%;border:4px solid var(--white);outline:3px solid var(--gold);overflow:hidden;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:var(--gold-d);margin:0 auto}
.av img{width:100%;height:100%;object-fit:cover}
.ver-dot{position:absolute;bottom:2px;left:2px;width:24px;height:24px;background:#2563EB;border-radius:50%;border:3px solid var(--white);display:flex;align-items:center;justify-content:center}
.pname{font-size:22px;font-weight:900;color:var(--text);margin-bottom:3px}
.pbiz{font-size:14px;font-weight:700;color:var(--gold-d);margin-bottom:6px}
.pcity{font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:10px}
.ver-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);color:#2563EB;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.rating-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.stars{font-size:18px;letter-spacing:2px}
.rat-num{font-size:18px;font-weight:900;color:var(--text)}
.rat-cnt{font-size:12px;color:var(--muted)}
.active-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;margin-bottom:12px}
.a-now{background:var(--green-l);color:var(--green);border:1px solid #BBF7D0}
.a-recent{background:var(--gold-l);color:var(--gold-d);border:1px solid var(--gold-soft)}
.a-old{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.specs-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.spec-chip{background:var(--bg);border:1px solid var(--border);color:var(--p);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700}

/* STATS */
.stats-strip{max-width:500px;margin:12px auto 0;padding:0 16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.stat{padding:14px 8px;text-align:center;border-left:1px solid var(--border)}
.stat:last-child{border-left:none}
.stat-v{font-size:22px;font-weight:900;color:var(--text);line-height:1}
.stat-v.gold{color:var(--gold)}
.stat-l{font-size:10px;color:var(--muted);font-weight:600;margin-top:3px}

/* CONTENT */
.wrap{max-width:500px;margin:14px auto 40px;padding:0 16px}

/* CONTACT CARD */
.contact-card{background:var(--p);border-radius:16px;padding:18px;margin-bottom:14px;border-bottom:3px solid var(--gold);box-shadow:0 4px 20px rgba(13,24,41,.15)}
.contact-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.8px;text-transform:uppercase;text-align:center;margin-bottom:12px}
.btns-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:12px;font-size:14px;font-weight:800;text-decoration:none;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .18s}
.cbtn:active{transform:scale(.97)}
.cbtn-call{background:var(--gold);color:#fff;box-shadow:0 3px 12px rgba(201,146,10,.35)}
.cbtn-call:hover{background:var(--gold-d)}
.cbtn-wa{background:#16A34A;color:#fff;box-shadow:0 3px 12px rgba(22,163,74,.25)}
.cbtn-wa:hover{background:#15803D}
.cbtn-msg{grid-column:1/-1;background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.12)}
.cbtn-msg:hover{background:rgba(255,255,255,.14);color:#fff}
.phone-txt{text-align:center;font-size:12px;color:rgba(255,255,255,.3);margin-top:4px}

/* SECTION */
.sec{background:var(--white);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sec-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sec-ic{width:32px;height:32px;border-radius:9px;background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-lbl{font-size:14px;font-weight:900;color:var(--text)}
.sec-cnt{font-size:11px;color:var(--muted);margin-right:auto}
.bio-text{font-size:13px;color:var(--text2);line-height:2}
.exp-tag{display:inline-flex;align-items:center;gap:5px;background:var(--gold-l);border:1px solid var(--gold-soft);color:var(--gold-d);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px}

/* PORTFOLIO */
.port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.port-img{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;background:var(--bg);border:1px solid var(--border)}
.port-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.port-img:hover img{transform:scale(1.06)}

/* REVIEWS */
.rev{padding:14px 0;border-bottom:1px solid var(--border)}
.rev:last-child{border-bottom:none;padding-bottom:0}
.rev-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rev-av{width:36px;height:36px;border-radius:50%;background:var(--p-light,#EEF2FF);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--p);flex-shrink:0;overflow:hidden}
.rev-av img{width:100%;height:100%;object-fit:cover}
.rev-name{font-size:13px;font-weight:800;color:var(--text)}
.rev-date{font-size:10px;color:var(--muted);margin-top:1px}
.rev-stars{margin-right:auto;font-size:14px;color:var(--gold)}
.rev-comment{font-size:12px;color:var(--text2);line-height:1.9;padding-right:46px;margin-top:4px}

/* CTA */
.platform-cta{background:var(--p);border-radius:16px;padding:22px 18px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;border-bottom:3px solid var(--gold)}
.platform-cta::before{content:'';position:absolute;inset:0;opacity:.05;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='1'%3E%3Ccircle cx='20' cy='20' r='1'/%3E%3C/g%3E%3C/svg%3E")}
.cta-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px;position:relative}
.cta-text{font-size:12px;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:14px;position:relative}
.cta-btn{display:inline-block;padding:12px 28px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;text-decoration:none;box-shadow:0 4px 14px rgba(201,146,10,.35);position:relative;transition:.18s}
.cta-btn:hover{background:var(--gold-d);transform:translateY(-1px)}

/* SHARE */
.share-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:12px;transition:.15s;box-shadow:var(--shadow)}
.share-btn:hover{border-color:var(--p);color:var(--p)}

/* VIEWER */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;padding:16px}
.viewer.show{display:flex}
.viewer img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.vcl{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* SKELETON */
.sk{background:linear-gradient(90deg,#eef2f8 25%,#e2eaf4 50%,#eef2f8 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}

.pg-foot{text-align:center;padding:16px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <button class="back-btn" onclick="location.href='/'">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    الرئيسية
  </button>
  <a class="logo" href="/"><span class="logo-dot"></span>مناقصة</a>

</nav>

<!-- HERO BANNER -->
<div class="hero-banner">
  <svg class="hero-net" viewBox="0 0 500 120" preserveAspectRatio="none">
    <line x1="30" y1="20" x2="150" y2="55" stroke="#fff" stroke-width="1.5"/>
    <line x1="150" y1="55" x2="280" y2="25" stroke="#fff" stroke-width="1.5"/>
    <line x1="280" y1="25" x2="430" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="150" y1="55" x2="200" y2="30" stroke="#C9920A" stroke-width="1.5" stroke-opacity=".8"/>
    <circle cx="150" cy="55" r="7" fill="#fff" opacity=".4"/>
    <circle cx="200" cy="30" r="5" fill="#C9920A" opacity=".8"/>
    <circle cx="280" cy="25" r="4" fill="#fff" opacity=".3"/>
  </svg>
</div>

<!-- PROFILE FLOAT -->
<div class="profile-float">
  <div class="profile-card" id="profile-card">
    <!-- Skeleton -->
    <div class="av-wrap"><div class="av sk" style="outline:none;border:none"></div></div>
    <div class="sk" style="height:22px;width:55%;margin:0 auto 10px"></div>
    <div class="sk" style="height:13px;width:40%;margin:0 auto 14px"></div>
    <div class="sk" style="height:36px;width:70%;margin:0 auto"></div>
  </div>
</div>

<!-- STATS -->
<div class="stats-strip">
  <div class="stats" id="stats-row" style="display:none">
    <div class="stat"><div class="stat-v gold" id="s-avg">—</div><div class="stat-l">التقييم</div></div>
    <div class="stat"><div class="stat-v" id="s-cnt">—</div><div class="stat-l">تقييم</div></div>
    <div class="stat"><div class="stat-v" id="s-done">—</div><div class="stat-l">مشروع منجز</div></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="wrap" id="main-content"></div>

<!-- IMAGE VIEWER -->
<div class="viewer" id="viewer" onclick="if(event.target===this)closeImg()">
  <button class="vcl" onclick="closeImg()">✕</button>
  <img id="vimg" src="" alt="">
</div>

<script>
var API = 'https://manaqasati-production.up.railway.app';

function getId(){
  var path = location.pathname;
  var slug = path.split('/').pop();
  var m = slug.match(/(\d+)$/);
  if(m) return m[1];
  return new URLSearchParams(location.search).get('id')||'';
}
function starsHtml(n,color,sz){
  var h='';
  for(var i=1;i<=5;i++) h+='<span style="color:'+(i<=Math.round(n)?(color||'#C9920A'):'#E6E2D9')+';font-size:'+(sz||'17px')+'">★</span>';
  return h;
}
function ago(d){
  if(!d) return '';
  var m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<2) return 'نشط الآن';
  if(m<60) return 'منذ '+m+' د';
  var h=Math.floor(m/60);
  if(h<24) return 'منذ '+h+' ساعة';
  return 'منذ '+Math.floor(h/24)+' يوم';
}
function activePill(d){
  var m=d?Math.floor((Date.now()-new Date(d))/60000):99999;
  if(m<60)   return '<span class="active-pill a-now">● نشط الآن</span>';
  if(m<1440) return '<span class="active-pill a-recent">● نشط منذ '+Math.floor(m/60)+' ساعة</span>';
  return '<span class="active-pill a-old">● آخر نشاط منذ '+Math.floor(m/1440)+' يوم</span>';
}
function phone966(ph){
  if(!ph) return '';
  var n=ph.replace(/\D/g,'');
  if(n.startsWith('966')) return n;
  if(n.startsWith('0')) return '966'+n.slice(1);
  return '966'+n;
}
function openImg(src){ document.getElementById('vimg').src=src; document.getElementById('viewer').classList.add('show'); document.body.style.overflow='hidden'; }
function closeImg(){ document.getElementById('viewer').classList.remove('show'); document.body.style.overflow=''; }

function render(p, rat){
  var avg   = parseFloat(p.avg_rating)||parseFloat(rat&&rat.average)||0;
  var cnt   = parseInt(p.review_count)||parseInt(rat&&rat.count)||0;
  var vrf   = !!(p.profile_image&&p.bio&&(p.specialties||[]).length>0&&avg>0);
  var lastA = p.last_bumped_at||p.created_at;
  var phone = p.phone||'';
  var ph96  = phone966(phone);
  var reviews=(rat&&rat.reviews)||[];
  var ports =(p.portfolio_images)||[];
  var pName = p.business_name||p.name||'مزود';
  var pCity = p.city||'السعودية';
  var pSpecs= (p.specialties||[]).join('، ');
  var url   = location.href;

  // SEO
  var pgT = pName+(pSpecs?' — '+pSpecs:'')+' | مناقصة';
  var pgD = pName+' مزود خدمة في '+pCity+(pSpecs?'، متخصص في '+pSpecs:'')+(avg>0?'. تقييم '+avg.toFixed(1)+' من 5':'')+'. تواصل الآن.';
  document.getElementById('pg-title').textContent = pgT;
  document.getElementById('pg-desc').content = pgD;
  document.getElementById('og-title').content = pgT;
  document.getElementById('og-desc').content = pgD;
  document.getElementById('pg-can').href = url;
  document.title = pgT;
  if(p.profile_image&&p.profile_image.startsWith('http'))
    document.getElementById('og-img').content=p.profile_image;
  var sc={"@context":"https://schema.org","@type":"LocalBusiness","name":pName,"description":pgD,"address":{"@type":"PostalAddress","addressLocality":pCity,"addressCountry":"SA"},"url":url};
  if(phone) sc.telephone=phone;
  if(avg>0) sc.aggregateRating={"@type":"AggregateRating","ratingValue":avg.toFixed(1),"reviewCount":cnt};
  document.getElementById('schema').textContent=JSON.stringify(sc);

  // PROFILE CARD
  var avHtml=p.profile_image?'<img src="'+p.profile_image+'" alt="'+pName+'" loading="eager">':pName.charAt(0);
  var verDot=vrf?'<div class="ver-dot"><svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>':'';
  var verBadge=vrf?'<div class="ver-badge"><svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>مزود موثّق</div>':'';
  var specChips=(p.specialties||[]).map(function(s){return '<span class="spec-chip">'+s+'</span>';}).join('');

  document.getElementById('profile-card').innerHTML=
    '<div class="av-wrap"><div class="av">'+avHtml+'</div>'+verDot+'</div>'
    +(p.business_name&&p.business_name!==p.name?'<div class="pbiz">'+p.business_name+'</div>':'')
    +'<h1 class="pname">'+p.name+'</h1>'
    +verBadge
    +'<div class="pcity"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+pCity+'</div>'
    +(avg>0?'<div class="rating-row">'+starsHtml(avg,'#C9920A','18px')+'<span class="rat-num">'+avg.toFixed(1)+'</span><span class="rat-cnt">('+cnt+' تقييم)</span></div>':'')
    +activePill(lastA)
    +(specChips?'<div class="specs-row">'+specChips+'</div>':'');

  // STATS
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('s-avg').textContent=avg>0?avg.toFixed(1):'—';
  document.getElementById('s-cnt').textContent=cnt;
  document.getElementById('s-done').textContent=p.completed_projects||0;

  // MAIN CONTENT
  var html='';

  // CONTACT
  html+='<div class="contact-card">'
    +'<div class="contact-lbl">تواصل مع المزود</div>'
    +'<div class="btns-grid">';
  if(phone){
    html+='<a href="tel:'+phone+'" class="cbtn cbtn-call">'
      +'<svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 7.63 19.79 19.79 0 01.01 4 2 2 0 012 1.84h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.72 6.72l1.24-1.24a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>'
      +'اتصال مباشر</a>';
    html+='<a href="https://wa.me/'+ph96+'" target="_blank" rel="noopener" class="cbtn cbtn-wa">'
      +'<svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
      +'واتساب</a>';
    html+='<div class="phone-txt">'+phone+'</div>';
  }else{
    html+='<a href="/auth.html" class="cbtn cbtn-call">اتصال — سجّل دخول</a>';
    html+='<a href="/auth.html" class="cbtn cbtn-wa">واتساب — سجّل دخول</a>';
  }
  var provId = getId();
  html+='<button class="cbtn cbtn-msg" onclick="goMsg(''+provId+'')">'
    +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'
    +'رسالة عبر المنصة</button>';
  html+='</div></div>';

  // BIO
  if(p.bio){
    html+='<div class="sec">'
      +'<div class="sec-head"><div class="sec-ic"><svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><div class="sec-lbl">نبذة</div></div>'

  }

  // REVIEWS
  if(reviews.length){

      +'<div class="sec-head"><div class="sec-ic"><svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div class="sec-lbl">تقييمات العملاء</div><div class="sec-cnt">'+reviews.length+' تقييم</div></div>';

      var rvDate=rv.created_at?new Date(rv.created_at).toLocaleDateString('ar-SA'):'';
      var rvS='';
      for(var s=1;s<=5;s++) rvS+='<span style="color:'+(s<=rv.rating?'#C9920A':'#E6E2D9')+'">★</span>';
      html+='<div class="rev"><div class="rev-top"><div class="rev-av">'+rvAv+'</div><div><div class="rev-name">'+(rv.reviewer_name||'عميل')+'</div><div class="rev-date">'+rvDate+'</div></div><div class="rev-stars">'+rvS+'</div></div>'+(rv.comment?'<p class="rev-comment">'+rv.comment+'</p>':'')+'</div>';
    }
    html+='</div>';
  }

  // SHARE
  html+='<button class="share-btn" onclick="doShare(\''+pName+'\',\''+url+'\')">'
    +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>'

    +'</div>';

  document.getElementById('main-content').innerHTML=html;
  document.querySelectorAll('.port-img').forEach(function(el){
    el.addEventListener('click',function(){ openImg(el.getAttribute('data-src')); });
  });
}

function goMsg(provId){
  // حفظ المزود المقصود ثم توجيه لصفحة الدخول
  try{ localStorage.setItem('msg_provider_id', provId); }catch(e){}
  location.href = '/auth.html?redirect=msg&provider_id=' + provId;
}

function doShare(name,url){
  if(navigator.share){ navigator.share({title:name+' — مناقصة',url:url}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){ alert('تم نسخ الرابط'); }); }
}

// LOAD
(function(){
  var id=getId();
  if(!id){ document.getElementById('profile-card').innerHTML='<p style="padding:30px;color:var(--muted)">رابط غير صحيح</p>'; return; }
  var d1=null,d2=null,done=0;
  function tryRender(){ done++; if(done<2)return; if(!d1||d1.message){ document.getElementById('profile-card').innerHTML='<p style="padding:30px;color:var(--muted)">المزود غير موجود</p>'; return; } render(d1,d2||{}); }
  var x1=new XMLHttpRequest(); x1.open('GET',API+'/api/providers/'+id,true); x1.onload=function(){try{d1=JSON.parse(x1.responseText);}catch(e){d1=null;} tryRender();}; x1.onerror=function(){tryRender();}; x1.send();
  var x2=new XMLHttpRequest(); x2.open('GET',API+'/api/ratings/provider/'+id,true); x2.onload=function(){try{d2=JSON.parse(x2.responseText);}catch(e){d2=null;} tryRender();}; x2.onerror=function(){tryRender();}; x2.send();
})();
</script>
