<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:#0D1829;color:#fff;min-height:100vh;overflow-x:hidden}

/* ── BACK BAR ── */
.back-bar{background:rgba(13,24,41,.9);backdrop-filter:blur(10px);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:1px solid rgba(201,146,10,.2)}
.back-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif;transition:.15s}
.back-btn:hover{color:#fff}
.platform-logo{font-size:16px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px;text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:#C9920A}

/* ── HERO ── */
.hero{min-height:100vh;background:linear-gradient(160deg,#0D1829 0%,#16213E 50%,#1e2f50 100%);padding:90px 16px 40px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.hero-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-bg svg{width:100%;height:100%;opacity:.06}
.hero-glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(201,146,10,.15) 0%,transparent 70%);pointer-events:none}

/* ── CARD ── */
.card{width:100%;max-width:420px;position:relative;z-index:1}

/* ── PROFILE ── */
.profile{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.av-ring{width:110px;height:110px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#C9920A,#FFD060,#C9920A);margin-bottom:14px;flex-shrink:0;position:relative}
.av{width:100%;height:100%;border-radius:50%;background:#1A2F5E;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;color:#C9920A}
.av img{width:100%;height:100%;object-fit:cover}
.ver-ic{position:absolute;bottom:4px;left:4px;width:26px;height:26px;background:#2563EB;border-radius:50%;border:3px solid #0D1829;display:flex;align-items:center;justify-content:center}
.name{font-size:26px;font-weight:900;color:#fff;text-align:center;margin-bottom:4px;line-height:1.2}
.business{font-size:15px;font-weight:700;color:#C9920A;text-align:center;margin-bottom:8px}
.city-row{display:flex;align-items:center;justify-content:center;gap:5px;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:14px}
.ver-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(37,99,235,.2);border:1px solid rgba(37,99,235,.4);color:#93C5FD;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.rating-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;justify-content:center}
.stars-big{font-size:20px;letter-spacing:3px}
.rating-num{font-size:20px;font-weight:900;color:#fff}
.rating-cnt{font-size:12px;color:rgba(255,255,255,.4)}
.active-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;margin-bottom:16px}
.a-now{background:rgba(22,163,74,.15);color:#4ADE80;border:1px solid rgba(22,163,74,.25)}
.a-recent{background:rgba(201,146,10,.12);color:#C9920A;border:1px solid rgba(201,146,10,.2)}
.a-old{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08)}

/* ── SPECS ── */
.specs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.spec{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.08);border-radius:16px;overflow:hidden;margin-bottom:20px;border:1px solid rgba(255,255,255,.06)}
.stat{background:#111e35;padding:14px 8px;text-align:center}
.stat-v{font-size:22px;font-weight:900;color:#fff;line-height:1}
.stat-v.gold{color:#C9920A}
.stat-l{font-size:10px;color:rgba(255,255,255,.3);font-weight:600;margin-top:4px}

/* ── CONTACT BUTTONS ── */
.contact-section{margin-bottom:20px}
.contact-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;text-align:center;margin-bottom:10px}
.btns-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;font-size:14px;font-weight:800;text-decoration:none;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .18s;letter-spacing:.2px}
.cbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.cbtn:active{transform:scale(.97)}
.cbtn-call{background:linear-gradient(135deg,#C9920A,#F0B429);color:#fff;box-shadow:0 4px 16px rgba(201,146,10,.3)}
.cbtn-wa{background:linear-gradient(135deg,#16A34A,#22C55E);color:#fff;box-shadow:0 4px 16px rgba(22,163,74,.25)}
.cbtn-msg{grid-column:1/-1;background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.1)}
.cbtn-msg:hover{background:rgba(255,255,255,.1);color:#fff}
.phone-txt{text-align:center;font-size:12px;color:rgba(255,255,255,.25);margin-top:4px}

/* ── BIO ── */
.section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:14px}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-ic{width:30px;height:30px;border-radius:9px;background:rgba(201,146,10,.15);border:1px solid rgba(201,146,10,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-lbl{font-size:13px;font-weight:800;color:rgba(255,255,255,.7)}
.bio-text{font-size:13px;color:rgba(255,255,255,.55);line-height:2}
.exp-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(201,146,10,.12);border:1px solid rgba(201,146,10,.2);color:#C9920A;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px}

/* ── PORTFOLIO ── */
.port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.port-img{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;position:relative;background:rgba(255,255,255,.05)}
.port-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.port-img:hover img{transform:scale(1.07)}

/* ── REVIEWS ── */
.rev{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rev:last-child{border-bottom:none;padding-bottom:0}
.rev-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.rev-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.rev-av img{width:100%;height:100%;object-fit:cover}
.rev-name{font-size:13px;font-weight:800;color:rgba(255,255,255,.8)}
.rev-date{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.rev-stars{margin-right:auto;font-size:13px}
.rev-comment{font-size:12px;color:rgba(255,255,255,.45);line-height:1.9;padding-right:44px;margin-top:4px}

/* ── PLATFORM CTA ── */
.platform-cta{background:linear-gradient(135deg,rgba(201,146,10,.12),rgba(201,146,10,.05));border:1.5px solid rgba(201,146,10,.25);border-radius:16px;padding:18px;text-align:center;margin-bottom:20px}
.cta-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px}
.cta-text{font-size:12px;color:rgba(255,255,255,.4);line-height:1.8;margin-bottom:12px}
.cta-btn{display:inline-block;padding:11px 28px;background:linear-gradient(135deg,#C9920A,#F0B429);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;text-decoration:none;box-shadow:0 4px 14px rgba(201,146,10,.35);transition:.18s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,146,10,.45)}

/* ── SHARE ── */
.share-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:8px;transition:.15s}
.share-btn:hover{background:rgba(255,255,255,.08);color:#fff}

/* ── FOOTER ── */
.pg-foot{text-align:center;padding:16px 0 8px;font-size:10px;color:rgba(255,255,255,.15)}

/* ── VIEWER ── */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center;padding:16px}
.viewer.show{display:flex}
.viewer img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.vcl{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}

@media(max-width:400px){
  .name{font-size:22px}
  .cbtn{font-size:13px;padding:12px}
  .av-ring{width:95px;height:95px}
}
</style>
</head>

<!-- IMAGE VIEWER -->

<script>
var API = 'https://manaqasati-production.up.railway.app';

function getSlug(){
  // URL: /pro/وليد-49  or  /pro/49
  var path = location.pathname;
  var parts = path.split('/');
  var slug = parts[parts.length-1] || parts[parts.length-2] || '';
  // Extract ID: last number in slug
  var m = slug.match(/(\d+)$/);
  if(m) return m[1];
  // Try query param as fallback
  return new URLSearchParams(location.search).get('id') || '';
}

function starsHtml(n, color, sz){
  var h='', c=color||'#C9920A', s=sz||'18px';
  for(var i=1;i<=5;i++) h+='<span style="color:'+(i<=Math.round(n)?c:'rgba(255,255,255,.15)')+';font-size:'+s+'">★</span>';
  return h;
}
function ago(d){
  if(!d) return '';
  var m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<2) return 'نشط الآن';
  if(m<60) return 'منذ '+m+' د';
  var h=Math.floor(m/60);
  if(h<24) return 'منذ '+h+' ساعة';
  return 'منذ '+Math.floor(h/24)+' يوم';
}
function activePill(d){
  if(!d) return '<span class="active-pill a-old">● آخر ظهور منذ فترة</span>';
  var m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<60) return '<span class="active-pill a-now">● نشط الآن</span>';
  if(m<1440) return '<span class="active-pill a-recent">● نشط منذ '+Math.floor(m/60)+' ساعة</span>';
  return '<span class="active-pill a-old">● آخر نشاط منذ '+Math.floor(m/1440)+' يوم</span>';
}
function phone966(ph){
  if(!ph) return '';
  var n=ph.replace(/\D/g,'');
  if(n.startsWith('966')) return n;
  if(n.startsWith('0')) return '966'+n.slice(1);
  return '966'+n;
}
function openImg(src){ document.getElementById('vimg').src=src; document.getElementById('viewer').classList.add('show'); document.body.style.overflow='hidden'; }
function closeImg(){ document.getElementById('viewer').classList.remove('show'); document.body.style.overflow=''; }

function shareCard(name, url){
  if(navigator.share){
    navigator.share({ title: name+' — مناقصة', text: 'تواصل مع '+name+' على منصة مناقصة', url: url });
  } else {
    navigator.clipboard && navigator.clipboard.writeText(url).then(function(){
      var btn=document.getElementById('share-btn');
      if(btn){ btn.textContent='تم نسخ الرابط ✓'; setTimeout(function(){ btn.textContent='مشاركة الملف الشخصي'; },2000); }
    });
  }
}

function render(p, rat){
  var avg    = parseFloat(p.avg_rating)||parseFloat(rat&&rat.average)||0;
  var cnt    = parseInt(p.review_count)||parseInt(rat&&rat.count)||0;
  var vrf    = !!(p.profile_image && p.bio && (p.specialties||[]).length>0 && avg>0);
  var lastA  = p.last_bumped_at || p.created_at;
  var phone  = p.phone||'';
  var phone96= phone966(phone);
  var reviews= (rat&&rat.reviews)||[];
  var ports  = p.portfolio_images||[];
  var pName  = p.business_name||p.name||'مزود';
  var pCity  = p.city||'السعودية';
  var pSpecs = (p.specialties||[]).join('، ');
  var shareUrl = location.href;

  // ── SEO ──────────────────────────────────────
  var pgT = pName+(pSpecs?' — '+pSpecs:'')+' | مناقصة';
  var pgD = pName+' مزود خدمة في '+pCity+(pSpecs?' متخصص في '+pSpecs:'')+(avg>0?' — تقييم '+avg.toFixed(1)+' من 5':'')+'. تواصل معه الآن على منصة مناقصة.';
  document.getElementById('pg-title').textContent   = pgT;
  document.getElementById('pg-desc').content        = pgD;
  document.getElementById('og-title').content       = pgT;
  document.getElementById('og-desc').content        = pgD;
  document.getElementById('tw-title').content       = pgT;
  document.getElementById('tw-desc').content        = pgD;
  document.getElementById('pg-can').href            = shareUrl;
  document.title = pgT;
  if(p.profile_image && p.profile_image.startsWith('http'))
    document.getElementById('og-img').content = p.profile_image;

  // JSON-LD
  var schema = {"@context":"https://schema.org","@type":"LocalBusiness","name":pName,"description":pgD,"address":{"@type":"PostalAddress","addressLocality":pCity,"addressCountry":"SA"}};
  if(phone) schema.telephone = phone;
  if(avg>0) schema.aggregateRating = {"@type":"AggregateRating","ratingValue":avg.toFixed(1),"reviewCount":cnt};
  schema.url = shareUrl;
  document.getElementById('schema').textContent = JSON.stringify(schema);

  // ── BUILD HTML ────────────────────────────────
  var avHtml = p.profile_image
    ? '<img src="'+p.profile_image+'" alt="'+pName+'" loading="eager">'
    : pName.charAt(0);
  var verDot   = vrf?'<div class="ver-ic"><svg width="12" height="12" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>':'';
  var verBadge = vrf?'<div class="ver-badge"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>مزود موثّق على مناقصة</div>':'';
  var specChips= (p.specialties||[]).map(function(s){return '<span class="spec">'+s+'</span>';}).join('');

  var html = '';

  // PROFILE
  html+='<div class="profile">'
    +'<div class="av-ring"><div class="av">'+avHtml+'</div>'+verDot+'</div>'
    +(p.business_name&&p.business_name!==p.name?'<div class="business">'+p.business_name+'</div>':'')
    +'<h1 class="name">'+p.name+'</h1>'
    +verBadge
    +'<div class="city-row"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+pCity+'</div>'
    +(avg>0?'<div class="rating-row">'+starsHtml(avg,'#C9920A','20px')+'<span class="rating-num">'+avg.toFixed(1)+'</span><span class="rating-cnt">('+cnt+' تقييم)</span></div>':'')
    +activePill(lastA)
    +(specChips?'<div class="specs">'+specChips+'</div>':'')
    +'</div>';

  // STATS
  html+='<div class="stats">'
    +'<div class="stat"><div class="stat-v gold">'+(avg>0?avg.toFixed(1):'—')+'</div><div class="stat-l">التقييم</div></div>'
    +'<div class="stat"><div class="stat-v">'+cnt+'</div><div class="stat-l">تقييم</div></div>'
    +'<div class="stat"><div class="stat-v">'+(p.completed_projects||0)+'</div><div class="stat-l">مشروع منجز</div></div>'
    +'</div>';

  // CONTACT
  html+='<div class="contact-section">'
    +'<div class="contact-title">تواصل مباشر</div>'
    +'<div class="btns-grid">';
  if(phone){
    html+='<a href="tel:'+phone+'" class="cbtn cbtn-call">'
      +'<svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 7.63 19.79 19.79 0 01.01 4 2 2 0 012 1.84h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.72 6.72l1.24-1.24a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>'
      +'اتصال</a>';
    html+='<a href="https://wa.me/'+phone96+'" target="_blank" rel="noopener" class="cbtn cbtn-wa">'

// Load data
(function(){
  var id = getSlug();
  if(!id){
    document.getElementById('card').innerHTML='<p style="text-align:center;padding:60px;color:rgba(255,255,255,.4)">رابط غير صحيح</p>';
    return;
  }
  var xhr1 = new XMLHttpRequest();
  var xhr2 = new XMLHttpRequest();
  var d1=null, d2=null, done=0;

  function tryRender(){
    done++;
    if(done<2) return;
    if(!d1||d1.message){
      document.getElementById('card').innerHTML='<p style="text-align:center;padding:60px;color:rgba(255,255,255,.4)">المزود غير موجود</p>';
      return;
    }
    render(d1, d2||{});
  }

  xhr1.open('GET', API+'/api/providers/'+id, true);
  xhr1.onload=function(){ try{d1=JSON.parse(xhr1.responseText);}catch(e){d1=null;} tryRender(); };
  xhr1.onerror=function(){ tryRender(); };
  xhr1.send();

  xhr2.open('GET', API+'/api/ratings/provider/'+id, true);
  xhr2.onload=function(){ try{d2=JSON.parse(xhr2.responseText);}catch(e){d2=null;} tryRender(); };
  xhr2.onerror=function(){ tryRender(); };
  xhr2.send();
})();
</script>
