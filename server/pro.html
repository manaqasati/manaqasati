<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ملف المزود — مناقصة</title>
<meta name="description" content="مزود خدمة على منصة مناقصة السعودية">
<script type="application/ld+json" id="ld"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#16213E;--p2:#1A2F5E;--p3:#0D1829;--gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;--text:#0F172A;--muted:#8896AA;--hint:#94A3B8;--border:#E6E2D9;--bg:#F5F5F0;--white:#FFFFFF;--green:#16A34A;--green-l:#EDFBF0;--red:#DC2626;--p-light:#EEF2FF;--p-mid:#C7D2FE;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.top-bar{background:var(--p3);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--gold)}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:.15s}
.back-btn:hover{background:rgba(255,255,255,.2)}
.top-title{font-size:14px;font-weight:800;color:#fff;flex:1}
.logo-sm{font-size:16px;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:4px}
.hero{background:linear-gradient(135deg,var(--p3),var(--p));padding:28px 20px 24px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.hero-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:18px}
.av{width:80px;height:80px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--p2);flex-shrink:0;border:3px solid rgba(255,255,255,.2);overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.hero-info{flex:1}
.hero-name{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.verified-badge{background:rgba(37,99,235,.3);border:1px solid rgba(37,99,235,.5);color:#93c5fd;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.hero-city{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px}
.hero-stars{display:flex;align-items:center;gap:6px}
.stars{color:#F0A500;font-size:15px;letter-spacing:1px}
.rating-num{font-size:13px;font-weight:800;color:#fff}
.rating-cnt{font-size:11px;color:rgba(255,255,255,.4)}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;max-width:600px;margin-left:auto;margin-right:auto}
.hs{background:rgba(255,255,255,.08);border-radius:10px;padding:10px;text-align:center}
.hs-n{font-size:20px;font-weight:900;color:#fff}
.hs-l{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.content{max-width:600px;margin:0 auto;padding:20px 16px 40px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:900;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.specs{display:flex;flex-wrap:wrap;gap:6px}
.spec{padding:6px 14px;border-radius:20px;background:var(--p-light);color:var(--p);font-size:12px;font-weight:700;border:1px solid var(--p-mid)}
.port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.port-img{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer}
.port-img img{width:100%;height:100%;object-fit:cover;transition:.3s}
.port-img:hover img{transform:scale(1.05)}
.bio-text{font-size:13px;line-height:1.9;color:var(--text2)}
.contact-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;z-index:100}
.btn-wa{flex:1;padding:13px;background:#25D366;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}
.btn-msg{flex:1;padding:13px;background:var(--p);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px}
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.empty{text-align:center;padding:32px;color:var(--muted)}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:13px}
.social-links{display:flex;flex-wrap:wrap;gap:8px}
.social-link{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--text);text-decoration:none;transition:.15s}
.social-link:hover{border-color:var(--p);color:var(--p)}
@media(max-width:480px){.hero-inner{flex-direction:column;text-align:center}.hero-name{justify-content:center}}
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    رجوع
  </button>
  <div class="top-title" id="top-title">ملف المزود</div>
  <div class="logo-sm">
    <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#C9920A"/></svg>
    مناقصة
  </div>
</div>

<div id="loading" class="loading">جاري تحميل الملف...</div>
<div id="main" style="display:none;padding-bottom:80px">

  <div class="hero">
    <div class="hero-inner">
      <div class="av" id="av">م</div>
      <div class="hero-info">
        <div class="hero-name" id="hero-name">—</div>
        <div class="hero-city" id="hero-city"></div>
        <div class="hero-stars" id="hero-stars"></div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="hs"><div class="hs-n" id="st-proj">—</div><div class="hs-l">مشروع منجز</div></div>
      <div class="hs"><div class="hs-n" id="st-rating" style="color:var(--gold)">—</div><div class="hs-l">التقييم</div></div>
      <div class="hs"><div class="hs-n" id="st-exp">—</div><div class="hs-l">سنوات خبرة</div></div>
    </div>
  </div>

  <div class="content">

    <!-- التخصصات -->
    <div class="card" id="specs-card" style="display:none">
      <div class="card-title">
        <svg width="15" height="15" fill="none" stroke="var(--p)" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        التخصصات
      </div>
      <div class="specs" id="specs"></div>
    </div>

    <!-- النبذة -->
    <div class="card" id="bio-card" style="display:none">
      <div class="card-title">
        <svg width="15" height="15" fill="none" stroke="var(--p)" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        نبذة عن المزود
      </div>
      <div class="bio-text" id="bio"></div>
    </div>

    <!-- معرض الأعمال -->
    <div class="card" id="port-card" style="display:none">
      <div class="card-title">
        <svg width="15" height="15" fill="none" stroke="var(--p)" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        معرض الأعمال
      </div>
      <div class="port-grid" id="portfolio"></div>
    </div>

    <!-- روابط التواصل -->
    <div class="card" id="social-card" style="display:none">
      <div class="card-title">
        <svg width="15" height="15" fill="none" stroke="var(--p)" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        روابط التواصل
      </div>
      <div class="social-links" id="social-links"></div>
    </div>

    <!-- التقييمات -->
    <div class="card">
      <div class="card-title">
        <svg width="15" height="15" fill="none" stroke="var(--p)" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        التقييمات <span id="rev-count" style="font-size:12px;color:var(--muted);font-weight:600"></span>
      </div>
      <div id="reviews"><div class="empty">لا توجد تقييمات بعد</div></div>
    </div>

  </div>
</div>

<!-- شريط التواصل -->
<div class="contact-bar" id="contact-bar" style="display:none">
  <a id="wa-btn" href="#" class="btn-wa" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    واتساب
  </a>
  <button id="msg-btn" class="btn-msg" onclick="goMsg()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    راسل المزود
  </button>
</div>

<div id="imgViewer" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;padding:20px">
  <img id="imgViewerImg" src="" style="max-width:100%;max-height:90vh;object-fit:contain;border-radius:10px">
</div>

<script>
var API='https://manaqasati-production.up.railway.app';
var _provId=null,_provPhone=null,_provName='مزود';

function slug2id(){
  var path=location.pathname.replace(/^\/pro\//,'');
  var m=path.match(/(\d+)$/);
  return m?parseInt(m[1]):null;
}

function stars(n){var s='';for(var i=1;i<=5;i++)s+='<span style="color:'+(i<=Math.round(n)?'#F0A500':'#D1D5DB')+'">★</span>';return s;}

function ago(d){
  if(!d)return'';
  var s=(Date.now()-new Date(d))/1000;
  if(s<3600)return Math.floor(s/60)+' دقيقة';
  if(s<86400)return Math.floor(s/3600)+' ساعة';
  if(s<2592000)return Math.floor(s/86400)+' يوم';
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

function goMsg(){
  var token=localStorage.getItem('token');
  if(!token){location.href='/auth.html?mode=register&ref=pro&pid='+_provId;return;}
  fetch(API+'/api/direct-message',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({provider_id:_provId})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.request_id){
      localStorage.setItem('mnq_open_chat_id',d.request_id);
      localStorage.setItem('mnq_open_chat_other',_provId);
      location.href='/dashboard-client.html';
    }
  }).catch(function(){location.href='/auth.html';});
}

async function load(){
  var id=slug2id();
  if(!id){document.getElementById('loading').innerHTML='<div style="padding:60px;text-align:center">مزود غير موجود</div>';return;}
  _provId=id;
  try{
    var r=await fetch(API+'/api/providers/'+id);
    var p=await r.json();
    if(!p||!p.id){document.getElementById('loading').innerHTML='<div style="padding:60px;text-align:center">مزود غير موجود</div>';return;}

    _provPhone=p.phone||null;
    _provName=p.business_name||p.name||'مزود';
    document.title=_provName+' — مناقصة';
    document.getElementById('top-title').textContent=_provName;
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';

    // الأفاتار
    var avEl=document.getElementById('av');
    if(p.profile_image){avEl.innerHTML='<img src="'+p.profile_image+'" alt="'+esc(_provName)+'">';}
    else{avEl.textContent=_provName[0];}

    // الاسم والشارة
    var isVerified=!!(p.profile_image&&p.bio&&(p.specialties||[]).length>0&&parseFloat(p.avg_rating)>0);
    var nameHtml=esc(_provName)+(isVerified?'<span class="verified-badge"><svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>موثّق</span>':'');
    document.getElementById('hero-name').innerHTML=nameHtml;

    // المدينة والخبرة
    var cityParts=[];
    if(p.city)cityParts.push('📍 '+p.city);
    if(p.experience_years)cityParts.push('⏱️ '+p.experience_years+' سنوات خبرة');
    document.getElementById('hero-city').textContent=cityParts.join(' · ');

    // التقييم
    var avg=parseFloat(p.avg_rating)||0;
    var cnt=parseInt(p.review_count)||0;
    if(avg>0){
      document.getElementById('hero-stars').innerHTML=
        '<div class="stars">'+stars(avg)+'</div>'
        +'<span class="rating-num">'+avg.toFixed(1)+'</span>'
        +'<span class="rating-cnt">('+cnt+' تقييم)</span>';
    }

    // الإحصائيات
    document.getElementById('st-proj').textContent=p.completed_projects||'0';
    document.getElementById('st-rating').textContent=avg>0?avg.toFixed(1):'—';
    document.getElementById('st-exp').textContent=p.experience_years?p.experience_years+'y':'—';

    // التخصصات
    if(p.specialties&&p.specialties.length){
      document.getElementById('specs-card').style.display='block';
      document.getElementById('specs').innerHTML=p.specialties.map(function(s){return '<span class="spec">'+esc(s)+'</span>';}).join('');
    }

    // النبذة
    if(p.bio){
      document.getElementById('bio-card').style.display='block';
      document.getElementById('bio').textContent=p.bio;
    }

    // معرض الأعمال
    if(p.portfolio_images&&p.portfolio_images.length){
      document.getElementById('port-card').style.display='block';
      document.getElementById('portfolio').innerHTML=p.portfolio_images.filter(function(i){return i&&i.startsWith('http');}).map(function(img){
        return '<div class="port-img" onclick="openImg(\''+img+'\')"><img src="'+img+'" loading="lazy" alt="عمل"></div>';
      }).join('');
    }

    // روابط التواصل
    var socials=[];
    if(p.website)socials.push({url:p.website,label:'الموقع',icon:'🌐'});
    if(p.instagram)socials.push({url:p.instagram,label:'انستقرام',icon:'📷'});
    if(p.twitter)socials.push({url:p.twitter,label:'تويتر',icon:'🐦'});
    if(p.snapchat)socials.push({url:p.snapchat,label:'سناب',icon:'👻'});
    if(p.tiktok)socials.push({url:p.tiktok,label:'تيك توك',icon:'🎵'});
    if(p.youtube)socials.push({url:p.youtube,label:'يوتيوب',icon:'▶️'});
    if(socials.length){
      document.getElementById('social-card').style.display='block';
      document.getElementById('social-links').innerHTML=socials.map(function(s){
        var url=s.url.startsWith('http')?s.url:'https://'+s.url;
        return '<a href="'+url+'" class="social-link" target="_blank" rel="noopener">'+s.icon+' '+s.label+'</a>';
      }).join('');
    }

    // واتساب
    if(p.phone){
      var num='966'+String(p.phone).replace(/^0/,'').replace(/[^0-9]/g,'');
      var waMsg='مرحباً، أتواصل معك عبر منصة مناقصة.';
      document.getElementById('wa-btn').href='https://wa.me/'+num+'?text='+encodeURIComponent(waMsg);
    } else {
      document.getElementById('wa-btn').style.display='none';
    }
    document.getElementById('contact-bar').style.display='flex';

    // التقييمات
    loadReviews(id);

  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML='<div style="padding:60px;text-align:center;color:#dc2626">تعذر تحميل الملف</div>';
  }
}

async function loadReviews(id){
  try{
    var r=await fetch(API+'/api/ratings/provider/'+id);
    var d=await r.json();
    var reviews=d.reviews||[];
    document.getElementById('rev-count').textContent=reviews.length?'('+reviews.length+')':'';
    if(!reviews.length)return;
    document.getElementById('reviews').innerHTML=reviews.map(function(rv){
      return '<div class="review-item">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">'
          +'<div style="font-size:13px;font-weight:800;color:var(--text)">'+esc(rv.reviewer_name||'عميل')+'</div>'
          +'<div>'+stars(rv.rating)+'</div>'
        +'</div>'
        +(rv.comment?'<div style="font-size:12px;color:var(--text2);line-height:1.8">'+esc(rv.comment)+'</div>':'')
        +'<div style="font-size:10px;color:var(--hint);margin-top:4px">'+ago(rv.created_at)+' مضت</div>'
      +'</div>';
    }).join('');
  }catch(e){}
}

function openImg(src){
  var v=document.getElementById('imgViewer');
  var i=document.getElementById('imgViewerImg');
  if(v&&i){i.src=src;v.style.display='flex';}
}

load();
</script>
</body>
</html>
