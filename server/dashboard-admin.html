<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة الأدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>

:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --p-light:#EEF2FF;--p-mid:#C7D2FE;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#1E293B;--muted:#8896AA;--hint:#94A3B8;
  --border:#E6E2D9;--border2:#D8D3CB;
  --bg:#F5F5F0;--white:#FFFFFF;
  --green:#16A34A;--green-l:#EDFBF0;
  --red:#DC2626;--red-l:#FEF2F2;
  --yellow:#D97706;--yellow-l:#FEF3C7;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
  --shadow:0 1px 4px rgba(15,23,42,.06),0 0 0 1px rgba(15,23,42,.03);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ══ SIDEBAR ══ */
.side{width:260px;background:var(--white);border-left:1px solid var(--border);height:100vh;position:fixed;right:0;top:0;display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px rgba(15,23,42,0.06)}
.side-head{padding:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.side-brand{background:var(--p3);padding:18px 18px 14px;position:relative;overflow:hidden}
.side-brand::before{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:var(--gold)}
.net-svg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.2}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;position:relative;z-index:1;margin-top:2px}
.user-pill{margin:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.av{width:36px;height:36px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av-name{font-size:13px;font-weight:800;color:#fff}
.av-role{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;margin-top:1px}
.nav{padding:10px 10px;flex:1;overflow-y:auto}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-sec{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.8px;padding:0 8px;margin:14px 0 6px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:all .18s;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--gold-l);color:var(--gold-d)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold-d);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--gold);box-shadow:0 3px 10px rgba(212,160,23,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor}
.badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
.side-foot{padding:10px 12px;border-top:1px solid var(--border)}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--red-l)}

/* ══ MAIN ══ */
.main{margin-right:260px;min-height:100vh;display:flex;flex-direction:column;min-width:0}

/* ══ TOPBAR ══ */
.topbar{background:var(--p3);height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:14px;font-weight:800;color:#fff}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 10px rgba(212,160,23,.3)}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px)}

/* ══ CONTENT ══ */
.content{padding:24px 28px;flex:1}
.page{display:none}.page.on{display:block}

/* ══ STATS ══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;position:relative;overflow:hidden;transition:all .2s}
.sc:hover{border-color:var(--p-mid);box-shadow:0 4px 16px rgba(15,23,42,.1);transform:translateY(-1px)}
.sn{font-size:28px;font-weight:900;line-height:1;margin-bottom:6px}
.st{font-size:12px;color:var(--muted);font-weight:600}

/* ══ CARDS ══ */
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;transition:all .2s}
.card:hover{box-shadow:0 4px 16px rgba(15,23,42,.08)}
.card-accent{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.ch-l{display:flex;align-items:center;gap:10px}
.ch-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch h3{font-size:16px;font-weight:800;color:var(--text)}

/* ══ REQUEST CARDS ══ */
.request-card{
  background:var(--white);
  border:2px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
  transition:all .3s ease;
  position:relative;
  overflow:hidden;
}
.request-card::before{
  content:'';
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:5px;
  background:var(--border);
  transition:all .3s ease;
}
.request-card.priority::before{background:var(--gold)}
.request-card.pending::before{background:var(--yellow)}
.request-card.progress::before{background:var(--p)}
.request-card.completed::before{background:var(--green)}
.request-card.rejected::before{background:var(--red)}

.request-card:hover{
  border-color:var(--p-mid);
  box-shadow:0 8px 32px rgba(15,23,42,.12);
  transform:translateY(-2px);
}

.request-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
  gap:16px;
}
.request-info{flex:1;min-width:0}
.request-meta{
  font-size:11px;
  color:var(--hint);
  margin-bottom:8px;
  display:flex;
  gap:8px;
  align-items:center;
}
.request-title{
  font-size:16px;
  font-weight:800;
  color:var(--text);
  margin-bottom:12px;
  line-height:1.4;
}
.request-badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

/* ══ STATUS BADGES ══ */
.status-badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  gap:6px;
  letter-spacing:.3px;
}
.status-badge::before{
  content:'';
  width:6px;
  height:6px;
  border-radius:50%;
  flex-shrink:0;
}
.status-pending_review{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.status-pending_review::before{background:#d97706}
.status-open{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.status-open::before{background:#16a34a}
.status-in_progress{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.status-in_progress::before{background:#2563eb}
.status-completed{background:var(--gold-l);color:#b45309;border:1px solid var(--gold-soft)}
.status-completed::before{background:var(--gold)}
.status-rejected{background:var(--red-l);color:var(--red);border:1px solid #fecaca}
.status-rejected::before{background:var(--red)}

.info-badge{
  background:var(--bg);
  color:var(--muted);
  padding:4px 10px;
  border-radius:16px;
  font-size:10px;
  font-weight:600;
  border:1px solid var(--border2);
}

.request-details{
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:16px;
}
.request-details strong{color:var(--text)}

/* ══ ACTION BUTTONS ══ */
.request-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  padding-top:16px;
  border-top:1px solid var(--border);
}
.btn-action{
  padding:10px 16px;
  border-radius:10px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  border:none;
  font-family:'Tajawal',sans-serif;
  transition:all .2s ease;
  display:inline-flex;
  align-items:center;
  gap:6px;
  flex:1;
  justify-content:center;
  min-width:0;
}
.btn-approve{background:var(--green-l);color:var(--green);border:2px solid #bbf7d0}
.btn-approve:hover{background:var(--green);color:#fff;transform:translateY(-1px)}
.btn-reject{background:var(--red-l);color:var(--red);border:2px solid #fecaca}
.btn-reject:hover{background:var(--red);color:#fff;transform:translateY(-1px)}
.btn-complete{background:var(--green-l);color:var(--green);border:2px solid #bbf7d0}
.btn-complete:hover{background:var(--green);color:#fff;transform:translateY(-1px)}
.btn-edit{background:var(--p-light);color:var(--p);border:2px solid var(--p-mid)}
.btn-edit:hover{background:var(--p);color:#fff;transform:translateY(-1px)}
.btn-delete{background:var(--red-l);color:var(--red);border:2px solid #fecaca}
.btn-delete:hover{background:var(--red);color:#fff;transform:translateY(-1px)}

/* ══ USER CARDS ══ */
.user-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  transition:all .2s;
}
.user-card:hover{
  border-color:var(--p-mid);
  box-shadow:0 4px 16px rgba(15,23,42,.08);
  transform:translateY(-1px);
}
.user-card.inactive{
  background:var(--bg);
  border-color:#fecaca;
  opacity:.8;
}
.user-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.user-info{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:0;
}
.user-avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:var(--p);
  color:#fff;
  font-size:18px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  overflow:hidden;
}
.user-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.user-details{
  min-width:0;
  flex:1;
}
.user-name{
  font-size:14px;
  font-weight:800;
  color:var(--text);
  margin-bottom:3px;
}
.user-email{
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
}
.user-badges{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}
.user-badge{
  background:var(--bg);
  color:var(--muted);
  padding:2px 8px;
  border-radius:16px;
  font-size:10px;
  font-weight:600;
  border:1px solid var(--border2);
}
.user-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* ══ NOTIFICATION FORM ══ */
.notif-form{
  display:grid;
  gap:20px;
}
.form-section{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
}
.section-title{
  font-size:14px;
  font-weight:800;
  color:var(--text);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-icon{
  width:24px;
  height:24px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.recipient-options{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:12px;
  margin-bottom:16px;
}
.recipient-btn{
  padding:12px 16px;
  border:2px solid var(--border);
  border-radius:12px;
  background:var(--white);
  color:var(--muted);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s ease;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-family:'Tajawal',sans-serif;
}
.recipient-btn.active{
  border-color:var(--p);
  background:var(--p-light);
  color:var(--p);
}
.recipient-btn:hover{
  border-color:var(--p-mid);
  background:var(--p-light);
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  align-items:end;
}
.form-field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.form-field.full{grid-column:1/-1}

.form-label{
  font-size:12px;
  font-weight:700;
  color:var(--text2);
}
.form-input, .form-textarea, .form-select{
  padding:12px 16px;
  border:2px solid var(--border);
  border-radius:10px;
  font-family:'Tajawal',sans-serif;
  font-size:14px;
  color:var(--text);
  outline:none;
  background:var(--white);
  transition:all .2s ease;
  resize:none;
}
.form-input:focus, .form-textarea:focus, .form-select:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(212,160,23,.1);
}
.form-textarea{
  min-height:120px;
  resize:vertical;
  line-height:1.6;
}

.send-section{
  background:linear-gradient(135deg, var(--p-light), var(--gold-l));
  border:2px solid var(--gold-soft);
  border-radius:14px;
  padding:24px;
  text-align:center;
}
.send-btn{
  background:linear-gradient(135deg, var(--p), var(--p2));
  color:#fff;
  border:none;
  border-radius:12px;
  padding:14px 32px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  font-family:'Tajawal',sans-serif;
  transition:all .3s ease;
  box-shadow:0 6px 20px rgba(22,33,62,.25);
  display:inline-flex;
  align-items:center;
  gap:10px;
}
.send-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 25px rgba(22,33,62,.35);
}
.send-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

.preview-section{
  background:var(--bg);
  border:2px dashed var(--border2);
  border-radius:12px;
  padding:20px;
}
.preview-phone{
  max-width:280px;
  margin:0 auto;
  background:var(--white);
  border-radius:16px;
  padding:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
.preview-notif{
  background:var(--p-light);
  border-radius:10px;
  padding:12px;
  border-right:4px solid var(--p);
}
.preview-title{
  font-size:13px;
  font-weight:800;
  color:var(--text);
  margin-bottom:4px;
}
.preview-body{
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}

/* ══ FORM CONTROLS ══ */
.tab-btns{
  display:flex;
  gap:6px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.tab-btn{
  padding:8px 16px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  border:2px solid var(--border);
  background:var(--bg);
  color:var(--muted);
  font-family:'Tajawal',sans-serif;
  transition:all .15s;
}
.tab-btn.active{
  background:var(--p);
  color:#fff;
  border-color:var(--p);
}
.tab-btn:hover{
  border-color:var(--p-mid);
}

/* ══ EMPTY / LOADING ══ */
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty-ic{width:52px;height:52px;background:var(--p-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.empty-ic svg{stroke:var(--p)}
.empty h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty p{font-size:12px}
.loading{text-align:center;padding:28px;color:var(--muted);font-size:13px}

/* ══ MOB HEAD ══ */
.mob-head{display:none;background:var(--p);height:54px;padding:0 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mob-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
.mob-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-av{width:30px;height:30px;border-radius:9px;background:var(--gold);color:var(--p2);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mob-out{background:rgba(255,255,255,.1);border:none;cursor:pointer;padding:6px;color:#fff;display:flex;border-radius:8px}

/* ══ BOTTOM NAV ══ */
.bnav{display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:420px;background:var(--p3);border-radius:24px;z-index:100;padding:8px 8px;box-shadow:0 8px 28px rgba(13,24,41,.35)}
.bnav::before{content:'';position:absolute;top:0;left:25%;right:25%;height:1px;background:rgba(255,255,255,.08)}
.bnav-inner{display:flex;align-items:center;justify-content:space-around}

.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;border:none;background:none;cursor:pointer;font-family:'Tajawal',sans-serif;color:rgba(255,255,255,.3);transition:.2s;position:relative;border-radius:16px}
.bni .bic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;transition:.2s}
.bni .bic svg{stroke:currentColor;transition:.2s}
.bni .bt{font-size:9px;font-weight:700;transition:.2s;letter-spacing:.2px}
.bni.on{background:rgba(212,160,23,.15)}
.bni.on .bt{color:var(--gold)}
.bni.on .bic svg{stroke:var(--gold)}

/* ══ OVERLAYS ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,5,30,.65);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column}
.modal-drag{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--white)}

/* ══ RESPONSIVE ══ */
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .side,.topbar{display:none}
  .main{margin-right:0;max-width:100vw;width:100%}
  .mob-head{display:flex}
  .bnav{display:block}
  .content{padding:12px 14px 100px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .request-card{padding:16px}
  .request-actions{flex-direction:column}
  .btn-action{flex:none}
  .recipient-options{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .user-header{flex-direction:column;align-items:flex-start}
  .user-actions{justify-content:flex-start}
}

.pg-t{font-size:16px;font-weight:900;color:var(--text)}
.pg-s{font-size:12px;color:var(--muted);margin-top:3px}
.pghd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:8px;flex-wrap:wrap}
</style>
</head>

<!-- ══ TOAST ══ -->
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--p);color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:all .22s;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25)">
  <div id="tIc" style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0"></div>
  <span id="tMsg"></span>
</div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="ov">
  <div class="modal" style="max-width:560px">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <span id="mTit" style="font-size:15px;font-weight:800;color:var(--text)">—</span>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="mBd"></div>
    <div id="mFt" style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;background:var(--bg);border-radius:0 0 22px 22px"></div>
  </div>
</div>

<script>
'use strict';
var API = 'https://manaqasati-production.up.railway.app';
var _token = localStorage.getItem('token') || '';
var _me    = JSON.parse(localStorage.getItem('user') || '{}');
if (!_token || _me.role !== 'admin') { location.href = 'auth.html'; }

function _el(id){ return document.getElementById(id); }
function _h(id,html){ var e=_el(id); if(e) e.innerHTML=html; }
function _esc(s){ var d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function _fdt(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('ar-SA',{day:'2-digit',month:'2-digit',year:'numeric'}); }catch(e){ return d; } }
function _ago(d){ var s=(Date.now()-new Date(d))/1000; if(s<60)return'الآن'; if(s<3600)return Math.floor(s/60)+' د'; if(s<86400)return Math.floor(s/3600)+' س'; return Math.floor(s/86400)+' يوم'; }
function _fpr(p){ return p?Number(p).toLocaleString('en-US')+' ر.س':'—'; }
function _empty(t,s){ return '<div class="empty"><div class="empty-ic"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg></div><h4>'+t+'</h4>'+(s?'<p>'+s+'</p>':'')+'</div>'; }

function _api(path, opts){
  return fetch(API+path, Object.assign({headers:{'Authorization':'Bearer '+_token,'Content-Type':'application/json'}}, opts||{}))
    .then(function(r){ return r.json(); }).catch(function(){ return {}; });
}

var _tT;
function toast(msg, type){
  var el=_el('toast'),ic=_el('tIc'),tm=_el('tMsg'); if(!el) return;
  ic.textContent=type==='success'?'✓':type==='error'?'✕':'i';
  ic.style.background=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--p)';
  tm.textContent=msg;
  el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tT); _tT=setTimeout(function(){ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(14px)'; },3200);
}

function openModal(title, body, foot){
  _el('mTit').textContent=title;
  _el('mBd').innerHTML=body;
  _el('mFt').innerHTML=foot||'';
  _el('ov').classList.add('show');
}
function closeModal(){ _el('ov').classList.remove('show'); }
function closeSb(){ 
  var side = document.querySelector('.side'); 
  if(side) side.classList.remove('open'); 
}
function openSb(){  
  var side = document.querySelector('.side'); 
  if(side) side.classList.add('open'); 
}
function doLogout(){ localStorage.clear(); location.href='auth.html'; }

function _stBadge(s){
  var map={'open':['status-open','مفتوح'],'in_progress':['status-in_progress','جارٍ'],'completed':['status-completed','مكتمل'],'pending_review':['status-pending_review','مراجعة'],'rejected':['status-rejected','مرفوض']};
  var d=map[s]||['status-rejected',s];
  return '<span class="status-badge '+d[0]+'">'+d[1]+'</span>';
}
function _roleBadge(r){
  if(r==='admin')   return '<span style="background:var(--red-l);color:var(--red);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;border:1px solid #fecaca">أدمن</span>';
  if(r==='provider')return '<span style="background:var(--p-light);color:var(--p);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;border:1px solid var(--p-mid)">مزود</span>';
  return '<span style="background:var(--gold-l);color:#92400e;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;border:1px solid var(--gold-soft)">عميل</span>';
}

var _pages={home:'الرئيسية',requests:'الطلبات',providers:'المزودون',clients:'العملاء',reports:'البلاغات',reviews:'التقييمات',notify:'إرسال إشعار'};
function gotoPage(page){
  document.querySelectorAll('.page').forEach(function(p){ p.className='page'; });
  var pg=_el('page-'+page); if(pg) pg.className='page on';
  document.querySelectorAll('.ni,.bni').forEach(function(b){ b.classList.remove('on'); });
  var ni=_el('ni-'+page); if(ni) ni.classList.add('on');
  var bn=_el('bn-'+page); if(bn) bn.classList.add('on');
  var pt=_el('pageTitle'); if(pt) pt.textContent=_pages[page]||page;
  window.scrollTo(0,0); closeSb();
  sessionStorage.setItem('mnq_admin_page', page);
  if(page==='home')      loadHome();
  if(page==='requests')  loadRequests();
  if(page==='providers') loadProviders();
  if(page==='clients')   loadClients();
  if(page==='reports')   loadReports();
  if(page==='reviews')   loadReviews();
  if(page==='notify')    loadNotify();
}

// ══ HOME PAGE ══
async function loadHome(){
  var pg=_el('page-home'); if(!pg) return;
  pg.innerHTML='<div class="loading">جاري التحميل...</div>';
  var s=await _api('/api/admin/stats')||{};
  pg.innerHTML=
    '<div class="pghd"><div><div class="pg-t">لوحة التحكم</div><div class="pg-s">مرحباً، '+_esc(_me.name||'المدير')+'</div></div></div>'+
   '<div class="stat-grid">'+
      '<div class="sc"><div class="sn" style="color:var(--p)">'+(s.total_users||0)+'</div><div class="st">إجمالي المستخدمين</div></div>'+
      '<div class="sc"><div class="sn" style="color:var(--gold)">'+(s.requests||0)+'</div><div class="st">إجمالي الطلبات</div></div>'+
      '<div class="sc"><div class="sn" style="color:#2563EB">'+(s.in_progress||0)+'</div><div class="st">قيد التنفيذ</div></div>'+
      '<div class="sc"><div class="sn" style="color:var(--green)">'+(s.completed||0)+'</div><div class="st">مكتملة</div></div>'+
      '<div class="sc"><div class="sn" style="color:var(--gold)">'+(s.total_bids||0)+'</div><div class="st">إجمالي العروض</div></div>'+
      '<div class="sc"><div class="sn" style="color:var(--p)">'+(s.providers||0)+'</div><div class="st">المزودون</div></div>'+
      '<div class="sc"><div class="sn" style="color:var(--red)">'+(s.pending_review||0)+'</div><div class="st">تحتاج مراجعة</div></div>'+
      '<div class="sc"><div class="sn" style="color:#2563EB">'+(s.total_users-(s.providers||0))+'</div><div class="st">العملاء</div></div>'+
    '</div>'+
    '<div class="card card-accent">'+
      '<div class="ch"><div class="ch-l"><div class="ch-ic" style="background:var(--gold-l)"><svg width="16" height="16" fill="none" stroke="var(--gold-d)" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><h3>إجراءات سريعة</h3></div></div>'+
      '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
        '<button class="btn-new" onclick="gotoPage(\'requests\')">مراجعة الطلبات '+(s.pending_review?'('+s.pending_review+')':'')+'</button>'+
        '<button class="btn-new" style="background:var(--p-light);color:var(--p)" onclick="gotoPage(\'providers\')">إدارة المزودين</button>'+
        '<button class="btn-new" style="background:var(--green-l);color:var(--green)" onclick="gotoPage(\'notify\')">إرسال إشعار</button>'+
      '</div>'+
    '</div>';
}

// ══ REQUESTS PAGE ══
var _allReqs=[], _reqFilter='all';
async function loadRequests(){
  var pg=_el('page-requests'); if(!pg) return;
  pg.innerHTML='<div class="loading">جاري التحميل...</div>';
  _allReqs=await _api('/api/admin/requests')||[];
  _renderRequests(_allReqs);
}
function _renderRequests(list){
  var pg=_el('page-requests'); if(!pg) return;
  
  // ترتيب الطلبات حسب الأولوية والتاريخ
  list.sort(function(a, b) {
    var priorities = {'pending_review': 1, 'open': 2, 'in_progress': 3, 'completed': 4, 'rejected': 5};
    var priorityDiff = (priorities[a.status] || 6) - (priorities[b.status] || 6);
    if (priorityDiff !== 0) return priorityDiff;
    return new Date(b.created_at) - new Date(a.created_at);
  });
  
  var tabs=['all','pending_review','open','in_progress','completed','rejected'];
  var labels={all:'الكل',pending_review:'مراجعة',open:'مفتوح',in_progress:'جارٍ',completed:'مكتمل',rejected:'مرفوض'};
  var html='<div class="pghd"><div><div class="pg-t">الطلبات</div><div class="pg-s">'+list.length+' طلب</div></div>';
  html+='<button onclick="_exportCSV()" class="btn-new" style="background:var(--green-l);color:var(--green)">تصدير CSV</button></div>';
  html+='<div class="tab-btns">';
  tabs.forEach(function(s){
    var cnt=s==='all'?_allReqs.length:_allReqs.filter(function(r){return r.status===s;}).length;
    var act=_reqFilter===s;
    html+='<button class="tab-btn'+(act?' active':'')+'" onclick="_reqTab(\''+s+'\')">'+labels[s]+' ('+cnt+')</button>';
  });
  html+='</div>';
  
  if(!list.length){ 
    html+=_empty('لا يوجد طلبات',''); 
  } else {
    list.forEach(function(r){
      var cardClass='request-card';
      if(r.status==='pending_review') cardClass+=' priority';
      else if(r.status==='open') cardClass+=' pending';
      else if(r.status==='in_progress') cardClass+=' progress';
      else if(r.status==='completed') cardClass+=' completed';
      else if(r.status==='rejected') cardClass+=' rejected';
      
      html+='<div class="'+cardClass+'">';
      html+='<div class="request-header">';
      html+='<div class="request-info">';
      html+='<div class="request-meta">';
      html+='<span>'+(r.project_number||'—')+'</span>';
      html+='<span>•</span>';
      html+='<span>'+_ago(r.created_at)+'</span>';
      html+='</div>';
      html+='<div class="request-title">'+_esc(r.title)+'</div>';
      html+='<div class="request-badges">';
      html+=_stBadge(r.status);
      if(r.category) html+='<span class="info-badge">'+_esc(r.category)+'</span>';
      if(r.city) html+='<span class="info-badge">'+_esc(r.city)+'</span>';
      html+='<span class="info-badge">'+(r.bid_count||0)+' عرض</span>';
      if(r.budget_max) html+='<span class="info-badge">'+_fpr(r.budget_max)+'</span>';
      html+='</div>';
      html+='</div>';
      html+='</div>';

  [['all','الكل'],['pending','بانتظار المراجعة'],['warned','تم التحذير'],['resolved','تمت المعالجة'],['ignored','مُتجاهَل']].forEach(function(x){
    var cnt=x[0]==='all'?_reportsList.length:_reportsList.filter(function(r){return r.status===x[0];}).length;
    html+='<button class="tab-btn" onclick="_filterReports(\''+x[0]+'\')" id="rf-'+x[0]+'">'+x[1]+' ('+cnt+')</button>';

  setTimeout(function(){ _setReportFilterActive('all'); },0);

function _filterReports(status){ 
  _setReportFilterActive(status); 
  var list=status==='all'?_reportsList:_reportsList.filter(function(r){return r.status===status;}); 
  var el=_el('reports-list'); if(el) el.innerHTML=_buildReportsList(list); 
}
function _setReportFilterActive(active){ 
  ['all','pending','warned','resolved','ignored'].forEach(function(s){ 
    var b=_el('rf-'+s); if(!b) return; 
    if(s===active) b.classList.add('active'); else b.classList.remove('active'); 
  }); 
}
function _buildReportsList(list){
  if(!list.length) return _empty('لا يوجد بلاغات','');
  return list.map(function(r){
    var isPend=r.status==='pending';
    var sm={
      pending:['var(--red)','#fff8f8','var(--red)','بانتظار المراجعة'],
      warned:['var(--yellow)','#fffbeb','var(--yellow)','تم التحذير'],
      resolved:['var(--green)','#f0fdf4','var(--green)','تمت المعالجة'],
      ignored:['var(--border)','var(--bg)','var(--muted)','مُتجاهَل']
    }[r.status]||['var(--red)','#fff8f8','var(--red)','معلق'];

    var html='<div class="card" style="border-color:'+sm[0]+';background:'+sm[1]+';margin-bottom:12px">';
    html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px">';
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html+='<span style="font-size:13px;font-weight:800;color:var(--text)">'+_esc(r.reporter_name||'—')+'</span>';
    html+='<svg width="14" height="14" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
    html+='<span style="font-size:13px;font-weight:800;color:var(--p)">'+_esc(r.reported_name||'—')+'</span>';
    html+='</div>';
    html+='<span class="status-badge" style="background:var(--red-l);color:var(--red)">'+_esc(r.reason)+'</span>';
    if(r.details) html+='<div style="font-size:12px;color:var(--text2);line-height:1.7;margin-top:8px;background:#fff;padding:8px 12px;border-radius:8px;border-right:3px solid var(--border)">'+_esc(r.details)+'</div>';
    html+='</div>';
    html+='<span style="background:#fff;color:'+sm[2]+';border:1.5px solid '+sm[0]+';padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;flex-shrink:0">'+sm[3]+'</span>';
    html+='</div>';
    if(isPend){
      html+='<div style="display:flex;gap:7px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)">';
      html+='<button class="btn-action" style="background:var(--yellow-l);color:var(--yellow)" onclick="_handleReport('+r.id+',\'warn\')">تحذير</button>';
      html+='<button class="btn-action btn-delete" onclick="_handleReport('+r.id+',\'ban\')">إيقاف الحساب</button>';
      html+='<button class="btn-action" style="background:var(--bg);color:var(--muted)" onclick="_handleReport('+r.id+',\'ignore\')">تجاهل</button>';
      html+='</div>';
    }
    html+='</div>';
    return html;
  }).join('');
}
async function _handleReport(id, action){

          '<button class="recipient-btn active" data-role="all" onclick="_setRecipient(this,\'all\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>جميع المستخدمين</button>'+
          '<button class="recipient-btn" data-role="client" onclick="_setRecipient(this,\'client\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>العملاء فقط</button>'+
          '<button class="recipient-btn" data-role="provider" onclick="_setRecipient(this,\'provider\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>المزودون فقط</button>'+
        '</div>'+
        '<div class="form-field"><label class="form-label">أو أدخل رقم المستخدم (اختياري)</label><input type="number" class="form-input" id="notif-user-id" placeholder="مثال: 123"></div>'+
      '</div>'+
      '<div class="form-section">'+
        '<div class="section-title"><div class="section-icon" style="background:var(--green-l);color:var(--green)">📤</div>طريقة الإرسال</div>'+
        '<div class="recipient-options">'+
          '<button class="recipient-btn active" data-channel="app" onclick="_setChannel(this,\'app\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>التطبيق فقط</button>'+
          '<button class="recipient-btn" data-channel="email" onclick="_setChannel(this,\'email\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>الإيميل فقط</button>'+
          '<button class="recipient-btn" data-channel="both" onclick="_setChannel(this,\'both\')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>التطبيق + الإيميل</button>'+
        '</div>'+
      '</div>'+
      '<div class="form-section">'+
        '<div class="section-title"><div class="section-icon" style="background:var(--gold-l);color:var(--gold-d)">📝</div>محتوى الإشعار</div>'+
        '<div class="form-row">'+
          '<div class="form-field"><label class="form-label">عنوان الإشعار *</label><input type="text" class="form-input" id="notif-title" placeholder="مثال: تحديث مهم على المنصة" oninput="_updatePreview()"></div>'+
          '<div class="form-field"><label class="form-label">نوع الإشعار</label><select class="form-select" id="notif-type"><option value="admin">إداري</option><option value="system">نظام</option><option value="marketing">تسويقي</option><option value="urgent">عاجل</option></select></div>'+
        '</div>'+
        '<div class="form-field full"><label class="form-label">نص الرسالة *</label><textarea class="form-textarea" id="notif-body" placeholder="اكتب نص الإشعار هنا..." oninput="_updatePreview()"></textarea></div>'+
      '</div>'+
      '<div class="form-section preview-section">'+
        '<div class="section-title"><div class="section-icon" style="background:var(--green-l);color:var(--green)">👁️</div>معاينة الإشعار</div>'+
        '<div class="preview-phone"><div class="preview-notif"><div class="preview-title" id="preview-title">عنوان الإشعار</div><div class="preview-body" id="preview-body">نص الإشعار سيظهر هنا...</div></div></div>'+
      '</div>'+
      '<div class="send-section">'+
        '<button class="send-btn" id="send-notif-btn" onclick="_sendNotification()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>إرسال الإشعار الآن</button>'+
        '<div style="margin-top:12px;font-size:12px;color:var(--muted);">✨ سيتم إرسال الإشعار فوراً عبر الطريقة المختارة</div>'+
      '</div>'+
    '</div>';
}
function _setRecipient(btn, role){
  document.querySelectorAll('.recipient-btn[data-role]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  _recipientRole = role;
}
function _setChannel(btn, channel){
  document.querySelectorAll('[data-channel]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  _notifChannel = channel;
}
function _updatePreview(){
  var title = _el('notif-title').value || 'عنوان الإشعار';
  var body = _el('notif-body').value || 'نص الإشعار سيظهر هنا...';
  _el('preview-title').textContent = title;
  _el('preview-body').textContent = body;
}
async function _sendNotification(){
  var title = (_el('notif-title').value || '').trim();
  var body = (_el('notif-body').value || '').trim();
  var userId = parseInt(_el('notif-user-id').value) || null;
  var type = _el('notif-type').value || 'admin';

  if (!title || !body) {
    toast('يرجى إدخال العنوان ونص الرسالة', 'error');
    return;
  }

  var btn = _el('send-notif-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg> جاري الإرسال...';
  }

  var payload = {title: title, body: body, type: type, channel: _notifChannel};
  if (userId) payload.user_id = userId;
  else if (_recipientRole !== 'all') payload.role = _recipientRole;

  try {
    var response = await _api('/api/admin/notify', {method: 'POST', body: JSON.stringify(payload)});
    if (response.ok || response.success) {
      var channelText = _notifChannel === 'app' ? 'التطبيق' : _notifChannel === 'email' ? 'الإيميل' : 'التطبيق والإيميل';
      toast('تم إرسال الإشعار عبر ' + channelText + ' بنجاح! 🎉', 'success');
      _el('notif-title').value = '';
      _el('notif-body').value = '';
      _el('notif-user-id').value = '';
      _updatePreview();
    } else {
      toast(response.message || 'حدث خطأ في الإرسال', 'error');
    }
  } catch (error) {
    toast('حدث خطأ في الاتصال', 'error');
  }

  if (btn) {
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg> إرسال الإشعار الآن';
  }
}

async function _quickSearch(){
  var q=(_el('admin-search')||{}).value; if(!q||q.length<2) return;
  document.querySelectorAll('.page').forEach(function(p){p.className='page';});
  var pg=_el('page-search'); if(pg) pg.className='page on';
  var pt=_el('pageTitle'); if(pt) pt.textContent='نتائج البحث';
  pg.innerHTML='<div class="loading">جاري البحث...</div>';
  var r=await _api('/api/admin/search?q='+encodeURIComponent(q));
  var html='<div class="pghd"><div><div class="pg-t">نتائج البحث</div><div class="pg-s">'+q+'</div></div></div>';
  if((r.requests&&r.requests.length)||(r.users&&r.users.length)){
    if(r.requests&&r.requests.length){
      html+='<div class="card"><div class="ch"><h3>طلبات ('+r.requests.length+')</h3></div>';
      r.requests.forEach(function(x){
        html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:700">'+_esc(x.title)+'</div><div style="font-size:11px;color:var(--muted)">'+_esc(x.client_name||'')+'</div></div>'+_stBadge(x.status)+'</div>';
      });
      html+='</div>';
    }
    if(r.users&&r.users.length){
      html+='<div class="card"><div class="ch"><h3>مستخدمون ('+r.users.length+')</h3></div>';
      r.users.forEach(function(x){
        html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:700">'+_esc(x.name)+'</div><div style="font-size:11px;color:var(--muted)">'+_esc(x.email)+'</div></div>'+_roleBadge(x.role)+'</div>';
      });
      html+='</div>';
    }
  } else {
    html+=_empty('لا توجد نتائج','جرب كلمات مختلفة');
  }
  pg.innerHTML=html;
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeModal();});
  var av=_el('userAv'); if(av) av.textContent=(_me.name||'م')[0];
  var un=_el('userName'); if(un) un.textContent=_me.name||'المدير';
  var ma=_el('mobAv'); if(ma) ma.textContent=(_me.name||'م')[0];
  _api('/api/admin/reports').then(function(rs){ 
    var p=(rs||[]).filter(function(r){return r.status==='pending';}).length; 
    var b=_el('nb-reports'); if(b){b.style.display=p?'':'none';b.textContent=p;} 
  });
  var saved=sessionStorage.getItem('mnq_admin_page');
  gotoPage(saved&&_pages[saved]?saved:'home');
});
</script>
