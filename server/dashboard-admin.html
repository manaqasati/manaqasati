<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة الأدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>

:root{
  --p:#1B3A6B;--p2:#142d54;--p3:#2C5282;
  --p-light:#e8eef7;--p-mid:#c5d6ee;
  --gold:#F0A500;--gold-d:#c78500;--gold-l:#fff8e7;--gold-soft:#fef3cd;
  --text:#0d1f3c;--text2:#2d4a6e;--muted:#6b85a8;--hint:#9db3cc;
  --border:#dce5f0;--border2:#b8cde4;
  --bg:#f4f7fb;--white:#fff;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ══ SIDEBAR ══ */
.side{
  width:260px;background:var(--white);
  border-left:1px solid var(--border);
  height:100vh;position:fixed;right:0;top:0;
  display:flex;flex-direction:column;z-index:100;
  box-shadow:4px 0 24px rgba(27,58,107,0.07)
}
.side-head{padding:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.side-brand{background:linear-gradient(135deg,var(--p),var(--p3));padding:18px 18px 14px;position:relative;overflow:hidden}
.side-brand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.net-svg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.25}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;position:relative;z-index:1;margin-top:2px}
.user-pill{margin:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.av{width:36px;height:36px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av-name{font-size:13px;font-weight:800;color:#fff}
.av-role{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;margin-top:1px}
.nav{padding:10px 10px;flex:1;overflow-y:auto}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-sec{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.8px;padding:0 8px;margin:14px 0 6px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:all .18s;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--p-light);color:var(--p)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--p);box-shadow:0 3px 10px rgba(27,58,107,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor}
.badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
.side-foot{padding:10px 12px;border-top:1px solid var(--border)}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--red-l)}

/* ══ MAIN ══ */
.main{margin-right:260px;min-height:100vh;display:flex;flex-direction:column;min-width:0}

/* ══ TOPBAR ══ */
.topbar{background:var(--white);height:58px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:800;color:var(--text)}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 12px rgba(240,165,0,.3)}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px);box-shadow:0 5px 16px rgba(240,165,0,.35)}
.btn-new svg{flex-shrink:0}

/* ══ CONTENT ══ */
.content{padding:24px 28px;flex:1}
.page{display:none}.page.on{display:block}

/* ══ HERO ══ */
.hero{background:var(--p);border-radius:var(--radius-lg);padding:26px 30px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.hero-net{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(240,165,0,.15);border:1px solid rgba(240,165,0,.3);color:var(--gold);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.hero-t h2{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.3}
.hero-t p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6}
.hero-btn{background:var(--gold);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .18s;flex-shrink:0;position:relative;z-index:1;box-shadow:0 4px 14px rgba(240,165,0,.35)}
.hero-btn:hover{background:var(--gold-d);transform:translateY(-2px)}

/* ══ STATS ══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);border-radius:0 0 var(--radius) var(--radius)}
.sc.gold::after{background:var(--gold)}
.sc.navy::after{background:var(--p)}
.sc.green::after{background:var(--green)}
.sc.blue::after{background:var(--p3)}
.sc:hover{border-color:var(--p-mid);box-shadow:0 4px 16px rgba(27,58,107,.08)}
.sic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sic.a{background:var(--p-light)}.sic.a svg{stroke:var(--p)}
.sic.y{background:var(--gold-l)}.sic.y svg{stroke:var(--gold-d)}
.sic.g{background:var(--green-l)}.sic.g svg{stroke:var(--green)}
.sic.b{background:var(--p-light)}.sic.b svg{stroke:var(--p3)}
.sn{font-size:26px;font-weight:900;color:var(--text);line-height:1}
.st{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}

/* ══ CARDS ══ */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card-accent{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.ch-l{display:flex;align-items:center;gap:8px}
.ch-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch h3{font-size:14px;font-weight:800;color:var(--text)}
.ch-link{font-size:12px;color:var(--p);font-weight:700;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:3px}
.ch-link:hover{color:var(--p2)}

/* ══ REQUEST ITEMS - محسّنة ══ */
.ri{
  background:var(--white);
  border:1.5px solid var(--border);
  border-right:4px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
  transition:all .2s cubic-bezier(.34,1.2,.64,1);
  cursor:pointer;
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:start;
  position:relative;
  overflow:hidden
}
.ri:last-child{margin-bottom:0}
.ri:hover{
  border-color:var(--p-mid);
  border-right-color:var(--p);
  box-shadow:0 4px 16px rgba(27,58,107,.1);
  transform:translateY(-1px)
}
.ri-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:7px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ri-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.rm{
  font-size:11px;color:var(--muted);
  display:inline-flex;align-items:center;gap:3px;
  font-weight:600;
  background:var(--bg);
  padding:3px 8px;border-radius:20px;
  border:1px solid var(--border)
}
.ri-actions{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-top:11px;padding-top:10px;
  border-top:1px solid var(--border);
  grid-column:1/-1
}
.tag{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:.3px}
.tag::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-open{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}.t-open::before{background:#16a34a}
.t-prog{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}.t-prog::before{background:#2563eb}
.t-done{background:#fff8e7;color:#b45309;border:1px solid #fde68a}.t-done::before{background:#F0A500}
.t-rev{background:#fef3c7;color:#92400e;border:1px solid #fde68a}.t-rev::before{background:#d97706}

/* ══ BUTTONS ══ */
.btn-sm{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.bs-p{background:var(--p-light);color:var(--p)}.bs-p:hover{background:var(--p-mid)}
.bs-g{background:var(--green-l);color:var(--green)}.bs-g:hover{background:#bbf7d0}
.bs-r{background:var(--red-l);color:var(--red)}.bs-r:hover{background:#fecaca}
.btn-p{padding:12px 22px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s}
.btn-p:hover{background:var(--p2);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-s{padding:12px 16px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* ══ FORM ══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--white);transition:all .18s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.08)}
.fg textarea{min-height:100px;resize:vertical}
.form-btns{display:flex;gap:8px;margin-top:16px}

/* ══ BIDS ══ */
.bid-item{border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:10px;transition:all .2s}
.bid-item:hover{border-color:var(--p-mid)}
.bid-item.accepted{border-color:var(--green);background:linear-gradient(135deg,rgba(22,163,74,.04),rgba(22,163,74,.08))}
.bid-item.rejected{opacity:.45}
.bid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.bid-name{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.bid-price{font-size:20px;font-weight:900;color:var(--p)}
.bid-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.bid-note{font-size:12px;color:#475569;line-height:1.7;margin-bottom:10px;font-style:italic;padding:8px 12px;background:var(--bg);border-radius:8px;border-right:3px solid var(--border2)}
.bid-actions{display:flex;gap:6px}
.stars-row{color:#f59e0b;font-size:12px;letter-spacing:1px}

/* ══ CHAT ══ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 340px);min-height:260px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);border-radius:12px;margin-bottom:10px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.msg-me{background:var(--p);color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px}
.msg-other{background:var(--white);border:1px solid var(--border);align-self:flex-start;border-radius:16px 16px 16px 4px}
.msg-name{font-size:10px;font-weight:700;margin-bottom:2px;opacity:.65}
.msg-time{font-size:10px;opacity:.5;margin-top:3px;text-align:left}
.chat-input{display:flex;gap:8px}
.chat-inp{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:.18s}
.chat-inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.07)}
.chat-send{padding:11px 18px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;white-space:nowrap}
.chat-send:hover{background:var(--p2)}

/* ══ NOTIFS ══ */
.notif-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);transition:.15s;cursor:pointer}
.notif-item:hover{background:var(--bg)}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:var(--p-light)}
.notif-ic{width:38px;height:38px;border-radius:11px;background:var(--p-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.notif-title{font-size:13px;font-weight:800;margin-bottom:2px}
.notif-body{font-size:11px;color:var(--muted);line-height:1.5}
.notif-time{font-size:10px;color:var(--hint);margin-top:3px}

/* ══ DETAIL HEAD ══ */
.req-detail-head{background:var(--p);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.req-detail-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.rdh-title{font-size:20px;font-weight:900;margin-bottom:10px}
.rdh-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.8}
.rdh-meta span{display:flex;align-items:center;gap:4px}
.rdh-desc{margin-top:12px;font-size:13px;line-height:1.8;opacity:.85}

/* ══ TABS ══ */
.tab-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;background:var(--bg);border-radius:12px;padding:4px}
.tab-btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;background:none;color:var(--muted);transition:all .18s}
.tab-btn.on{background:var(--white);color:var(--p);box-shadow:0 2px 8px rgba(27,58,107,.1)}
.tab{display:none}.tab.on{display:block}

/* ══ OVERLAYS ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,5,30,.65);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column}
.modal-drag{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--white)}

/* ══ AGREEMENT MODAL ══ */
.agree-modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:540px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column}
.agree-hd{background:var(--p);padding:18px 22px;text-align:center;flex-shrink:0;position:relative}
.agree-hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.agree-hd h2{color:#fff;font-size:16px;font-weight:900;margin-bottom:3px}
.agree-hd p{color:rgba(255,255,255,.55);font-size:11px}
.agree-body{padding:18px 20px;overflow-y:auto;flex:1}
.quran-box{background:linear-gradient(135deg,#fef9e7,#fef3c7);border:2px solid var(--gold);border-radius:14px;padding:16px 18px;margin-bottom:14px;text-align:center}
.quran-title{font-size:12px;font-weight:800;color:#92400e;margin-bottom:7px}
.quran-text{font-size:13px;font-weight:700;color:#78350f;line-height:2.1}
.quran-src{font-size:11px;color:#92400e;font-weight:700;margin-top:7px}
.agree-sec{background:var(--bg);border:1px solid var(--p-mid);border-right:3px solid var(--p);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:10px}
.agree-sec-t{font-size:12px;font-weight:900;color:var(--p);margin-bottom:6px}
.agree-sec p{font-size:11px;color:var(--text);line-height:2;font-weight:500}
.agree-sec strong{color:var(--p);font-weight:800}
.note-sec{background:#fef2f2;border:1px solid #fca5a5;border-right:3px solid var(--red);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:14px}
.note-sec .agree-sec-t{color:var(--red)}
.note-sec p{font-size:11px;color:#7f1d1d;line-height:2}
.agree-summary{background:var(--p-light);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.agree-sum-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(27,58,107,.1);font-size:12px;color:var(--text)}
.agree-sum-row:last-child{border-bottom:none}
.agree-sum-ic{font-size:14px;flex-shrink:0}
.agree-sum-row strong{color:var(--p)}
.agree-check{display:flex;align-items:flex-start;gap:9px;padding:12px 14px;background:var(--gold-l);border:1px solid var(--gold-soft);border-radius:11px;cursor:pointer}
.agree-check input{width:17px;height:17px;cursor:pointer;margin-top:2px;accent-color:var(--p);flex-shrink:0}
.agree-check label{font-size:11px;font-weight:700;cursor:pointer;line-height:1.8}
.agree-foot{padding:14px 20px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0}
.btn-agree{flex:1;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.18s;box-shadow:0 3px 12px rgba(240,165,0,.3)}
.btn-agree:hover:not(:disabled){background:var(--gold-d);transform:translateY(-1px)}
.btn-agree:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-back{padding:13px 16px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ══ RATING ══ */
.stars-pick{display:flex;gap:10px;justify-content:center;margin:14px 0;direction:ltr}
.sp{font-size:36px;cursor:pointer;opacity:.25;transition:all .15s;filter:grayscale(1)}
.sp.on{opacity:1;filter:none;transform:scale(1.1)}

/* ══ EMPTY / LOADING ══ */
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty-ic{width:52px;height:52px;background:var(--p-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.empty-ic svg{stroke:var(--p)}
.empty h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty p{font-size:12px}
.loading{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.alert.ok{background:var(--green-l);color:var(--green);display:block}
.alert.err{background:var(--red-l);color:var(--red);display:block}

/* ══ PROFILE ══ */
.profile-av{width:80px;height:80px;border-radius:50%;background:var(--gold);color:var(--p2);font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:3px solid rgba(255,255,255,.2)}
.profile-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:center}
.profile-stat-n{font-size:22px;font-weight:900;color:#fff}
.profile-stat-l{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}

/* ══ SKELETON ══ */
.skel{background:linear-gradient(90deg,#f4f7fb 25%,#e8eef7 50%,#f4f7fb 75%);background-size:200%;animation:sk 1.4s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ MOB HEAD ══ */
.mob-head{display:none;background:var(--p);height:54px;padding:0 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.mob-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
.mob-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-notif{position:relative;background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:7px;color:#fff;display:flex;border-radius:9px}
.mob-notif-badge{position:absolute;top:2px;left:2px;background:var(--red);color:#fff;font-size:9px;font-weight:900;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.mob-av{width:30px;height:30px;border-radius:9px;background:var(--gold);color:var(--p2);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mob-out{background:rgba(255,255,255,.1);border:none;cursor:pointer;padding:6px;color:#fff;display:flex;border-radius:8px}

/* ══ BOTTOM NAV - محسّن ══ */
.bnav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  z-index:100;
  padding:4px 0 calc(env(safe-area-inset-bottom,0px) + 6px);
  box-shadow:0 -4px 20px rgba(27,58,107,.08)
}
.bnav::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%)
}
.bnav-inner{display:flex;align-items:flex-end}

/* أزرار التنقل العادية */
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 2px 2px;border:none;background:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;color:var(--hint);transition:.2s;position:relative
}
.bni .bic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:.2s}
.bni .bic svg{stroke:currentColor;transition:.2s}
.bni .bt{font-size:10px;font-weight:700;transition:.2s;letter-spacing:.2px}
.bni.on{color:var(--p)}
.bni.on .bt{color:var(--p)}
.bni-badge{
  position:absolute;top:4px;right:calc(50% - 22px);
  background:var(--red);color:#fff;font-size:9px;font-weight:900;
  width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  border:1.5px solid var(--white)
}

/* زر جديد FAB - محسّن */
.bni-fab{
  flex:0 0 80px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;gap:5px;
  padding-bottom:4px;
  border:none;background:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;
  position:relative;
  margin-top:-22px
}
.bni-fab .fab-circle{
  width:58px;height:58px;
  background:linear-gradient(145deg,#F0A500,#c78500);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 8px 24px rgba(240,165,0,.55),
    0 3px 8px rgba(240,165,0,.35),
    0 0 0 3px var(--white),
    0 0 0 4px rgba(240,165,0,.2);
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  z-index:1
}
.bni-fab .fab-circle::before{
  content:'';
  position:absolute;inset:-6px;border-radius:50%;
  background:rgba(240,165,0,.12);
  animation:fab-ring 2.5s ease-in-out infinite
}
@keyframes fab-ring{
  0%,100%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.15);opacity:.2}
}
.bni-fab .fab-circle svg{stroke:#fff;width:24px;height:24px;stroke-width:2.5;position:relative;z-index:1}
.bni-fab .fab-label{
  font-size:10px;font-weight:900;
  color:var(--gold-d);
  letter-spacing:.3px
}
.bni-fab:active .fab-circle{
  transform:scale(.9);
  box-shadow:0 4px 12px rgba(240,165,0,.4),0 0 0 3px var(--white)
}
.bni-fab:hover .fab-circle{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(240,165,0,.6),0 4px 10px rgba(240,165,0,.4),0 0 0 3px var(--white),0 0 0 5px rgba(240,165,0,.15)
}

}

<script>

'use strict';
var API = 'https://manaqasati-production.up.railway.app';
var _token = localStorage.getItem('token') || '';
var _me    = JSON.parse(localStorage.getItem('user') || '{}');
if (!_token || _me.role !== 'admin') { location.href = 'auth.html'; }

// ── Helpers ──
function _el(id){ return document.getElementById(id); }
function _h(id,html){ var e=_el(id); if(e) e.innerHTML=html; }
function _esc(s){ var d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function _fdt(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('ar-SA',{day:'2-digit',month:'2-digit',year:'numeric'}); }catch(e){ return d; } }
function _ago(d){ var s=(Date.now()-new Date(d))/1000; if(s<60)return'الآن'; if(s<3600)return Math.floor(s/60)+' د'; if(s<86400)return Math.floor(s/3600)+' س'; return Math.floor(s/86400)+' يوم'; }
function _fpr(p){ return p?Number(p).toLocaleString('en-US')+' ر.س':'—'; }
function _empty(t,s){ return '<div class="empty"><div class="empty-ic"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg></div><h4>'+t+'</h4>'+(s?'<p>'+s+'</p>':'')+'</div>'; }

// ── API ──
function _api(path, opts){
  return fetch(API+path, Object.assign({headers:{'Authorization':'Bearer '+_token,'Content-Type':'application/json'}}, opts||{}))
    .then(function(r){ return r.json(); }).catch(function(){ return {}; });
}

// ── Toast ──
var _tT;
function toast(msg, type){
  var el=_el('toast'),ic=_el('tIc'),tm=_el('tMsg'); if(!el) return;
  ic.textContent=type==='success'?'✓':type==='error'?'✕':'i';
  ic.style.background=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--p)';
  tm.textContent=msg;
  el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tT); _tT=setTimeout(function(){ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(14px)'; },3200);
}

  _el('mBd').innerHTML=body;
  _el('mFt').innerHTML=foot||'';
  _el('ov').classList.add('show');

function _stBadge(s){
  var map={
    open:       ['t-open','مفتوح'],
    in_progress:['t-prog','جارٍ'],
    completed:  ['t-done','مكتمل'],
    pending_review:['t-rev','مراجعة'],
    rejected:   ['t-rev','مرفوض'],
  };
  var d=map[s]||['t-rev',s];
  return '<span class="tag '+d[0]+'">'+d[1]+'</span>';
}

// ── Navigation ──
var _pages={home:'الرئيسية',requests:'الطلبات',providers:'المزودون',clients:'العملاء',reports:'البلاغات',reviews:'التقييمات',notify:'إرسال إشعار'};
function gotoPage(page){
  document.querySelectorAll('.page').forEach(function(p){ p.className='page'; });
  var pg=_el('page-'+page); if(pg) pg.className='page on';
  document.querySelectorAll('.ni,.bni').forEach(function(b){ b.classList.remove('on'); });
  var ni=_el('ni-'+page); if(ni) ni.classList.add('on');
  var bn=_el('bn-'+page); if(bn) bn.classList.add('on');
  var pt=_el('pageTitle'); if(pt) pt.textContent=_pages[page]||page;
  window.scrollTo(0,0); closeSb();
  if(page==='home')      loadHome();
  if(page==='requests')  loadRequests();
  if(page==='providers') loadProviders();
  if(page==='clients')   loadClients();
  if(page==='reports')   loadReports();
  if(page==='reviews')   loadReviews();
  if(page==='notify')    loadNotify();
}

var _allReqs=[], _reqFilter='all';
async function loadRequests(){
  var pg=_el('page-requests'); if(!pg) return;
  pg.innerHTML='<div class="loading">جاري التحميل...</div>';
  _allReqs=await _api('/api/admin/requests')||[];
  _renderRequests(_allReqs);
}
function _renderRequests(list){
  var pg=_el('page-requests'); if(!pg) return;
  var tabs=['all','pending_review','open','in_progress','completed','rejected'];
  var labels={all:'الكل',pending_review:'مراجعة',open:'مفتوح',in_progress:'جارٍ',completed:'مكتمل',rejected:'مرفوض'};
  var html='<div class="pghd"><div><div class="pg-t">الطلبات</div><div class="pg-s">'+list.length+' طلب</div></div>';
  html+='<button onclick="_exportCSV()" style="padding:8px 16px;background:var(--green-l);color:var(--green);border:1px solid #bbf7d0;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">تصدير CSV</button></div>';
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
  tabs.forEach(function(s){
    var cnt=s==='all'?_allReqs.length:_allReqs.filter(function(r){return r.status===s;}).length;
    var act=_reqFilter===s;
    html+='<button onclick="_reqTab(\''+s+'\')" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid var(--border);background:'+(act?'var(--p)':'var(--bg)')+';color:'+(act?'#fff':'var(--muted)')+';transition:all .15s">'+labels[s]+' ('+cnt+')</button>';
  });
  html+='</div><div class="card card-accent"><div class="cb" id="req-list">';
  if(!list.length){ html+=_empty('لا يوجد طلبات',''); }
  else {
    list.forEach(function(r){
      var isRev=r.status==='pending_review';
      html+='<div style="border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;background:'+(isRev?'var(--gold-l)':'#fff')+'">';
      html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">';
      html+='<div style="flex:1;min-width:0">';
      html+='<div style="font-size:11px;color:var(--hint);margin-bottom:3px">'+(r.project_number||'—')+' · '+_ago(r.created_at)+'</div>';
      html+='<div style="font-size:14px;font-weight:800;margin-bottom:4px">'+_esc(r.title)+'</div>';
      html+='<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">'+_stBadge(r.status);
      if(r.category) html+='<span style="background:var(--bg);color:var(--muted);padding:3px 8px;border-radius:20px;font-size:10px">'+_esc(r.category)+'</span>';
      if(r.city) html+='<span style="background:var(--bg);color:var(--muted);padding:3px 8px;border-radius:20px;font-size:10px">'+_esc(r.city)+'</span>';
      html+='<span style="background:var(--bg);color:var(--muted);padding:3px 8px;border-radius:20px;font-size:10px">'+(r.bid_count||0)+' عرض</span>';
      if(r.budget_max) html+='<span style="background:var(--bg);color:var(--muted);padding:3px 8px;border-radius:20px;font-size:10px">'+_fpr(r.budget_max)+'</span>';
      html+='</div>';
      html+='<div style="font-size:11px;color:var(--muted);margin-top:5px">العميل: <strong>'+_esc(r.client_name||'—')+'</strong>';
      if(r.provider_name) html+=' · المزود: <strong>'+_esc(r.provider_name)+'</strong>';
      html+='</div></div></div>';
      html+='<div style="display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">';
      if(isRev){
        html+='<button onclick="_approveReq('+r.id+')" style="padding:7px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--green-l);color:var(--green);border:1px solid #bbf7d0">موافقة</button>';
        html+='<button onclick="_rejectReq('+r.id+')" style="padding:7px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--red-l);color:var(--red);border:1px solid #fecaca">رفض</button>';
      }
      if(r.status==='in_progress') html+='<button onclick="_completeReq('+r.id+')" style="padding:7px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--green-l);color:var(--green);border:1px solid #bbf7d0">إنهاء</button>';
      html+='<button onclick="_editReqModal('+r.id+')" style="padding:7px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--p-light);color:var(--p);border:1px solid var(--p-mid)">تعديل</button>';
      html+='<button onclick="_deleteReq('+r.id+')" style="padding:7px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--red-l);color:var(--red);border:1px solid #fecaca">حذف</button>';
      html+='</div></div>';
    });
  }
  html+='</div></div>';
  pg.innerHTML=html;
}
function _reqTab(s){
  _reqFilter=s;
  var list=s==='all'?_allReqs:_allReqs.filter(function(r){return r.status===s;});
  _renderRequests(list);
}
async function _approveReq(id){
  var r=await _api('/api/admin/requests/'+id+'/review',{method:'PUT',body:JSON.stringify({action:'approve'})});
  toast(r.id?'تمت الموافقة':'حدث خطأ',r.id?'success':'error');
  loadRequests();
}
async function _rejectReq(id){
  var reason=prompt('سبب الرفض:'); if(!reason) return;
  var r=await _api('/api/admin/requests/'+id+'/review',{method:'PUT',body:JSON.stringify({action:'reject',reason:reason})});
  toast(r.id?'تم الرفض':'حدث خطأ',r.id?'success':'error');
  loadRequests();
}
async function _completeReq(id){
  if(!confirm('إنهاء هذا المشروع؟')) return;
  var r=await _api('/api/admin/requests/'+id+'/complete',{method:'PUT'});
  toast(r.id?'تم الإنهاء':'حدث خطأ',r.id?'success':'error');
  loadRequests();
}
async function _deleteReq(id){
  if(!confirm('حذف هذا الطلب نهائياً؟')) return;
  await _api('/api/admin/requests/'+id,{method:'DELETE'});
  toast('تم الحذف','success'); loadRequests();
}

async function _uploadReqImgAdmin(reqId, input){
  var files=[...input.files]; input.value='';
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(f.size>5*1024*1024){ toast(f.name+': أكبر من 5MB','error'); continue; }
    var b64=await new Promise(function(res){ var r=new FileReader(); r.onload=function(e){res(e.target.result);}; r.readAsDataURL(f); });
    var res=await _api('/api/requests/'+reqId+'/images',{method:'POST',body:JSON.stringify({image:b64})});
    if(res.ok||res.count) toast('تم رفع الصورة','success');
    else toast(res.message||'فشل الرفع','error');
  }
  // تحديث allReqs
  var updated=await _api('/api/requests/'+reqId);
  var idx=_allReqs.findIndex(function(r){return r.id===reqId;});
  if(idx>=0&&updated.id) _allReqs[idx]=Object.assign(_allReqs[idx],updated);
  _editReqModal(reqId);
}
async function _uploadReqAttAdmin(reqId, input){
  var files=[...input.files]; input.value='';
  for(var i=0;i<files.length;i++){
    var f=files[i];
    if(f.size>10*1024*1024){ toast(f.name+': أكبر من 10MB','error'); continue; }
    var b64=await new Promise(function(res){ var r=new FileReader(); r.onload=function(e){res(e.target.result);}; r.readAsDataURL(f); });
    var res=await _api('/api/requests/'+reqId+'/attachments',{method:'POST',body:JSON.stringify({name:f.name,type:f.type,data:b64})});
    if(res.ok||res.count) toast('تم رفع الملف','success');
    else toast(res.message||'فشل الرفع','error');
  }
  var updated=await _api('/api/requests/'+reqId);
  var idx=_allReqs.findIndex(function(r){return r.id===reqId;});
  if(idx>=0&&updated.id) _allReqs[idx]=Object.assign(_allReqs[idx],updated);
  _editReqModal(reqId);
}

      '<div class="sc"><div class="sic" style="background:var(--green-l)"><svg width="19" height="19" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="sn">'+resolved.length+'</div><div class="st">تمت المعالجة</div></div></div>' +

function _filterReports(status){
  _setReportFilterActive(status);
  var list = status==='all' ? _reportsList : _reportsList.filter(function(r){ return r.status===status; });
  var el=_el('reports-list');
  if(el) el.innerHTML = _buildReportsList(list);
}

function _setReportFilterActive(active){
  ['all','pending','warned','resolved','ignored'].forEach(function(s){
    var b=_el('rf-'+s); if(!b) return;
    var isAct = s===active;
    b.style.background = isAct?'var(--p)':'var(--bg)';
    b.style.color      = isAct?'#fff':'var(--muted)';
    b.style.borderColor= isAct?'var(--p)':'var(--border)';
  });
}

function _buildReportsList(list){
  if(!list.length) return _empty('لا يوجد بلاغات','');
  return list.map(function(r){
    var isPend = r.status==='pending';
    var statusMap = {
      pending:  ['var(--red)',   '#fff8f8',  'var(--red)',  'بانتظار المراجعة'],
      warned:   ['var(--yellow)','#fffbeb',  'var(--yellow)','تم التحذير'],
      resolved: ['var(--green)', '#f0fdf4',  'var(--green)', 'تمت المعالجة'],
      ignored:  ['var(--border)','var(--bg)','var(--muted)', 'مُتجاهَل'],
      banned:   ['var(--red)',   '#fff8f8',  'var(--red)',  'تم الإيقاف'],
    };
    var sm = statusMap[r.status] || statusMap.pending;
    var roleColor = r.reported_role==='provider' ? 'var(--p)' : r.reported_role==='admin' ? 'var(--red)' : '#92400e';
    var roleTxt   = r.reported_role==='provider' ? 'مزود' : r.reported_role==='admin' ? 'أدمن' : 'عميل';

    var html = '<div style="border:1.5px solid '+sm[0]+';border-radius:14px;padding:16px;margin-bottom:12px;background:'+sm[1]+'">';

    // ── Header ──
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px">';
      html += '<div style="flex:1;min-width:0">';
        // أسماء
        html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px">';
          html += '<div style="width:30px;height:30px;border-radius:50%;background:var(--red-l);color:var(--red);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(r.reporter_name||'م')[0]+'</div>';
          html += '<span style="font-size:13px;font-weight:800;color:var(--text)">'+_esc(r.reporter_name||'—')+'</span>';
          html += '<svg width="14" height="14" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
          html += '<div style="width:30px;height:30px;border-radius:50%;background:var(--p-light);color:var(--p);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(r.reported_name||'م')[0]+'</div>';
          html += '<span style="font-size:13px;font-weight:800;color:var(--p)">'+_esc(r.reported_name||'—')+'</span>';
          html += '<span style="background:'+roleColor+';color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800">'+roleTxt+'</span>';
        html += '</div>';
        // السبب
        html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
          html += '<span style="background:var(--red-l);color:var(--red);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;border:1px solid #fecaca">'+_esc(r.reason)+'</span>';
          if(r.request_title) html += '<span style="background:var(--p-light);color:var(--p);padding:4px 10px;border-radius:20px;font-size:11px">'+_esc(r.request_title)+'</span>';
        html += '</div>';
        // التفاصيل
        if(r.details) html += '<div style="font-size:12px;color:var(--text2);line-height:1.7;margin-top:8px;background:#fff;padding:8px 12px;border-radius:8px;border-right:3px solid var(--border)">'+_esc(r.details)+'</div>';
        // ملاحظة الأدمن (إن وجدت)
        if(r.admin_note) html += '<div style="font-size:11px;color:var(--muted);margin-top:6px"><strong>ملاحظة الأدمن:</strong> '+_esc(r.admin_note)+'</div>';
      html += '</div>';
      // حالة + وقت
      html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">';
        html += '<span style="background:#fff;color:'+sm[2]+';border:1.5px solid '+sm[0]+';padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800">'+sm[3]+'</span>';
        html += '<span style="font-size:10px;color:var(--hint)">'+_ago(r.created_at)+'</span>';
      html += '</div>';
    html += '</div>';

    // ── أزرار الإجراء (للمعلقة فقط) ──
    if(isPend){
      html += '<div style="display:flex;gap:7px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)">';
        html += '<button onclick="_openHandleModal('+r.id+',\'warn\')" style="flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--yellow-l);color:var(--yellow);border:1.5px solid #fde68a;display:flex;align-items:center;justify-content:center;gap:5px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>تحذير</button>';
        html += '<button onclick="_openHandleModal('+r.id+',\'ban\')" style="flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--red-l);color:var(--red);border:1.5px solid #fecaca;display:flex;align-items:center;justify-content:center;gap:5px"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>إيقاف الحساب</button>';
        html += '<button onclick="_openHandleModal('+r.id+',\'ignore\')" style="padding:9px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--bg);color:var(--muted);border:1.5px solid var(--border)">تجاهل</button>';
      html += '</div>';
    }

    html += '</div>';
    return html;
  }).join('');
}

function _openHandleModal(reportId, action){
  var labels = {warn:'إرسال تحذير للمستخدم',ban:'إيقاف حساب المستخدم',ignore:'تجاهل البلاغ'};
  var colors  = {warn:'var(--yellow)',ban:'var(--red)',ignore:'var(--muted)'};
  var desc    = {
    warn:'سيصلهم إشعار تحذيري داخل التطبيق.',
    ban:'سيتم إيقاف الحساب فوراً ولن يتمكن من تسجيل الدخول.',
    ignore:'سيُغلَق البلاغ دون اتخاذ أي إجراء.',
  };
  openModal(
    labels[action],
    '<div style="background:var(--bg);border-right:3px solid '+colors[action]+';border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text2)">'+desc[action]+'</div>'+
    '<div>'+
      '<label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">ملاحظة '+(action==='ignore'?'(اختياري)':'للمستخدم (اختياري)')+'</label>'+
      '<textarea id="rpt-note" placeholder="مثال: لاحظنا مخالفة الشروط في..." style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none;min-height:80px;resize:vertical;line-height:1.7"></textarea>'+
    '</div>',
    '<button onclick="closeModal()" style="padding:9px 16px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--bg);color:var(--muted);border:1px solid var(--border)">إلغاء</button>'+
    '<button onclick="_execHandleReport('+reportId+',\''+action+'\')" style="padding:9px 16px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;background:'+colors[action]+';color:#fff;border:none">'+labels[action]+'</button>'
  );
}

async function _execHandleReport(id, action){
  var note = ((_el('rpt-note')||{}).value||'').trim();
  var btn  = document.querySelector('#mFt button:last-child');
  if(btn){ btn.disabled=true; btn.textContent='جاري التنفيذ...'; }

  var r = await _api('/api/admin/reports/'+id, {
    method:'PUT',
    body: JSON.stringify({ action:action, admin_note:note||null })
  });

  closeModal();
  if(r.ok){
    var msgs = {warn:'تم إرسال التحذير للمستخدم', ban:'تم إيقاف الحساب', ignore:'تم تجاهل البلاغ'};
    toast(msgs[action]||'تم تنفيذ الإجراء','success');
    loadReports();
  } else {
    toast(r.message||'حدث خطأ في السيرفر','error');
  }
}

async function loadReviews(){

  var list=await _api('/api/admin/reviews')||[];
  function stars(n){ var s=''; for(var i=1;i<=5;i++) s+='<span style="color:'+(i<=n?'#F0A500':'#e4e4e7')+'">★</span>'; return s; }
  pg.innerHTML=
    '<div class="pghd"><div><div class="pg-t">التقييمات</div><div class="pg-s">'+list.length+' تقييم</div></div></div>'+
    '<div class="card card-accent"><div class="cb">'+
    (list.length?list.map(function(r){
      return '<div style="border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
            '<div style="font-size:13px;font-weight:800;color:var(--text)">'+_esc(r.reviewer_name||'—')+'</div>'+
            '<span style="color:var(--muted);font-size:11px">قيّم</span>'+
            '<div style="font-size:13px;font-weight:800;color:var(--p)">'+_esc(r.reviewed_name||'—')+'</div>'+
          '</div>'+
          '<div>'+stars(r.rating)+'</div>'+
          (r.comment?'<div style="font-size:12px;color:var(--text2);margin-top:6px;background:var(--bg);padding:7px 10px;border-radius:8px;border-right:3px solid var(--gold)">'+_esc(r.comment)+'</div>':'')+
          '<div style="font-size:10px;color:var(--hint);margin-top:4px">'+_fdt(r.created_at)+' · '+_esc(r.request_title||'')+'</div>'+
        '</div>'+
        '<button onclick="_deleteReview('+r.id+')" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--red-l);color:var(--red);border:1px solid #fecaca;flex-shrink:0">حذف</button>'+
      '</div>';
    }).join(''):_empty('لا يوجد تقييمات',''))+
    '</div></div>';
}
async function _deleteReview(id){
  if(!confirm('حذف هذا التقييم؟')) return;
  await _api('/api/admin/reviews/'+id,{method:'DELETE'});
  toast('تم الحذف','success'); loadReviews();
}

        '<div>'+
          '<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px">نص الإشعار *</div>'+
          '<textarea id="notif-body" placeholder="اكتب نص الإشعار هنا..." style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:Tajawal,sans-serif;font-size:13px;outline:none;min-height:100px;resize:vertical;line-height:1.7;transition:.15s" onfocus="this.style.borderColor=\'var(--p)\'" onblur="this.style.borderColor=\'var(--border)\'"></textarea>'+
        '</div>'+

        // ─ معاينة ─
        '<div style="background:var(--bg);border:1px dashed var(--border);border-radius:11px;padding:13px">'+
          '<div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">معاينة</div>'+
          '<div style="background:#0d1f3c;border-radius:12px;padding:13px;display:flex;gap:10px;align-items:flex-start">'+
            '<div style="width:32px;height:32px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">م</div>'+
            '<div style="flex:1;min-width:0">'+
              '<div id="prev-title" style="font-size:13px;font-weight:800;color:#fff;margin-bottom:3px">عنوان الإشعار</div>'+
              '<div id="prev-body" style="font-size:11px;color:rgba(255,255,255,.6);line-height:1.6">نص الإشعار سيظهر هنا...</div>'+
            '</div>'+
          '</div>'+
        '</div>'+

        // ─ إرسال ─
        '<div style="display:flex;gap:8px;align-items:center;padding-top:4px">'+
          '<button id="send-notif-btn" onclick="_sendNotif()" style="flex:1;padding:13px;background:var(--p);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;box-shadow:0 4px 16px rgba(27,58,107,.25);transition:all .18s">إرسال الإشعار</button>'+
          '<div id="send-status" style="font-size:12px;color:var(--muted)"></div>'+
        '</div>'+

      '</div>'+
    '</div>';

  // تحديث المعاينة لحظياً
  setTimeout(function(){
    var t=_el('notif-title'), b=_el('notif-body');
    if(t) t.addEventListener('input',function(){ var e=_el('prev-title'); if(e) e.textContent=t.value||'عنوان الإشعار'; });
    if(b) b.addEventListener('input',function(){ var e=_el('prev-body'); if(e) e.textContent=b.value||'نص الإشعار سيظهر هنا...'; });
  },0);
}

function _setNRole(btn, role){
  _notifRole=role;
  ['all','provider','client'].forEach(function(r){
    var b=_el('nr-'+r); if(!b) return;
    var act=r===role;
    b.style.background=act?'var(--p)':'var(--bg)';
    b.style.color=act?'#fff':'var(--muted)';
    b.style.borderColor=act?'var(--p)':'var(--border)';
  });
  // إظهار/إخفاء فلتر التخصصات
  var specWrap=_el('spec-filter-wrap');
  if(specWrap) specWrap.style.display=(role==='provider'||role==='all')?'':'none';
}
function _setNSpec(btn, spec){
  _notifSpec=spec;
  // update active button
  document.querySelectorAll('[id^="ns-"]').forEach(function(b){
    var isActive=b.textContent.trim()===spec;
    b.style.background=isActive?'var(--p)':'var(--bg)';
    b.style.color=isActive?'#fff':'var(--muted)';
    b.style.borderColor=isActive?'var(--p)':'var(--border)';
  });
  // حساب عدد المزودين المتأثرين
  if(spec!=='الكل'){
    _api('/api/admin/providers').then(function(provs){
      var cnt=(provs||[]).filter(function(p){
        return (p.specialties||[]).includes(spec)||(p.notify_categories||[]).includes(spec);
      }).length;
      var el=_el('spec-count');
      if(el) el.textContent='سيُرسَل لـ '+cnt+' مزود لديهم هذا التخصص';
    });
  } else {
    var el=_el('spec-count'); if(el) el.textContent='';
  }
}
function _setNChannel(btn, ch){
  _notifChannel=ch;
  var cols={'both':'var(--p)','push':'#7c3aed','email':'#d97706'};
  ['both','push','email'].forEach(function(c){
    var b=_el('nc-'+c); if(!b) return;
    var act=c===ch;
    b.style.background=act?cols[c]:'var(--bg)';
    b.style.color=act?'#fff':'var(--muted)';
    b.style.borderColor=act?cols[c]:'var(--border)';
  });
}

async function _sendNotif(){
  var title=(_el('notif-title')||{}).value||'';
  var body=(_el('notif-body')||{}).value||'';
  var uid=parseInt((_el('notif-uid')||{}).value)||null;
  if(!title.trim()||!body.trim()){ toast('أدخل العنوان والنص','error'); return; }

  var btn=_el('send-notif-btn');
  var st=_el('send-status');
  if(btn){ btn.disabled=true; btn.textContent='جاري الإرسال...'; }

  var payload={title:title.trim(), body:body.trim(), type:'admin', channel:_notifChannel};
  if(uid) payload.user_id=uid;
  else {
    if(_notifRole!=='all') payload.role=_notifRole;
    if(_notifSpec!=='الكل') payload.specialty=_notifSpec;
  }

  var r=await _api('/api/admin/notify',{method:'POST',body:JSON.stringify(payload)});

  if(btn){ btn.disabled=false; btn.textContent='إرسال الإشعار'; }
  if(r.ok){
    toast('تم الإرسال بنجاح','success');
    _el('notif-title').value=''; _el('notif-body').value='';
    if(uid) _el('notif-uid').value='';
    var pt=_el('prev-title'); if(pt) pt.textContent='عنوان الإشعار';
    var pb=_el('prev-body'); if(pb) pb.textContent='نص الإشعار سيظهر هنا...';
    if(st) st.textContent='تم الإرسال في '+new Date().toLocaleTimeString('ar-SA');
  } else {
    toast(r.message||'حدث خطأ','error');
  }
}

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('ov').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
  gotoPage('home');

// Quick search
async function _quickSearch(){
  var q=(_el('admin-search')||{}).value; if(!q||q.length<2) return;
  var pg=_el('page-search');
  document.querySelectorAll('.page').forEach(function(p){p.className='page';});
  if(pg) pg.className='page on';
  var pt=_el('pageTitle'); if(pt) pt.textContent='نتائج البحث';
  pg.innerHTML='<div class="loading">جاري البحث...</div>';
  var r=await _api('/api/admin/search?q='+encodeURIComponent(q));
  pg.innerHTML=
    '<div class="pghd"><div><div class="pg-t">نتائج البحث</div><div class="pg-s">'+q+'</div></div></div>'+
    ((r.requests&&r.requests.length)?
      '<div class="card" style="margin-bottom:14px"><div class="ch"><h3>طلبات ('+(r.requests.length)+')</h3></div><div class="cb">'+
      r.requests.map(function(x){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:700">'+_esc(x.title)+'</div><div style="font-size:11px;color:var(--muted)">'+_esc(x.project_number||'')+'  · '+_esc(x.client_name||'')+'</div></div>'+_stBadge(x.status)+'</div>';}).join('')+
      '</div></div>' : '')+
    ((r.users&&r.users.length)?
      '<div class="card"><div class="ch"><h3>مستخدمون ('+(r.users.length)+')</h3></div><div class="cb">'+
      r.users.map(function(x){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:700">'+_esc(x.name)+'</div><div style="font-size:11px;color:var(--muted)">'+_esc(x.email)+'</div></div>'+_roleBadge(x.role)+'</div>';}).join('')+
      '</div></div>' : '')+
    ((!r.requests||!r.requests.length)&&(!r.users||!r.users.length)?'<div class="empty"><h4>لا توجد نتائج</h4></div>':'');
}
