<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الصفحة غير موجودة — مناقصة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1B3A6B;--accent:#D4973A}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#0d2040,#1B3A6B);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:460px}
.num{font-size:100px;font-weight:900;color:rgba(255,255,255,.08);line-height:1;margin-bottom:-20px;letter-spacing:-4px}
.ic{font-size:56px;margin-bottom:16px}
h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:10px}
p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:28px}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 22px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;border:none;transition:.15s;display:inline-block}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#c07e28}
.btn-o{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-o:hover{background:rgba(255,255,255,.18)}
.logo{font-size:18px;font-weight:900;color:rgba(255,255,255,.3);margin-bottom:32px}.logo span{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">مناقصة<span>.</span></div>
  <div class="num">404</div>
  <div class="ic">🔍</div>
  <h1>الصفحة غير موجودة</h1>
  <p>يبدو أن الصفحة التي تبحث عنها انتقلت أو لم تعد متوفرة. تحقق من الرابط أو عد للصفحة الرئيسية.</p>
  <div class="btns">
    <a class="btn btn-p" href="index.html">الصفحة الرئيسية</a>
    <a class="btn btn-o" href="auth.html">تسجيل الدخول</a>
  </div>
</div>
</body>
</html>
