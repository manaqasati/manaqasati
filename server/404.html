<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الصفحة غير موجودة — مناقصة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#0D1829,#16213E,#1B3A6B);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#fff;position:relative;overflow:hidden}
.stars{position:absolute;inset:0;opacity:.5;pointer-events:none}
.wrap{text-align:center;max-width:420px;position:relative;z-index:2}
.logo{font-size:24px;font-weight:900;margin-bottom:40px;display:flex;align-items:center;justify-content:center;gap:8px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#C9920A;box-shadow:0 0 0 5px rgba(201,146,10,.25)}
.code{font-size:96px;font-weight:900;line-height:1;background:linear-gradient(135deg,#C9920A,#F0A500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
h1{font-size:22px;font-weight:800;margin-bottom:10px}
p{font-size:14px;color:rgba(255,255,255,.65);line-height:1.8;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#C9920A,#A87000);color:#fff;padding:14px 36px;border-radius:12px;text-decoration:none;font-size:15px;font-weight:800;transition:.2s;box-shadow:0 6px 20px rgba(201,146,10,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(201,146,10,.4)}
.btn svg{width:18px;height:18px}
</style>
</head>
<body>
<svg class="stars" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice">
  <line x1="50" y1="100" x2="160" y2="180" stroke="#fff" stroke-width="1" opacity=".3"/>
  <line x1="160" y1="180" x2="300" y2="120" stroke="#fff" stroke-width="1" opacity=".3"/>
  <line x1="300" y1="120" x2="350" y2="260" stroke="#C9920A" stroke-width="1" opacity=".4"/>
  <line x1="160" y1="180" x2="220" y2="340" stroke="#fff" stroke-width="1" opacity=".3"/>
  <line x1="80" y1="420" x2="220" y2="340" stroke="#fff" stroke-width="1" opacity=".25"/>
  <line x1="220" y1="340" x2="340" y2="450" stroke="#fff" stroke-width="1" opacity=".25"/>
  <circle cx="50" cy="100" r="3" fill="#fff" opacity=".6"/>
  <circle cx="160" cy="180" r="5" fill="#fff" opacity=".8"/>
  <circle cx="300" cy="120" r="3.5" fill="#C9920A"/>
  <circle cx="350" cy="260" r="3" fill="#fff" opacity=".5"/>
  <circle cx="220" cy="340" r="4.5" fill="#C9920A" opacity=".7"/>
  <circle cx="80" cy="420" r="3" fill="#fff" opacity=".4"/>
  <circle cx="340" cy="450" r="3" fill="#fff" opacity=".4"/>
</svg>
<div class="wrap">
  <div class="logo"><span class="logo-dot"></span>مناقصة</div>
  <div class="code">404</div>
  <h1>الصفحة غير موجودة</h1>
  <p>عذراً، الصفحة التي تبحث عنها غير متوفرة أو تم نقلها. تأكد من الرابط أو ارجع للصفحة الرئيسية.</p>
  <a href="/" class="btn">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    العودة للرئيسية
  </a>
</div>
</body>
</html>
