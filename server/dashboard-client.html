<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة العميل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --p-light:#EEF2FF;--p-mid:#C7D2FE;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#1E293B;--muted:#8896AA;--hint:#94A3B8;
  --border:#E6E2D9;--border2:#D8D3CB;
  --bg:#F5F5F0;--white:#FFFFFF;
  --green:#16A34A;--green-l:#EDFBF0;
  --red:#DC2626;--red-l:#FEF2F2;
  --shadow:0 1px 4px rgba(15,23,42,.06),0 0 0 1px rgba(15,23,42,.03);
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.side{width:260px;background:var(--white);border-left:1px solid var(--border);height:100vh;position:fixed;right:0;top:0;display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px rgba(27,58,107,0.07)}
.side-brand{background:var(--p3);padding:18px;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.side-brand::before{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:var(--gold)}
.side-brand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;position:relative;z-index:1;margin-top:2px}
.user-pill{margin-top:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.av{width:36px;height:36px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av-name{font-size:13px;font-weight:800;color:#fff}
.av-role{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;margin-top:1px}
.nav{padding:10px;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.8px;padding:0 8px;margin:14px 0 6px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:all .18s;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--gold-l);color:var(--gold-d)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold-d);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--p);box-shadow:0 3px 10px rgba(27,58,107,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor}
.badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
.side-foot{padding:10px 12px;border-top:1px solid var(--border)}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--red-l)}

.main{margin-right:260px;min-height:100vh;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--p3);height:54px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.topbar-title{font-size:15px;font-weight:800;color:#fff}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 10px rgba(201,146,10,.3)}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px)}

.content{padding:24px 28px;flex:1}
.page{display:none}.page.on{display:block}
.pghd{margin-bottom:16px}
.pg-t{font-size:18px;font-weight:900;color:var(--text)}
.pg-s{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:12px 6px 11px;text-align:center}
.sc:hover{border-color:var(--p-mid);box-shadow:0 4px 16px rgba(27,58,107,.08)}
.sn{font-size:22px;font-weight:900;line-height:1;margin-bottom:3px}
.st{font-size:9px;color:var(--muted);font-weight:600}

.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card-accent{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.ch-l{display:flex;align-items:center;gap:8px}
.ch-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch h3{font-size:14px;font-weight:800;color:var(--text)}
.ch-link{font-size:12px;color:var(--p);font-weight:700;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif}

.tag{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tag::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-open{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}.t-open::before{background:#16a34a}
.t-prog{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}.t-prog::before{background:#2563eb}
.t-done{background:#fff8e7;color:#b45309;border:1px solid #fde68a}.t-done::before{background:#F0A500}
.t-rev{background:#fef3c7;color:#92400e;border:1px solid #fde68a}.t-rev::before{background:#d97706}

.btn-sm{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.bs-p{background:var(--p-light);color:var(--p)}
.bs-p:hover{background:var(--p-mid)}
.bs-g{background:var(--green-l);color:var(--green)}
.bs-r{background:var(--red-l);color:var(--red)}

.tab-btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;background:none;color:var(--muted);transition:all .18s}
.tab-btn.on{background:var(--white);color:var(--p);box-shadow:0 2px 8px rgba(27,58,107,.1)}

.overlay{display:none;position:fixed;inset:0;background:rgba(10,5,30,.65);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column}
.modal-drag{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg)}

.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty-ic{width:52px;height:52px;background:var(--p-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.empty-ic svg{stroke:var(--p)}
.empty h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty p{font-size:12px}
.loading{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.alert.ok{background:var(--green-l);color:var(--green);display:block}
.alert.err{background:var(--red-l);color:var(--red);display:block}

.profile-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:center}
.profile-stat-n{font-size:22px;font-weight:900}
.profile-stat-l{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}

.mob-head{display:none;background:var(--p3);height:54px;padding:0 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mob-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
.mob-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-notif{position:relative;background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:7px;color:#fff;display:flex;border-radius:9px}
.mob-notif-badge{position:absolute;top:2px;left:2px;background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 3px}
.mob-av{width:30px;height:30px;border-radius:9px;background:var(--gold);color:var(--p2);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mob-out{background:rgba(255,255,255,.1);border:none;cursor:pointer;padding:6px;color:#fff;display:flex;border-radius:8px}

.bnav{display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:420px;background:var(--p);border-radius:24px;z-index:100;padding:8px;box-shadow:0 8px 28px rgba(22,33,62,.3),0 2px 8px rgba(22,33,62,.2)}
.bnav::before{content:'';position:absolute;top:0;left:25%;right:25%;height:1px;background:rgba(255,255,255,.08)}
.bnav-inner{display:flex;align-items:center;justify-content:space-around}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;border:none;background:none;cursor:pointer;font-family:'Tajawal',sans-serif;color:rgba(255,255,255,.35);transition:.2s;position:relative;border-radius:16px}
.bni .bic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:.2s}
.bni .bic svg{stroke:currentColor;transition:.2s}
.bni .bt{font-size:10px;font-weight:700;transition:.2s;letter-spacing:.2px}
.bni.on{background:rgba(201,146,10,.14)}
.bni.on .bt{color:var(--gold)}
.bni.on .bic svg{stroke:var(--gold)}
.bni-badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;border:1.5px solid var(--white)}
.bni-fab{flex:0 0 80px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;padding-bottom:4px;border:none;background:none;cursor:pointer;font-family:'Tajawal',sans-serif;position:relative;margin-top:-22px}
.bni-fab .fab-circle{width:58px;height:58px;background:linear-gradient(145deg,#F0A500,#c78500);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(240,165,0,.55),0 3px 8px rgba(240,165,0,.35),0 0 0 3px var(--white),0 0 0 4px rgba(240,165,0,.2);transition:all .28s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1}
.bni-fab .fab-circle::before{content:'';position:absolute;inset:-6px;border-radius:50%;background:rgba(240,165,0,.12);animation:fab-ring 2.5s ease-in-out infinite}
@keyframes fab-ring{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:.2}}
.bni-fab .fab-circle svg{stroke:#fff;width:24px;height:24px;stroke-width:2.5;position:relative;z-index:1}
.bni-fab .fab-label{font-size:10px;font-weight:900;color:var(--gold);letter-spacing:.3px}
.bni-fab:active .fab-circle{transform:scale(.9);box-shadow:0 4px 12px rgba(240,165,0,.4),0 0 0 3px var(--white)}
.bni-fab:hover .fab-circle{transform:translateY(-2px);box-shadow:0 12px 28px rgba(240,165,0,.6),0 4px 10px rgba(240,165,0,.4),0 0 0 3px var(--white),0 0 0 5px rgba(240,165,0,.15)}

.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;background:var(--white)}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--p)}

.spec-pill{padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;margin-bottom:4px}
.spec-pill:hover{border-color:var(--gold);color:var(--gold-d)}
.spec-pill.on{background:var(--p);color:#fff;border-color:var(--p)}

.sk{background:#eee;background-image:linear-gradient(to right,#ebebeb 8%,#d6d6d6 18%,#ebebeb 33%);background-size:800px 104px;border-radius:8px;animation:sk 1.2s ease-in-out infinite}
.sk-line{height:14px;margin-bottom:8px;border-radius:6px}
.sk-line.xl{height:22px;width:55%}
.sk-line.lg{height:16px;width:65%}
.sk-line.md{height:13px;width:80%}
.sk-line.sm{height:11px;width:45%}
.sk-box{background:#fff;border:1px solid #e6e2d9;border-radius:14px;padding:14px;margin-bottom:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:#0d1f3c;color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:all .22s;pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
#tIc{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}

#lbar-wrap{position:fixed;top:0;left:0;right:0;z-index:99999;height:3px;background:rgba(0,0,0,.06);display:none}
#lbar-wrap.on{display:block}
#lbar{height:3px;width:0%;background:var(--gold);transition:width .3s ease}

/* Account deletion danger zone */
.danger-zone{background:#fef2f2;border:1.5px solid #fca5a5;border-right:4px solid var(--red);border-radius:14px;padding:18px;margin-bottom:14px}
.danger-zone-title{font-size:14px;font-weight:900;color:var(--red);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.danger-zone-desc{font-size:12px;color:#7f1d1d;line-height:1.8;margin-bottom:14px}
.btn-delete-account{background:var(--red);color:#fff;border:none;padding:11px 20px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 12px rgba(220,38,38,.25)}
.btn-delete-account:hover{background:#b91c1c;transform:translateY(-1px);box-shadow:0 5px 16px rgba(220,38,38,.35)}
.delete-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:14px 0}
.delete-stat-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px;text-align:center}
.delete-stat-num{font-size:18px;font-weight:900;color:var(--red)}
.delete-stat-lbl{font-size:10px;color:#991b1b;margin-top:2px;font-weight:700}
.confirm-input{width:100%;padding:13px 16px;border:2px solid var(--red);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;outline:none;text-align:center;background:#fff;color:var(--red)}
.confirm-input:focus{box-shadow:0 0 0 3px rgba(220,38,38,.15)}
.btn-p{padding:12px 22px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{padding:12px 16px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* 🔔 PUSH BANNER */
.push-banner{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:420px;background:linear-gradient(135deg,#16213E,#1A2F5E);border:1px solid var(--gold);border-radius:18px;padding:16px 18px;z-index:200;box-shadow:0 12px 40px rgba(15,23,42,.4);display:none;animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}
.push-banner.show{display:block}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.push-banner-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.push-banner-icon{width:38px;height:38px;border-radius:11px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(201,146,10,.4)}
.push-banner-title{font-size:13px;font-weight:900;color:#fff;margin-bottom:2px}
.push-banner-sub{font-size:11px;color:rgba(255,255,255,.6)}
.push-banner-list{font-size:11px;color:rgba(255,255,255,.78);line-height:2;margin-bottom:12px;padding-right:18px}
.push-banner-actions{display:flex;gap:8px}
.push-banner-yes{flex:1;padding:11px;background:var(--gold);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:.15s}
.push-banner-yes:hover:not(:disabled){background:var(--gold-d)}
.push-banner-yes:disabled{opacity:.6;cursor:wait}
.push-banner-no{padding:11px 14px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.push-banner-no:hover{background:rgba(255,255,255,.15)}
@media(min-width:769px){.push-banner{bottom:24px;left:auto;right:24px;transform:none;max-width:340px}@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}}

/* 🔔 PUSH TOGGLE CARD */
.push-toggle-card{background:linear-gradient(135deg,#fef9e7,#fff8e6);border:1.5px solid var(--gold-soft);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.push-toggle-icon{width:42px;height:42px;border-radius:11px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 10px rgba(201,146,10,.3)}
.push-toggle-info{flex:1;min-width:0}
.push-toggle-title{font-size:13px;font-weight:900;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.push-toggle-sub{font-size:11px;color:var(--text2);line-height:1.6}
.push-toggle-switch{width:48px;height:26px;background:var(--border2);border-radius:13px;position:relative;cursor:pointer;transition:.25s;flex-shrink:0;border:none;padding:0}
.push-toggle-switch::after{content:'';position:absolute;top:2px;right:2px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.push-toggle-switch.on{background:var(--green)}
.push-toggle-switch.on::after{right:24px}

}

<script>
'use strict';
var API='https://manaqasati-production.up.railway.app';

// ══ GLOBALS ══
var _token=localStorage.getItem('token')||'';
var _me=JSON.parse(localStorage.getItem('user')||'{}');
var _chatPolling=null;
var _chatMsgs=[];
var _myId=null;
var _pendingImgs=[];
var _editReqId=null;
var _allReqs=[];
if(!_token||_me.role!=='client'){location.href='auth.html';}
_myId=_me.id||null;

// ══ URL PARAMS ══
(function(){
  var params=new URLSearchParams(location.search);
  var chatId=params.get('chat')||localStorage.getItem('mnq_open_chat_id')||localStorage.getItem('open_chat_request');
  var editId=params.get('edit')||localStorage.getItem('mnq_edit_req');
  localStorage.removeItem('mnq_open_chat_id');localStorage.removeItem('open_chat_request');localStorage.removeItem('mnq_edit_req');
  if(params.get('chat')||params.get('edit')) history.replaceState(null,'',location.pathname);
  if(chatId){
    setTimeout(function(){
      gotoPage('chat');
      setTimeout(function(){
        _api('/api/requests/'+chatId).then(function(req){
          if(req&&req.id){
            var otherId=String(req.assigned_provider_id||'');
            openClientChat(String(req.id),otherId,req.provider_name||'مزود',req.title||'محادثة');
          }
        }).catch(function(){});
      },800);
    },600);
    return;
  }
  if(editId){ setTimeout(function(){ loadEditForm(editId); },500); return; }
})();

// ══ SHARED UTILITIES ══

function _el(id){return document.getElementById(id);}

function _esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

function fmtN(n){ return n?String(Math.round(Number(n))).replace(/\B(?=(\d{3})+(?!\d))/g,','):'0'; }

function _ago(d){if(!d)return'';var diff=(Date.now()-new Date(d))/1000;if(diff<60)return 'الآن';if(diff<3600)return Math.floor(diff/60)+' د';if(diff<86400)return Math.floor(diff/3600)+' س';return Math.floor(diff/86400)+' يوم';}

function showToast(msg,type){
  var el=_el('toast'),ic=_el('tIc'),tm=_el('tMsg');
  if(!el)return;
  ic.textContent=type==='success'?'✓':type==='error'?'✕':'i';
  ic.style.background=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--p)';
  tm.textContent=msg;
  el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tTimer);
  _tTimer=setTimeout(function(){el.style.opacity='0';el.style.transform='translateX(-50%) translateY(14px)';},3200);
}

function openModal(title,body,foot){_el('mTit').textContent=title;_el('mBd').innerHTML=body;_el('mFt').innerHTML=foot||'';_el('ov').classList.add('show');}

function closeModal(){_el('ov').classList.remove('show');}

function openImgFull(src){
  var v=_el('imgViewer'),i=_el('imgViewerImg');
  if(!v||!i)return;
  i.src=src;v.style.display='flex';
}

function doLogout(){localStorage.removeItem('token');localStorage.removeItem('user');location.href='auth.html';}

function _api(path,opts){
  var headers={'Authorization':'Bearer '+(localStorage.getItem('token')||_token||''),'Content-Type':'application/json'};
  function doFetch(){
    var fetchOpts=Object.assign({headers:headers,cache:'no-store'},opts||{});
    return fetch(API+path,fetchOpts).then(function(r){return r.json();}).catch(function(){return null;});
  }
  var req=doFetch().then(function(r){
    if(r!==null)return r;
    return new Promise(function(res){setTimeout(res,1000);}).then(doFetch);
  });
  var timeout=new Promise(function(res){setTimeout(function(){res(null);},12000);});
  return Promise.race([req,timeout]);
}

function prefetchPage(page){
  if(_cacheGet(page==='home'?'home_data':page)) return; // عندنا Cache
  clearTimeout(_prefetchTimer[page]);
  _prefetchTimer[page]=setTimeout(function(){
    if(page==='browse')_api('/api/requests').then(function(d){if(d)_cacheSet('browse',d);});
    else if(page==='works')Promise.all([_api('/api/provider/bids'),_api('/api/provider/projects')]).then(function(r){var hc=_cacheGet('home_data')||{profile:{}};_cacheSet('home_data',{profile:hc.profile,bids:r[0]||[],projs:r[1]||[]});});
    else if(page==='notifs')_api('/api/notifications').then(function(d){if(d)_cacheSet('notifs',d);});
  },150); // ابدأ الجلب بعد 150ms من الـ hover
}

function openImgFull(src){var v=_el('img-viewer');var i=_el('img-viewer-src');if(v&&i){i.src=src;v.style.display='flex';}}
function closeImgFull(){var v=_el('img-viewer');if(v){v.style.display='none';}}

function fmtDate(d){if(!d)return'';var dt=new Date(d);var m=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear();}
function stTag(s){var m={open:['t-open','مفتوح'],in_progress:['t-prog','قيد التنفيذ'],completed:['t-done','مكتمل'],done:['t-done','مكتمل'],closed:['','مغلق']};var v=m[s]||['',''];return '<span class="tag '+v[0]+'">'+v[1]+'</span>';}
function timeAgo(d){return _ago(d);}
function _skCards(n){var h='';for(var i=0;i<n;i++)h+='<div class="card" style="height:80px"><div class="sk" style="height:14px;width:60%;margin-bottom:8px"></div><div class="sk" style="height:10px;width:40%"></div></div>';return h;}

// ══ NAVIGATION ══
var _pageTitles={home:'الرئيسية',requests:'مشاريعي',new:'نشر مشروع',chat:'المحادثات',notifs:'الإشعارات',profile:'ملفي الشخصي'};

function gotoPage(pg,param){
  // Close any open chat
  if(pg!=='chat'&&_chatPolling){clearInterval(_chatPolling);_chatPolling=null;}
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('on');});
  var p=_el('page-'+pg); if(p) p.classList.add('on');
  document.querySelectorAll('.ni,.bni').forEach(function(el){el.classList.remove('on');});
  var nav=_el('ni-'+pg); if(nav) nav.classList.add('on');
  var bnav=_el('bn-'+pg); if(bnav) bnav.classList.add('on');
  _el('pageTitle').textContent=_pageTitles[pg]||'';
  if(pg==='home')    loadHome();
  if(pg==='requests') loadRequests();
  if(pg==='new'){
    if(!param) resetForm();
    renderNewForm();
  }
  if(pg==='chat')    loadConversations();
  if(pg==='notifs')  loadNotifs();
  if(pg==='profile') loadProfile();
}

function prefetchPage(pg){}

// ══ INIT UI ══
(function(){
  var av=_el('userAv'); var mav=_el('mobAv');
  var name=_me.name||'العميل';
  _el('userName').textContent=name;
  if(av) av.textContent=name[0]||'ع';
  if(mav) mav.textContent=name[0]||'ع';
  if(_me.profile_image&&_me.profile_image.startsWith('http')){
    if(av) av.innerHTML='<img src="'+_me.profile_image+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px">';
    if(mav) mav.innerHTML='<img src="'+_me.profile_image+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
  }
  loadBadges();
  setInterval(loadBadges,30000);
  gotoPage('home');
})();

// ══ BADGES ══
function loadBadges(){
  _api('/api/notifications/count').then(function(d){
    var b=_el('nb-notif'),mb=_el('mob-nb');
    var n=d&&d.count?d.count:0;
    if(b){b.textContent=n;b.style.display=n>0?'flex':'none';}
    if(mb){mb.textContent=n;mb.style.display=n>0?'flex':'none';}
  });
}

// ══════════════════════════════════════════
// HOME
// ══════════════════════════════════════════
function loadHome(){
  var pg=_el('page-home');
  pg.innerHTML='<div class="pghd"><div class="pg-t">أهلاً '+_esc(_me.name||'')+'</div><div class="pg-s">مرحباً بك في مناقصة</div></div>'+_skCards(3);
  _api('/api/requests/my').then(function(all){
    if(!Array.isArray(all))all=[];
    _allReqs=all;
    var open=all.filter(function(r){return r.status==='open';}).length;
    var prog=all.filter(function(r){return r.status==='in_progress';}).length;
    var done=all.filter(function(r){return r.status==='completed'||r.status==='done';}).length;
    var html='<div class="pghd"><div class="pg-t">أهلاً '+_esc(_me.name||'')+'</div></div>';
    html+='<div class="stat-grid">';
    html+='<div class="sc"><div class="sn">'+all.length+'</div><div class="st">الإجمالي</div></div>';
    html+='<div class="sc"><div class="sn" style="color:var(--green)">'+open+'</div><div class="st">مفتوح</div></div>';
    html+='<div class="sc"><div class="sn" style="color:#2563EB">'+prog+'</div><div class="st">قيد التنفيذ</div></div>';
    html+='<div class="sc"><div class="sn" style="color:var(--gold)">'+done+'</div><div class="st">مكتمل</div></div>';
    html+='</div>';
    html+='<div class="card card-accent">';
    html+='<div class="ch"><div class="ch-l"><div class="ch-ic" style="background:var(--p)"><svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><h3>آخر المشاريع</h3></div><button class="ch-link" onclick="gotoPage(&quot;requests&quot;)">عرض الكل</button></div>';
    if(!all.length){html+='<div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-size:13px;font-weight:700">لا توجد مشاريع بعد</div><button class="btn-new" style="margin-top:12px" onclick="gotoPage(&quot;new&quot;)">انشر أول مشروع</button></div>';}
    else{html+=all.slice(0,5).map(function(r){return riCard(r,false);}).join('');}
    html+='</div>';
    pg.innerHTML=html;
    addCardListeners(pg);
  });
}

// ══════════════════════════════════════════
// REQUESTS
// ══════════════════════════════════════════
function loadRequests(){
  var pg=_el('page-requests');
  pg.innerHTML='<div class="pghd"><div class="pg-t">مشاريعي</div></div>'+_skCards(4);
  _api('/api/requests/my').then(function(all){
    _allReqs=Array.isArray(all)?all:[];
    var pg=_el('page-requests');
    var html='<div class="pghd"><div class="pg-t">مشاريعي</div><div class="pg-s">'+_allReqs.length+' مشروع</div></div>';
    if(!_allReqs.length){html+='<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-size:14px;font-weight:700;margin-bottom:12px">لا توجد مشاريع</div><button class="btn-new" onclick="gotoPage(&quot;new&quot;)">انشر أول مشروع</button></div>';}
    else{html+=_allReqs.map(function(r){return riCard(r,true);}).join('');}
    pg.innerHTML=html;
    addCardListeners(pg);
  });
}

function riCard(r,actions){
  var barColor=r.status==='open'?'var(--green)':r.status==='in_progress'?'#2563EB':r.status==='completed'||r.status==='done'?'var(--gold)':'var(--hint)';
  var thumbHtml=r.thumbnail&&r.thumbnail.startsWith('http')?'<div style="width:80px;height:100%;min-height:80px;flex-shrink:0;overflow:hidden"><img src="'+r.thumbnail+'" style="width:100%;height:100%;min-height:80px;object-fit:cover;display:block"></div>':'';
  var acts='';
  if(actions){
    acts='<div style="display:flex;gap:6px;flex-wrap:wrap;padding-top:9px;border-top:1px solid var(--border);margin-top:7px">'
      +'<button class="btn-sm bs-p _view-btn" data-id="'+r.id+'" data-slug="'+encodeURIComponent((r.title||'مشروع').replace(/\s+/g,'-').slice(0,40))+'-'+r.id+'">عرض المشروع</button>'
      +'<button class="btn-sm bs-p _edit-btn" data-id="'+r.id+'">تعديل</button>'
      +'<button class="btn-sm bs-r _del-btn" data-id="'+r.id+'">حذف</button>'
      +'</div>';
  }
  return '<div style="background:var(--white);border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border);display:flex;cursor:pointer" class="_proj-card" data-id="'+r.id+'" data-slug="'+encodeURIComponent((r.title||'مشروع').replace(/\s+/g,'-').slice(0,40))+'-'+r.id+'">'
    +'<div style="width:4px;flex-shrink:0;background:'+barColor+'"></div>'
    +thumbHtml
    +'<div style="flex:1;padding:12px 14px;min-width:0">'
      +(r.category?'<div style="font-size:9px;color:var(--muted);font-weight:700;margin-bottom:3px;letter-spacing:.3px">'+_esc(r.category)+'</div>':'')

function resetForm(){
  _pendingImgs=[];_editReqId=null;
  ['req-title','req-desc','req-budget','req-edit-id'].forEach(function(id){var el=_el(id);if(el)el.value='';});
  ['req-cat','req-city'].forEach(function(id){var el=_el(id);if(el)el.value='';});
  var dl=_el('req-deadline');if(dl)dl.value='';
  var prev=_el('req-img-preview');if(prev)prev.innerHTML='';
  var fth=_el('form-title-h');if(fth)fth.textContent='نشر مشروع جديد';
  var sub=_el('req-submit');if(sub)sub.textContent='نشر المشروع';
}

function previewImgs(e){
  var files=Array.from(e.target.files);
  _pendingImgs=files;
  var prev=_el('req-img-preview');
  if(!prev)return;
  prev.innerHTML='';
  files.forEach(function(f,i){
    var url=URL.createObjectURL(f);
    prev.innerHTML+='<div style="position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden;border:1px solid var(--border)"><img src="'+url+'" style="width:100%;height:100%;object-fit:cover"><button onclick="removeImg('+i+')" style="position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center">×</button></div>';
  });
}

function removeImg(i){
  _pendingImgs.splice(i,1);
  var dt=new DataTransfer();
  _pendingImgs.forEach(function(f){dt.items.add(f);});
  var inp=_el('req-imgs');
  if(inp)inp.files=dt.files;
  previewImgs({target:{files:dt.files}});
}

async function submitReq(){
  var title=(_el('req-title')||{}).value||'';
  var cat=(_el('req-cat')||{}).value||'';
  var city=(_el('req-city')||{}).value||'';
  var budget=(_el('req-budget')||{}).value||'';
  var deadline=(_el('req-deadline')||{}).value||'';
  var desc=(_el('req-desc')||{}).value||'';
  var editId=(_el('req-edit-id')||{}).value||'';
  if(!title.trim()||!cat||!city||!desc.trim()){showToast('يرجى تعبئة الحقول المطلوبة *','error');return;}
  var btn=_el('req-submit');if(btn){btn.disabled=true;btn.textContent='جاري الحفظ...';}
  // Upload images
  var images=[];
  if(_pendingImgs.length){
    for(var i=0;i<_pendingImgs.length;i++){
      images.push(await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsDataURL(_pendingImgs[i]);}));
    }
  }
  var body={title:title,description:desc,category:cat,city:city,budget_max:budget||null,deadline:deadline||null};
  if(images.length)body.images=images;
  var url=editId?'/api/requests/'+editId:'/api/requests';
  var method=editId?'PUT':'POST';
  _api(url,{method:method,body:JSON.stringify(body)}).then(function(d){
    if(btn){btn.disabled=false;btn.textContent=editId?'حفظ التعديلات':'نشر المشروع';}
    if(d&&(d.id||d.ok)){
      showToast(editId?'تم تحديث المشروع ✓':'تم نشر المشروع ✓','success');
      resetForm();gotoPage('requests');
    }else{showToast((d&&d.message)||'تعذر الحفظ','error');}
  });
}

function loadEditForm(id){
  _api('/api/requests/'+id).then(function(r){
    if(!r||!r.id){showToast('تعذر تحميل المشروع','error');return;}
    gotoPage('new');
    setTimeout(function(){
      renderNewForm();
      setTimeout(function(){
        var set=function(id,val){var el=_el(id);if(el)el.value=val||'';};
        set('req-title',r.title);set('req-desc',r.description);
        set('req-cat',r.category);set('req-city',r.city);
        set('req-budget',r.budget_max);set('req-edit-id',id);
        if(r.deadline)set('req-deadline',r.deadline.split('T')[0]);
        var fth=_el('form-title-h');if(fth)fth.textContent='تعديل المشروع';
        var sub=_el('req-submit');if(sub)sub.textContent='حفظ التعديلات';
        _editReqId=id;
      },100);
    },100);
  });
}

function openClientChat(reqId,receiverId,receiverName,reqTitle){
  reqId=String(reqId||'');
  if(!reqId){return;}
  if(_chatPolling){clearInterval(_chatPolling);_chatPolling=null;}
  _chatMsgs=[];

  // If no receiverId, fetch from API
  if(!receiverId||receiverId==='null'||receiverId==='undefined'){
    _api('/api/requests/'+reqId).then(function(req){
      if(req&&req.id){
        var otherId=String(req.assigned_provider_id||'');
        openClientChat(reqId,otherId,req.provider_name||receiverName||'مزود',req.title||reqTitle||'محادثة');
      }
    });
    return;
  }

  var old=_el('cl-chat-overlay');if(old)old.remove();
  var overlay=document.createElement('div');
  overlay.id='cl-chat-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML=
    '<div style="background:var(--bg);width:100%;max-width:500px;height:82vh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;overflow:hidden">'
      +'<div style="background:var(--p3);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0">'
        +'<button id="cl-chat-close" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px">×</button>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:14px;font-weight:800;color:#fff">'+_esc(receiverName||'مزود')+'</div>'
          +'<div style="font-size:10px;color:rgba(255,255,255,.5)">'+_esc(reqTitle||'محادثة')+'</div>'
        +'</div>'
      +'</div>'
      +'<div id="cl-chat-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;background:var(--bg)">'
        +'<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">جاري التحميل...</div>'
      +'</div>'
      +'<div style="display:flex;gap:8px;padding:12px;background:#fff;border-top:1px solid var(--border);flex-shrink:0">'
        +'<textarea id="cl-chat-inp" placeholder="اكتب رسالتك..." rows="1" style="flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:11px;font-family:Tajawal,sans-serif;font-size:13px;outline:none;resize:none;max-height:80px"></textarea>'
        +'<button id="cl-chat-send" style="padding:10px 16px;background:var(--p3);color:#fff;border:none;border-radius:11px;cursor:pointer;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700">إرسال</button>'
      +'</div>'
    +'</div>';
  document.body.appendChild(overlay);

  _el('cl-chat-close').onclick=function(){overlay.remove();if(_chatPolling){clearInterval(_chatPolling);_chatPolling=null;}loadConversations();};
  _el('cl-chat-send').onclick=function(){_sendClientMsg(reqId,receiverId);};
  _el('cl-chat-inp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();_sendClientMsg(reqId,receiverId);}});

  // Load messages
  _fetchClientMsgs(reqId,receiverId);

  // Poll
  _chatPolling=setInterval(function(){
    if(!_el('cl-chat-overlay')){clearInterval(_chatPolling);_chatPolling=null;return;}
    _fetchClientMsgs(reqId,receiverId);
  },2500);
}

function _fetchClientMsgs(reqId,receiverId){
  var url=API+'/api/messages/'+reqId+(receiverId&&receiverId!='null'&&receiverId!='0'&&!isNaN(receiverId)?'?with='+receiverId:'');
  fetch(url,{headers:{'Authorization':'Bearer '+_token}})
    .then(function(r){return r.json();})
    .then(function(msgs){
      if(!Array.isArray(msgs))return;
      if(msgs.length===0&&_chatMsgs.filter(function(m){return !String(m.id||'').startsWith('tmp');}).length>0)return;
      _chatMsgs=msgs;
      _renderClientMsgs();
    }).catch(function(){});
}

function _renderClientMsgs(){
  var wrap=_el('cl-chat-msgs');if(!wrap)return;
  if(!_chatMsgs.length){wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">ابدأ المحادثة</div>';return;}
  var seen={},unique=[];
  _chatMsgs.forEach(function(m){var k=m.id||(m.content+m.created_at);if(!seen[k]){seen[k]=1;unique.push(m);}});
  var wasBottom=wrap.scrollTop+wrap.clientHeight>=wrap.scrollHeight-30;
  wrap.innerHTML=unique.map(function(m){
    var isMe=String(m.sender_id)===String(_myId);
    var align=isMe?'flex-end':'flex-start';
    var radius=isMe?'16px 16px 4px 16px':'16px 16px 16px 4px';
    var bg=isMe?'var(--p3)':'#fff';
    var color=isMe?'#fff':'var(--text)';
    var border=isMe?'none':'1px solid var(--border)';
    var h='<div style="display:flex;flex-direction:column;align-items:'+align+';margin-bottom:6px">';
    h+='<div style="max-width:78%;padding:10px 13px;border-radius:'+radius+';background:'+bg+';color:'+color+';border:'+border+';font-size:13px;line-height:1.7;word-break:break-word">';
    if(!isMe)h+='<div style="font-size:10px;opacity:.55;margin-bottom:3px;font-weight:700">'+_esc(m.sender_name||'')+'</div>';
    h+=_esc(m.content);
    h+='<div style="font-size:10px;opacity:.45;margin-top:4px;text-align:left">'+_ago(m.created_at)+'</div>';
    h+='</div></div>';
    return h;
  }).join('');
  if(wasBottom) wrap.scrollTop=wrap.scrollHeight;
}

function _sendClientMsg(reqId,receiverId){
  var inp=_el('cl-chat-inp');
  var content=inp&&inp.value.trim();
  if(!content)return;
  inp.value='';inp.style.height='auto';
  // Optimistic
  _chatMsgs.push({id:'tmp'+Date.now(),sender_id:_myId,content:content,created_at:new Date().toISOString(),sender_name:'أنت'});
  _renderClientMsgs();
  fetch(API+'/api/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token},
    body:JSON.stringify({request_id:parseInt(reqId),receiver_id:parseInt(receiverId)||0,content:content})
  }).then(function(r){return r.json();}).then(function(){
    _fetchClientMsgs(reqId,receiverId);
  }).catch(function(){showToast('تعذر إرسال الرسالة','error');});
}

    +'<div style="background:var(--p3);padding:16px;display:flex;align-items:center;justify-content:space-between">'
      +'<span style="font-size:15px;font-weight:900;color:#fff">محادثة جديدة</span>'
      +'<button id="nc-x" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>'
    +'</div>'
    +'<div style="padding:16px">'
      +'<input id="nc-inp" placeholder="ابحث باسم المزود أو رقم الجوال..." style="width:100%;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;box-sizing:border-box">'
      +'<div id="nc-res" style="margin-top:8px;max-height:260px;overflow-y:auto"></div>'
    +'</div>'
  +'</div>';
  document.body.appendChild(ol);
  _el('nc-x').onclick=function(){ol.remove();};
  ol.addEventListener('click',function(e){if(e.target===ol)ol.remove();});
  var inp=_el('nc-inp'),res=_el('nc-res'),timer=null;
  inp.focus();
  inp.addEventListener('input',function(){
    clearTimeout(timer);
    var q=inp.value.trim();
    if(!q){res.innerHTML='';return;}
    res.innerHTML='<div style="padding:10px;text-align:center;color:var(--muted);font-size:12px">جاري البحث...</div>';
    timer=setTimeout(function(){
      _api('/api/users/search?q='+encodeURIComponent(q)).then(function(us){
        if(!us||!us.length){res.innerHTML='<div style="padding:10px;text-align:center;color:var(--muted)">لا توجد نتائج</div>';return;}
        var h='';
        us.forEach(function(u){
          h+='<div style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border)">'
            +'<div style="width:40px;height:40px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0;overflow:hidden">'+(u.profile_image&&u.profile_image.startsWith('http')?'<img src="'+u.profile_image+'" style="width:100%;height:100%;object-fit:cover">':(u.name||'م')[0])+'</div>'
            +'<div style="flex:1"><div style="font-size:13px;font-weight:800">'+_esc(u.business_name||u.name)+'</div><div style="font-size:11px;color:var(--muted)">'+_esc(u.city||'')+'</div></div>'
            +'<button data-uid="'+u.id+'" data-name="'+_esc(u.business_name||u.name)+'" style="padding:8px 14px;background:var(--p);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">محادثة</button>'
          +'</div>';
        });
        res.innerHTML=h;
        res.querySelectorAll('button[data-uid]').forEach(function(btn){
          btn.addEventListener('click',function(){
            var uid=btn.getAttribute('data-uid');
            var name=btn.getAttribute('data-name');
            ol.remove();
            _api('/api/direct-message',{method:'POST',body:JSON.stringify({provider_id:uid})}).then(function(d){
              if(d&&d.request_id){showToast('تم ✓','success');openClientChat(String(d.request_id),String(uid),name,'محادثة مباشرة');}
            });
          });
        });
      });
    },400);
  });
}

// ══════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════
function loadNotifs(){
  var pg=_el('page-notifs');
  pg.innerHTML='<div class="pghd"><div class="pg-t">الإشعارات</div></div><div id="notifs-list">'+_skCards(3)+'</div>';
  _api('/api/notifications').then(function(ns){
    var list=_el('notifs-list');if(!list)return;
    if(!Array.isArray(ns)||!ns.length){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">🔔</div><div style="font-size:14px;font-weight:700">لا توجد إشعارات</div></div>';return;}
    list.innerHTML=ns.map(function(n){
      return '<div style="background:var(--white);border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid var(--border);'+(n.is_read?'':'border-right:3px solid var(--gold);"')+'>"'
        +'<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px">'+_esc(n.title||'')+'</div>'
        +'<div style="font-size:12px;color:var(--muted)">'+_esc(n.body||n.message||'')+'</div>'
        +'<div style="font-size:10px;color:var(--hint);margin-top:5px">'+_ago(n.created_at)+'</div>'
      +'</div>';
    }).join('');
    _api('/api/notifications/read-all',{method:'POST'}).then(function(){loadBadges();});
  });
}

// ══════════════════════════════════════════
// PROFILE
// ══════════════════════════════════════════
function loadProfile(){
  var pg=_el('page-profile');
  pg.innerHTML='<div class="pghd"><div class="pg-t">ملفي الشخصي</div></div>'
    +'<div class="card card-accent">'
    +'<div style="margin-bottom:12px"><label style="font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px">الاسم</label><input id="p-name" style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;background:var(--bg)"></div>'
    +'<div style="margin-bottom:12px"><label style="font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px">البريد الإلكتروني</label><input id="p-email" type="email" style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;background:var(--bg)"></div>'
    +'<div style="margin-bottom:12px"><label style="font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px">رقم الجوال</label><input id="p-phone" style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;background:var(--bg)"></div>'
    +'<div style="margin-bottom:14px"><label style="font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px">المدينة</label><input id="p-city" style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;background:var(--bg)"></div>'
    +'<button class="btn-new" onclick="saveProfile()" style="width:100%;justify-content:center;padding:13px">حفظ التغييرات</button>'
    +'</div>';
  _api('/api/client/profile').then(function(p){
    if(!p)return;
    var set=function(id,val){var el=_el(id);if(el)el.value=val||'';};
    set('p-name',p.name);set('p-email',p.email);set('p-phone',p.phone);set('p-city',p.city);
  });
}

function saveProfile(){
  var body={
    name:(_el('p-name')||{}).value,
    email:(_el('p-email')||{}).value,
    phone:(_el('p-phone')||{}).value,
    city:(_el('p-city')||{}).value,
  };
  _api('/api/client/profile',{method:'PUT',body:JSON.stringify(body)}).then(function(d){
    if(d&&d.ok){
      showToast('تم الحفظ ✓','success');
      _me.name=body.name;
      localStorage.setItem('user',JSON.stringify(_me));
      _el('userName').textContent=_me.name;
    }else{showToast((d&&d.message)||'تعذر الحفظ','error');}
  });
}
</script>
</body>
