<!DOCTYPE html>
<!-- MANAQASA-CLIENT-v4.0 -->
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة العميل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --p-light:#EEF2FF;--p-mid:#C7D2FE;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#1E293B;--muted:#8896AA;--hint:#94A3B8;
  --border:#E6E2D9;--bg:#F5F5F0;--white:#FFFFFF;
  --green:#16A34A;--green-l:#EDFBF0;
  --red:#DC2626;--red-l:#FEF2F2;
  --radius:14px;--radius-lg:18px;
  --shadow:0 1px 4px rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* SIDEBAR */
.side{width:260px;background:var(--white);border-left:1px solid var(--border);height:100vh;position:fixed;right:0;top:0;display:flex;flex-direction:column;z-index:100}
.side-brand{background:var(--p3);padding:18px;position:relative;overflow:hidden;border-bottom:3px solid var(--gold)}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.user-pill{margin:12px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.av{width:38px;height:38px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.av-name{font-size:13px;font-weight:800;color:var(--text)}
.av-role{font-size:10px;color:var(--muted);margin-top:1px}
.nav{padding:8px;flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:.15s;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--gold-l);color:var(--gold-d)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold-d);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--p);box-shadow:0 3px 10px rgba(27,58,107,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
.side-foot{padding:10px 12px;border-top:1px solid var(--border)}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--red-l)}

/* MAIN */
.main{margin-right:260px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--p);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.tb-title{font-size:15px;font-weight:800;color:#fff}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:.18s;box-shadow:0 3px 12px rgba(201,146,10,.3)}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px)}
.content{padding:22px 26px;flex:1}
.page{display:none!important}.page.on{display:block!important}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-t{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:8px}
.ch h3{font-size:14px;font-weight:800}
.ch-link{font-size:12px;color:var(--p);font-weight:700;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.sn{font-size:24px;font-weight:900;line-height:1;margin-bottom:3px}
.st{font-size:10px;color:var(--muted);font-weight:600}

/* REQUEST ITEM */
.ri{background:var(--white);border:1.5px solid var(--border);border-right:4px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;transition:.2s;position:relative}
.ri:hover{border-color:var(--p-mid);border-right-color:var(--p);box-shadow:0 4px 16px rgba(27,58,107,.1);transform:translateY(-1px)}
.ri-title{font-size:14px;font-weight:800;margin-bottom:7px;line-height:1.4}
.ri-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.rm{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:3px;font-weight:600;background:var(--bg);padding:3px 8px;border-radius:20px;border:1px solid var(--border)}
.ri-acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);grid-column:1/-1}
.tag{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.t-open{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}.t-open::before{background:#16a34a}
.t-prog{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}.t-prog::before{background:#2563eb}
.t-done{background:#fff8e7;color:#b45309;border:1px solid #fde68a}.t-done::before{background:#F0A500}
.t-rev{background:#fef3c7;color:#92400e;border:1px solid #fde68a}.t-rev::before{background:#d97706}

/* BUTTONS */
.btn-p{padding:12px 22px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.18s;width:100%}
.btn-p:hover{background:var(--p2);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-s{padding:12px 16px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-sm{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.bs-p{background:var(--p-light);color:var(--p)}.bs-p:hover{background:var(--p-mid)}
.bs-g{background:var(--green-l);color:var(--green)}
.bs-r{background:var(--red-l);color:var(--red)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--white);transition:.18s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.08)}
.fg input.err,.fg textarea.err,.fg select.err{border-color:var(--red)}
.fg textarea{min-height:100px;resize:vertical}
.form-btns{display:flex;gap:8px;margin-top:16px}
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.alert.ok{background:var(--green-l);color:var(--green);display:block}
.alert.err{background:var(--red-l);color:var(--red);display:block}

/* BIDS */
.bid-card{background:var(--white);border-radius:16px;overflow:hidden;margin-bottom:12px;border:1.5px solid var(--border)}
.bid-card.accepted{border-color:var(--green)}
.bid-card.best{border-color:#F59E0B}

/* CHAT */
.chat-box{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:400px}
.chat-list{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:14px}
.cl-item{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.cl-item:hover{background:var(--bg)}
.cl-item:last-child{border-bottom:none}
.cl-item.unread{background:var(--p-light)}
.cl-av{width:42px;height:42px;border-radius:50%;background:var(--gold);color:var(--p2);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.cl-av img{width:100%;height:100%;object-fit:cover}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);border-radius:12px;margin-bottom:10px}
.msg{max-width:72%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.msg-me{background:var(--p3);color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px}
.msg-other{background:var(--white);border:1px solid var(--border);align-self:flex-start;border-radius:16px 16px 16px 4px}
.msg-time{font-size:10px;opacity:.5;margin-top:3px}
.chat-input{display:flex;gap:8px}
.chat-inp{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:.18s}
.chat-inp:focus{border-color:var(--p)}
.chat-send{padding:11px 18px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* PROFILE */
.profile-hero{background:var(--p3);border-radius:16px;padding:22px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.profile-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.pav{width:80px;height:80px;border-radius:50%;background:var(--gold);color:var(--p2);font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid rgba(255,255,255,.2);cursor:pointer;flex-shrink:0}
.pav img{width:100%;height:100%;object-fit:cover}

/* NOTIFS */
.notif-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--bg)}
.notif-item.unread{background:var(--p-light)}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,5,30,.65);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column}
.modal-drag{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--white)}
.stars-pick{display:flex;gap:10px;justify-content:center;margin:14px 0;direction:ltr}
.sp{font-size:36px;cursor:pointer;opacity:.25;transition:.15s;filter:grayscale(1)}
.sp.on{opacity:1;filter:none;transform:scale(1.1)}

/* EMPTY / SKELETON */
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty svg{opacity:.3;margin-bottom:12px}
.empty h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty p{font-size:12px}
.sk{background:#ebebeb;background-image:linear-gradient(to right,#ebebeb 8%,#d6d6d6 18%,#ebebeb 33%);background-size:800px 104px;border-radius:8px;animation:sk 1.2s ease-in-out infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-line{height:13px;margin-bottom:8px;border-radius:6px}
.sk-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px}

/* MOBILE */
.mob-head{display:none;background:var(--p);height:54px;padding:0 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.mob-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
.mob-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.bnav{display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:420px;background:var(--p);border-radius:24px;z-index:100;padding:8px;box-shadow:0 8px 28px rgba(22,33,62,.3)}
.bnav-inner{display:flex;align-items:center;justify-content:space-around}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;border:none;background:none;cursor:pointer;font-family:'Tajawal',sans-serif;color:rgba(255,255,255,.35);transition:.2s;border-radius:16px}
.bni .bic{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.bni .bt{font-size:10px;font-weight:700}
.bni.on{background:rgba(201,146,10,.14)}
.bni.on .bt{color:var(--gold)}
.bni.on .bic svg{stroke:var(--gold)}
.bni-badge{position:absolute;top:4px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;border:1.5px solid var(--white)}
.fab-wrap{flex:0 0 80px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;padding-bottom:4px;border:none;background:none;cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:-22px}
.fab{width:58px;height:58px;background:linear-gradient(145deg,#F0A500,#c78500);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(240,165,0,.55),0 0 0 3px var(--white);transition:all .28s}
.fab svg{stroke:#fff;width:24px;height:24px;stroke-width:2.5}
.fab-lbl{font-size:10px;font-weight:900;color:var(--gold)}
@media(max-width:768px){
  .side,.topbar{display:none}
  .main{margin-right:0}
  .mob-head{display:flex}
  .bnav{display:block}
  .content{padding:12px 14px 110px}
  .stat-grid{grid-template-columns:repeat(4,1fr);gap:6px}
  .form-grid{grid-template-columns:1fr}
  .ff{grid-column:1}
  .form-btns{flex-direction:column}
  .btn-p,.btn-s{width:100%;text-align:center;justify-content:center;padding:11px}
}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="side">
  <div class="side-brand">
    <div class="logo"><span class="logo-dot"></span>مناقصة</div>
    <div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:3px">لوحة العميل</div>
  </div>
  <div class="user-pill">
    <div class="av" id="sideAv" onclick="show('profile',null,'profile')"></div>
    <div><div class="av-name" id="sideN">—</div><div class="av-role">عميل</div></div>
  </div>
  <nav class="nav">
    <button class="ni on" onclick="show('home',this,'home')">
      <div class="ni-ic"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></div>
      الرئيسية
    </button>
    <button class="ni" onclick="show('requests',this,'requests')">
      <div class="ni-ic"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      طلباتي
    </button>
    <button class="ni" onclick="show('chat',this,'chat')">
      <div class="ni-ic" style="position:relative"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="ni-badge" id="chatBadge" style="display:none">0</span></div>
      المحادثات
    </button>
    <button class="ni" onclick="show('profile',this,'profile')">
      <div class="ni-ic"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      حسابي
    </button>
    <button class="ni" onclick="show('notifs',this,'notifs')">
      <div class="ni-ic" style="position:relative"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="ni-badge" id="notifBadge" style="display:none">0</span></div>
      الإشعارات
    </button>
  </nav>
  <div class="side-foot">
    <button class="logoutbtn" onclick="logout()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      تسجيل الخروج
    </button>
  </div>
</div>

<!-- MOBILE HEADER -->
<div class="mob-head">
  <div class="mob-logo"><span class="mob-logo-dot"></span>مناقصة</div>
  <div style="display:flex;align-items:center;gap:8px">
    <button onclick="show('notifs',null,'notifs')" style="background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:7px;color:#fff;display:flex;border-radius:9px;position:relative">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    </button>
    <div class="av" id="mobAv" onclick="show('profile',null,'profile')" style="width:30px;height:30px;border-radius:9px;font-size:12px"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="tb-title" id="pageTitle">الرئيسية</div>
    <button class="btn-new" onclick="openNewReq()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      طلب جديد
    </button>
  </div>

  <div class="content">

    <!-- HOME -->
    <div class="page on" id="pg-home">
      <div style="background:var(--p3);border-radius:16px;padding:20px 22px;margin-bottom:14px;position:relative;overflow:hidden;border-bottom:3px solid var(--gold)">
        <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px">أهلاً بك</div>
        <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:4px" id="heroName">—</div>
        <div style="font-size:12px;color:rgba(255,255,255,.5)">انشر طلبك واحصل على أفضل العروض</div>
        <button class="btn-new" onclick="openNewReq()" style="margin-top:14px">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

<script>
// ═══ INIT ═══
var API = 'https://manaqasati-production.up.railway.app';
var _user = JSON.parse(localStorage.getItem('user') || '{}');
var _token = localStorage.getItem('token') || '';

if (!_token || !_user.id) { location.href = 'auth.html'; }

// Helpers
function isImg(s){ return !!(s && (s.startsWith('http') || s.startsWith('data:'))); }
function esc(s){ var d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function fmtN(n){ return n ? String(Math.round(Number(n))).replace(/\B(?=(\d{3})+(?!\d))/g,',') : '0'; }
function fmtDate(d){ if(!d) return ''; try { return new Date(d).toLocaleDateString('ar-SA',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return d; } }
function timeAgo(d){
  var s=(Date.now()-new Date(d))/1000;
  if(s<60) return 'الآن';
  if(s<3600) return Math.floor(s/60)+' د';
  if(s<86400) return Math.floor(s/3600)+' س';
  return Math.floor(s/86400)+' يوم';
}
function hdr(){ return { headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token}, cache:'no-store' }; }
function jFetch(path, opts){
  return fetch(API+path, Object.assign({headers:{'Content-Type':'application/json','Authorization':'Bearer '+_token},cache:'no-store'}, opts||{}))
    .then(function(r){ return r.json(); });
}
function showToast(msg, type){
  var w = document.getElementById('_tw');
  if (!w) { w=document.createElement('div'); w.id='_tw'; w.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:99999;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px'; document.body.appendChild(w); }
  var t = document.createElement('div');
  var bg = type==='error'?'#DC2626':type==='success'?'#16A34A':'#16213E';
  t.style.cssText = 'padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .3s;white-space:nowrap;background:'+bg+';font-family:Tajawal,sans-serif';
  t.textContent = msg; w.appendChild(t);
  setTimeout(function(){ t.style.opacity='1'; }, 10);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 400); }, 3000);
}
function stTag(s){
  var m = {open:'<span class="tag t-open">● مفتوح للعروض</span>',in_progress:'<span class="tag t-prog">⟳ قيد التنفيذ</span>',completed:'<span class="tag t-done">✓ مكتمل</span>',pending_review:'<span class="tag t-rev">⧖ قيد المراجعة</span>',review:'<span class="tag t-rev">⧖ قيد المراجعة</span>'};
  return m[s] || '<span class="tag t-rev">'+s+'</span>';
}
function emptyH(t,s){ return '<div class="empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h4>'+t+'</h4>'+(s?'<p>'+s+'</p>':'')+'</div>'; }
function errH(retry){ return '<div class="empty"><h4 style="color:var(--red)">⚠️ تعذر التحميل</h4>'+(retry?'<p><button onclick="'+retry+'()" style="margin-top:8px;padding:8px 16px;background:var(--p);color:#fff;border:none;border-radius:9px;font-family:Tajawal;font-size:12px;font-weight:700;cursor:pointer">إعادة المحاولة</button></p>':'')+'</div>'; }
function _skCards(n){ var h=''; for(var i=0;i<(n||3);i++) h+='<div class="sk-box"><div style="display:flex;gap:8px"><div class="sk sk-line" style="width:4px;height:50px;flex-shrink:0;border-radius:4px"></div><div style="flex:1"><div class="sk sk-line md"></div><div class="sk sk-line sm"></div></div><div class="sk sk-line" style="width:60px"></div></div></div>'; return h; }

// ═══ AVATAR ═══
function applyAvatar(img){
  if (!isImg(img)) return;
  ['sideAv','mobAv','profileAv'].forEach(function(id){
    var el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<img src="'+img+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">';
  });
}
(function initUser(){
  var n = _user.name || '—';
  document.getElementById('sideN').textContent = n;
  document.getElementById('heroName').textContent = 'أهلاً، '+n.split(' ')[0];
  document.getElementById('profName').textContent = n;
  ['sideAv','mobAv','profileAv'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.textContent = n[0] || 'ع';
  });
  // Load avatar from cache
  var cached = localStorage.getItem('cav_'+_user.id);
  if (isImg(cached)) applyAvatar(cached);
  // Fetch fresh profile
  jFetch('/api/client/profile').then(function(p){
    if (p && isImg(p.profile_image)) {
      localStorage.setItem('cav_'+_user.id, p.profile_image);
      applyAvatar(p.profile_image);
    }
    if (p && p.name) {
      document.getElementById('prof-name').value = p.name || '';
      document.getElementById('prof-phone').value = p.phone || '';
    }
  }).catch(function(){});
})();

// ═══ NAVIGATION ═══
var _pageTitles = {home:'الرئيسية',requests:'طلباتي',detail:'تفاصيل الطلب',chat:'المحادثات',profile:'حسابي',notifs:'الإشعارات'};
function show(pg, el, key){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  var target = document.getElementById('pg-'+pg);
  if (target) target.classList.add('on');
  document.querySelectorAll('.ni').forEach(function(n){ n.classList.remove('on'); });
  if (el) el.classList.add('on');
  document.querySelectorAll('.bni').forEach(function(n){ n.classList.remove('on'); });
  var bn = document.getElementById('bn-'+pg); if(bn) bn.classList.add('on');
  var pt = document.getElementById('pageTitle'); if(pt) pt.textContent = _pageTitles[pg] || '';
  if (pg==='home') loadHome();
  else if (pg==='requests') loadReqs();
  else if (pg==='chat') loadChatList();
  else if (pg==='notifs') loadNotifs();
}
function showTab(t, el){
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('on'); });
  document.getElementById('tab-'+t).classList.add('on');
  document.querySelectorAll('.tab-btn').forEach(function(x){ x.classList.remove('on'); x.style.background='none'; x.style.color='var(--muted)'; x.style.boxShadow='none'; });
  if(el){ el.classList.add('on'); el.style.background='var(--white)'; el.style.color='var(--p)'; el.style.boxShadow='0 2px 8px rgba(27,58,107,.1)'; }
}
function logout(){ localStorage.removeItem('token'); localStorage.removeItem('user'); location.href='auth.html'; }

// ═══ REQUEST CARD ═══
function riCard(r, actions){
  var open = r.status==='open', prog = r.status==='in_progress', done = r.status==='completed'||r.status==='done';
  var h = '<div class="ri" style="border-right-color:'+(open?'var(--green)':prog?'var(--p)':done?'var(--gold)':'var(--border)')+'">'+
    '<div>'+
      '<div class="ri-title">'+esc(r.title)+'</div>'+
      '<div class="ri-meta">'+
        stTag(r.status)+
        (r.category?'<span class="rm">'+esc(r.category)+'</span>':'')+
        (r.city?'<span class="rm">📍 '+esc(r.city)+'</span>':'')+
        (r.budget_max?'<span class="rm">'+fmtN(r.budget_max)+' ر.س</span>':'')+
        '<span class="rm">'+timeAgo(r.created_at)+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="text-align:center"><div style="font-size:18px;font-weight:900;color:var(--p)">'+(r.bid_count||0)+'</div><div style="font-size:10px;color:var(--muted)">عرض</div></div>';
  if (actions) {
    h += '<div class="ri-acts">';
    h += '<button class="btn-sm bs-p" onclick="openDetail('+r.id+',event)">العروض والتفاصيل</button>';
    if (open) h += '<button class="btn-sm bs-p" onclick="openEdit('+r.id+',\''+esc(r.title)+'\',\''+esc(r.description)+'\','+r.budget_max+',event)">تعديل</button>';
    if (open || r.status==='pending_review') h += '<button class="btn-sm bs-r" onclick="deleteReq('+r.id+',event)">حذف</button>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// ═══ LOAD HOME ═══
function loadHome(){
  var el = document.getElementById('home-reqs');
  if (!el) return;
  el.innerHTML = _skCards(3);
  jFetch('/api/requests/my').then(function(all){
    if (!Array.isArray(all)) { el.innerHTML = errH('loadHome'); return; }
    var s_total=document.getElementById('s-total'), s_open=document.getElementById('s-open'), s_prog=document.getElementById('s-prog'), s_done=document.getElementById('s-done');
    if(s_total) s_total.textContent = all.length;
    if(s_open) s_open.textContent = all.filter(function(r){return r.status==='open';}).length;
    if(s_prog) s_prog.textContent = all.filter(function(r){return r.status==='in_progress';}).length;
    if(s_done) s_done.textContent = all.filter(function(r){return r.status==='completed'||r.status==='done';}).length;
    el.innerHTML = all.length ? all.slice(0,5).map(function(r){return riCard(r,false);}).join('') : emptyH('لا يوجد طلبات بعد','انشر أول طلب الآن');
    loadNotifCount();
  }).catch(function(){ el.innerHTML = errH('loadHome'); });
}

// ═══ LOAD REQUESTS ═══
function loadReqs(){
  var el = document.getElementById('all-reqs');
  if (!el) return;
  el.innerHTML = _skCards(5);
  jFetch('/api/requests/my').then(function(all){
    if (!Array.isArray(all)) { el.innerHTML = errH('loadReqs'); return; }
    el.innerHTML = all.length ? all.map(function(r){return riCard(r,true);}).join('') : emptyH('لا يوجد طلبات','انشر طلبك الأول');
  }).catch(function(){ el.innerHTML = errH('loadReqs'); });

// ═══ LOAD BIDS ═══
async function loadBids(id){
  var el = document.getElementById('bids-list');
  if (!el) return;
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">جاري تحميل العروض...</div>';
  var bids = [];
  try {
    var resp = await fetch(API+'/api/requests/'+id+'/bids', hdr());
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    bids = await resp.json();
  } catch(e) {
    el.innerHTML = '<div style="padding:30px;text-align:center"><div style="color:var(--red);font-size:13px;margin-bottom:12px">⚠️ تعذر تحميل العروض</div><button onclick="loadBids('+id+')" style="padding:9px 18px;background:var(--p);color:#fff;border:none;border-radius:9px;font-family:Tajawal;font-size:13px;font-weight:700;cursor:pointer">إعادة المحاولة</button></div>';
    return;
  }
  if (!Array.isArray(bids)) { el.innerHTML = emptyH('لا توجد عروض بعد','سيصلك إشعار عند وصول أول عرض'); return; }

  var bc = document.getElementById('bids-count');
  if (bc) bc.textContent = '('+bids.length+')';

  if (!bids.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:12px">📋</div><div style="font-size:14px;font-weight:700">لا توجد عروض بعد</div><div style="font-size:12px;margin-top:4px">سيصلك إشعار عند وصول أول عرض</div></div>'; return; }

  // ✅ استخدم بيانات bid مباشرة — تفادي base64 ضخم
  var provs = {};
  bids.forEach(function(b){
    if (b.provider_id) provs[b.provider_id] = {
      id: b.provider_id,
      name: b.provider_name || 'مزود',
      business_name: b.provider_business_name || null,
      city: b.provider_city || null,
      phone: b.provider_phone || null,
      badge: b.provider_badge || 'none',
      profile_image: b.provider_image || null,
      avg_rating: parseFloat(b.provider_rating) || 0,
      review_count: parseInt(b.provider_reviews) || 0
    };
  });

  // Best bid
  var bestBid = null;
  var pending = bids.filter(function(b){ return b.status==='pending'; });
  if (pending.length > 1) {
    bestBid = pending.reduce(function(best, b){
      var p=provs[b.provider_id]||{}, bp=provs[best.provider_id]||{};
      var score = (parseFloat(p.avg_rating)||0)*10 - b.price/1000;
      var bScore = (parseFloat(bp.avg_rating)||0)*10 - best.price/1000;
      return score > bScore ? b : best;
    });
  }

  // Compare table
  var cmpHtml = '<div class="card card-t" style="margin-bottom:12px">'
    +'<div class="ch"><h3>مقارنة العروض ('+bids.length+')</h3></div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr style="background:var(--bg)">'
    +'<th style="padding:8px;text-align:right;font-weight:800;color:var(--muted);border-bottom:1px solid var(--border)">المزود</th>'
    +'<th style="padding:8px;text-align:center;font-weight:800;color:var(--muted);border-bottom:1px solid var(--border)">السعر</th>'
    +'<th style="padding:8px;text-align:center;font-weight:800;color:var(--muted);border-bottom:1px solid var(--border)">المدة</th>'
    +'<th style="padding:8px;text-align:center;font-weight:800;color:var(--muted);border-bottom:1px solid var(--border)">التقييم</th>'
    +'<th style="padding:8px;text-align:center;font-weight:800;color:var(--muted);border-bottom:1px solid var(--border)">الحالة</th>'
    +'</tr></thead><tbody>';
  bids.forEach(function(b){
    var p=provs[b.provider_id]||{}, avg=parseFloat(p.avg_rating)||0;
    var isAcc=b.status==='accepted', isRej=b.status==='rejected';
    var isBest=bestBid&&bestBid.id===b.id;
    cmpHtml += '<tr style="border-bottom:1px solid var(--border);background:'+(isBest?'#FFFBEB':'var(--white)')+'">'
      +'<td style="padding:8px 10px;font-weight:800">'+(p.business_name||p.name||'مزود')+(isBest?'<div style="font-size:9px;background:#F59E0B;color:#fff;padding:1px 6px;border-radius:20px;display:inline-block;margin-right:4px;font-weight:700">الأنسب</div>':'')+'</td>'
      +'<td style="padding:8px;text-align:center;font-weight:900;color:var(--gold)">'+fmtN(b.price)+'</td>'
      +'<td style="padding:8px;text-align:center">'+(b.days?b.days+' يوم':'—')+'</td>'
      +'<td style="padding:8px;text-align:center">'+(avg>0?avg.toFixed(1)+' ★':'—')+'</td>'
      +'<td style="padding:8px;text-align:center"><span style="font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;background:'+(isAcc?'#DCFCE7':isRej?'#FEE2E2':'#F1F5F9')+';color:'+(isAcc?'#16A34A':isRej?'#DC2626':'#64748B')+'">'+(isAcc?'مقبول':isRej?'مرفوض':'انتظار')+'</span></td>'
    +'</tr>';
  });
  cmpHtml += '</tbody></table></div></div>';

  // Bid cards
  var cardsHtml = bids.map(function(b){
    var p = provs[b.provider_id] || {};
    var avg = parseFloat(p.avg_rating) || 0;
    var isAcc = b.status==='accepted', isRej = b.status==='rejected';
    var isBest = bestBid && bestBid.id===b.id;
    var borderColor = isAcc?'var(--green)':isRej?'#EF4444':isBest?'#F59E0B':'var(--border)';

    // ✅ safeProvId — مضمون دائماً
    var safeId = String(p.id || b.provider_id || '');
    var safeName = (p.business_name || p.name || b.provider_name || 'مزود').replace(/\s+/g,'-');
    var proUrl = '/pro/'+encodeURIComponent(safeName)+'-'+safeId+(safeId?'?id='+safeId:'');

    var stars = '';
    for (var i=1;i<=5;i++) stars += '<span style="color:'+(i<=Math.round(avg)?'#C9920A':'#E6E2D9')+';font-size:12px">★</span>';

    var h = '<div class="bid-card'+(isAcc?' accepted':isBest?' best':'')+'" style="border:1.5px solid '+borderColor+'">';

    // Accepted/Best banner
    if (isBest) h += '<div style="background:linear-gradient(90deg,#F59E0B,#D97706);padding:5px 14px;font-size:11px;font-weight:800;color:#fff">★ العرض الأنسب</div>';
    if (isAcc) h += '<div style="background:linear-gradient(90deg,var(--green),#15803D);padding:5px 14px;font-size:11px;font-weight:800;color:#fff">✓ تم قبول هذا العرض</div>';

    // Provider header
    h += '<div style="background:linear-gradient(135deg,#0D1829,#16213E);padding:14px 16px;display:flex;align-items:center;gap:12px">';
    if (isImg(p.profile_image)) {
      h += '<div style="width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;flex-shrink:0"><img src="'+p.profile_image+'" style="width:100%;height:100%;object-fit:cover" loading="lazy"></div>';
    } else {
      h += '<div style="width:52px;height:52px;border-radius:50%;background:rgba(201,146,10,.15);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--gold);flex-shrink:0">'+(p.name||'م').charAt(0)+'</div>';
    }
    h += '<div style="flex:1;min-width:0">'
      +'<div style="font-size:15px;font-weight:900;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(p.business_name||p.name||b.provider_name||'مزود')+'</div>'
      +'<div style="display:flex;align-items:center;gap:3px;margin-top:2px">'+stars+'<span style="font-size:10px;color:rgba(255,255,255,.4)">('+( parseFloat(p.avg_rating)||0 > 0 ? (parseFloat(p.avg_rating)).toFixed(1) : 'جديد')+')</span></div>'
      +(p.city?'<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:1px">📍 '+esc(p.city)+'</div>':'')
    +'</div>'
    +'<div style="text-align:center;flex-shrink:0">'
      +'<div style="font-size:22px;font-weight:900;color:var(--gold)">'+fmtN(b.price)+'</div>'
      +'<div style="font-size:10px;color:rgba(255,255,255,.4)">ر.س</div>'
      +(b.days?'<div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:2px">'+b.days+' يوم</div>':'')
    +'</div></div>';

    // Action buttons
    h += '<div style="padding:14px 16px">'
      +'<div style="font-size:10px;color:var(--muted);margin-bottom:10px">قُدِّم '+timeAgo(b.created_at)+' مضت</div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
    
    // ✅ عرض الملف — URL مضمون
    if (safeId) {
      h += '<a href="'+proUrl+'" style="display:inline-flex;align-items:center;gap:5px;padding:9px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-size:12px;font-weight:700;color:var(--text);text-decoration:none"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>عرض الملف</a>';
    }
    h += '<button class="_chatbtn" data-pid="'+safeId+'" style="display:inline-flex;align-items:center;gap:5px;padding:9px 14px;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:Tajawal"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>محادثة</button>';
    if (!isAcc && !isRej) {
      h += '<button onclick="acceptBid('+b.id+','+id+')" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;background:#16A34A;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:Tajawal"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>قبول العرض</button>';
      h += '<button onclick="rejectBid('+b.id+','+id+')" style="padding:9px 14px;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal">رفض</button>';
    }
    h += '</div>';

    // ✅ رسالة المزود — دائماً ظاهرة
    var noteText = b.note ? String(b.note).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
    h += '<div style="border-top:1px solid var(--border);padding-top:11px">'
      +'<div style="font-size:10px;font-weight:800;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>رسالة المزود</div>';
    if (noteText) {
      h += '<div style="font-size:13px;color:var(--text2);background:var(--bg);padding:10px 13px;border-radius:10px;border-right:3px solid var(--gold);line-height:1.9">'+noteText+'</div>';
    } else {
      h += '<div style="font-size:12px;color:var(--hint);font-style:italic;background:var(--bg);padding:8px 12px;border-radius:8px">لم يُضف المزود رسالة مع العرض</div>';
    }
    h += '</div></div></div>';
    return h;
  }).join('');

  el.innerHTML = cmpHtml + cardsHtml;
  el.querySelectorAll('._chatbtn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var pid = btn.getAttribute('data-pid');
      if (!pid) return;
      fetch(API+'/api/direct-message', Object.assign({method:'POST',body:JSON.stringify({provider_id:pid})}, hdr()))
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.request_id){ _curChatReqId=d.request_id; _curChatWith=pid; show('chat',null,'chat'); } })
        .catch(function(){ showToast('❌ تعذر فتح المحادثة','error'); });
    });
  });
  window._currentBids = bids;
}

// ═══ BID ACTIONS ═══
function acceptBid(bidId, reqId){
  if (!confirm('هل تؤكد قبول هذا العرض؟')) return;
  showToast('جاري القبول...','info');
  fetch(API+'/api/bids/'+bidId+'/accept', Object.assign({method:'PUT'}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(){ showToast('✅ تم قبول العرض','success'); loadBids(reqId); })
    .catch(function(){ showToast('❌ تعذر القبول','error'); });
}
function rejectBid(bidId, reqId){
  if (!confirm('هل تؤكد رفض هذا العرض؟')) return;
  fetch(API+'/api/bids/'+bidId+'/reject', Object.assign({method:'PUT'}, hdr()))
    .then(function(r){ return r.json(); })
    .then(function(){ showToast('تم الرفض','success'); loadBids(reqId); })
    .catch(function(){ showToast('❌ تعذر الرفض','error'); });
}

// ═══ NEW REQUEST ═══
var _reqImgs = [];
function openNewReq(){
  _reqImgs = [];
  document.getElementById('img-grid').innerHTML = '';
  ['n-cat','n-title','n-desc','n-budget','n-deadline'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });

function closeNewReq(){ document.getElementById('newReqOl').className='overlay'; }

function fillCity(sel){
  if (!sel) return;
  var regions = [
    {n:'منطقة الرياض',c:['الرياض','الخرج','الدوادمي','المجمعة','القويعية','الزلفي','الدرعية','الدلم','المزاحمية','الحريق','حوطة بني تميم','وادي الدواسر','السليل','الأفلاج','الغاط','ثادق','حريملاء','مرات','ضرما']},
    {n:'منطقة مكة المكرمة',c:['جدة','مكة المكرمة','الطائف','رابغ','القنفذة','الليث','خليص','تربة','المويه','الخرمة','رنية']},
    {n:'منطقة المدينة المنورة',c:['المدينة المنورة','ينبع','العلا','الوجه','ضباء','أملج','المهد','بدر','خيبر']},
    {n:'منطقة القصيم',c:['بريدة','عنيزة','الرس','البكيرية','الأسياح','رياض الخبراء','النبهانية','الشماسية','البدائع','المذنب']},
    {n:'المنطقة الشرقية',c:['الدمام','الخبر','الظهران','الأحساء','القطيف','الجبيل','حفر الباطن','الخفجي','بقيق','النعيرية','رأس تنورة','صفوى','سيهات']},
    {n:'منطقة عسير',c:['أبها','خميس مشيط','بيشة','النماص','محايل عسير','أحد رفيدة','ظهران الجنوب','تثليث','بلقرن','رجال ألمع','المجاردة']},
    {n:'منطقة تبوك',c:['تبوك','تيماء','حقل']},
    {n:'منطقة حائل',c:['حائل','بقعاء','الشنان']},
    {n:'منطقة الحدود الشمالية',c:['عرعر','طريف','رفحاء']},
    {n:'منطقة الجوف',c:['سكاكا','دومة الجندل','القريات']},
    {n:'منطقة الباحة',c:['الباحة','بلجرشي','المندق','العقيق','قلوة','المخواة']},
    {n:'منطقة جازان',c:['جازان','صبيا','أبو عريش','صامطة','الدرب','ضمد','الريث','الحرث']},
    {n:'منطقة نجران',c:['نجران','شرورة']}
  ];
  sel.innerHTML = '<option value="">— اختر المدينة —</option>';
  regions.forEach(function(reg){
    var grp = document.createElement('optgroup'); grp.label = reg.n;
    reg.c.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; grp.appendChild(o); });
    sel.appendChild(grp);
  });
}

function previewImgs(input){
  var files = [].slice.call(input.files).slice(0, 3 - _reqImgs.length);
  files.forEach(function(f){
    if (f.size > 5*1024*1024) { showToast('الحجم الأقصى 5MB','error'); return; }
    var r = new FileReader();
    r.onload = function(e){ _reqImgs.push({name:f.name,data:e.target.result}); renderImgGrid(); };
    r.readAsDataURL(f);
  });
  input.value = '';
}
function renderImgGrid(){
  var g = document.getElementById('img-grid');
  if (!g) return;
  g.innerHTML = _reqImgs.map(function(img,i){
    return '<div style="position:relative;border-radius:9px;overflow:hidden;aspect-ratio:1"><img src="'+img.data+'" style="width:100%;height:100%;object-fit:cover"><button onclick="rmImg('+i+')" style="position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;background:rgba(220,38,38,.85);border:none;color:#fff;cursor:pointer;font-size:13px">✕</button></div>';
  }).join('');
}
function rmImg(i){ _reqImgs.splice(i,1); renderImgGrid(); }

function submitReq(btn){
  var cat = document.getElementById('n-cat').value;
  var title = (document.getElementById('n-title').value||'').trim();
  var desc = (document.getElementById('n-desc').value||'').trim();
  var city = document.getElementById('n-city').value;
  var budget = document.getElementById('n-budget').value;
  var deadline = document.getElementById('n-deadline').value;
  var msg = document.getElementById('new-msg');
  var cityErr = document.getElementById('city-err');

  var err = '';
  if (!cat) err = 'يرجى اختيار التصنيف';
  else if (!title) err = 'يرجى كتابة عنوان الطلب';
  else if (!desc) err = 'يرجى كتابة تفاصيل الطلب';
  else if (!city) {
    err = 'يرجى اختيار المدينة — هذا الحقل إلزامي';
    document.getElementById('n-city').style.borderColor='var(--red)';
    if (cityErr) cityErr.style.display='block';
  }
  if (err) { if(msg){msg.textContent=err;msg.className='alert err';} return; }
  if (cityErr) cityErr.style.display='none';
  document.getElementById('n-city').style.borderColor='';

  if (btn) { btn.disabled=true; btn.textContent='جاري النشر...'; }
  var body = {title:title,description:desc,category:cat,city:city};
  if (budget) body.budget_max = Number(budget);
  if (deadline) body.deadline = deadline;
  if (_reqImgs.length) body.images = _reqImgs.map(function(i){return i.data;});

  fetch(API+'/api/requests', Object.assign({method:'POST',body:JSON.stringify(body)}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(r){
      if (r && r.id) {
        closeNewReq();
        showToast('✅ تم نشر الطلب بنجاح','success');
        loadHome(); loadReqs();
      } else {
        if(msg){msg.textContent=r.message||'حدث خطأ';msg.className='alert err';}
      }
    })
    .catch(function(e){ if(msg){msg.textContent='❌ تعذر نشر الطلب: '+e.message;msg.className='alert err';} })
    .finally(function(){ if(btn){btn.disabled=false;btn.textContent='نشر الطلب';} });
}

// ═══ EDIT REQUEST ═══
var _editId = null;
function openEdit(id, title, desc, budget, e){
  if(e) e.stopPropagation();
  _editId = id;
  document.getElementById('edit-title').value = title||'';
  document.getElementById('edit-desc').value = desc||'';
  document.getElementById('edit-budget').value = budget||'';
  document.getElementById('editOl').className='overlay show';
}
function submitEdit(btn){
  if (!_editId) return;
  var body = {
    title: document.getElementById('edit-title').value.trim(),
    description: document.getElementById('edit-desc').value.trim(),
    budget_max: Number(document.getElementById('edit-budget').value)||null
  };
  if (!body.title) { showToast('العنوان مطلوب','error'); return; }
  if(btn){btn.disabled=true;btn.textContent='جاري الحفظ...';}
  fetch(API+'/api/requests/'+_editId, Object.assign({method:'PUT',body:JSON.stringify(body)}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(){ document.getElementById('editOl').className='overlay'; showToast('✅ تم التحديث','success'); loadReqs(); loadHome(); })
    .catch(function(){ showToast('❌ تعذر التحديث','error'); })
    .finally(function(){ if(btn){btn.disabled=false;btn.textContent='حفظ';} });
}

// ═══ DELETE REQUEST ═══
function deleteReq(id, e){
  if(e) e.stopPropagation();
  if (!confirm('هل تريد حذف هذا الطلب نهائياً؟')) return;
  showToast('جاري الحذف...','info');
  fetch(API+'/api/requests/'+id, Object.assign({method:'DELETE'}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(){ showToast('✅ تم الحذف','success'); loadReqs(); loadHome(); })
    .catch(function(e){ showToast('❌ تعذر الحذف','error'); });
}

// ═══ CHAT ═══
var _curChatReqId = null, _curChatWith = null, _chatMsgs = [], _chatPoll = null;
function loadChatList(){
  var el = document.getElementById('chat-area');
  if (!el) return;
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">جاري التحميل...</div>';
  // Check if we should open a specific chat
  if (_curChatReqId) { openChat(_curChatReqId, _curChatWith, null, null); return; }
  jFetch('/api/client/conversations').then(function(convs){
    if (!Array.isArray(convs) || !convs.length) {
      el.innerHTML = '<div class="card card-t"><div class="ch"><h3>المحادثات</h3></div>'+emptyH('لا توجد محادثات','ستظهر محادثاتك مع المزودين هنا')+'</div>';
      return;
    }
    var h = '<div class="card card-t"><div class="ch"><h3>المحادثات</h3></div><div class="chat-list">';
    convs.forEach(function(cv){
      var name = cv.provider_name || 'مزود';
      var img = isImg(cv.provider_image) ? '<img src="'+cv.provider_image+'" style="width:100%;height:100%;object-fit:cover">' : name[0];
      h += '<div class="cl-item'+(cv.unread>0?' unread':'')+'" onclick="openChat(\''+cv.request_id+'\',\''+cv.provider_id+'\',\''+esc(name)+'\',\''+esc(cv.request_title||'محادثة')+'\')">'+
        '<div class="cl-av">'+img+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:800;margin-bottom:2px">'+esc(name)+'</div>'+
          '<div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cv.request_title||'')+'</div>'+
          (cv.last_message?'<div style="font-size:11px;color:var(--hint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cv.last_message)+'</div>':'')
        +'</div>'+
        '<div style="text-align:center;flex-shrink:0">'+
          (cv.unread>0?'<div style="background:var(--red);color:#fff;font-size:10px;font-weight:900;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 3px">'+cv.unread+'</div>':'')+
          '<div style="font-size:10px;color:var(--hint)">'+timeAgo(cv.last_time)+'</div>'
        +'</div>'+
      '</div>';
    });
    h += '</div></div>';
    el.innerHTML = h;
  }).catch(function(){
    el.innerHTML = '<div class="card card-t"><div class="ch"><h3>المحادثات</h3></div>'+errH('loadChatList')+'</div>';
  });
}

function openChat(reqId, providerId, providerName, reqTitle){
  _curChatReqId = reqId; _curChatWith = providerId;
  var el = document.getElementById('chat-area');
  if (!el) return;
  var name = providerName || 'مزود';
  el.innerHTML =
    '<button onclick="_curChatReqId=null;_curChatWith=null;loadChatList()" style="display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 14px;font-family:Tajawal;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);margin-bottom:12px"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>المحادثات</button>'+
    '<div style="font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'+esc(name)+(reqTitle?'<span style="font-size:11px;color:var(--muted);font-weight:600">— '+esc(reqTitle)+'</span>':'')+'</div>'+
    '<div class="chat-box"><div class="chat-msgs" id="chatMsgs"><div style="text-align:center;color:var(--muted);font-size:13px">جاري التحميل...</div></div>'+
    '<div class="chat-input"><input class="chat-inp" id="chatInp" placeholder="اكتب رسالة..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMsg();}"><button class="chat-send" onclick="sendMsg()">إرسال</button></div></div>';

  loadMsgs();
  if (_chatPoll) clearInterval(_chatPoll);
  _chatPoll = setInterval(function(){ if(_curChatReqId) loadMsgs(); else clearInterval(_chatPoll); }, 6000);
}

function loadMsgs(){
  if (!_curChatReqId) return;
  var url = '/api/messages/'+_curChatReqId+(_curChatWith?'?with='+_curChatWith:'');
  jFetch(url).then(function(msgs){
    if (!Array.isArray(msgs)) return;
    _chatMsgs = msgs;
    renderMsgs();
  }).catch(function(){});
}

function renderMsgs(){
  var el = document.getElementById('chatMsgs');
  if (!el) return;
  if (!_chatMsgs.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px">لا توجد رسائل بعد</div>'; return; }
  el.innerHTML = _chatMsgs.map(function(m){
    var isMe = String(m.sender_id) === String(_user.id);
    return '<div class="msg '+(isMe?'msg-me':'msg-other')+'">'
      +(!isMe?'<div class="msg-name">'+esc(m.sender_name||'مزود')+'</div>':'')
      +esc(m.content)
      +'<div class="msg-time">'+timeAgo(m.created_at)+'</div>'
    +'</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function sendMsg(){
  var inp = document.getElementById('chatInp');
  if (!inp) return;
  var msg = inp.value.trim();
  if (!msg || !_curChatReqId) return;
  inp.value = '';
  fetch(API+'/api/messages', Object.assign({method:'POST',body:JSON.stringify({request_id:_curChatReqId,receiver_id:_curChatWith,content:msg})}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(m){ _chatMsgs.push(m); renderMsgs(); })
    .catch(function(){ showToast('❌ تعذر إرسال الرسالة','error'); inp.value=msg; });
}

// ═══ PROFILE ═══
function uploadAvatar(input){
  var f = input.files[0]; if (!f) return;
  if (f.size > 5*1024*1024) { showToast('الحجم الأقصى 5MB','error'); return; }
  var r = new FileReader();
  r.onload = function(e){
    var img = e.target.result;
    applyAvatar(img);
    localStorage.setItem('cav_'+_user.id, img);
    fetch(API+'/api/client/profile', Object.assign({method:'PUT',body:JSON.stringify({profile_image:img})}, hdr()))
      .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
      .then(function(){ showToast('✅ تم تحديث الصورة','success'); })
      .catch(function(){ showToast('❌ تعذر حفظ الصورة','error'); });
  };
  r.readAsDataURL(f);
}
function saveProfile(btn){
  var name = (document.getElementById('prof-name').value||'').trim();
  var phone = (document.getElementById('prof-phone').value||'').trim();
  if (!name) { showToast('الاسم مطلوب','error'); return; }
  if(btn){btn.disabled=true;btn.textContent='جاري الحفظ...';}
  fetch(API+'/api/client/profile', Object.assign({method:'PUT',body:JSON.stringify({name:name,phone:phone})}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(p){
      showToast('✅ تم الحفظ','success');
      if (p && p.name) { _user.name = p.name; localStorage.setItem('user',JSON.stringify(_user)); document.getElementById('sideN').textContent=p.name; document.getElementById('profName').textContent=p.name; document.getElementById('heroName').textContent='أهلاً، '+p.name.split(' ')[0]; }
    })
    .catch(function(){ showToast('❌ تعذر الحفظ','error'); })
    .finally(function(){ if(btn){btn.disabled=false;btn.textContent='حفظ التغييرات';} });
}
function changePw(){
  var pw = (document.getElementById('new-pw').value||'').trim();
  if (pw.length < 8) { showToast('كلمة المرور يجب أن تكون 8 أحرف على الأقل','error'); return; }
  fetch(API+'/api/client/profile', Object.assign({method:'PUT',body:JSON.stringify({password:pw})}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(){ showToast('✅ تم تغيير كلمة المرور','success'); document.getElementById('new-pw').value=''; })
    .catch(function(){ showToast('❌ تعذر تغيير كلمة المرور','error'); });
}

// ═══ NOTIFICATIONS ═══
function loadNotifCount(){
  jFetch('/api/notifications?unread=1').then(function(d){
    var cnt = Array.isArray(d) ? d.filter(function(n){return !n.is_read;}).length : (d&&d.unread)||0;
    ['notifBadge'].forEach(function(id){ var el=document.getElementById(id); if(el){el.textContent=cnt;el.style.display=cnt?'flex':'none';} });
  }).catch(function(){});
  jFetch('/api/messages/unread-count').then(function(d){
    var cnt = d&&d.count ? d.count : 0;
    var el=document.getElementById('chatBadge'); if(el){el.textContent=cnt;el.style.display=cnt?'flex':'none';}
    var bn=document.getElementById('bn-chat-badge'); if(bn){bn.textContent=cnt;bn.style.display=cnt?'flex':'none';}
  }).catch(function(){});
}
function loadNotifs(){
  var el = document.getElementById('notifs-list');
  if (!el) return;
  el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">جاري التحميل...</div>';
  jFetch('/api/notifications').then(function(ns){
    if (!Array.isArray(ns)||!ns.length){ el.innerHTML=emptyH('لا توجد إشعارات','ستظهر إشعاراتك هنا'); return; }
    el.innerHTML = ns.map(function(n){
      var icons = {new_bid:'🔔',bid_accepted:'✅',message:'💬',review:'⭐'};
      return '<div class="notif-item'+(n.is_read?'':' unread')+'" onclick="markRead('+n.id+',this,'+(n.ref_id||'null')+')">'
        +'<div style="width:38px;height:38px;border-radius:11px;background:var(--p-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+(icons[n.type]||'📣')+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:800;margin-bottom:2px">'+esc(n.title||'')+'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+esc(n.body||'')+'</div>'
        +'<div style="font-size:10px;color:var(--hint);margin-top:3px">'+timeAgo(n.created_at)+'</div></div>'
      +'</div>';
    }).join('');
  }).catch(function(){ el.innerHTML=errH('loadNotifs'); });
}
function markRead(id, el, refId){
  if (el) el.classList.remove('unread');
  fetch(API+'/api/notifications/'+id+'/read', Object.assign({method:'PUT'}, hdr())).catch(function(){});
  if (refId) { openDetail(refId, null); show('detail',null,'detail'); }
}
function markAllRead(){
  fetch(API+'/api/notifications/read', Object.assign({method:'PUT'}, hdr())).then(function(){
    document.querySelectorAll('.notif-item').forEach(function(el){ el.classList.remove('unread'); });
    var nb=document.getElementById('notifBadge'); if(nb) nb.style.display='none';
    showToast('تم تحديد الكل كمقروء','success');
  }).catch(function(){});
}

// ═══ RATING ═══
var _selRating=0, _rateReqId=null, _rateProvId=null;
function openRateModal(reqId, provId){
  _rateReqId=reqId; _rateProvId=provId; _selRating=0;
  document.querySelectorAll('.sp').forEach(function(s){s.classList.remove('on');});
  document.getElementById('rate-comment').value='';
  document.getElementById('rateOl').className='overlay show';
}
function setStar(n){
  _selRating=n;
  document.querySelectorAll('.sp').forEach(function(s,i){s.classList.toggle('on',i<n);});
}
function submitRate(){
  if (!_selRating) { showToast('اختر تقييماً','error'); return; }
  var comment = document.getElementById('rate-comment').value.trim();
  fetch(API+'/api/ratings', Object.assign({method:'POST',body:JSON.stringify({request_id:_rateReqId,reviewed_id:_rateProvId,rating:_selRating,comment:comment})}, hdr()))
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(){ document.getElementById('rateOl').className='overlay'; showToast('✅ شكراً على تقييمك','success'); })
    .catch(function(){ showToast('❌ تعذر إرسال التقييم','error'); });
}

// ═══ INIT ═══
loadHome();
loadNotifCount();
setInterval(loadNotifCount, 30000);
</script>
