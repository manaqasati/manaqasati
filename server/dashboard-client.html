<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة العميل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#374151;--muted:#8896AA;--hint:#B0BDD0;
  --border:#E6E2D9;--bg:#F0F2F5;--white:#FFFFFF;
  --green:#16A34A;--green-l:#DCFCE7;
  --red:#DC2626;--red-l:#FEF2F2;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--p3);position:fixed;top:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:.3s}
.main{margin-right:240px;flex:1;min-height:100vh}

/* ── SIDEBAR ── */
.sb-logo{padding:18px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.sb-logo-txt{font-size:18px;font-weight:900;color:#fff}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.sb-user{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-av{width:38px;height:38px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:800;color:rgba(255,255,255,.25);letter-spacing:1px;padding:12px 16px 5px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:.15s;border-right:3px solid transparent;color:rgba(255,255,255,.55);font-size:13px;font-weight:700;position:relative}
.sb-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.sb-item.on{background:rgba(201,146,10,.12);border-right-color:var(--gold);color:#fff}
.sb-item svg{flex-shrink:0;opacity:.7}
.sb-item.on svg{opacity:1}
.sb-badge{min-width:18px;height:18px;background:#EF4444;color:#fff;border-radius:9px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-right:auto;padding:0 5px}
.sb-bottom{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.sb-logout{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.sb-logout:hover{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.3);color:#FCA5A5}

/* ── TOPBAR ── */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
.topbar-menu{display:none;background:none;border:none;cursor:pointer;padding:4px}
.topbar-title{font-size:16px;font-weight:900;color:var(--text);flex:1}
.topbar-notif{position:relative;width:36px;height:36px;border-radius:10px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer}
.topbar-notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#EF4444;border:2px solid #fff;display:none}

/* ── CONTENT ── */
.content{padding:20px;max-width:800px}
.page{display:none}.page.on{display:block}

/* ── CARDS ── */
.card{background:var(--white);border-radius:16px;padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px}
.card-title{font-size:15px;font-weight:900;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:var(--bg);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:24px;font-weight:900;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:5px}

/* ── PROJECT CARD ── */
.proj-card{background:var(--white);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;cursor:pointer;display:flex;transition:.15s}
.proj-card:hover{border-color:var(--p);box-shadow:var(--shadow-md)}
.proj-bar{width:4px;flex-shrink:0}
.proj-img{width:80px;height:80px;flex-shrink:0;overflow:hidden;background:var(--bg)}
.proj-img img{width:100%;height:100%;object-fit:cover}
.proj-body{flex:1;padding:12px 14px;min-width:0}
.proj-cat{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.3px;margin-bottom:3px}
.proj-title{font-size:13px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.proj-meta{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.tag-green{background:var(--green-l);color:var(--green)}
.tag-blue{background:#DBEAFE;color:#1D4ED8}
.tag-gold{background:var(--gold-l);color:var(--gold-d)}
.tag-gray{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.proj-actions{display:flex;gap:6px;margin-top:10px}

/* ── BUTTONS ── */
.btn{padding:9px 16px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--p2)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:var(--gold-d)}
.btn-green{background:var(--green);color:#fff}
.btn-outline{background:var(--bg);border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--p)}
.btn-red{background:var(--red-l);color:var(--red);border:1px solid #FECACA}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-full{width:100%;justify-content:center;padding:13px}

/* ── FORM ── */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:var(--bg);transition:.15s}
.form-input:focus{outline:none;border-color:var(--p);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── STATUS ── */
.status{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px}
.st-open{background:rgba(22,163,74,.1);color:var(--green)}
.st-prog{background:rgba(37,99,235,.1);color:#1D4ED8}
.st-done{background:rgba(201,146,10,.1);color:var(--gold-d)}
.st-closed{background:var(--bg);color:var(--muted)}

/* ── CHAT ── */
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center}
.chat-box{background:var(--bg);width:100%;max-width:500px;height:82vh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;overflow:hidden}
.chat-head{background:var(--p3);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column}
.chat-inp-wrap{display:flex;gap:8px;padding:12px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.chat-inp{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:11px;font-family:inherit;font-size:13px;outline:none;resize:none;max-height:80px}
.chat-send{padding:10px 16px;background:var(--p3);color:#fff;border:none;border-radius:11px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700}
.msg-bubble{max-width:78%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.7;word-break:break-word;margin-bottom:6px}
.msg-me{background:var(--p3);color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.msg-other{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:16px 16px 16px 4px;align-self:flex-start}
.msg-time{font-size:10px;opacity:.45;margin-top:4px;text-align:left}
.msg-name{font-size:10px;opacity:.55;margin-bottom:3px;font-weight:700}

/* ── CONV LIST ── */
.conv-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.conv-item:hover{background:var(--bg)}
.conv-av{width:44px;height:44px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.conv-av img{width:100%;height:100%;object-fit:cover}
.conv-unread{font-size:10px;font-weight:800;min-width:18px;height:18px;background:#EF4444;color:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,#eef2f8 25%,#e2eaf4 50%,#eef2f8 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:14px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:12px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:99999;opacity:0;transition:.3s}
.toast.on{opacity:1}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0}
  .topbar-menu{display:flex}
  .content{padding:14px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .sb-overlay{display:block}
}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
.sb-overlay.on{display:block}
</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-dot"></div>
    <div>
      <div class="sb-logo-txt">مناقصة</div>
      <div class="sb-logo-sub">لوحة العميل</div>
    </div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sb-av">م</div>
    <div>
      <div class="sb-uname" id="sb-name">...</div>
      <div class="sb-urole">عميل</div>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">عام</div>
    <div class="sb-item on" data-page="home">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      الرئيسية
    </div>
    <div class="sb-sec">مشاريعي</div>
    <div class="sb-item" data-page="requests">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      مشاريعي
    </div>
    <div class="sb-item" data-page="new">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      نشر مشروع جديد
    </div>
    <div class="sb-sec">التواصل</div>
    <div class="sb-item" data-page="chat">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      المحادثات
      <span class="sb-badge" id="chat-badge" style="display:none">0</span>
    </div>
    <div class="sb-item" data-page="notifs">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      الإشعارات
      <span class="sb-badge" id="notif-badge" style="display:none">0</span>
    </div>
    <div class="sb-sec">الحساب</div>
    <div class="sb-item" data-page="profile">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      ملفي الشخصي
    </div>
  </nav>
  <div class="sb-bottom">
    <button class="sb-logout" onclick="logout()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      تسجيل الخروج
    </button>
  </div>
</div>

<!-- OVERLAY -->
<div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <button class="topbar-menu" onclick="toggleSidebar()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title" id="topbar-title">الرئيسية</div>
    <a href="/" style="font-size:11px;color:var(--muted);text-decoration:none">الرئيسية</a>
  </div>

  <!-- PAGES -->
  <div class="content">

    <!-- HOME -->
    <div class="page on" id="page-home">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-box"><div class="stat-val sk" style="height:24px;width:40px;margin:0 auto 5px"></div><div class="stat-lbl">إجمالي المشاريع</div></div>
        <div class="stat-box"><div class="stat-val sk" style="height:24px;width:40px;margin:0 auto 5px"></div><div class="stat-lbl">مفتوح</div></div>
        <div class="stat-box"><div class="stat-val sk" style="height:24px;width:40px;margin:0 auto 5px"></div><div class="stat-lbl">مكتمل</div></div>
      </div>
      <div class="card">
        <div class="card-title">آخر المشاريع
          <button class="btn btn-outline btn-sm" onclick="gotoPage('new')">+ نشر مشروع</button>
        </div>
        <div id="home-list"><div class="sk" style="height:70px;margin-bottom:8px;border-radius:12px"></div><div class="sk" style="height:70px;border-radius:12px"></div></div>
      </div>
    </div>

    <!-- REQUESTS -->
    <div class="page" id="page-requests">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:18px;font-weight:900">مشاريعي</div>
        <button class="btn btn-gold" onclick="gotoPage('new')">+ نشر مشروع</button>
      </div>
      <div id="reqs-list"><div class="sk" style="height:80px;margin-bottom:8px;border-radius:14px"></div></div>
    </div>

    <!-- NEW PROJECT -->
    <div class="page" id="page-new">
      <div class="card">
        <div class="card-title" id="form-title">نشر مشروع جديد</div>
        <div class="form-group">
          <label class="form-label">عنوان المشروع *</label>
          <input class="form-input" id="f-title" placeholder="مثال: تركيب نظام كاميرات مراقبة">
        </div>
        <div class="form-group">
          <label class="form-label">التصنيف *</label>
          <select class="form-input" id="f-cat">
            <option value="">اختر التصنيف</option>
            <option>كاميرات مراقبة</option><option>تبريد وتكييف</option><option>كهرباء</option>
            <option>سباكة</option><option>نجارة</option><option>تنظيف</option><option>نقل عفش</option>
            <option>بناء</option><option>تصميم</option><option>مسابح</option><option>مكافحة حشرات</option>
            <option>مظلات وسواتر</option><option>حدادة</option><option>ديكور</option><option>برمجة</option>
            <option>توريد</option><option>صيانة</option><option>أخرى</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">المدينة *</label>
            <select class="form-input" id="f-city">
              <option value="">اختر المدينة</option>
              <option>الرياض</option><option>جدة</option><option>مكة المكرمة</option>
              <option>المدينة المنورة</option><option>الدمام</option><option>الخبر</option>
              <option>الطائف</option><option>بريدة</option><option>تبوك</option><option>الأحساء</option>
              <option>خميس مشيط</option><option>حائل</option><option>الجبيل</option><option>جازان</option>
              <option>نجران</option><option>أبها</option><option>ينبع</option><option>القطيف</option>
              <option>الخرج</option><option>عرعر</option><option>سكاكا</option><option>حفر الباطن</option>
              <option>الباحة</option><option>الدوادمي</option><option>بيشة</option><option>الزلفي</option>
              <option>شقراء</option><option>عنيزة</option><option>الرس</option><option>القنفذة</option>
              <option>رابغ</option><option>صبيا</option><option>الوجه</option><option>ضباء</option>
              <option>تيماء</option><option>حقل</option><option>مهد الذهب</option><option>العلا</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">الميزانية (ر.س)</label>
            <input class="form-input" id="f-budget" type="number" placeholder="5000">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">الموعد النهائي</label>
          <input class="form-input" id="f-deadline" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">وصف المشروع *</label>
          <textarea class="form-input" id="f-desc" rows="5" placeholder="اشرح متطلبات المشروع بالتفصيل..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">صور المشروع</label>
          <input type="file" id="f-images" accept="image/*" multiple style="display:none" onchange="previewImages(event)">
          <div onclick="document.getElementById('f-images').click()" style="border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;font-weight:700">
            <div style="font-size:24px;margin-bottom:6px">📷</div>اضغط لإضافة صور
          </div>
          <div id="img-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
        </div>
        <input type="hidden" id="f-edit-id">
        <button class="btn btn-gold btn-full" id="f-submit" onclick="submitProject()">نشر المشروع</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="page" id="page-chat">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:18px;font-weight:900">المحادثات</div>
        <button class="btn btn-p btn-sm" onclick="openNewChat()">+ محادثة جديدة</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div id="conv-list"></div>
      </div>
    </div>

    <!-- NOTIFS -->
    <div class="page" id="page-notifs">
      <div style="font-size:18px;font-weight:900;margin-bottom:14px">الإشعارات</div>
      <div id="notifs-list"></div>
    </div>

    <!-- PROFILE -->
    <div class="page" id="page-profile">
      <div class="card">
        <div class="card-title">ملفي الشخصي</div>
        <div class="form-group">
          <label class="form-label">الاسم</label>
          <input class="form-input" id="p-name">
        </div>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input class="form-input" id="p-email" type="email">
        </div>
        <div class="form-group">
          <label class="form-label">رقم الجوال</label>
          <input class="form-input" id="p-phone" type="tel">
        </div>
        <div class="form-group">
          <label class="form-label">المدينة</label>
          <input class="form-input" id="p-city">
        </div>
        <button class="btn btn-gold btn-full" onclick="saveProfile()">حفظ التغييرات</button>
      </div>
    </div>

  </div>
</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// GLOBALS
// ════════════════════════════════════════════════════════
var API = 'https://manaqasati-production.up.railway.app';
var user = null;
var token = null;
var currentPage = 'home';
var editingReqId = null;
var _chatPolling = null;
var _chatReqId = null;
var _chatReceiverId = null;
var _chatMsgs = [];
var _uploadedImages = [];

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
(function init(){
  try{ user = JSON.parse(localStorage.getItem('user') || 'null'); }catch(e){}
  token = localStorage.getItem('token') || '';
  if(!user || !token){ location.href = '/auth.html'; return; }

  // Set user info
  document.getElementById('sb-name').textContent = user.name || 'العميل';
  var av = document.getElementById('sb-av');
  if(user.profile_image && user.profile_image.startsWith('http')){
    av.innerHTML = '<img src="'+user.profile_image+'" alt="">';
  } else {
    av.textContent = (user.name||'م')[0];
  }

  // Handle URL params
  var params = new URLSearchParams(location.search);
  var chatId = params.get('chat');
  var editId = params.get('edit');
  if(chatId || editId) history.replaceState(null,'',location.pathname);

  // Auto-open chat from mnq_open_chat_id
  var storedChat = localStorage.getItem('mnq_open_chat_id');
  if(storedChat){ localStorage.removeItem('mnq_open_chat_id'); chatId = chatId || storedChat; }

  // Auto-open edit
  var storedEdit = localStorage.getItem('mnq_edit_req');
  if(storedEdit){ localStorage.removeItem('mnq_edit_req'); editId = editId || storedEdit; }

  // Navigate
  if(chatId){
    gotoPage('chat');
    setTimeout(function(){ openChatById(chatId); }, 1200);
  } else if(editId){
    loadEditForm(editId);
  } else {
    gotoPage('home');
  }

  // Load badges
  loadBadges();
  setInterval(loadBadges, 30000);

  // Setup nav
  document.querySelectorAll('.sb-item[data-page]').forEach(function(el){
    el.addEventListener('click',function(){
      gotoPage(el.getAttribute('data-page'));
      closeSidebar();
    });
  });
})();

// ════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════
var pageTitles = {home:'الرئيسية',requests:'مشاريعي',new:'نشر مشروع',chat:'المحادثات',notifs:'الإشعارات',profile:'ملفي الشخصي'};

function gotoPage(pg){
  currentPage = pg;
  document.querySelectorAll('.page').forEach(function(el){ el.classList.remove('on'); });
  var p = document.getElementById('page-'+pg);
  if(p) p.classList.add('on');
  document.querySelectorAll('.sb-item').forEach(function(el){ el.classList.remove('on'); });
  var nav = document.querySelector('.sb-item[data-page="'+pg+'"]');
  if(nav) nav.classList.add('on');
  document.getElementById('topbar-title').textContent = pageTitles[pg]||'';
  // Load page data
  if(pg==='home')    loadHome();
  if(pg==='requests') loadRequests();
  if(pg==='chat')    loadConversations();
  if(pg==='notifs')  loadNotifs();
  if(pg==='profile') loadProfile();
  if(pg==='new'){
    document.getElementById('form-title').textContent = 'نشر مشروع جديد';
    document.getElementById('f-submit').textContent = 'نشر المشروع';
    document.getElementById('f-edit-id').value = '';
    editingReqId = null;
  }
  if(pg !== 'chat') clearChatPolling();
}

// ════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════
function esc(s){ var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function fmtN(n){ return n?Number(n).toLocaleString('en-US'):'0'; }
function fmtDate(d){ if(!d)return''; var dt=new Date(d); var m=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']; return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear(); }
function ago(d){ if(!d)return''; var s=(Date.now()-new Date(d))/1000; if(s<60)return'الآن'; if(s<3600)return Math.floor(s/60)+' د'; if(s<86400)return Math.floor(s/3600)+' س'; return Math.floor(s/86400)+' يوم'; }
function hdr(){ return {headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}}; }
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#DC2626':type==='success'?'#16A34A':'#0F172A';
  t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},3000);
}
function stTag(s){
  var map={open:'st-open مفتوح',in_progress:'st-prog قيد التنفيذ',completed:'st-done مكتمل',closed:'st-closed مغلق',done:'st-done مكتمل'};
  var v=(map[s]||'st-closed '+s).split(' ');
  return '<span class="status '+v[0]+'">'+v.slice(1).join(' ')+'</span>';
}
function apiFetch(url,opts){
  return fetch(API+url,Object.assign({},hdr(),opts||{})).then(function(r){
    if(r.status===401){logout();return null;}
    return r.json();
  }).catch(function(){return null;});
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-overlay').classList.toggle('on');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('on');}
function logout(){localStorage.clear();location.href='/auth.html';}

// ════════════════════════════════════════════════════════
// BADGES
// ════════════════════════════════════════════════════════
function loadBadges(){
  apiFetch('/api/notifications/count').then(function(d){
    var b=document.getElementById('notif-badge');
    if(b&&d){b.textContent=d.count;b.style.display=d.count>0?'flex':'none';}
  });
}

// ════════════════════════════════════════════════════════
// HOME PAGE
// ════════════════════════════════════════════════════════
function loadHome(){
  apiFetch('/api/requests/my').then(function(all){
    if(!Array.isArray(all)) all=[];
    // Stats
    var grid=document.getElementById('stats-grid');
    grid.innerHTML=
      '<div class="stat-box"><div class="stat-val">'+all.length+'</div><div class="stat-lbl">إجمالي المشاريع</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:var(--green)">'+all.filter(function(r){return r.status==='open';}).length+'</div><div class="stat-lbl">مفتوح</div></div>'+
      '<div class="stat-box"><div class="stat-val" style="color:var(--gold)">'+all.filter(function(r){return r.status==='completed'||r.status==='done';}).length+'</div><div class="stat-lbl">مكتمل</div></div>';
    // Recent
    var list=document.getElementById('home-list');
    if(!all.length){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">لا يوجد مشاريع بعد</div><div class="empty-sub">انشر أول مشروعك الآن</div></div>';return;}
    list.innerHTML=all.slice(0,5).map(projCard).join('');
    addProjListeners(list);
  });
}

// ════════════════════════════════════════════════════════
// REQUESTS PAGE
// ════════════════════════════════════════════════════════
function loadRequests(){
  var list=document.getElementById('reqs-list');
  list.innerHTML='<div class="sk" style="height:80px;margin-bottom:8px;border-radius:14px"></div>'.repeat(3);
  apiFetch('/api/requests/my').then(function(all){
    if(!Array.isArray(all)||!all.length){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">لا يوجد مشاريع</div></div>';return;}
    list.innerHTML=all.map(function(r){return projCard(r,true);}).join('');
    addProjListeners(list);
  });
}

function projCard(r,showActions){
  var barColor=r.status==='open'?'var(--green)':r.status==='in_progress'?'#2563EB':r.status==='done'||r.status==='completed'?'var(--gold)':'var(--hint)';
  var thumbHtml=r.thumbnail&&r.thumbnail.startsWith('http')?'<div class="proj-img"><img src="'+r.thumbnail+'" loading="lazy"></div>':'';
  var acts='';
  if(showActions){
    acts='<div class="proj-actions">'
      +'<button class="btn btn-outline btn-sm _view-proj" data-id="'+r.id+'" data-slug="'+encodeURIComponent((r.title||'مشروع').replace(/\s+/g,'-').slice(0,40))+'-'+r.id+'">عرض المشروع</button>'
      +'<button class="btn btn-outline btn-sm _edit-proj" data-id="'+r.id+'">تعديل</button>'
      +'<button class="btn btn-red btn-sm _del-proj" data-id="'+r.id+'">حذف</button>'
      +'</div>';
  }
  return '<div class="proj-card _open-proj" data-id="'+r.id+'" data-slug="'+encodeURIComponent((r.title||'مشروع').replace(/\s+/g,'-').slice(0,40))+'-'+r.id+'">'
    +'<div class="proj-bar" style="background:'+barColor+'"></div>'
    +thumbHtml
    +'<div class="proj-body">'
      +'<div class="proj-cat">'+esc(r.category||'')+'</div>'
      +'<div class="proj-title">'+esc(r.title||'')+'</div>'
      +'<div class="proj-meta">'
        +stTag(r.status)
        +(r.city?'<span class="tag tag-green">'+esc(r.city)+'</span>':'')
        +(r.budget_max?'<span class="tag tag-gold">'+fmtN(r.budget_max)+' ر.س</span>':'')
        +(r.bid_count>0?'<span class="tag tag-gray">'+r.bid_count+' عروض</span>':'')
      +'</div>'
      +acts
    +'</div>'
  +'</div>';
}

function addProjListeners(container){
  container.querySelectorAll('._open-proj').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('button')) return;
      location.href='/project/'+el.getAttribute('data-slug');
    });
  });
  container.querySelectorAll('._view-proj').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      location.href='/project/'+el.getAttribute('data-slug');
    });
  });
  container.querySelectorAll('._edit-proj').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      loadEditForm(el.getAttribute('data-id'));
    });
  });
  container.querySelectorAll('._del-proj').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      if(!confirm('حذف هذا المشروع؟')) return;
      apiFetch('/api/requests/'+el.getAttribute('data-id'),{method:'DELETE'}).then(function(){
        showToast('تم الحذف','success');
        loadRequests(); loadHome();
      });
    });
  });
}

// ════════════════════════════════════════════════════════
// NEW / EDIT PROJECT
// ════════════════════════════════════════════════════════
var _pendingImages = [];

function previewImages(e){
  var files=Array.from(e.target.files);
  var preview=document.getElementById('img-preview');
  preview.innerHTML='';
  _pendingImages=files;
  files.forEach(function(f,i){
    var url=URL.createObjectURL(f);
    preview.innerHTML+='<div style="position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden"><img src="'+url+'" style="width:100%;height:100%;object-fit:cover"><button onclick="removeImage('+i+')" style="position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center">×</button></div>';
  });
}

function removeImage(i){
  _pendingImages.splice(i,1);
  var dt=new DataTransfer();
  _pendingImages.forEach(function(f){dt.items.add(f);});
  document.getElementById('f-images').files=dt.files;
  previewImages({target:{files:dt.files}});
}

async function submitProject(){
  var title=document.getElementById('f-title').value.trim();
  var cat=document.getElementById('f-cat').value;
  var city=document.getElementById('f-city').value;
  var budget=document.getElementById('f-budget').value;
  var deadline=document.getElementById('f-deadline').value;
  var desc=document.getElementById('f-desc').value.trim();
  var editId=document.getElementById('f-edit-id').value;

  if(!title||!cat||!city||!desc){showToast('يرجى تعبئة الحقول المطلوبة','error');return;}

  var btn=document.getElementById('f-submit');
  btn.disabled=true;btn.textContent='جاري الحفظ...';

  // Upload images
  var images=[];
  if(_pendingImages.length){
    for(var i=0;i<_pendingImages.length;i++){
      var b64=await toBase64(_pendingImages[i]);
      images.push(b64);
    }
  }

  var body={title,description:desc,category:cat,city,budget_max:budget||null,deadline:deadline||null};
  if(images.length) body.images=images;

  var url=editId?'/api/requests/'+editId:'/api/requests';
  var method=editId?'PUT':'POST';

  apiFetch(url,{method,body:JSON.stringify(body)}).then(function(d){
    btn.disabled=false;btn.textContent=editId?'حفظ التعديلات':'نشر المشروع';
    if(d&&(d.id||d.ok)){
      showToast(editId?'تم تحديث المشروع ✓':'تم نشر المشروع ✓','success');
      _pendingImages=[];
      document.getElementById('img-preview').innerHTML='';
      ['f-title','f-desc'].forEach(function(id){document.getElementById(id).value='';});
      editingReqId=null;
      document.getElementById('f-edit-id').value='';
      gotoPage('requests');
    } else {
      showToast((d&&d.message)||'تعذر الحفظ','error');
    }
  });
}

function toBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function loadEditForm(id){
  apiFetch('/api/requests/'+id).then(function(r){
    if(!r||!r.id){showToast('تعذر تحميل المشروع','error');return;}
    document.getElementById('f-title').value=r.title||'';
    document.getElementById('f-cat').value=r.category||'';
    document.getElementById('f-city').value=r.city||'';
    document.getElementById('f-budget').value=r.budget_max||'';
    document.getElementById('f-deadline').value=r.deadline?r.deadline.split('T')[0]:'';
    document.getElementById('f-desc').value=r.description||'';
    document.getElementById('f-edit-id').value=id;
    document.getElementById('form-title').textContent='تعديل المشروع';
    document.getElementById('f-submit').textContent='حفظ التعديلات';
    editingReqId=id;
    gotoPage('new');
  });
}

// ════════════════════════════════════════════════════════
// CHAT
// ════════════════════════════════════════════════════════
function loadConversations(){
  var list=document.getElementById('conv-list');
  list.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">جاري التحميل...</div>';
  apiFetch('/api/client/conversations').then(function(convs){
    if(!Array.isArray(convs)||!convs.length){
      list.innerHTML='<div class="empty"><div class="empty-icon">💬</div><div class="empty-title">لا توجد محادثات بعد</div><div class="empty-sub">ابدأ محادثة مع أحد المزودين</div></div>';
      return;
    }
    var h='';
    convs.forEach(function(cv){
      var av=cv.provider_image&&cv.provider_image.startsWith('http')
        ?'<img src="'+cv.provider_image+'" alt="">'
        :(cv.provider_name||'م')[0];
      h+='<div class="conv-item" data-rid="'+cv.request_id+'" data-prov="'+cv.provider_id+'" data-name="'+esc(cv.provider_name||'مزود')+'" data-title="'+esc(cv.request_title||'محادثة')+'">'
        +'<div class="conv-av">'+av+'</div>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:2px">'+esc(cv.provider_name||'مزود')+'</div>'
          +'<div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(cv.last_message||'')+'</div>'
        +'</div>'
        +(cv.unread>0?'<div class="conv-unread">'+cv.unread+'</div>':'<div style="font-size:10px;color:var(--hint)">'+ago(cv.last_time)+'</div>')
      +'</div>';
    });
    list.innerHTML=h;
    list.querySelectorAll('.conv-item').forEach(function(el){
      el.addEventListener('click',function(){
        openChat(el.getAttribute('data-rid'),el.getAttribute('data-prov'),el.getAttribute('data-name'),el.getAttribute('data-title'));
      });
    });
  });
}

function openChatById(reqId){
  // Open chat by request ID - fetch details first
  apiFetch('/api/requests/'+reqId).then(function(req){
    if(req&&req.id){
      var otherId=req.assigned_provider_id||req.client_id||'';
      openChat(String(reqId),String(otherId),req.provider_name||req.client_name||'مزود',req.title||'محادثة');
    }
  });
}

function openChat(reqId,receiverId,receiverName,reqTitle){
  reqId=String(reqId);
  receiverId=String(receiverId);
  clearChatPolling();

  // Remove existing overlay
  var old=document.getElementById('cl-overlay');
  if(old) old.remove();

  var overlay=document.createElement('div');
  overlay.id='cl-overlay';
  overlay.className='chat-overlay';
  overlay.innerHTML=
    '<div class="chat-box">'
      +'<div class="chat-head">'
        +'<button id="cl-close" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">×</button>'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:800;color:#fff">'+esc(receiverName||'مزود')+'</div><div style="font-size:10px;color:rgba(255,255,255,.5)">'+esc(reqTitle||'')+'</div></div>'
      +'</div>'
      +'<div id="cl-msgs" class="chat-msgs"><div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">جاري التحميل...</div></div>'
      +'<div class="chat-inp-wrap">'
        +'<textarea id="cl-inp" class="chat-inp" placeholder="اكتب رسالتك..." rows="1"></textarea>'
        +'<button id="cl-send" class="chat-send">إرسال</button>'
      +'</div>'
    +'</div>';

  document.body.appendChild(overlay);

  document.getElementById('cl-close').onclick=function(){
    overlay.remove();
    clearChatPolling();
    loadConversations();
  };
  document.getElementById('cl-send').onclick=function(){ sendMsg(reqId,receiverId); };
  document.getElementById('cl-inp').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(reqId,receiverId);}
  });

  // Load messages
  fetchMsgs(reqId,receiverId);

  // Poll every 2.5s
  _chatPolling=setInterval(function(){
    if(!document.getElementById('cl-overlay')){clearChatPolling();return;}
    fetchMsgs(reqId,receiverId);
  },2500);
}

function fetchMsgs(reqId,receiverId){
  var url=API+'/api/messages/'+reqId+(receiverId&&receiverId!=='null'&&receiverId!=='undefined'&&!isNaN(receiverId)?'?with='+receiverId:'');
  fetch(url,{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){return r.json();})
    .then(function(msgs){
      if(!Array.isArray(msgs)) return;
      if(msgs.length===0&&_chatMsgs.length>0) return; // Don't clear existing
      _chatMsgs=msgs;
      renderMsgs();
    }).catch(function(){});
}

function renderMsgs(){
  var wrap=document.getElementById('cl-msgs');
  if(!wrap) return;
  if(!_chatMsgs.length){
    wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">ابدأ المحادثة</div>';
    return;
  }
  var seen={},unique=[];
  _chatMsgs.forEach(function(m){
    var k=m.id||(m.content+m.created_at);
    if(!seen[k]){seen[k]=1;unique.push(m);}
  });
  var wasAtBottom=wrap.scrollTop+wrap.clientHeight>=wrap.scrollHeight-30;
  wrap.innerHTML=unique.map(function(m){
    var isMe=String(m.sender_id)===String(user.id);
    var h='<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+';margin-bottom:6px">';
    h+='<div class="msg-bubble '+(isMe?'msg-me':'msg-other')+'">';
    if(!isMe) h+='<div class="msg-name">'+esc(m.sender_name||'')+'</div>';
    h+=esc(m.content);
    h+='<div class="msg-time">'+ago(m.created_at)+'</div>';
    h+='</div></div>';
    return h;
  }).join('');
  if(wasAtBottom) wrap.scrollTop=wrap.scrollHeight;
}

function sendMsg(reqId,receiverId){
  var inp=document.getElementById('cl-inp');
  var content=inp&&inp.value.trim();
  if(!content) return;
  inp.value='';
  inp.style.height='auto';

  // Optimistic
  _chatMsgs.push({id:'tmp'+Date.now(),sender_id:user.id,content:content,created_at:new Date().toISOString(),sender_name:'أنت'});
  renderMsgs();

  fetch(API+'/api/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({request_id:parseInt(reqId),receiver_id:parseInt(receiverId),content:content})
  }).then(function(r){return r.json();}).then(function(){
    fetchMsgs(reqId,receiverId);
  }).catch(function(){showToast('تعذر إرسال الرسالة','error');});
}

function clearChatPolling(){
  if(_chatPolling){clearInterval(_chatPolling);_chatPolling=null;}
  _chatMsgs=[];
}

// ─── New Chat ──────────────────────────────────────────
function openNewChat(){
  var ol=document.createElement('div');
  ol.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  ol.innerHTML='<div style="background:#fff;border-radius:18px;width:100%;max-width:440px;overflow:hidden">'
    +'<div style="background:var(--p3);padding:16px;display:flex;align-items:center;justify-content:space-between">'
      +'<span style="font-size:15px;font-weight:900;color:#fff">محادثة جديدة</span>'
      +'<button id="nc-x" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px">×</button>'
    +'</div>'
    +'<div style="padding:16px">'
      +'<input id="nc-inp" placeholder="ابحث باسم المزود أو رقم الجوال..." style="width:100%;padding:11px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:Tajawal,sans-serif;box-sizing:border-box">'
      +'<div id="nc-res" style="margin-top:8px;max-height:260px;overflow-y:auto"></div>'
    +'</div>'
  +'</div>';
  document.body.appendChild(ol);
  document.getElementById('nc-x').onclick=function(){ol.remove();};
  ol.addEventListener('click',function(e){if(e.target===ol)ol.remove();});

  var inp=document.getElementById('nc-inp'),res=document.getElementById('nc-res'),timer=null;
  inp.focus();
  inp.addEventListener('input',function(){
    clearTimeout(timer);
    var q=inp.value.trim();
    if(!q){res.innerHTML='';return;}
    res.innerHTML='<div style="padding:10px;text-align:center;color:var(--muted);font-size:12px">جاري البحث...</div>';
    timer=setTimeout(function(){
      apiFetch('/api/users/search?q='+encodeURIComponent(q)).then(function(us){
        if(!us||!us.length){res.innerHTML='<div style="padding:10px;text-align:center;color:var(--muted)">لا توجد نتائج</div>';return;}
        var h='';
        us.forEach(function(u){
          h+='<div style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border)">'
            +'<div style="width:40px;height:40px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;flex-shrink:0;overflow:hidden">'+(u.profile_image?'<img src="'+u.profile_image+'" style="width:100%;height:100%;object-fit:cover">':(u.name||'م')[0])+'</div>'
            +'<div style="flex:1"><div style="font-size:13px;font-weight:800">'+esc(u.business_name||u.name)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(u.city||'')+'</div></div>'
            +'<button data-uid="'+u.id+'" data-name="'+esc(u.business_name||u.name)+'" style="padding:8px 14px;background:var(--p);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">محادثة</button>'
          +'</div>';
        });
        res.innerHTML=h;
        res.querySelectorAll('button[data-uid]').forEach(function(btn){
          btn.addEventListener('click',function(){
            var uid=btn.getAttribute('data-uid');
            var name=btn.getAttribute('data-name');
            ol.remove();
            apiFetch('/api/direct-message',{method:'POST',body:JSON.stringify({provider_id:uid})}).then(function(d){
              if(d&&d.request_id){
                showToast('تم فتح المحادثة ✓','success');
                openChat(String(d.request_id),String(uid),name,'محادثة مباشرة');
              }
            });
          });
        });
      });
    },400);
  });
}

// ════════════════════════════════════════════════════════
// NOTIFICATIONS
// ════════════════════════════════════════════════════════
function loadNotifs(){
  var list=document.getElementById('notifs-list');
  list.innerHTML='<div class="sk" style="height:60px;margin-bottom:8px;border-radius:12px"></div>'.repeat(3);
  apiFetch('/api/notifications').then(function(ns){
    if(!Array.isArray(ns)||!ns.length){list.innerHTML='<div class="empty"><div class="empty-icon">🔔</div><div class="empty-title">لا توجد إشعارات</div></div>';return;}
    list.innerHTML=ns.map(function(n){
      return '<div style="background:var(--white);border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid var(--border);'+(n.is_read?'':'border-right:3px solid var(--gold);')+'">'
        +'<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:3px">'+esc(n.title||'')+'</div>'
        +'<div style="font-size:12px;color:var(--muted)">'+esc(n.body||n.message||'')+'</div>'
        +'<div style="font-size:10px;color:var(--hint);margin-top:5px">'+ago(n.created_at)+'</div>'
      +'</div>';
    }).join('');
    // Mark as read
    apiFetch('/api/notifications/read-all',{method:'POST'}).then(function(){loadBadges();});
  });
}

// ════════════════════════════════════════════════════════
// PROFILE
// ════════════════════════════════════════════════════════
function loadProfile(){
  apiFetch('/api/client/profile').then(function(p){
    if(!p) return;
    document.getElementById('p-name').value=p.name||'';
    document.getElementById('p-email').value=p.email||'';
    document.getElementById('p-phone').value=p.phone||'';
    document.getElementById('p-city').value=p.city||'';
  });
}

function saveProfile(){
  var body={
    name:document.getElementById('p-name').value,
    email:document.getElementById('p-email').value,
    phone:document.getElementById('p-phone').value,
    city:document.getElementById('p-city').value,
  };
  apiFetch('/api/client/profile',{method:'PUT',body:JSON.stringify(body)}).then(function(d){
    if(d&&d.ok){
      showToast('تم الحفظ ✓','success');
      user.name=body.name;
      localStorage.setItem('user',JSON.stringify(user));
      document.getElementById('sb-name').textContent=user.name;
    } else {
      showToast((d&&d.message)||'تعذر الحفظ','error');
    }
  });
}
</script>
