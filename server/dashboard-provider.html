<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة المزود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1B3A6B;--p2:#142d54;--p3:#2C5282;
  --p-light:#e8eef7;--p-mid:#c5d6ee;
  --gold:#F0A500;--gold-d:#c78500;--gold-l:#fff8e7;
  --text:#0d1f3c;--text2:#2d4a6e;--muted:#6b85a8;--hint:#9db3cc;
  --border:#dce5f0;--bg:#f4f7fb;--white:#fff;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --sb:260px;--tb:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ══ SIDEBAR ══ */
.sb{width:var(--sb);background:var(--white);border-left:1px solid var(--border);height:100vh;position:fixed;right:0;top:0;display:flex;flex-direction:column;z-index:300;transition:transform .25s ease;box-shadow:4px 0 24px rgba(27,58,107,.07)}
.sb-brand{background:var(--p);padding:0 18px;height:var(--tb);display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;flex-shrink:0}
.sb-brand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.sb-net{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.2}
.logo{font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.logo-tag{font-size:9px;font-weight:700;background:rgba(240,165,0,.2);border:1px solid rgba(240,165,0,.3);color:var(--gold);padding:2px 8px;border-radius:20px;margin-right:2px}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.su-row{display:flex;align-items:center;gap:10px}
.su-av{width:38px;height:38px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.su-nm{font-size:13px;font-weight:800;color:var(--text)}
.su-rl{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px}
.sb-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.ss{padding:10px 6px;text-align:center;border-left:1px solid var(--border)}
.ss:last-child{border-left:none}
.ss-v{font-size:17px;font-weight:900;color:var(--text);line-height:1}
.ss-l{font-size:9px;font-weight:600;color:var(--muted);margin-top:3px;letter-spacing:.3px}
.sb-nav{flex:1;overflow-y:auto;padding:10px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sg-lbl{font-size:9px;font-weight:800;color:var(--hint);letter-spacing:.8px;text-transform:uppercase;padding:10px 8px 5px;display:block}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;width:100%;text-align:right;margin-bottom:2px;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--p-light);color:var(--p)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--p);box-shadow:0 3px 10px rgba(27,58,107,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;width:14px;height:14px}
.nbdg{font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center;background:var(--gold-l);color:#92400e}
.ni.on .nbdg{background:rgba(27,58,107,.15);color:var(--p)}
.sb-ft{padding:10px;border-top:1px solid var(--border);flex-shrink:0}

/* ══ MAIN ══ */
.main{margin-right:var(--sb);min-height:100vh;display:flex;flex-direction:column;min-width:0;overflow-x:hidden}
.topbar{height:var(--tb);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;flex-shrink:0}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.bc{display:flex;align-items:center;gap:6px}
.bc-h{font-size:12px;color:var(--muted);font-weight:500}
.bc-s{color:var(--border);font-size:10px;margin:0 2px}
.bc-c{font-size:14px;font-weight:800;color:var(--text)}
.tb-r{display:flex;align-items:center;gap:8px}
.tb-clk{font-size:11px;font-weight:700;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-variant-numeric:tabular-nums}
.ib{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:all .15s;position:relative}
.ib:hover{background:var(--bg);border-color:var(--p-mid);color:var(--p)}
.ib svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ndot{position:absolute;top:4px;left:4px;width:7px;height:7px;border-radius:50%;background:var(--gold);border:2px solid #fff}
.pg{padding:24px 28px;flex:1}
.pghd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.pg-t{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.4px}
.pg-s{font-size:12px;color:var(--muted);margin-top:3px}
.pghd-r{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ══ STATS ══ */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 14px 14px;background:var(--border)}
.sc.s-navy::after{background:var(--p)}
.sc.s-gold::after{background:var(--gold)}
.sc.s-green::after{background:var(--green)}
.sc.s-gray::after{background:var(--hint)}
.sc:hover{box-shadow:0 4px 16px rgba(27,58,107,.08)}
.sc-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sc-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sc-v{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.5px;line-height:1;margin-bottom:4px}
.sc-l{font-size:11px;font-weight:600;color:var(--muted)}

/* ══ CARDS ══ */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.card-accent{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;min-height:46px}
.ch-l{display:flex;align-items:center;gap:9px}
.ch-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-ic svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ch-t{font-size:13px;font-weight:800;color:var(--text)}
.ch-s{font-size:10px;color:var(--muted)}
.cb{padding:16px}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 15px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit;line-height:1}
.btn:active{transform:scale(.97)}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-dk{background:var(--p);color:#fff;border-color:var(--p);box-shadow:0 2px 8px rgba(27,58,107,.2)}.btn-dk:hover{background:var(--p2)}
.btn-gn{background:var(--green-l);color:#166534;border-color:#bbf7d0}.btn-gn:hover{background:#bbf7d0}
.btn-rd{background:var(--red-l);color:#991b1b;border-color:#fecaca}.btn-rd:hover{background:#fecaca}
.btn-am{background:var(--gold-l);color:#92400e;border-color:#fde68a}.btn-am:hover{background:#fde68a}
.btn-gh{background:var(--bg);color:var(--p);border-color:var(--border)}.btn-gh:hover{background:var(--p-light);border-color:var(--p-mid)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}

/* ══ BADGES ══ */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bdg::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bdg-new{background:var(--p-light);color:var(--p)}.bdg-new::before{background:var(--p)}
.bdg-open{background:var(--green-l);color:#166534}.bdg-open::before{background:var(--green)}
.bdg-prog{background:var(--yellow-l);color:#92400e}.bdg-prog::before{background:var(--yellow)}
.bdg-done{background:#f4f4f5;color:#3f3f46}.bdg-done::before{background:#3f3f46}
.bdg-rej{background:var(--red-l);color:#991b1b}.bdg-rej::before{background:var(--red)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:var(--p-light);font-size:10px;font-weight:600;color:var(--text2)}
.chip svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

/* ══ FILTER BAR ══ */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sbox{flex:1;min-width:160px;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:0 12px;transition:border-color .15s}
.sbox:focus-within{border-color:var(--p)}
.sbox svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.8;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.sbox input{border:none;background:transparent;font-size:12px;padding:8px 0;flex:1;color:var(--text);font-family:inherit;outline:none}
.sbox input::placeholder{color:var(--hint)}
.fsel{padding:8px 11px;border:1px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;background:var(--bg);color:var(--p);cursor:pointer;font-family:inherit;transition:border-color .15s;outline:none}
.fsel:focus{border-color:var(--p)}

/* ══ PROJECT CARDS (browse) ══ */
.pc{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s;border-right:3px solid transparent}
.pc:hover{box-shadow:0 4px 16px rgba(27,58,107,.1);transform:translateX(-2px)}
.pc-open{border-right-color:var(--green)}.pc-prog{border-right-color:var(--yellow)}.pc-done{border-right-color:var(--hint)}.pc-navy{border-right-color:var(--p)}
.pc-num{font-size:9px;font-weight:700;color:var(--hint);letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px}
.pc-tit{font-size:14px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:8px;letter-spacing:-.2px}
.pc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pc-acts{display:flex;gap:6px;flex-wrap:wrap}

/* ══ BID CARD ══ */
.bdc{border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;background:var(--bg);transition:border-color .15s}
.bdc:hover{border-color:var(--p-mid)}
.bdc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.bdc-pr{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-.4px}
.bdc-due{font-size:10px;color:var(--muted);font-weight:600}
.bdc-note{font-size:11.5px;color:var(--text2);line-height:1.7;margin:8px 0;padding:8px 11px;background:var(--white);border-radius:8px;border-right:3px solid var(--border)}
.bdc-st{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.bdc-pend{background:var(--gold-l);color:#92400e}.bdc-acc{background:var(--green-l);color:#166534}.bdc-rej{background:var(--red-l);color:#991b1b}

/* ══ REVIEW CARD ══ */
.rvc{border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;background:var(--white)}
.rv-av{width:30px;height:30px;border-radius:8px;color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rv-nm{font-size:12px;font-weight:700;color:var(--text)}
.rv-sb{font-size:10px;color:var(--muted)}
.sts{font-size:13px;letter-spacing:1px}
.rv-body{font-size:11.5px;color:var(--text2);background:var(--bg);padding:9px 12px;border-radius:8px;line-height:1.7;margin-top:9px}

/* ══ INFO BLOCK ══ */
.ib-bl{background:var(--bg);border-radius:9px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--p-light)}
.ib-t{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.ir:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--muted)}
.iv{font-size:11px;font-weight:700;color:var(--p)}

/* ══ FORM ══ */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fl{font-size:11px;font-weight:700;color:var(--text2)}
.fh{color:var(--hint);font-weight:400}
.fi{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:var(--white);color:var(--text);transition:border-color .15s;width:100%;outline:none}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.07)}
.fi::placeholder{color:var(--hint)}
.fis{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:var(--white);color:var(--p);cursor:pointer;width:100%;transition:border-color .15s;outline:none}
.fis:focus{border-color:var(--p)}
.fta{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;resize:vertical;min-height:72px;width:100%;color:var(--text);line-height:1.6;background:var(--white);transition:border-color .15s;outline:none}
.fta:focus{border-color:var(--p)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.c2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}

/* ══ MODAL ══ */
.ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(13,31,60,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:16px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(27,58,107,.2);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:2;border-radius:16px 16px 0 0}
.mh-l{display:flex;align-items:center;gap:9px}
.m-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.m-ic svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.m-tit{font-size:14px;font-weight:800;color:var(--text)}
.m-cls{width:28px;height:28px;border-radius:8px;background:var(--bg);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.m-cls:hover{background:var(--red-l);color:var(--red);border-color:var(--red)}
.mb{padding:18px}
.mf{display:flex;gap:6px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border);background:var(--bg);border-radius:0 0 16px 16px}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:all .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:'Tajawal',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.t-ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.t-s{background:var(--green)}.t-e{background:var(--red)}.t-i{background:var(--p)}

/* ══ LOADING/EMPTY ══ */
.ls{display:flex;flex-direction:column;align-items:center;padding:52px 24px}
.spin{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.ls-t{font-size:12px;color:var(--muted)}
.es{display:flex;flex-direction:column;align-items:center;padding:40px 24px;text-align:center}
.es-ic{width:44px;height:44px;border-radius:12px;background:var(--p-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.es-ic svg{width:18px;height:18px;stroke:var(--p);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.es-t{font-size:13px;font-weight:800;color:var(--p);margin-bottom:4px}
.es-s{font-size:11px;color:var(--muted)}

/* ══ MOB ══ */
.mob-btn{display:none;position:fixed;top:10px;left:10px;z-index:500;width:36px;height:36px;border-radius:9px;background:var(--p);border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(27,58,107,.3)}
.mob-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:250}

@media(max-width:1024px){
  .sb{transform:translateX(110%)}
  .sb.open{transform:translateX(0)}
  .main{margin-right:0;max-width:100vw;width:100%}
  body{overflow-x:hidden}
  .mob-btn{display:flex}
  .mob-ov.show{display:block}
  .sg{grid-template-columns:repeat(2,1fr)}
  .c2{grid-template-columns:1fr}
  .pg{padding:12px 14px}
  .g2{grid-template-columns:1fr}
  .topbar{padding:0 48px 0 14px}
}
</style>
</head>
<body>

<button class="mob-btn" onclick="openSb()">
  <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="mob-ov" id="mobOv" onclick="closeSb()"></div>

<aside class="sb" id="sb">
  <div class="sb-brand">
    <svg class="sb-net" viewBox="0 0 260 58" preserveAspectRatio="none">
      <line x1="20" y1="18" x2="100" y2="32" stroke="#fff" stroke-width="1.2"/>
      <line x1="100" y1="32" x2="175" y2="14" stroke="#fff" stroke-width="1.2"/>
      <line x1="175" y1="14" x2="245" y2="28" stroke="#fff" stroke-width="1"/>
      <line x1="100" y1="32" x2="145" y2="18" stroke="#F0A500" stroke-width="1" stroke-opacity="0.8"/>
      <circle cx="20" cy="18" r="3" fill="#fff" opacity="0.4"/>

  setPage(`<div class="pghd"><div><div class="pg-t">تصفح المشاريع</div><div class="pg-s">${openProjs.length} مشروع متاح</div></div></div>

        <select class="fsel" id="bCat" onchange="filterBrowse()"><option value="">كل التصنيفات</option>${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <select class="fsel" id="bCit" onchange="filterBrowse()"><option value="">كل المدن</option>${CITIES.map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <div id="bList">${renderBrowse(openProjs)}</div>
    </div></div>`);
}
function filterBrowse(){
  const q=(document.getElementById('bQ')?.value||'').toLowerCase();const cat=document.getElementById('bCat')?.value||'';const cit=document.getElementById('bCit')?.value||'';
  const f=allProjects.filter(p=>p.status==='open'&&(!q||p.title.toLowerCase().includes(q))&&(!cat||p.category===cat)&&(!cit||p.city===cit));
  const el=document.getElementById('bList');if(el)el.innerHTML=renderBrowse(f);

function bidModal(projectId,projectTitle){

async function submitBid(projectId){
  const priceEl=document.getElementById('bPrice');const daysEl=document.getElementById('bDays');const noteEl=document.getElementById('bNote');
  const price=priceEl?.value?.trim();const days=daysEl?.value?.trim();const note=noteEl?.value?.trim();
  if(!price||parseFloat(price)<=0){toast('أدخل سعر العرض','error');priceEl?.focus();return;}
  if(!days||parseInt(days)<=0){toast('أدخل مدة التنفيذ','error');daysEl?.focus();return;}
  if(!note){toast('أدخل رسالتك للعميل','error');noteEl?.focus();return;}
  const btn=document.querySelector('#ov .btn-dk');if(btn){btn.disabled=true;btn.textContent='جاري الإرسال...';}
  const res=await api(`/api/requests/${projectId}/bids`,{method:'POST',body:JSON.stringify({price:parseFloat(price),days:parseInt(days),note})});
  if(btn){btn.disabled=false;btn.innerHTML=S(I.send)+' إرسال العرض';}
  if(res.message&&!res.id&&!res.bid_id){toast(res.message||'حدث خطأ','error');return;}
  closeM();toast('تم إرسال عرضك بنجاح','success');
}

          ${(p.portfolio_images||[]).length<6?`<div onclick="document.getElementById('portfolioInput').click()" style="border:2px dashed var(--border);border-radius:8px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:5px;background:var(--bg)" onmouseover="this.style.borderColor='#1B3A6B'" onmouseout="this.style.borderColor='var(--border)'"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#6b85a8" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span style="font-size:11px;color:var(--muted)">إضافة</span></div>`:''}
        </div>
        <input type="file" id="portfolioInput" accept="image/*" multiple style="display:none" onchange="addPortfolioImgs(this)">
        <div style="font-size:10px;color:var(--muted)">أضف صور أعمالك السابقة — حد أقصى 6 صور، 5MB للصورة</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="ch"><div class="ch-l"><div class="ch-ic" style="background:#e8eef7;color:#1B3A6B"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#1B3A6B" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div><div class="ch-t">تغيير كلمة المرور</div></div></div>
      <div class="cb">
        <div class="g2">
          <div class="fg"><label class="fl">كلمة المرور الحالية</label><input type="password" class="fi" id="pwOld"></div>
          <div class="fg"><label class="fl">كلمة المرور الجديدة</label><input type="password" class="fi" id="pwNew"></div>
        </div>
        <button class="btn btn-gh btn-sm" onclick="changePw()">تغيير كلمة المرور</button>
      </div>
    </div>
    <div style="position:sticky;bottom:0;background:var(--bg);padding:12px 0;border-top:1px solid var(--border)">
      <button class="btn btn-dk" id="saveAllBtn" style="width:100%;justify-content:center;padding:14px;font-size:14px" onclick="saveAllProfile()">${S(I.save)} حفظ جميع التغييرات</button>
    </div>`);
}

function previewAvatar(input){
  const file=input.files[0];if(!file)return;
  if(file.size>3*1024*1024){toast('الحجم الأقصى 3MB','error');return;}
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=e.target.result;
    document.getElementById('avatarPreview').innerHTML=`<img src="${img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    applyProviderAvatar(img);
    localStorage.setItem('provider_avatar_'+me.id,img);
    await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({profile_image:img})});
    toast('تم حفظ الصورة','success');
  };
  reader.readAsDataURL(file);
}
async function removeAvatar(){
  await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({profile_image:null})});
  localStorage.removeItem('provider_avatar_'+me.id);
  applyProviderAvatar(null);
  toast('تم حذف الصورة','success');
  pgProfile();
}
async function addPortfolioImgs(input){
  const files=[...input.files].slice(0,6);if(!files.length)return;
  toast('جاري الرفع...','info');
  for(let i=0;i<files.length;i++){
    const file=files[i];
    if(file.size>5*1024*1024){toast('صورة '+file.name+' أكبر من 5MB','error');continue;}
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
      const result=await api('/api/provider/profile/portfolio',{method:'POST',body:JSON.stringify({image:base64})});
      if(result.message&&!result.ok){toast(result.message,'error');break;}
    }catch{toast('فشل رفع الصورة','error');}
  }
  toast('تم رفع الصور','success');pgProfile();
}
async function removePortfolioImg(index){await api('/api/provider/profile/portfolio/'+index,{method:'DELETE'});toast('تم حذف الصورة','success');pgProfile();}
async function saveSpecs(){const specs=[...document.querySelectorAll('.on')].filter(b=>CATS.includes(b.textContent)).map(b=>b.textContent);await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({specialties:specs})});toast('تم حفظ التخصصات','success');}
async function changePw(){const oldPw=document.getElementById('pwOld')?.value;const newPw=document.getElementById('pwNew')?.value;if(!oldPw||!newPw){toast('اكمل البيانات','error');return;}const res=await api('/api/auth/change-password',{method:'PUT',body:JSON.stringify({old_password:oldPw,new_password:newPw})});if(res.message&&res.message.includes('success')){toast('تم تغيير كلمة المرور','success');}else{toast(res.message||'حدث خطأ','error');}}
async function saveAllProfile(){
  const btn=document.getElementById('saveAllBtn');if(btn){btn.disabled=true;btn.textContent='جاري الحفظ...';}
  try{
    const name=document.getElementById('pNm')?.value?.trim()||'';const phone=document.getElementById('pPh')?.value?.trim()||'';const city=document.getElementById('pCit')?.value||'';const bio=document.getElementById('pBio')?.value||'';const exp=parseInt(document.getElementById('pExp')?.value||0)||null;
    if(!name){toast('الاسم مطلوب','error');return;}
    const r=await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({name,phone,city,bio,experience_years:exp})});
    if(r.id){document.getElementById('sbNm').textContent=r.name||'المزود';toast('تم حفظ جميع التغييرات','success');}
    else toast(r.message||'حدث خطأ','error');
  }catch{toast('تعذر الحفظ','error');}
  finally{if(btn){btn.disabled=false;btn.innerHTML=S(I.save)+' حفظ جميع التغييرات';}}
}

async function pgNotifications(){
  loading();const data=await api('/api/provider/notifications');const list=data||[];
  const unseen=list.filter(n=>!n.read).length;
  const nb=document.getElementById('nbNot');if(nb){nb.style.display=unseen?'':'none';nb.textContent=unseen;}
  const tDot=document.getElementById('tDot');if(tDot)tDot.style.display=unseen?'':'none';
  setPage(`<div class="pghd"><div><div class="pg-t">الإشعارات</div><div class="pg-s">${unseen} غير مقروء</div></div>${unseen?`<div class="pghd-r"><button class="btn btn-gh btn-sm" onclick="markAllRead()">تحديد الكل مقروء</button></div>`:''}</div>
    <div class="card card-accent"><div class="cb">${list.length?list.map(n=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><div style="width:8px;height:8px;border-radius:50%;background:${!n.read?'var(--p)':'var(--border)'};flex-shrink:0"></div><div style="flex:1"><div style="font-size:12.5px;font-weight:${!n.read?'800':'600'};color:${!n.read?'var(--text)':'var(--muted)'};margin-bottom:2px">${n.title}</div>${n.body?`<div style="font-size:11px;color:var(--muted);line-height:1.5">${n.body}</div>`:''}</div><div style="font-size:9px;color:var(--hint);flex-shrink:0">${fdt(n.created_at)}</div></div>`).join(''):`<div class="es"><div class="es-ic">${S(I.bell)}</div><div class="es-t">لا يوجد إشعارات</div></div>`}</div></div>`);
}
async function markAllRead(){await api('/api/provider/notifications/read',{method:'PUT'});toast('تم التحديث','success');pgNotifications();}

document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeM();});
go('home',document.querySelector('.ni.on'));
</script>
