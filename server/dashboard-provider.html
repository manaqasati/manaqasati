<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مناقصة — المزود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --w:#ffffff;--g0:#fafafa;--g1:#f4f4f5;--g2:#e4e4e7;--g3:#a1a1aa;--g4:#71717a;--g5:#3f3f46;--g6:#27272a;--g7:#18181b;
  --acc:#18181b;--red:#ef4444;--grn:#22c55e;--amb:#f59e0b;--blu:#3b82f6;
  --sb:240px;--tb:52px;--r:8px;--r2:12px;
}
html{height:100%}
body{font-family:'Tajawal',sans-serif;background:var(--g0);color:var(--g7);display:flex;min-height:100vh;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;border:none;outline:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--g2);border-radius:4px}
.sb{width:var(--sb);flex-shrink:0;background:var(--w);border-left:1px solid var(--g2);position:fixed;top:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:300;transition:transform .25s ease}
.sb-head{height:var(--tb);display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid var(--g1);flex-shrink:0}
.sb-mark{width:28px;height:28px;background:var(--acc);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-mark svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.sb-name{font-size:15px;font-weight:800;color:var(--g7);letter-spacing:-.4px}
.sb-tag{font-size:9px;font-weight:700;background:var(--g1);color:var(--g4);padding:2px 7px;border-radius:20px}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--g1);flex-shrink:0}
.su-row{display:flex;align-items:center;gap:10px}
.su-av{width:36px;height:36px;border-radius:9px;background:var(--acc);color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.su-nm{font-size:12px;font-weight:700;color:var(--g7)}
.su-rl{font-size:10px;color:var(--g3)}
.su-on{display:flex;align-items:center;gap:5px;margin-top:7px}
.on-d{width:6px;height:6px;border-radius:50%;background:var(--grn)}
.on-t{font-size:10px;font-weight:600;color:var(--g4)}
.sb-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--g1);flex-shrink:0}
.ss{padding:10px 8px;text-align:center;border-left:1px solid var(--g1)}
.ss:last-child{border-left:none}
.ss-v{font-size:16px;font-weight:900;color:var(--g7);line-height:1;letter-spacing:-.5px}
.ss-l{font-size:9px;font-weight:600;color:var(--g3);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.sb-nav{flex:1;overflow-y:auto;padding:10px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sg-lbl{font-size:9px;font-weight:700;color:var(--g3);letter-spacing:1px;text-transform:uppercase;padding:12px 8px 5px;display:block}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);color:var(--g4);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s;width:100%;text-align:right;margin-bottom:1px}
.ni:hover{background:var(--g0);color:var(--g6)}
.ni.on{background:var(--acc);color:#fff}
.ni-ic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:6px}
.ni:hover .ni-ic{background:var(--g1)}
.ni.on .ni-ic{background:rgba(255,255,255,.12)}
.ni-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{flex:1}
.nbdg{font-size:9px;font-weight:800;min-width:18px;height:18px;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;background:#fef3c7;color:#92400e}
.ni.on .nbdg{background:rgba(255,255,255,.2);color:#fff}
.sb-ft{padding:10px;border-top:1px solid var(--g1);flex-shrink:0}
.main{margin-right:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh;max-width:calc(100vw - var(--sb));overflow:hidden}
.topbar{height:var(--tb);background:var(--w);border-bottom:1px solid var(--g1);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px}
.bc span{font-size:12px;font-weight:500}
.bch{color:var(--g3)}.bcs{color:var(--g2);font-size:10px}.bcc{color:var(--g7);font-weight:700}
.tb-r{display:flex;align-items:center;gap:6px}
.tb-clk{font-size:11px;font-weight:700;color:var(--g4);background:var(--g0);border:1px solid var(--g2);border-radius:6px;padding:4px 10px;letter-spacing:.3px;font-variant-numeric:tabular-nums}
.ib{width:30px;height:30px;border-radius:7px;border:1px solid var(--g2);background:var(--w);display:flex;align-items:center;justify-content:center;color:var(--g4);cursor:pointer;transition:all .12s;position:relative}
.ib:hover{background:var(--g0);border-color:var(--g3);color:var(--g6)}
.ib svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ndot{position:absolute;top:4px;left:4px;width:6px;height:6px;border-radius:50%;background:var(--amb);border:1.5px solid #fff}
.pg{padding:24px;flex:1}
.pghd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pg-t{font-size:19px;font-weight:800;color:var(--g7);letter-spacing:-.4px}
.pg-s{font-size:12px;color:var(--g3);margin-top:3px}
.pghd-r{display:flex;gap:7px;align-items:center;flex-shrink:0}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:18px}
.sc{background:var(--w);border:1px solid var(--g2);border-radius:var(--r2);padding:16px;transition:box-shadow .15s;cursor:default}
.sc:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.sc-ic{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sc-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sc-v{font-size:24px;font-weight:900;color:var(--g7);letter-spacing:-.6px;line-height:1;margin-bottom:4px}
.sc-l{font-size:11px;font-weight:500;color:var(--g3)}
.sc-bar{height:2px;background:var(--g1);border-radius:2px;margin-top:12px}
.sc-fill{height:100%;border-radius:2px}
.card{background:var(--w);border:1px solid var(--g2);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--g1);gap:10px;flex-wrap:wrap;min-height:44px}
.ch-l{display:flex;align-items:center;gap:9px}
.ch-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-ic svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ch-t{font-size:13px;font-weight:700;color:var(--g7)}
.ch-s{font-size:10px;color:var(--g3);margin-top:1px}
.cb{padding:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .12s;white-space:nowrap;font-family:inherit;line-height:1}
.btn:active{transform:scale(.97)}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-dk{background:var(--acc);color:#fff;border-color:var(--acc)}.btn-dk:hover{background:var(--g6)}
.btn-gn{background:#dcfce7;color:#166534;border-color:#bbf7d0}.btn-gn:hover{background:#bbf7d0}
.btn-rd{background:#fee2e2;color:#991b1b;border-color:#fecaca}.btn-rd:hover{background:#fecaca}
.btn-am{background:#fef3c7;color:#92400e;border-color:#fde68a}.btn-am:hover{background:#fde68a}
.btn-bl{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}.btn-bl:hover{background:#bfdbfe}
.btn-gh{background:var(--g0);color:var(--g5);border-color:var(--g2)}.btn-gh:hover{background:var(--g1);border-color:var(--g3)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 7px;font-size:10px;border-radius:5px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bdg::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bdg-new{background:#dbeafe;color:#1e40af}.bdg-new::before{background:var(--blu)}
.bdg-open{background:#dcfce7;color:#166534}.bdg-open::before{background:var(--grn)}
.bdg-prog{background:#fef3c7;color:#92400e}.bdg-prog::before{background:var(--amb)}
.bdg-done{background:#f4f4f5;color:#3f3f46}.bdg-done::before{background:var(--g5)}
.bdg-rej{background:#fee2e2;color:#991b1b}.bdg-rej::before{background:var(--red)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;background:var(--g1);font-size:10px;font-weight:600;color:var(--g4)}
.chip svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.fbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.sbox{flex:1;min-width:180px;display:flex;align-items:center;gap:7px;background:var(--g0);border:1px solid var(--g2);border-radius:7px;padding:0 11px;transition:border-color .12s}
.sbox:focus-within{border-color:var(--g5)}
.sbox svg{width:12px;height:12px;stroke:var(--g3);fill:none;stroke-width:1.8;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.sbox input{border:none;background:transparent;font-size:12px;padding:7px 0;flex:1;color:var(--g7);font-family:inherit}
.sbox input::placeholder{color:var(--g3)}
.fsel{padding:7px 10px;border:1px solid var(--g2);border-radius:7px;font-size:11px;font-weight:500;background:var(--g0);color:var(--g5);cursor:pointer;font-family:inherit;transition:border-color .12s}
.fsel:focus{border-color:var(--g5);outline:none}
/* PROJECT CARD for provider */
.pc{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;transition:box-shadow .15s;border-right:2px solid transparent}
.pc:hover{box-shadow:0 1px 8px rgba(0,0,0,.06)}
.pc-new{border-right-color:var(--blu)}.pc-open{border-right-color:var(--grn)}.pc-prog{border-right-color:var(--amb)}.pc-done{border-right-color:var(--g5)}.pc-rej{border-right-color:var(--red)}
.pc-num{font-size:9px;font-weight:700;color:var(--g3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.pc-tit{font-size:14px;font-weight:700;color:var(--g7);line-height:1.3;margin-bottom:8px;letter-spacing:-.2px}
.pc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pc-desc{font-size:11.5px;color:var(--g4);line-height:1.7;padding:8px 11px;background:var(--g0);border-radius:6px;margin-bottom:10px;border-right:2px solid var(--g2)}
.pc-acts{display:flex;gap:5px;flex-wrap:wrap}
/* BID FORM */
.bf{background:var(--g0);border:1px solid var(--g2);border-radius:8px;padding:14px;margin-top:10px}
.bf-t{font-size:11px;font-weight:700;color:var(--g5);margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl{font-size:11px;font-weight:700;color:var(--g5)}
.fh{color:var(--g3);font-weight:400}
.fi{padding:8px 11px;border:1px solid var(--g2);border-radius:7px;font-size:12px;background:var(--w);color:var(--g7);transition:border-color .12s;width:100%;font-family:inherit}
.fi:focus{border-color:var(--g5)}
.fi::placeholder{color:var(--g3)}
.fis{padding:8px 11px;border:1px solid var(--g2);border-radius:7px;font-size:12px;background:var(--w);color:var(--g5);cursor:pointer;width:100%;font-family:inherit;transition:border-color .12s}
.fis:focus{border-color:var(--g5);outline:none}
.fta{padding:8px 11px;border:1px solid var(--g2);border-radius:7px;font-size:12px;resize:vertical;min-height:72px;width:100%;color:var(--g7);line-height:1.6;font-family:inherit;background:var(--w);transition:border-color .12s}
.fta:focus{border-color:var(--g5)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Bid card */
.bdc{border:1px solid var(--g2);border-radius:8px;padding:12px;margin-bottom:8px;background:var(--g0)}
.bdc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.bdc-pr{font-size:16px;font-weight:900;color:var(--g7);letter-spacing:-.4px}
.bdc-due{font-size:10px;color:var(--g3);font-weight:600}
.bdc-note{font-size:11.5px;color:var(--g4);line-height:1.6}
.bdc-st{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.bdc-pend{background:#fef3c7;color:#92400e}.bdc-acc{background:#dcfce7;color:#166534}.bdc-rej{background:#fee2e2;color:#991b1b}
/* Review card */
.rvc{border:1px solid var(--g2);border-radius:8px;padding:13px;margin-bottom:7px;background:var(--w)}
.rv-av{width:28px;height:28px;border-radius:6px;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rv-nm{font-size:12px;font-weight:700;color:var(--g7)}
.rv-sb{font-size:10px;color:var(--g3);margin-top:1px}
.sts{font-size:12px;letter-spacing:1px}
.rv-body{font-size:11.5px;color:var(--g4);background:var(--g0);padding:8px 11px;border-radius:6px;line-height:1.7;margin-top:9px}
/* Info block */
.ib-bl{background:var(--g0);border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid var(--g1)}
.ib-t{font-size:9px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--g1)}
.ir:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--g3)}
.iv{font-size:11px;font-weight:700;color:var(--g6)}
/* Alerts */
.alt{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:7px;margin-bottom:10px;font-size:11.5px;line-height:1.5;font-weight:500}
.alt svg{width:13px;height:13px;flex-shrink:0;margin-top:1px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.alt-i{background:#dbeafe;color:#1e40af}.alt-i svg{stroke:#2563eb}
.alt-w{background:#fef3c7;color:#92400e}.alt-w svg{stroke:#d97706}
.alt-s{background:#dcfce7;color:#166534}.alt-s svg{stroke:#16a34a}
/* Toggle */
.set-r{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--g1)}
.set-r:last-child{border-bottom:none}
.set-i{flex:1}
.set-t{font-size:12px;font-weight:700;color:var(--g7);margin-bottom:2px}
.set-d{font-size:10px;color:var(--g3)}
.tgl{position:relative;flex-shrink:0;cursor:pointer}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-tr{width:34px;height:19px;border-radius:20px;background:var(--g2);transition:background .15s;position:relative;border:1px solid var(--g2)}
.tgl input:checked + .tgl-tr{background:var(--acc);border-color:var(--acc)}
.tgl-th{position:absolute;top:2px;right:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:right .15s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.tgl input:checked + .tgl-tr .tgl-th{right:17px}
.dv{height:1px;background:var(--g1);margin:12px 0}
.c2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
.pr{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.pr-l{font-size:11px;font-weight:500;color:var(--g4);min-width:80px;text-align:right}
.pr-tr{flex:1;height:3px;background:var(--g1);border-radius:3px;overflow:hidden}
.pr-br{height:100%;border-radius:3px}
.pr-n{font-size:11px;font-weight:700;color:var(--g4);min-width:22px}
.ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.modal{background:var(--w);border:1px solid var(--g2);border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--g1);position:sticky;top:0;background:var(--w);z-index:2;border-radius:14px 14px 0 0}
.mh-l{display:flex;align-items:center;gap:9px}
.m-ic{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.m-ic svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.m-tit{font-size:14px;font-weight:700;color:var(--g7);letter-spacing:-.2px}
.m-cls{width:26px;height:26px;border-radius:6px;background:var(--g1);color:var(--g4);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .12s}
.m-cls:hover{background:var(--g2);color:var(--g7)}
.mb{padding:18px}
.mf{display:flex;gap:6px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--g1);background:var(--g0);border-radius:0 0 14px 14px}
.ls{display:flex;flex-direction:column;align-items:center;padding:48px 24px}
.spin{width:24px;height:24px;border:2px solid var(--g2);border-top-color:var(--g6);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
.ls-t{font-size:12px;color:var(--g3)}
.es{display:flex;flex-direction:column;align-items:center;padding:36px 24px;text-align:center}
.es-ic{width:40px;height:40px;border-radius:10px;background:var(--g0);border:1px solid var(--g2);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.es-ic svg{width:17px;height:17px;stroke:var(--g3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.es-t{font-size:13px;font-weight:700;color:var(--g5);margin-bottom:3px}
.es-s{font-size:11px;color:var(--g3)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--g7);color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .2s cubic-bezier(.34,1.56,.64,1);pointer-events:none;display:flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:'Tajawal',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.t-ic{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.t-s{background:var(--grn)}.t-e{background:var(--red)}.t-i{background:var(--g5)}
.mob-btn{display:none;position:fixed;top:9px;left:9px;z-index:500;width:34px;height:34px;border-radius:7px;background:var(--acc);border:none;cursor:pointer;align-items:center;justify-content:center}
.mob-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:250}

<script>

const CATS=['تبريد وتكييف','كهرباء','سباكة','نجارة','تنظيف','نقل عفش','حدادة','ألمنيوم','مسابح','كاميرات مراقبة','شبكات وإنترنت','مظلات وسواتر','عزل حراري','أبواب','جبس وطباشير','مكافحة حشرات','أخرى'];
const CITIES=['الرياض','جدة','مكة المكرمة','المدينة المنورة','الدمام','الخبر','الظهران','الأحساء','الطائف','تبوك','بريدة','خميس مشيط','أبها','نجران','جيزان','حائل','ينبع','الجبيل','القطيف','سكاكا','عرعر','الباحة','الرس','رابغ','بيشة','وادي الدواسر','الزلفي','القريات'];

let allProjects=[],myBids=[],myProjects=[];

document.getElementById('sbAv').textContent=(me.name||'م')[0];
document.getElementById('sbNm').textContent=me.name||'المزود';
setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('ar-SA',{hour12:false});},1000);

async function api(path,opts={}){try{const r=await fetch(API+path,{headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},...opts});return await r.json();}catch{return{};}}
let tT;
function toast(msg,type='info'){const el=document.getElementById('toast');document.getElementById('tIc').textContent=type==='success'?'✓':type==='error'?'✕':'i';document.getElementById('tIc').className=`t-ic t-${type==='success'?'s':type==='error'?'e':'i'}`;document.getElementById('tMsg').textContent=msg;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),3200);}
function openM(title,body,foot,iSvg,iBg='#f4f4f5'){document.getElementById('mTit').textContent=title;document.getElementById('mBd').innerHTML=body;document.getElementById('mFt').innerHTML=foot||'';const ic=document.getElementById('mIc');ic.innerHTML=iSvg||'';ic.style.background=iBg;if(iSvg){const s=ic.querySelector('svg');if(s)s.style.cssText='width:12px;height:12px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round';}document.getElementById('ov').classList.add('show');}
function closeM(){document.getElementById('ov').classList.remove('show');}
function setPage(h){document.getElementById('pg').innerHTML=h;}
function loading(){setPage(`<div class="ls"><div class="spin"></div><div class="ls-t">جاري التحميل…</div></div>`);}
function openSb(){document.getElementById('sb').classList.add('open');document.getElementById('mobOv').classList.add('show');}
function closeSb(){document.getElementById('sb').classList.remove('open');document.getElementById('mobOv').classList.remove('show');}
function logout(){localStorage.clear();location.href='auth.html';}

const TITLES={home:'الرئيسية',browse:'تصفح المشاريع',mybids:'عروضي',myprojects:'مشاريعي',reviews:'تقييماتي',profile:'الملف الشخصي',notifications:'الإشعارات'};
function go(page,btn){document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));if(btn)btn.classList.add('on');document.getElementById('pgT').textContent=TITLES[page]||page;({home:pgHome,browse:pgBrowse,mybids:pgMyBids,myprojects:pgMyProjects,reviews:pgReviews,profile:pgProfile,notifications:pgNotifications}[page]||pgHome)();closeSb();}

function S(p,c='currentColor'){return`<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}
const I={
  proj:`<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>`,
  send:`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,
  star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
  chk:`<polyline points="20 6 9 17 4 12"/>`,
  x:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
  eye:`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
  edit:`<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>`,
  map:`<path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>`,
  dol:`<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>`,
  cal:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
  usr:`<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
  bell:`<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>`,
  tool:`<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>`,
  bars:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
  save:`<path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>`,
  fold:`<path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>`,
};
const ac=(id)=>AVC[(id||0)%AVC.length];
const al=(n)=>(n||'؟')[0];
const sts=(n)=>[1,2,3,4,5].map(i=>`<span style="color:${i<=Math.round(n)?'#f59e0b':'#e4e4e7'}">★</span>`).join('');
const fdt=(d)=>d?new Date(d).toLocaleDateString('ar-SA'):'—';
const fpr=(p)=>p?Number(p).toLocaleString('ar-SA')+' ر.س':'—';
const cityOpts=(s='')=>`<option value="">اختر</option>`+CITIES.map(c=>`<option${c===s?' selected':''}>${c}</option>`).join('');
const catOpts=(s='')=>`<option value="">اختر</option>`+CATS.map(c=>`<option${c===s?' selected':''}>${c}</option>`).join('');

/* ══ HOME ══ */
async function pgHome(){
  loading();
  const [profile,bids]=await Promise.all([api('/api/provider/profile'),api('/api/provider/bids')]);
  const p=profile||{};myBids=Array.isArray(bids)?bids:[];myProjects=myBids.filter(b=>b.status==='accepted');
  const acceptedBids=myBids.filter(b=>b.status==='accepted').length;
  const pendingBids=myBids.filter(b=>b.status==='pending').length;
  const doneProjects=myProjects.filter(p=>p.status==='completed').length;
  document.getElementById('sProj').textContent=myProjects.length;
  document.getElementById('sBids').textContent=myBids.length;
  document.getElementById('sRat').textContent=p.avg_rating?Number(p.avg_rating).toFixed(1):'—';
  setPage(`
    <div class="pghd"><div><div class="pg-t">مرحباً، ${me.name||'المزود'} 👋</div><div class="pg-s">لوحة تحكم المزود</div></div><div class="pghd-r"><button class="btn btn-dk btn-sm" onclick="go('browse',null)">${S('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>')} تصفح مشاريع</button></div></div>
    <div class="sg">
      <div class="sc"><div class="sc-ic" style="background:#dbeafe;color:#1d4ed8">${S(I.proj,'#1d4ed8')}</div><div class="sc-v">${myProjects.length}</div><div class="sc-l">مشاريعي</div></div>
      <div class="sc"><div class="sc-ic" style="background:#dcfce7;color:#16a34a">${S(I.send,'#16a34a')}</div><div class="sc-v">${acceptedBids}</div><div class="sc-l">عروض مقبولة</div></div>
      <div class="sc"><div class="sc-ic" style="background:#fef3c7;color:#d97706">${S(I.send,'#d97706')}</div><div class="sc-v">${pendingBids}</div><div class="sc-l">عروض معلقة</div></div>
      <div class="sc"><div class="sc-ic" style="background:#f4f4f5;color:#3f3f46">${S(I.chk,'#3f3f46')}</div><div class="sc-v">${doneProjects}</div><div class="sc-l">مشاريع مكتملة</div></div>
      <div class="sc"><div class="sc-ic" style="background:#fef3c7;color:#d97706">${S(I.star,'#d97706')}</div><div class="sc-v">${p.avg_rating?Number(p.avg_rating).toFixed(1):'—'}</div><div class="sc-l">متوسط التقييم</div></div>
      <div class="sc"><div class="sc-ic" style="background:#f4f4f5;color:#3f3f46">${S(I.usr,'#3f3f46')}</div><div class="sc-v">${p.completed_projects||0}</div><div class="sc-l">مشاريع أنجزتها</div></div>
    </div>
    <div class="c2">
      <div class="card">
        <div class="ch"><div class="ch-l"><div class="ch-ic" style="background:#dbeafe;color:#1d4ed8">${S(I.proj,'#1d4ed8')}</div><div><div class="ch-t">مشاريعي الجارية</div><div class="ch-s">${myProjects.filter(p=>p.status==='in_progress').length} مشروع</div></div></div><button class="btn btn-gh btn-sm" onclick="go('myprojects',null)">عرض الكل</button></div>
        <div class="cb">${myProjects.filter(p=>p.status==='in_progress').slice(0,4).map(proj=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--g1)"><div style="min-width:0;flex:1;margin-left:10px"><div style="font-size:12.5px;font-weight:700;color:var(--g7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px">${proj.title}</div><div style="font-size:10px;color:var(--g3)">${proj.city||'—'} • ${fdt(proj.created_at)}</div></div><span class="bdg bdg-prog">جارٍ</span></div>`).join('')||`<div class="es" style="padding:18px"><div class="es-t">لا يوجد مشاريع جارية</div></div>`}</div>
      </div>
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="ch"><div class="ch-l"><div class="ch-ic" style="background:#f4f4f5;color:#3f3f46">${S(I.send,'#3f3f46')}</div><div><div class="ch-t">آخر عروضي</div></div></div><button class="btn btn-gh btn-sm" onclick="go('mybids',null)">عرض الكل</button></div>
          <div class="cb">${myBids.slice(0,4).map(b=>{const sc=b.status==='accepted'?'bdg-open':b.status==='rejected'?'bdg-rej':'bdg-new';const sl=b.status==='accepted'?'مقبول':b.status==='rejected'?'مرفوض':'معلق';return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--g1)"><div style="flex:1;min-width:0;margin-left:8px"><div style="font-size:12px;font-weight:700;color:var(--g7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.request_title||'—'}</div><div style="font-size:11px;color:var(--g3);margin-top:2px">${fpr(b.price)}</div></div><span class="bdg ${sc}">${sl}</span></div>`;}).join('')||`<div class="es" style="padding:16px"><div class="es-t">لا يوجد عروض</div></div>`}</div>
        </div>
        <div class="card">
          <div class="ch"><div class="ch-l"><div class="ch-ic" style="background:#fef3c7;color:#d97706">${S(I.star,'#d97706')}</div><div class="ch-t">ملف المزود</div></div><button class="btn btn-gh btn-sm" onclick="go('profile',null)">تعديل</button></div>
          <div class="cb">
            <div class="ib-bl">
              <div class="ir"><span class="ik">التخصصات</span><span class="iv" style="font-size:10px">${(p.specialties||[]).slice(0,3).join('، ')||'—'}</span></div>
              <div class="ir"><span class="ik">المدينة</span><span class="iv">${p.city||'—'}</span></div>
              <div class="ir"><span class="ik">الوسام</span><span class="iv">${p.badge&&p.badge!=='none'?{verified:'موثق ✓',star:'متميز ⭐',partner:'شريك 💎',top:'الأفضل 🏆'}[p.badge]||p.badge:'—'}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>`);
}

/* ══ BROWSE ══ */
async function pgBrowse(){
  loading();allProjects=await api('/api/requests')||[];
  const openProjs=allProjects.filter(p=>p.status==='open');
  const nb=document.getElementById('nbNew');if(nb){nb.style.display=openProjs.length?'':'none';nb.textContent=openProjs.length;}
  setPage(`<div class="pghd"><div><div class="pg-t">تصفح المشاريع</div><div class="pg-s">${openProjs.length} مشروع متاح</div></div></div>
    <div class="card"><div class="cb">
      <div class="fbar">
        <div class="sbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="bQ" placeholder="ابحث…" oninput="filterBrowse()"></div>
        <select class="fsel" id="bCat" onchange="filterBrowse()"><option value="">كل التصنيفات</option>${CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        <select class="fsel" id="bCit" onchange="filterBrowse()"><option value="">كل المدن</option>${CITIES.map(c=>`<option>${c}</option>`).join('')}</select>
      </div>

function bidModal(projectId,projectTitle){
  openM(`تقديم عرض — ${projectTitle}`,
    `<div class="g2">

       <div class="fg"><label class="fl">مدة التنفيذ (أيام) <span class="fh">*</span></label><input type="number" class="fi" id="bDays" placeholder="7"></div>
     </div>
     <div class="fg"><label class="fl">رسالتك للعميل <span class="fh">*</span></label><textarea class="fta" style="min-height:140px;white-space:pre-wrap;line-height:1.8" id="bNote" placeholder="اشرح خبرتك وكيف ستنفذ المشروع…"></textarea></div>`,
    `<button class="btn btn-gh" onclick="closeM()">إلغاء</button><button class="btn btn-dk" onclick="submitBid(${projectId})">${S(I.send)} إرسال العرض</button>`,
    `<svg viewBox="0 0 24 24">${I.send}</svg>`,'#f4f4f5');
}
async function submitBid(projectId){
  const price=document.getElementById('bPrice')?.value?.trim();const days=document.getElementById('bDays')?.value?.trim();const note=document.getElementById('bNote')?.value?.trim();
  if(!price||!days||!note){toast('السعر والمدة والرسالة مطلوبة','error');return;}
  const res=await api(`/api/requests/${projectId}/bids`,{method:'POST',body:JSON.stringify({price:parseFloat(price),days:parseInt(days),note})});
  if(res.message&&!res.id&&!res.bid_id){toast(res.message||'حدث خطأ','error');return;}
  closeM();toast('تم إرسال عرضك ✅','success');
}

        <a href="https://wa.me/966${r.client_phone.replace(/^0/,'')}" target="_blank" style="flex:1;text-align:center;background:#25d366;color:#fff;padding:8px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">💬 واتساب</a>
      </div>`:'<div style="font-size:12px;color:#6b7280;margin-top:4px">لم يتم إضافة رقم جوال</div>'}
    </div>`,

      <div class="fbar"><select class="fsel" id="bfSt" onchange="filterMyBids()"><option value="">كل العروض</option><option value="pending">معلقة</option><option value="accepted">مقبولة</option><option value="rejected">مرفوضة</option></select></div>

function filterMyBids(){const st=document.getElementById('bfSt')?.value||'';const el=document.getElementById('myBidList');if(el)el.innerHTML=renderMyBids(st?myBids.filter(b=>b.status===st):myBids);}
function renderMyBids(list){
  if(!list.length)return`<div class="es"><div class="es-ic">${S(I.send)}</div><div class="es-t">لا يوجد عروض</div><div class="es-s">تصفح المشاريع وقدم عروضك</div></div>`;
  return list.map(b=>{const sc=b.status==='accepted'?'bdc-acc':b.status==='rejected'?'bdc-rej':'bdc-pend';const sl=b.status==='accepted'?'مقبول':b.status==='rejected'?'مرفوض':'معلق';
    return`<div class="bdc">
      <div class="bdc-top">
        <div><div style="font-size:12.5px;font-weight:700;color:var(--g7);margin-bottom:3px">${b.request_title||'مشروع #'+b.request_id}</div><div class="bdc-due">تقديم: ${fdt(b.created_at)}</div></div>
        <span class="bdc-st ${sc}">${sl}</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:7px"><span class="chip">${fpr(b.price)}</span>${b.delivery_days?`<span class="chip">${b.delivery_days} يوم</span>`:''}</div>
      ${b.note?`<div class="bdc-note" style="white-space:pre-wrap;line-height:1.8">${b.note}</div>`:''}

  }).join('');

async function deleteBid(id){if(!confirm('سحب هذا العرض؟'))return;await api(`/api/bids/${id}`,{method:'DELETE'});toast('تم سحب العرض','error');pgMyBids();}
