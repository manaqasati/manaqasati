<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة المزود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>

:root{
  --p:#1B3A6B;--p2:#142d54;--p3:#2C5282;
  --p-light:#e8eef7;--p-mid:#c5d6ee;
  --gold:#F0A500;--gold-d:#c78500;--gold-l:#fff8e7;--gold-soft:#fef3cd;
  --text:#0d1f3c;--text2:#2d4a6e;--muted:#6b85a8;--hint:#9db3cc;
  --border:#dce5f0;--border2:#b8cde4;
  --bg:#f4f7fb;--white:#fff;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ══ SIDEBAR ══ */
.side{
  width:260px;background:var(--white);
  border-left:1px solid var(--border);
  height:100vh;position:fixed;right:0;top:0;
  display:flex;flex-direction:column;z-index:100;
  box-shadow:4px 0 24px rgba(27,58,107,0.07)
}
.side-head{padding:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.side-brand{background:linear-gradient(135deg,var(--p),var(--p3));padding:18px 18px 14px;position:relative;overflow:hidden}
.side-brand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.net-svg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.25}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;position:relative;z-index:1;margin-top:2px}
.user-pill{margin:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.av{width:36px;height:36px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av-name{font-size:13px;font-weight:800;color:#fff}
.av-role{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;margin-top:1px}
.nav{padding:10px 10px;flex:1;overflow-y:auto}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-sec{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.8px;padding:0 8px;margin:14px 0 6px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:all .18s;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--p-light);color:var(--p)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--p);box-shadow:0 3px 10px rgba(27,58,107,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor}
.badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
.side-foot{padding:10px 12px;border-top:1px solid var(--border)}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--red-l)}

/* ══ MAIN ══ */
.main{margin-right:260px;min-height:100vh;display:flex;flex-direction:column;min-width:0}

/* ══ TOPBAR ══ */
.topbar{background:var(--white);height:58px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:800;color:var(--text)}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 12px rgba(240,165,0,.3)}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px);box-shadow:0 5px 16px rgba(240,165,0,.35)}
.btn-new svg{flex-shrink:0}

/* ══ CONTENT ══ */
.content{padding:24px 28px;flex:1}
.page{display:none}.page.on{display:block}

/* ══ HERO ══ */
.hero{background:var(--p);border-radius:var(--radius-lg);padding:26px 30px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.hero-net{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(240,165,0,.15);border:1px solid rgba(240,165,0,.3);color:var(--gold);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.hero-t h2{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.3}
.hero-t p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6}
.hero-btn{background:var(--gold);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .18s;flex-shrink:0;position:relative;z-index:1;box-shadow:0 4px 14px rgba(240,165,0,.35)}
.hero-btn:hover{background:var(--gold-d);transform:translateY(-2px)}

/* ══ STATS ══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);border-radius:0 0 var(--radius) var(--radius)}
.sc.gold::after{background:var(--gold)}
.sc.navy::after{background:var(--p)}
.sc.green::after{background:var(--green)}
.sc.blue::after{background:var(--p3)}
.sc:hover{border-color:var(--p-mid);box-shadow:0 4px 16px rgba(27,58,107,.08)}
.sic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sic.a{background:var(--p-light)}.sic.a svg{stroke:var(--p)}
.sic.y{background:var(--gold-l)}.sic.y svg{stroke:var(--gold-d)}
.sic.g{background:var(--green-l)}.sic.g svg{stroke:var(--green)}
.sic.b{background:var(--p-light)}.sic.b svg{stroke:var(--p3)}
.sn{font-size:26px;font-weight:900;color:var(--text);line-height:1}
.st{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}

/* ══ CARDS ══ */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card-accent{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.ch-l{display:flex;align-items:center;gap:8px}
.ch-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch h3{font-size:14px;font-weight:800;color:var(--text)}
.ch-link{font-size:12px;color:var(--p);font-weight:700;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:3px}
.ch-link:hover{color:var(--p2)}

/* ══ REQUEST ITEMS - محسّنة ══ */
.ri{
  background:var(--white);
  border:1.5px solid var(--border);
  border-right:4px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
  transition:all .2s cubic-bezier(.34,1.2,.64,1);
  cursor:pointer;
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:start;
  position:relative;
  overflow:hidden
}
.ri:last-child{margin-bottom:0}
.ri:hover{
  border-color:var(--p-mid);
  border-right-color:var(--p);
  box-shadow:0 4px 16px rgba(27,58,107,.1);
  transform:translateY(-1px)
}
.ri-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:7px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ri-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.rm{
  font-size:11px;color:var(--muted);
  display:inline-flex;align-items:center;gap:3px;
  font-weight:600;
  background:var(--bg);
  padding:3px 8px;border-radius:20px;
  border:1px solid var(--border)
}
.ri-actions{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-top:11px;padding-top:10px;
  border-top:1px solid var(--border);
  grid-column:1/-1
}
.tag{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:.3px}
.tag::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-open{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}.t-open::before{background:#16a34a}
.t-prog{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}.t-prog::before{background:#2563eb}
.t-done{background:#fff8e7;color:#b45309;border:1px solid #fde68a}.t-done::before{background:#F0A500}
.t-rev{background:#fef3c7;color:#92400e;border:1px solid #fde68a}.t-rev::before{background:#d97706}

/* ══ BUTTONS ══ */
.btn-sm{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.bs-p{background:var(--p-light);color:var(--p)}.bs-p:hover{background:var(--p-mid)}
.bs-g{background:var(--green-l);color:var(--green)}.bs-g:hover{background:#bbf7d0}
.bs-r{background:var(--red-l);color:var(--red)}.bs-r:hover{background:#fecaca}
.btn-p{padding:12px 22px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s}
.btn-p:hover{background:var(--p2);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-s{padding:12px 16px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* ══ FORM ══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--white);transition:all .18s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.08)}
.fg textarea{min-height:100px;resize:vertical}
.form-btns{display:flex;gap:8px;margin-top:16px}

/* ══ BIDS ══ */
.bid-item{border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:10px;transition:all .2s}
.bid-item:hover{border-color:var(--p-mid)}
.bid-item.accepted{border-color:var(--green);background:linear-gradient(135deg,rgba(22,163,74,.04),rgba(22,163,74,.08))}
.bid-item.rejected{opacity:.45}
.bid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.bid-name{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.bid-price{font-size:20px;font-weight:900;color:var(--p)}
.bid-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.bid-note{font-size:12px;color:#475569;line-height:1.7;margin-bottom:10px;font-style:italic;padding:8px 12px;background:var(--bg);border-radius:8px;border-right:3px solid var(--border2)}
.bid-actions{display:flex;gap:6px}
.stars-row{color:#f59e0b;font-size:12px;letter-spacing:1px}

/* ══ CHAT ══ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 340px);min-height:260px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);border-radius:12px;margin-bottom:10px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.msg-me{background:var(--p);color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px}
.msg-other{background:var(--white);border:1px solid var(--border);align-self:flex-start;border-radius:16px 16px 16px 4px}
.msg-name{font-size:10px;font-weight:700;margin-bottom:2px;opacity:.65}
.msg-time{font-size:10px;opacity:.5;margin-top:3px;text-align:left}
.chat-input{display:flex;gap:8px}
.chat-inp{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:.18s}
.chat-inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.07)}
.chat-send{padding:11px 18px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;white-space:nowrap}
.chat-send:hover{background:var(--p2)}

/* ══ NOTIFS ══ */
.notif-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);transition:.15s;cursor:pointer}
.notif-item:hover{background:var(--bg)}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:var(--p-light)}
.notif-ic{width:38px;height:38px;border-radius:11px;background:var(--p-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.notif-title{font-size:13px;font-weight:800;margin-bottom:2px}
.notif-body{font-size:11px;color:var(--muted);line-height:1.5}
.notif-time{font-size:10px;color:var(--hint);margin-top:3px}

/* ══ DETAIL HEAD ══ */
.req-detail-head{background:var(--p);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.req-detail-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.rdh-title{font-size:20px;font-weight:900;margin-bottom:10px}
.rdh-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.8}
.rdh-meta span{display:flex;align-items:center;gap:4px}
.rdh-desc{margin-top:12px;font-size:13px;line-height:1.8;opacity:.85}

/* ══ TABS ══ */
.tab-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;background:var(--bg);border-radius:12px;padding:4px}
.tab-btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;background:none;color:var(--muted);transition:all .18s}
.tab-btn.on{background:var(--white);color:var(--p);box-shadow:0 2px 8px rgba(27,58,107,.1)}
.tab{display:none}.tab.on{display:block}

/* ══ OVERLAYS ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,5,30,.65);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column}
.modal-drag{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--white)}

/* ══ AGREEMENT MODAL ══ */
.agree-modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:540px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column}
.agree-hd{background:var(--p);padding:18px 22px;text-align:center;flex-shrink:0;position:relative}
.agree-hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.agree-hd h2{color:#fff;font-size:16px;font-weight:900;margin-bottom:3px}
.agree-hd p{color:rgba(255,255,255,.55);font-size:11px}
.agree-body{padding:18px 20px;overflow-y:auto;flex:1}
.quran-box{background:linear-gradient(135deg,#fef9e7,#fef3c7);border:2px solid var(--gold);border-radius:14px;padding:16px 18px;margin-bottom:14px;text-align:center}
.quran-title{font-size:12px;font-weight:800;color:#92400e;margin-bottom:7px}
.quran-text{font-size:13px;font-weight:700;color:#78350f;line-height:2.1}
.quran-src{font-size:11px;color:#92400e;font-weight:700;margin-top:7px}
.agree-sec{background:var(--bg);border:1px solid var(--p-mid);border-right:3px solid var(--p);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:10px}
.agree-sec-t{font-size:12px;font-weight:900;color:var(--p);margin-bottom:6px}
.agree-sec p{font-size:11px;color:var(--text);line-height:2;font-weight:500}
.agree-sec strong{color:var(--p);font-weight:800}
.note-sec{background:#fef2f2;border:1px solid #fca5a5;border-right:3px solid var(--red);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:14px}
.note-sec .agree-sec-t{color:var(--red)}
.note-sec p{font-size:11px;color:#7f1d1d;line-height:2}
.agree-summary{background:var(--p-light);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.agree-sum-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(27,58,107,.1);font-size:12px;color:var(--text)}
.agree-sum-row:last-child{border-bottom:none}
.agree-sum-ic{font-size:14px;flex-shrink:0}
.agree-sum-row strong{color:var(--p)}
.agree-check{display:flex;align-items:flex-start;gap:9px;padding:12px 14px;background:var(--gold-l);border:1px solid var(--gold-soft);border-radius:11px;cursor:pointer}
.agree-check input{width:17px;height:17px;cursor:pointer;margin-top:2px;accent-color:var(--p);flex-shrink:0}
.agree-check label{font-size:11px;font-weight:700;cursor:pointer;line-height:1.8}
.agree-foot{padding:14px 20px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0}
.btn-agree{flex:1;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.18s;box-shadow:0 3px 12px rgba(240,165,0,.3)}
.btn-agree:hover:not(:disabled){background:var(--gold-d);transform:translateY(-1px)}
.btn-agree:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-back{padding:13px 16px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ══ RATING ══ */
.stars-pick{display:flex;gap:10px;justify-content:center;margin:14px 0;direction:ltr}
.sp{font-size:36px;cursor:pointer;opacity:.25;transition:all .15s;filter:grayscale(1)}
.sp.on{opacity:1;filter:none;transform:scale(1.1)}

/* ══ EMPTY / LOADING ══ */
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty-ic{width:52px;height:52px;background:var(--p-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.empty-ic svg{stroke:var(--p)}
.empty h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty p{font-size:12px}
.loading{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.alert.ok{background:var(--green-l);color:var(--green);display:block}
.alert.err{background:var(--red-l);color:var(--red);display:block}

/* ══ PROFILE ══ */
.profile-av{width:80px;height:80px;border-radius:50%;background:var(--gold);color:var(--p2);font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:3px solid rgba(255,255,255,.2)}
.profile-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:center}
.profile-stat-n{font-size:22px;font-weight:900;color:#fff}
.profile-stat-l{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}

/* ══ SKELETON ══ */
.skel{background:linear-gradient(90deg,#f4f7fb 25%,#e8eef7 50%,#f4f7fb 75%);background-size:200%;animation:sk 1.4s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ MOB HEAD ══ */
.mob-head{display:none;background:var(--p);height:54px;padding:0 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.mob-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
.mob-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-notif{position:relative;background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:7px;color:#fff;display:flex;border-radius:9px}
.mob-notif-badge{position:absolute;top:2px;left:2px;background:var(--red);color:#fff;font-size:9px;font-weight:900;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.mob-av{width:30px;height:30px;border-radius:9px;background:var(--gold);color:var(--p2);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mob-out{background:rgba(255,255,255,.1);border:none;cursor:pointer;padding:6px;color:#fff;display:flex;border-radius:8px}

/* ══ BOTTOM NAV - محسّن ══ */
.bnav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  z-index:100;
  padding:4px 0 calc(env(safe-area-inset-bottom,0px) + 6px);
  box-shadow:0 -4px 20px rgba(27,58,107,.08)
}
.bnav::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%)
}
.bnav-inner{display:flex;align-items:flex-end}

/* أزرار التنقل العادية */
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 2px 2px;border:none;background:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;color:var(--hint);transition:.2s;position:relative
}
.bni .bic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:.2s}
.bni .bic svg{stroke:currentColor;transition:.2s}
.bni .bt{font-size:10px;font-weight:700;transition:.2s;letter-spacing:.2px}
.bni.on{color:var(--p)}
.bni.on .bt{color:var(--p)}
.bni-badge{
  position:absolute;top:4px;right:calc(50% - 22px);
  background:var(--red);color:#fff;font-size:9px;font-weight:900;
  width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  border:1.5px solid var(--white)
}

/* زر جديد FAB - محسّن */
.bni-fab{
  flex:0 0 80px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;gap:5px;
  padding-bottom:4px;
  border:none;background:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;
  position:relative;
  margin-top:-22px
}
.bni-fab .fab-circle{
  width:58px;height:58px;
  background:linear-gradient(145deg,#F0A500,#c78500);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 8px 24px rgba(240,165,0,.55),
    0 3px 8px rgba(240,165,0,.35),
    0 0 0 3px var(--white),
    0 0 0 4px rgba(240,165,0,.2);
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  z-index:1
}
.bni-fab .fab-circle::before{
  content:'';
  position:absolute;inset:-6px;border-radius:50%;
  background:rgba(240,165,0,.12);
  animation:fab-ring 2.5s ease-in-out infinite
}
@keyframes fab-ring{
  0%,100%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.15);opacity:.2}
}
.bni-fab .fab-circle svg{stroke:#fff;width:24px;height:24px;stroke-width:2.5;position:relative;z-index:1}
.bni-fab .fab-label{
  font-size:10px;font-weight:900;
  color:var(--gold-d);
  letter-spacing:.3px
}
.bni-fab:active .fab-circle{
  transform:scale(.9);
  box-shadow:0 4px 12px rgba(240,165,0,.4),0 0 0 3px var(--white)
}
.bni-fab:hover .fab-circle{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(240,165,0,.6),0 4px 10px rgba(240,165,0,.4),0 0 0 3px var(--white),0 0 0 5px rgba(240,165,0,.15)
}

/* ══ RESPONSIVE ══ */

@media(max-width:768px){

@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

var API = 'https://manaqasati-production.up.railway.app';

var _token = localStorage.getItem('token') || '';
var _me    = JSON.parse(localStorage.getItem('user') || '{}');
if (!_token || _me.role !== 'provider') { location.href = 'auth.html'; }

var _allProjs = [], _myBids = [], _myProjs = [];

// ── Helpers ──
function _el(id) { return document.getElementById(id); }
function _h(id, html) { var e=_el(id); if(e) e.innerHTML=html; }
function _esc(s) { var d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function _fpr(p) { return p ? Number(p).toLocaleString('en-US') + ' ر.س' : '—'; }
function _fdt(d) { if(!d) return '—'; try { return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return d; } }

// ── Toast ──
var _tTimer;
function showToast(msg, type) {
  var el=_el('toast'), ic=_el('tIc'), tm=_el('tMsg');
  if(!el) return;
  ic.textContent = type==='success'?'✓':type==='error'?'✕':'i';
  ic.style.background = type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--p)';
  tm.textContent = msg;
  el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tTimer);
  _tTimer = setTimeout(function(){
    el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(14px)';
  }, 3200);
}

var _pages = { home:'الرئيسية', browse:'تصفح المشاريع', works:'مشاريعي وعروضي', reviews:'تقييماتي', notifs:'الإشعارات', profile:'الملف الشخصي' };
var _curPage = 'home';

function gotoPage(page) {
  // hide all pages
  document.querySelectorAll('.page').forEach(function(p){ p.className='page'; });
  // show target
  var pg = _el('page-'+page);
  if(pg) pg.className = 'page on';

  // nav active
  document.querySelectorAll('.ni,.bni').forEach(function(b){ b.classList.remove('on'); });
  var ni = _el('ni-'+page);  if(ni) ni.classList.add('on');
  var bn = _el('bn-'+page);  if(bn) bn.classList.add('on');

  // title
  var pt = _el('pageTitle'); if(pt) pt.textContent = _pages[page] || page;
  _curPage = page;
  window.scrollTo(0,0);
  closeSidebar();

  // load content
  if(page==='home')    loadHome();
  if(page==='browse')  loadBrowse();
  if(page==='works')   loadWorks();
  if(page==='reviews') loadReviews();
  if(page==='notifs')  loadNotifs();
  if(page==='profile') loadProfile();
}

  );

async function _submitBid(projId) {
  var price = (_el('bid-price')||{}).value;
  var days  = (_el('bid-days')||{}).value;
  var note  = (_el('bid-note')||{}).value;
  if(!price||parseFloat(price)<=0){ showToast('أدخل سعر العرض','error'); return; }
  if(!days||parseInt(days)<=0){ showToast('أدخل مدة التنفيذ','error'); return; }
  if(!note.trim()){ showToast('أدخل رسالتك للعميل','error'); return; }
  var r = await _api('/api/requests/'+projId+'/bids', { method:'POST', body: JSON.stringify({price:parseFloat(price),days:parseInt(days),note:note.trim()}) });
  if(r && (r.id || r.request_id)){ closeModal(); showToast('تم إرسال عرضك بنجاح','success'); }
  else showToast(r.message||'حدث خطأ','error');
}

      '</div>' +
    '</div>' +
    imgsHtml +
    (r.description?'<div style="background:var(--bg);border-right:3px solid var(--border);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:12px;font-size:12px;line-height:1.8;color:var(--text2)">'+_esc(r.description)+'</div>':'') +
    '<div style="background:var(--bg);border-radius:9px;padding:12px 14px;margin-bottom:12px">' +

      '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;color:var(--muted)">الموعد النهائي</span><span style="font-size:11px;font-weight:700;color:var(--p)">'+_fdt(r.deadline)+'</span></div>' +
      '<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:11px;color:var(--muted)">صاحب الطلب</span><span style="font-size:11px;font-weight:700;color:var(--p)">'+_esc(r.client_name||'—')+'</span></div>' +
    '</div>' +
    (r.client_phone?
      '<div style="display:flex;gap:8px">' +
        '<a href="'+_waUrl(r.client_phone,r.client_name,r.title)+'" target="_blank" style="flex:1;text-align:center;background:#25d366;color:#fff;padding:10px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none">'+_WA+' واتساب</a>' +
        '<a href="tel:'+r.client_phone+'" style="text-align:center;background:var(--green-l);color:var(--green);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;border:1px solid #bbf7d0">'+_TEL+' اتصال</a>' +

    '<button onclick="closeModal();_openBidModal('+r.id+',\''+_esc(r.title).replace(/'/g,'')+'\')" style="'+_BS+';background:var(--p);color:#fff">تقديم عرض</button>';
}

// ══════════════════════════════════════════════════════════
// WORKS (مشاريعي وعروضي)
// ══════════════════════════════════════════════════════════
async function loadWorks() {
  var pg = _el('page-works');
  if(!pg) return;
  pg.innerHTML = '<div class="loading">جاري التحميل...</div>';

  _myBids = await _api('/api/provider/bids') || [];
  _myProjs = await _api('/api/provider/projects') || [];

  // جلب هاتف العميل للمقبولة
  var accepted = _myBids.filter(function(b){ return b.status==='accepted'; });
  var inprog   = _myProjs.filter(function(p){ return p.status==='in_progress'; });
  await Promise.all([].concat(accepted, inprog).map(async function(item){
    var key = 'c_'+(item.request_id||item.id);
    if(!_pCache[key]) {
      var rd = await _api('/api/requests/'+(item.request_id||item.id));
      if(rd && rd.client_phone) _pCache[key] = {phone:rd.client_phone, name:rd.client_name||''};
    }
  }));

  var acc  = _myBids.filter(function(b){ return b.status==='accepted'; }).length;
  var pend = _myBids.filter(function(b){ return b.status==='pending'; }).length;
  var prog = _myProjs.filter(function(p){ return p.status==='in_progress'; }).length;
  var done = _myProjs.filter(function(p){ return p.status==='completed'; }).length;

  pg.innerHTML =
    '<div class="pghd"><div><div class="pg-t">مشاريعي وعروضي</div><div class="pg-s">'+_myBids.length+' عرض · '+_myProjs.length+' مشروع</div></div></div>' +
    '<div class="stat-grid">' +
      '<div class="sc navy"><div class="sic a"><svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="sn">'+acc+'</div><div class="st">مقبولة</div></div></div>' +
      '<div class="sc gold"><div class="sic y"><svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="sn">'+pend+'</div><div class="st">معلقة</div></div></div>' +
      '<div class="sc blue"><div class="sic b"><svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="sn">'+prog+'</div><div class="st">جارية</div></div></div>' +
      '<div class="sc green"><div class="sic g"><svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="sn">'+done+'</div><div class="st">مكتملة</div></div></div>' +
    '</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:16px;background:var(--bg);border-radius:12px;padding:4px">' +
      '<button class="tab-btn on" id="wtab-bids" onclick="_wTab(\'bids\',this)">العروض ('+_myBids.length+')</button>' +
      '<button class="tab-btn" id="wtab-projs" onclick="_wTab(\'projs\',this)">المشاريع ('+_myProjs.length+')</button>' +
    '</div>' +
    '<div id="wtab-bids-wrap">' + _worksFilter('bids') + '<div id="bids-wrap">' + _renderBids(_myBids) + '</div></div>' +
    '<div id="wtab-projs-wrap" style="display:none">' + _worksFilter('projs') + '<div id="projs-wrap">' + _renderProjs(_myProjs) + '</div></div>';
}

function _worksFilter(type) {
  if(type==='bids') return '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">' +
    '<button onclick="_fBids(\'all\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid var(--p);background:var(--p);color:#fff;transition:all .15s" id="fb-all">الكل</button>' +
    '<button onclick="_fBids(\'accepted\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid #bbf7d0;background:var(--green-l);color:var(--green);transition:all .15s" id="fb-accepted">مقبولة</button>' +
    '<button onclick="_fBids(\'pending\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid #fde68a;background:var(--gold-l);color:#92400e;transition:all .15s" id="fb-pending">معلقة</button>' +
    '<button onclick="_fBids(\'rejected\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid #fecaca;background:var(--red-l);color:var(--red);transition:all .15s" id="fb-rejected">مرفوضة</button>' +
  '</div>';
  return '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">' +
    '<button onclick="_fProjs(\'all\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid var(--p);background:var(--p);color:#fff;transition:all .15s" id="fp-all">الكل</button>' +
    '<button onclick="_fProjs(\'in_progress\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid #fde68a;background:#fff8e7;color:#92400e;transition:all .15s" id="fp-inprog">جارية</button>' +
    '<button onclick="_fProjs(\'completed\',$event||event)" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;border:1.5px solid #bbf7d0;background:var(--green-l);color:var(--green);transition:all .15s" id="fp-done">مكتملة</button>' +
  '</div>';
}
function _wTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('on'); }); if(btn) btn.classList.add('on');
  var bw=_el('wtab-bids-wrap'), pw=_el('wtab-projs-wrap');
  if(bw) bw.style.display = tab==='bids' ? '' : 'none';
  if(pw) pw.style.display = tab==='projs' ? '' : 'none';
}
function _fBids(status, e) {
  var list = status==='all' ? _myBids : _myBids.filter(function(b){ return b.status===status; });
  var w=_el('bids-wrap'); if(w) w.innerHTML=_renderBids(list);
  // update active chip
  ['fb-all','fb-accepted','fb-pending','fb-rejected'].forEach(function(id){
    var btn=_el(id); if(!btn) return;
    var map={'fb-all':'all','fb-accepted':'accepted','fb-pending':'pending','fb-rejected':'rejected'};
    var isActive = map[id]===status;
    if(isActive){ btn.style.outline='2px solid var(--p)'; btn.style.outlineOffset='2px'; btn.style.fontWeight='900'; }
    else { btn.style.outline='none'; btn.style.fontWeight='700'; }
  });
}
function _fProjs(status, e) {
  var list = status==='all' ? _myProjs : _myProjs.filter(function(p){ return p.status===status; });
  var w=_el('projs-wrap'); if(w) w.innerHTML=_renderProjs(list);
  ['fp-all','fp-inprog','fp-done'].forEach(function(id){
    var btn=_el(id); if(!btn) return;
    var map={'fp-all':'all','fp-inprog':'in_progress','fp-done':'completed'};
    var isActive = map[id]===status;
    if(isActive){ btn.style.outline='2px solid var(--p)'; btn.style.outlineOffset='2px'; btn.style.fontWeight='900'; }
    else { btn.style.outline='none'; btn.style.fontWeight='700'; }
  });
}

function _renderBids(list) {
  if(!list.length) return _empty('لا يوجد عروض','');
  return list.map(function(b){
    var isAcc=b.status==='accepted', isRej=b.status==='rejected';
    var bg=isAcc?'#dcfce7':isRej?'#fee2e2':'#fff8e7';
    var tc=isAcc?'#15803d':isRej?'#991b1b':'#92400e';
    var bd=isAcc?'#bbf7d0':isRej?'#fecaca':'#fde68a';
    var sl=isAcc?'مقبول':isRej?'مرفوض':'<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> معلق';
    var key = 'c_'+b.request_id;
    var cd  = _pCache[key] || {};
    var ph  = cd.phone || '';
    var cBtns = _callBtns(ph, b.client_name||cd.name||'العميل', b.request_title||'المشروع');
    return '<div style="background:#fff;border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 14px rgba(27,58,107,.09)">' +
      '<div style="background:linear-gradient(135deg,#0f2548,#1B3A6B);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:relative">' +
        '<div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#F0A500,#fbbf24)"></div>' +
        '<div style="min-width:0;flex:1"><div style="font-size:15px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(b.request_title||'مشروع #'+b.request_id)+'</div>' +
        '<div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:3px">'+_fdt(b.created_at)+'</div></div>' +
        '<span style="background:'+bg+';color:'+tc+';border:1.5px solid '+bd+';padding:5px 13px;border-radius:20px;font-size:11px;font-weight:800;flex-shrink:0;margin-right:12px">'+sl+'</span>' +
      '</div>' +
      '<div style="padding:14px 20px">' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">' +
          '<span style="background:#fff8e7;color:#92400e;border:1px solid #fde68a;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:800"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> '+_fpr(b.price)+'</span>' +
          (b.days?'<span style="background:var(--p-light);color:var(--p);border:1px solid var(--p-mid);padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> '+b.days+' يوم</span>':'') +
        '</div>' +
        (b.note?'<div style="font-size:12px;color:var(--text2);line-height:1.8;padding:10px 13px;background:var(--bg);border-radius:10px;border-right:4px solid #F0A500;margin-bottom:12px">&ldquo;'+_esc(b.note)+'&rdquo;</div>':'') +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">' +
          (isAcc ? cBtns : '') +
          '<button onclick="_viewProj('+b.request_id+')" style="'+_BS+';background:var(--p-light);color:var(--p);border:1px solid var(--p-mid)"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>عرض</button>' +
          (!isAcc&&!isRej?'<button onclick="_delBid('+b.id+')" style="'+_BS+';background:var(--red-l);color:var(--red);border:1px solid #fecaca">سحب العرض</button>':'') +
        '</div>' +
      '</div></div>';
  }).join('');
}
async function _delBid(id) {
  if(!confirm('سحب هذا العرض؟')) return;
  await _api('/api/bids/'+id, {method:'DELETE'});
  showToast('تم سحب العرض','error');
  loadWorks();
}

function _renderProjs(list) {
  if(!list.length) return _empty('لا يوجد مشاريع','');
  return list.map(function(r){
    var isProg = r.status==='in_progress';
    var grad   = isProg?'135deg,#78350f,#d97706':'135deg,#0f2548,#1B3A6B';
    var stBg   = isProg?'#fff8e7':'#dcfce7', stCl=isProg?'#92400e':'#15803d', stBd=isProg?'#fde68a':'#bbf7d0';
    var key    = 'c_'+r.id;
    var cd     = _pCache[key] || {};
    var ph     = cd.phone || r.client_phone || '';
    var cBtns  = isProg ? _callBtns(ph, r.client_name||cd.name||'العميل', r.title) : '';
    return '<div style="background:#fff;border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 14px rgba(27,58,107,.09)">' +
      '<div style="background:linear-gradient('+grad+');padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:relative">' +
        '<div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#F0A500,#fbbf24)"></div>' +
        '<div style="min-width:0;flex:1">' +
          '<div style="font-size:10px;color:rgba(255,255,255,.45);margin-bottom:4px">'+(r.project_number||'#'+r.id)+'</div>' +
          '<div style="font-size:15px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+_esc(r.title)+'</div>' +
        '</div>' +
        '<span style="background:'+stBg+';color:'+stCl+';border:1.5px solid '+stBd+';padding:5px 13px;border-radius:20px;font-size:11px;font-weight:800;flex-shrink:0;margin-right:12px">'+(isProg?'<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> جارٍ':'✓ مكتمل')+'</span>' +
      '</div>' +
      '<div style="padding:14px 20px">' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">' +
          (r.city?'<span style="background:var(--p-light);color:var(--p);border:1px solid var(--p-mid);padding:4px 11px;border-radius:20px;font-size:11px"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> '+_esc(r.city)+'</span>':'') +
          (r.category?'<span style="background:var(--bg);color:var(--text2);border:1px solid var(--border);padding:4px 11px;border-radius:20px;font-size:11px">'+_esc(r.category)+'</span>':'') +
          (r.price?'<span style="background:#fff8e7;color:#92400e;border:1px solid #fde68a;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:800"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> '+_fpr(r.price)+'</span>':'') +
        '</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">' +
          '<button onclick="_viewProj('+r.id+')" style="'+_BS+';background:var(--p);color:#fff"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>عرض التفاصيل</button>' +
          cBtns +
        '</div>' +
      '</div></div>';
  }).join('');
}

async function loadReviews() {
  var pg = _el('page-reviews');
  if(!pg) return;
  pg.innerHTML = '<div class="loading">جاري التحميل...</div>';
  var list = await _api('/api/provider/reviews') || [];
  var avg  = list.length ? (list.reduce(function(s,r){ return s+(r.rating||0); },0)/list.length).toFixed(1) : '—';
  var html =
    '<div class="pghd"><div><div class="pg-t">تقييماتي</div><div class="pg-s">'+list.length+' تقييم · معدل '+avg+'★</div></div></div>' +
    '<div class="card card-accent"><div class="cb">' +
    (list.length ? list.map(function(r){
      var bg=['#1B3A6B','#2C5282','#166534','#92400e','#991b1b'][(r.reviewer_id||0)%5];
      return '<div style="border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
          '<div style="display:flex;align-items:center;gap:9px">' +
            '<div style="width:36px;height:36px;border-radius:10px;background:'+bg+';color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center">'+(r.reviewer_name||'؟')[0]+'</div>' +
            '<div><div style="font-size:13px;font-weight:800">'+_esc(r.reviewer_name||'عميل')+'</div><div style="font-size:10px;color:var(--muted)">'+_fdt(r.created_at)+'</div></div>' +
          '</div>' +
          '<div>'+_stars(r.rating)+'</div>' +
        '</div>' +
        (r.comment?'<div style="font-size:12px;color:var(--text2);background:var(--bg);padding:9px 12px;border-radius:8px;border-right:3px solid var(--gold);line-height:1.8">'+_esc(r.comment)+'</div>':'') +
      '</div>';
    }).join('') : _empty('لا يوجد تقييمات بعد','أنجز مشاريع لتحصل على تقييمات')) +
    '</div></div>';
  pg.innerHTML = html;
}

async function loadNotifs() {
  var pg = _el('page-notifs');
  if(!pg) return;
  pg.innerHTML = '<div class="loading">جاري التحميل...</div>';
  var list = await _api('/api/provider/notifications') || [];
  var unseen = list.filter(function(n){ return !n.is_read; }).length;
  var html =
    '<div class="pghd"><div><div class="pg-t">الإشعارات</div><div class="pg-s">'+unseen+' غير مقروء</div></div>' +
    (unseen?'<button class="btn-sm bs-p" onclick="_markRead()">تحديد الكل مقروء</button>':'') +
    '</div>' +
    '<div class="card card-accent"><div class="cb">' +
    (list.length ? list.map(function(n){
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)'+(n.is_read?'':';background:var(--p-light);margin:0 -18px;padding:10px 18px')+'">' +
        '<div style="width:8px;height:8px;border-radius:50%;background:'+(n.is_read?'var(--border)':'var(--p)')+';flex-shrink:0"></div>' +
        '<div style="flex:1"><div style="font-size:13px;font-weight:'+(n.is_read?'600':'800')+';color:'+(n.is_read?'var(--muted)':'var(--text)')+'">'+_esc(n.title)+'</div>' +
        (n.body?'<div style="font-size:11px;color:var(--muted);line-height:1.5">'+_esc(n.body)+'</div>':'') + '</div>' +
        '<div style="font-size:9px;color:var(--hint);flex-shrink:0">'+_fdt(n.created_at)+'</div>' +
      '</div>';
    }).join('') : _empty('لا يوجد إشعارات','')) +
    '</div></div>';
  pg.innerHTML = html;
  _api('/api/provider/notifications/read',{method:'PUT'});
  _el('nb-notif').style.display='none';
  _el('mob-nb').style.display='none';
}
async function _markRead() {
  await _api('/api/provider/notifications/read',{method:'PUT'});
  loadNotifs();
}

// ══════════════════════════════════════════════════════════
// PROFILE
// ══════════════════════════════════════════════════════════
async function loadProfile() {
  var pg = _el('page-profile');
  if(!pg) return;
  pg.innerHTML = '<div class="loading">جاري التحميل...</div>';
  var p = await _api('/api/provider/profile') || {};

  var avH = p.profile_image
    ? '<img src="'+p.profile_image+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">'
    : '<span style="font-size:28px;font-weight:900;color:var(--p2)">'+(p.name||'م')[0]+'</span>';

  var portHtml = (p.portfolio_images||[]).map(function(img,i){
    return '<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1"><img src="'+img+'" style="width:100%;height:100%;object-fit:cover">' +
      '<button onclick="_delPortImg('+i+')" style="position:absolute;top:4px;left:4px;background:rgba(220,38,38,.85);border:none;cursor:pointer;width:22px;height:22px;border-radius:50%;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1">×</button>' +
    '</div>';
  }).join('');

  var specsHtml = ['تبريد وتكييف','كهرباء','سباكة','نجارة','تنظيف','نقل عفش','حدادة','ألمنيوم','مسابح','كاميرات مراقبة','شبكات وإنترنت','مظلات وسواتر','عزل حراري','أبواب','جبس وطباشير','مكافحة حشرات','أخرى'].map(function(c){
    var on=(p.specialties||[]).includes(c);
    return '<button onclick="_togSpec(this)" class="spec-btn'+(on?' on':'')+'" style="padding:7px 14px;border-radius:20px;border:1.5px solid '+(on?'#1B3A6B':'var(--border)')+';font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;background:'+(on?'#1B3A6B':'var(--bg)')+';color:'+(on?'#fff':'var(--p)')+';transition:all .15s;margin-bottom:4px">'+c+'</button>';
  }).join(' ');

  var cityOpts = ['الرياض','جدة','الدمام','الخبر','المدينة المنورة','مكة المكرمة','الطائف','بريدة','أبها','تبوك','حائل','الباحة','جازان','نجران','ينبع','الخرج','الدوادمي','الأحساء','القطيف','الجبيل']
    .map(function(c){ return '<option'+(c===p.city?' selected':'')+'>'+c+'</option>'; }).join('');

  pg.innerHTML =
    '<div class="pghd"><div><div class="pg-t">الملف الشخصي</div><div class="pg-s">بياناتك كمزود خدمة</div></div></div>' +

    // صورة الحساب
    '<div class="card card-accent" style="margin-bottom:14px">' +
      '<div class="ch"><div class="ch-l"><div class="ch-ic" style="background:var(--p-light)"><svg width="14" height="14" fill="none" stroke="var(--p)" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><h3>صورة الحساب</h3></div></div>' +
      '<div style="display:flex;align-items:center;gap:16px">' +
        '<div id="av-preview" style="width:70px;height:70px;border-radius:50%;background:var(--p-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:3px solid var(--p-light)">'+avH+'</div>' +
        '<div>' +
          '<input type="file" id="av-inp" accept="image/*" style="display:none" onchange="_uploadAvatar(this)">' +
          '<button class="btn-sm bs-p" onclick="document.getElementById(\'av-inp\').click()">تغيير الصورة</button>' +
          (p.profile_image?'<button class="btn-sm bs-r" onclick="_removeAvatar()" style="margin-right:8px">حذف</button>':'') +
        '</div>' +
      '</div>' +
    '</div>' +

    // المعلومات
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="ch"><div class="ch-l"><h3>المعلومات الشخصية</h3></div></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
        '<div><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">الاسم الكامل</label><input id="p-name" type="text" value="'+_esc(p.name||'')+'" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none"></div>' +
        '<div><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">رقم الجوال</label><input id="p-phone" type="text" value="'+_esc(p.phone||'')+'" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none"></div>' +
        '<div style="grid-column:1/-1"><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">المدينة</label><select id="p-city" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none;color:var(--p)"><option value="">اختر المدينة</option>'+cityOpts+'</select></div>' +
        '<div style="grid-column:1/-1"><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">نبذة مختصرة</label><textarea id="p-bio" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none;min-height:80px;resize:vertical">'+_esc(p.bio||'')+'</textarea></div>' +
        '<div><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">سنوات الخبرة</label><input id="p-exp" type="number" value="'+(p.experience_years||'')+'" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none"></div>' +
      '</div>' +
    '</div>' +

    // التخصصات
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="ch"><div class="ch-l"><h3>التخصصات</h3></div><span id="specs-count" style="font-size:12px;font-weight:800;color:var(--p);background:var(--p-light);padding:4px 10px;border-radius:20px">'+(p.specialties||[]).length+'/3</span></div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+specsHtml+'</div>' +
      '<button class="btn-sm bs-p" onclick="_saveSpecs()">حفظ التخصصات</button>' +
    '</div>' +

    // معرض الأعمال
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="ch"><div class="ch-l"><h3>معرض الأعمال</h3></div><span style="font-size:11px;color:var(--muted)">'+(p.portfolio_images||[]).length+'/6</span></div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">'+portHtml +
        ((p.portfolio_images||[]).length<6?
          '<div onclick="document.getElementById(\'port-inp\').click()" style="border:2px dashed var(--border);border-radius:8px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:5px;background:var(--bg)">' +
            '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#6b85a8" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
            '<span style="font-size:11px;color:var(--muted)">إضافة</span></div>'
          : '') +
      '</div>' +
      '<input type="file" id="port-inp" accept="image/*" multiple style="display:none" onchange="_uploadPort(this)">' +
    '</div>' +

    // كلمة المرور
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="ch"><div class="ch-l"><h3>تغيير كلمة المرور</h3></div></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
        '<div><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">الحالية</label><input type="password" id="pw-old" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none"></div>' +
        '<div><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px">الجديدة</label><input type="password" id="pw-new" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Tajawal,sans-serif;font-size:13px;outline:none"></div>' +
      '</div>' +
      '<button class="btn-sm bs-p" onclick="_changePw()" style="margin-top:12px">تغيير كلمة المرور</button>' +
    '</div>' +

    // حفظ
    '<div style="position:sticky;bottom:0;background:var(--bg);padding:12px 0;border-top:1px solid var(--border)">' +
      '<button id="save-btn" onclick="_saveProfile()" style="width:100%;padding:14px;background:var(--p);border:none;color:#fff;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif;box-shadow:0 4px 16px rgba(27,58,107,.25)">حفظ جميع التغييرات</button>' +
    '</div>';
}

// Profile actions
function _togSpec(btn){
  var sel=document.querySelectorAll('.spec-btn.on');
  if(!btn.classList.contains('on')&&sel.length>=3){ showToast('الحد الأقصى 3 تخصصات','error'); return; }
  btn.classList.toggle('on');
  var on=btn.classList.contains('on');
  btn.style.background=on?'#1B3A6B':'var(--bg)'; btn.style.color=on?'#fff':'var(--p)'; btn.style.borderColor=on?'#1B3A6B':'var(--border)';
  var cnt=document.querySelectorAll('.spec-btn.on').length;
  var sc=_el('specs-count'); if(sc) sc.textContent=cnt+'/3';
}
async function _saveSpecs(){
  var specs=[...document.querySelectorAll('.spec-btn.on')].map(function(b){return b.textContent.trim();});
  var r=await _api('/api/provider/profile',{method:'PUT',body:JSON.stringify({specialties:specs,notify_categories:specs})});
  showToast(r.id?'تم حفظ التخصصات':'حدث خطأ',r.id?'success':'error');
}
async function _saveProfile(){
  var btn=_el('save-btn'); if(btn){btn.disabled=true;btn.textContent='جاري الحفظ...';}
  var r=await _api('/api/provider/profile',{method:'PUT',body:JSON.stringify({
    name:(_el('p-name')||{}).value,phone:(_el('p-phone')||{}).value,
    city:(_el('p-city')||{}).value,bio:(_el('p-bio')||{}).value,
    experience_years:parseInt((_el('p-exp')||{}).value)||null
  })});
  if(btn){btn.disabled=false;btn.textContent='حفظ جميع التغييرات';}
  if(r.id){
    _me.name=r.name; localStorage.setItem('user',JSON.stringify(_me));
    var un=_el('userName'); if(un) un.textContent=r.name;
    showToast('تم الحفظ بنجاح','success');
  } else showToast(r.message||'حدث خطأ','error');
}
async function _changePw(){
  var o=(_el('pw-old')||{}).value, n=(_el('pw-new')||{}).value;
  if(!o||!n){showToast('اكمل الحقلين','error');return;}
  var r=await _api('/api/auth/change-password',{method:'PUT',body:JSON.stringify({old_password:o,new_password:n})});
  showToast(r.ok?'تم تغيير كلمة المرور':'كلمة المرور الحالية غير صحيحة',r.ok?'success':'error');
}
function _uploadAvatar(inp){
  var f=inp.files[0]; if(!f) return;
  if(f.size>3*1024*1024){showToast('الحجم الأقصى 3MB','error');return;}
  var rd=new FileReader();
  rd.onload=async function(e){
    var img=e.target.result;
    var pr=_el('av-preview'); if(pr) pr.innerHTML='<img src="'+img+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
    _setAvatar(img); localStorage.setItem('pav_'+_me.id,img);
    await _api('/api/provider/profile',{method:'PUT',body:JSON.stringify({profile_image:img})});
    showToast('تم حفظ الصورة','success');
  };
  rd.readAsDataURL(f);
}
async function _removeAvatar(){
  await _api('/api/provider/profile',{method:'PUT',body:JSON.stringify({profile_image:null})});
  localStorage.removeItem('pav_'+_me.id); _setAvatar(null);
  showToast('تم حذف الصورة','success'); loadProfile();
}
function _uploadPort(inp){
  var files=[...inp.files]; inp.value='';
  files.forEach(function(f){
    if(f.size>5*1024*1024){showToast(f.name+': أكبر من 5MB','error');return;}
    var rd=new FileReader();
    rd.onload=async function(e){
      var r=await _api('/api/provider/profile/portfolio',{method:'POST',body:JSON.stringify({image:e.target.result})});
      if(r.ok||r.count) showToast('تم رفع الصورة','success');
      else showToast(r.message||'فشل الرفع','error');
    };
    rd.readAsDataURL(f);
  });
  setTimeout(loadProfile,1500);
}
async function _delPortImg(i){
  await _api('/api/provider/profile/portfolio/'+i,{method:'DELETE'});
  showToast('تم حذف الصورة','success'); loadProfile();
}

function _loadNotifCount(){
  _api('/api/provider/notifications').then(function(ns){
    var u=(ns||[]).filter(function(n){return!n.is_read;}).length;
    var b1=_el('nb-notif'); if(b1){b1.style.display=u?'':'none';b1.textContent=u;}
    var b2=_el('mob-nb');   if(b2){b2.style.display=u?'flex':'none';b2.textContent=u;}
  });
}
setInterval(_loadNotifCount, 30000);
