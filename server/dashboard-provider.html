<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — المزود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F8FC;--bg2:#f0f2f8;--bg3:#e8ecf4;
  --br:#e2e6f0;--br2:#c9d0e0;
  --t:#1B2B4B;--t2:#2C3E60;--t3:#6B7A99;--t4:#9aa3b8;
  --primary:#1B3A6B;
  --prov:#2C5282;--prov-l:#E6EEF8;--prov-m:#b8cce8;
  --accent:#D4973A;--accent-l:#FDF3E3;--accent-m:#f6c96b;
  --success:#1D9E75;--success-l:#E1F5EE;--success-m:#9FE1CB;
  --danger:#E24B4A;--danger-l:#FCEBEB;--danger-m:#F09595;
  --warn:#BA7517;--warn-l:#FAEEDA;--warn-m:#FAC775;
  --info:#185FA5;--info-l:#E6F1FB;--info-m:#85B7EB;
  --white:#fff;--border:rgba(27,58,107,0.11);
  --subtle:#EEF1F8;
  --sb:252px;
}
html{height:100%}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t);display:flex;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:4px}

/* ── SIDEBAR ── */
.side{width:var(--sb);background:var(--white);border-left:1px solid var(--border);height:100vh;position:fixed;right:0;top:0;display:flex;flex-direction:column;z-index:100;box-shadow:2px 0 24px rgba(27,58,107,0.08);overflow:hidden}
.side-head{padding:20px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:22px;font-weight:900;color:var(--primary);margin-bottom:12px}.logo span{color:var(--accent)}
.user-pill{background:var(--prov-l);border-radius:13px;padding:11px;display:flex;align-items:center;gap:10px}
.av{width:36px;height:36px;border-radius:10px;background:var(--prov);color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-name{font-size:13px;font-weight:800;color:var(--t)}.av-role{font-size:10px;color:var(--prov);font-weight:700;margin-top:1px}
.av-online{display:flex;align-items:center;gap:5px;margin-top:8px}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.online-txt{font-size:10px;font-weight:600;color:var(--t3)}

.side-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.ss{padding:10px 8px;text-align:center;border-left:1px solid var(--border)}
.ss:last-child{border-left:none}
.ss-v{font-size:16px;font-weight:900;color:var(--t);line-height:1}
.ss-l{font-size:9px;font-weight:600;color:var(--t4);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

.nav{padding:10px 8px;flex:1;overflow-y:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-sec{font-size:9px;font-weight:800;color:var(--t4);letter-spacing:.8px;padding:10px 8px 4px;text-transform:uppercase;display:block}
.ni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:11px;color:var(--t3);cursor:pointer;font-size:13px;font-weight:600;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:.15s;position:relative}
.ni:hover{background:var(--bg);color:var(--t)}
.ni.on{background:var(--prov-l);color:var(--prov)}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--prov)}.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor;width:14px;height:14px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{flex:1}
.nbdg{font-size:9px;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;background:var(--accent-l);color:var(--warn)}
.ni.on .nbdg{background:rgba(255,255,255,.25);color:var(--prov)}
.side-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--danger);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--danger-l)}
.logoutbtn svg{stroke:var(--danger);width:14px;height:14px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* ── MAIN ── */
.main{margin-right:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);border-top:3px solid var(--prov);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:8px}
.bc-sep{color:var(--t4);font-size:12px}
.bc-home{font-size:12px;font-weight:500;color:var(--t3)}
.bc-cur{font-size:13px;font-weight:800;color:var(--t)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-clock{font-size:11px;font-weight:700;color:var(--t3);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-variant-numeric:tabular-nums}
.tb-notif{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;position:relative}
.tb-notif:hover{background:var(--bg2);border-color:var(--br2)}
.tb-notif svg{width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.notif-dot{position:absolute;top:4px;left:4px;width:6px;height:6px;border-radius:50%;background:var(--accent);border:1.5px solid #fff;display:none}

.content{padding:22px 24px;flex:1}
.page{display:none}.page.on{display:block}

/* ── MOBILE ── */
.mob-btn{display:none;position:fixed;top:9px;left:9px;z-index:500;width:34px;height:34px;border-radius:8px;background:var(--prov);border:none;cursor:pointer;align-items:center;justify-content:center}
.mob-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(27,42,75,0.35);z-index:90;backdrop-filter:blur(3px)}
.mob-ov.show{display:block}
.mob-head{display:none;background:var(--white);border-bottom:1px solid var(--border);border-top:3px solid var(--prov);height:52px;padding:0 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-logo{font-size:18px;font-weight:900;color:var(--primary)}.mob-logo span{color:var(--accent)}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-av{width:30px;height:30px;border-radius:8px;background:var(--prov);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
.mob-out{background:none;border:none;cursor:pointer;padding:5px;color:var(--t3);display:flex}
.mob-out svg{stroke:currentColor;width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:100;padding:3px 0 calc(env(safe-area-inset-bottom,0px) + 3px)}
.bnav-inner{display:flex}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border:none;background:none;cursor:pointer;font-family:'Tajawal',sans-serif;color:var(--t3);transition:.15s}
.bni svg{stroke:currentColor;width:20px;height:20px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.bni .bt{font-size:9px;font-weight:700}
.bni.on{color:var(--prov)}

/* ── PAGE HEADER ── */
.pg-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pg-t{font-size:19px;font-weight:900;color:var(--t);letter-spacing:-.3px}
.pg-s{font-size:12px;color:var(--t4);margin-top:3px;font-weight:500}
.pg-hd-r{display:flex;gap:7px;align-items:center;flex-shrink:0}

/* ── HERO BANNER ── */
.hero{background:var(--primary);border-radius:16px;padding:22px 26px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative}
.hero::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04);top:-60px;left:-40px;pointer-events:none}
.hero::after{content:'';position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(212,151,58,0.1);bottom:-40px;left:80px;pointer-events:none}
.hero-t h2{font-size:17px;font-weight:800;color:#fff;margin-bottom:4px;position:relative}
.hero-t p{font-size:12px;color:rgba(255,255,255,0.6);position:relative}
.hero-btn{background:var(--accent);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:.15s;position:relative}
.hero-btn:hover{background:#c07e28;transform:translateY(-1px)}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:14px 16px;transition:.2s}
.sc:hover{border-color:var(--prov-m);box-shadow:0 4px 16px rgba(44,82,130,0.08)}
.sc-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sc-ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.sc-ic.cl{background:var(--prov-l);color:var(--prov)}.sc-ic.wn{background:var(--warn-l);color:var(--warn)}.sc-ic.su{background:var(--success-l);color:var(--success)}.sc-ic.in{background:var(--info-l);color:var(--info)}.sc-ic.ac{background:var(--accent-l);color:var(--accent)}
.sc-v{font-size:24px;font-weight:900;color:var(--t);letter-spacing:-.5px;line-height:1;margin-bottom:4px}
.sc-l{font-size:11px;font-weight:500;color:var(--t4)}
.sc-bar{height:2px;background:var(--bg3);border-radius:2px;margin-top:12px}
.sc-fill{height:100%;border-radius:2px}

/* ── CARD ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;min-height:46px}
.ch-l{display:flex;align-items:center;gap:9px}
.ch-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-ic svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.ch-t{font-size:13px;font-weight:800;color:var(--t)}
.ch-s{font-size:10px;color:var(--t4);margin-top:1px}
.ch-link{font-size:12px;color:var(--prov);font-weight:700;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif}
.cb{padding:14px 16px}

/* ── TWO COL ── */
.c2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bdg::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bdg-open{background:var(--success-l);color:#085041}.bdg-open::before{background:var(--success)}
.bdg-prog{background:var(--warn-l);color:#633806}.bdg-prog::before{background:var(--warn)}
.bdg-done{background:var(--subtle);color:var(--t2)}.bdg-done::before{background:var(--t3)}
.bdg-rej{background:var(--danger-l);color:#7f1d1d}.bdg-rej::before{background:var(--danger)}
.bdg-pend{background:var(--info-l);color:#0c447c}.bdg-pend::before{background:var(--info)}
.bdg-acc{background:var(--success-l);color:#085041}.bdg-acc::before{background:var(--success)}
.bdg-new{background:var(--prov-l);color:var(--prov)}.bdg-new::before{background:var(--prov)}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:var(--subtle);font-size:10px;font-weight:600;color:var(--t3)}
.chip svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}

/* ── PROJECT CARDS (browse) ── */
.pc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.pc{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(27,58,107,0.05);transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column}
.pc:hover{box-shadow:0 8px 24px rgba(27,58,107,0.12);transform:translateY(-2px)}
.pc-img{height:130px;overflow:hidden;position:relative}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-hdr{padding:20px 18px 16px;position:relative;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end}
.pc-num-tag{position:absolute;top:13px;right:13px;font-size:9px;color:rgba(255,255,255,.65);font-weight:600}
.pc-status-tag{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);color:#fff;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.pc-body{padding:14px 15px;flex:1;display:flex;flex-direction:column}
.pc-title{font-size:14px;font-weight:700;color:var(--t);line-height:1.4;margin-bottom:7px}
.pc-desc{font-size:12px;color:var(--t3);line-height:1.65;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-info{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.pc-info-item{font-size:11px;color:var(--t3)}
.pc-budget{font-size:12px;color:var(--success);font-weight:700}
.pc-acts{display:flex;gap:6px;margin-top:auto}

/* ── ROWS ── */
.row-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.row-item-l{flex:1;min-width:0}
.row-t{font-size:12.5px;font-weight:700;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.row-s{font-size:10px;color:var(--t4)}

/* ── BID CARD ── */
.bid-card{border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px;background:var(--white)}
.bid-card:hover{border-color:var(--prov-m)}
.bid-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.bid-pr{font-size:16px;font-weight:900;color:var(--t);letter-spacing:-.4px}
.bid-note{font-size:11.5px;color:var(--t3);line-height:1.7;padding:8px 11px;background:var(--subtle);border-radius:7px;margin:8px 0;font-style:italic;white-space:pre-wrap}
.bid-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}

/* ── REVIEW CARD ── */
.rv-card{border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px;background:var(--white)}
.rv-av{width:30px;height:30px;border-radius:8px;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rv-nm{font-size:12.5px;font-weight:700;color:var(--t)}
.rv-sb{font-size:10px;color:var(--t4);margin-top:1px}
.stars{color:var(--accent);font-size:13px;letter-spacing:1px}
.rv-body{font-size:11.5px;color:var(--t3);line-height:1.7;padding:8px 11px;background:var(--subtle);border-radius:7px;margin-top:9px}

/* ── INFO BLOCK ── */
.ib-bl{background:var(--bg2);border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid var(--bg3)}
.ib-t{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg3)}
.ir:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--t4)}
.iv{font-size:11px;font-weight:700;color:var(--t)}

/* ── PROGRESS BAR ── */
.pr{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.pr-l{font-size:11px;font-weight:500;color:var(--t3);min-width:80px;text-align:right}
.pr-tr{flex:1;height:3px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pr-br{height:100%;border-radius:3px}
.pr-n{font-size:11px;font-weight:700;color:var(--t3);min-width:22px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 15px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .12s;white-space:nowrap;font-family:'Tajawal',sans-serif;line-height:1}
.btn:active{transform:scale(.97)}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-p{background:var(--prov);color:#fff;border-color:var(--prov)}.btn-p:hover{background:var(--primary)}
.btn-g{background:var(--success-l);color:var(--success);border-color:var(--success-m)}.btn-g:hover{background:var(--success-m)}
.btn-r{background:var(--danger-l);color:var(--danger);border-color:var(--danger-m)}.btn-r:hover{background:var(--danger-m)}
.btn-a{background:var(--accent-l);color:var(--warn);border-color:var(--accent-m)}.btn-a:hover{background:var(--accent-m)}
.btn-gh{background:var(--bg2);color:var(--t2);border-color:var(--border)}.btn-gh:hover{background:var(--bg3);border-color:var(--br2)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--t2)}
.fi{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);color:var(--t);transition:border-color .12s;width:100%;outline:none}
.fi:focus{border-color:var(--prov);box-shadow:0 0 0 3px rgba(44,82,130,0.09)}
.fi::placeholder{color:var(--t4)}
.fis{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);color:var(--t2);cursor:pointer;width:100%;font-family:inherit;transition:border-color .12s;outline:none}
.fis:focus{border-color:var(--prov)}
.fta{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;resize:vertical;min-height:80px;width:100%;color:var(--t);line-height:1.7;font-family:inherit;background:var(--white);transition:border-color .12s;outline:none}
.fta:focus{border-color:var(--prov);box-shadow:0 0 0 3px rgba(44,82,130,0.09)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── FILTER BAR ── */
.fbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.sbox{flex:1;min-width:180px;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:0 12px;transition:border-color .12s}
.sbox:focus-within{border-color:var(--prov)}
.sbox svg{width:12px;height:12px;stroke:var(--t4);fill:none;stroke-width:1.8;flex-shrink:0;stroke-linecap:round;stroke-linejoin:round}
.sbox input{border:none;background:transparent;font-size:12px;padding:8px 0;flex:1;color:var(--t);font-family:inherit;outline:none}
.sbox input::placeholder{color:var(--t4)}
.fsel{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:11.5px;font-weight:500;background:var(--bg2);color:var(--t2);cursor:pointer;font-family:inherit;transition:border-color .12s;outline:none}
.fsel:focus{border-color:var(--prov)}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(10,20,50,0.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(27,58,107,0.18);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:2;border-radius:18px 18px 0 0}
.mh-l{display:flex;align-items:center;gap:9px}
.m-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.m-ic svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.m-tit{font-size:14px;font-weight:800;color:var(--t)}
.m-cls{width:27px;height:27px;border-radius:7px;background:var(--bg3);color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:.12s;border:none}
.m-cls:hover{background:var(--br2);color:var(--t)}
.mb{padding:18px 20px}
.mf{display:flex;gap:7px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg2);border-radius:0 0 18px 18px}

/* ── LOADING / EMPTY ── */
.ls{display:flex;flex-direction:column;align-items:center;padding:48px 24px}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--prov);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
.ls-t{font-size:12px;color:var(--t4)}
.es{display:flex;flex-direction:column;align-items:center;padding:36px 24px;text-align:center}
.es-ic{width:40px;height:40px;border-radius:10px;background:var(--subtle);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.es-ic svg{width:17px;height:17px;stroke:var(--t4);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.es-t{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:3px}
.es-s{font-size:11px;color:var(--t4)}

/* ── TOAST ── */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--t);color:#fff;padding:10px 17px;border-radius:9px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .2s cubic-bezier(.34,1.56,.64,1);pointer-events:none;display:flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:'Tajawal',sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.t-ic{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.t-s{background:var(--success)}.t-e{background:var(--danger)}.t-i{background:var(--t2)}

/* ── PROFILE SPECIALTY CHIPS ── */
.spec-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--bg2);color:var(--t2);transition:all .12s}
.spec-btn.on{background:var(--prov);color:#fff;border-color:var(--prov)}
.spec-btn:hover:not(.on){background:var(--prov-l);border-color:var(--prov-m)}

/* ── NOTIFICATIONS ── */
.notif-item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s}
.notif-item:last-child{border-bottom:none}
.notif-dot-ind{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.notif-body{flex:1}
.notif-title{font-size:12.5px;font-weight:700;color:var(--t);margin-bottom:2px}
.notif-sub{font-size:11px;color:var(--t4);line-height:1.5}
.notif-time{font-size:9px;color:var(--t4);flex-shrink:0;margin-top:2px}

/* ── ALERT ── */
.alt{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:8px;margin-bottom:10px;font-size:11.5px;line-height:1.5;font-weight:500;border-width:1px;border-style:solid}
.alt-i{background:var(--info-l);color:#0c447c;border-color:var(--info-m)}
.alt-w{background:var(--warn-l);color:#633806;border-color:var(--warn-m)}
.alt-s{background:var(--success-l);color:#085041;border-color:var(--success-m)}
.alt-e{background:var(--danger-l);color:#7f1d1d;border-color:var(--danger-m)}

/* ── DROPDOWN ── */
.dropdown{position:absolute;top:100%;right:0;left:0;z-index:50;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 20px rgba(27,58,107,0.12);max-height:220px;overflow-y:auto;margin-top:4px;display:none}
.dd-item{padding:9px 14px;font-size:12.5px;cursor:pointer;color:var(--t);border-bottom:1px solid var(--bg3);transition:.1s}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:var(--prov-l)}

/* ── RESPONSIVE ── */
@media(max-width:960px){.stat-grid{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:1fr}}
@media(max-width:768px){
  .side,.topbar{display:none}
  .main{margin-right:0}
  .mob-head{display:flex}.bnav{display:block}.mob-btn{display:flex}
  .content{padding:10px 12px;padding-bottom:86px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .sc{padding:12px 14px;border-radius:12px}
  .hero{padding:16px;border-radius:14px;flex-direction:column;gap:12px;text-align:center}
  .hero-btn{width:100%;padding:11px;justify-content:center}
  .g2{grid-template-columns:1fr}
  .pg-grid{grid-template-columns:1fr}
  .pc-grid{grid-template-columns:1fr}
  .btn{width:100%;justify-content:center;padding:11px}
  .fbar{flex-direction:column}
  .sbox{width:100%}
}
</style>
</head>

<script>
const API='https://manaqasati-production.up.railway.app';
const token=localStorage.getItem('token');
const me=JSON.parse(localStorage.getItem('user')||'{}');
if(!token||me.role!=='provider'){location.href='auth.html';}

const CATS=['تبريد وتكييف','كهرباء','سباكة','نجارة','تنظيف','نقل عفش','حدادة','ألمنيوم','مسابح','كاميرات مراقبة','شبكات وإنترنت','مظلات وسواتر','عزل حراري','أبواب','جبس وطباشير','مكافحة حشرات','أخرى'];
const CITIES=['الرياض','جدة','مكة المكرمة','المدينة المنورة','الدمام','الخبر','الظهران','الأحساء','الطائف','تبوك','بريدة','خميس مشيط','أبها','نجران','جيزان','حائل','ينبع','الجبيل','القطيف','سكاكا','عرعر','الباحة','الرس','رابغ','بيشة','وادي الدواسر','الزلفي','القريات'];
const CAT_STYLE={'تبريد وتكييف':{g:'135deg,#0ea5e9,#0284c7',ic:'❄️'},'كهرباء':{g:'135deg,#f59e0b,#d97706',ic:'⚡'},'سباكة':{g:'135deg,#06b6d4,#0891b2',ic:'🔧'},'نجارة':{g:'135deg,#92400e,#78350f',ic:'🪚'},'تنظيف':{g:'135deg,#10b981,#059669',ic:'🧹'},'نقل عفش':{g:'135deg,#8b5cf6,#7c3aed',ic:'🚛'},'حدادة':{g:'135deg,#6b7280,#374151',ic:'🔩'},'ألمنيوم':{g:'135deg,#9ca3af,#6b7280',ic:'🪟'},'مسابح':{g:'135deg,#3b82f6,#1d4ed8',ic:'🏊'},'كاميرات مراقبة':{g:'135deg,#1f2937,#111827',ic:'📷'},'شبكات وإنترنت':{g:'135deg,#6366f1,#4f46e5',ic:'📡'},'مظلات وسواتر':{g:'135deg,#f97316,#ea580c',ic:'⛱️'},'عزل حراري':{g:'135deg,#ef4444,#dc2626',ic:'🌡️'},'أبواب':{g:'135deg,#854d0e,#713f12',ic:'🚪'},'جبس وطباشير':{g:'135deg,#94a3b8,#64748b',ic:'🏠'},'مكافحة حشرات':{g:'135deg,#16a34a,#15803d',ic:'🦟'},'أخرى':{g:'135deg,#64748b,#475569',ic:'📋'}};
const AVC=['#1B3A6B','#374151','#1e40af','#166534','#92400e','#991b1b','#1e3a8a','#365314'];

let allProjects=[],myBids=[],myProjects=[];

// Init
document.getElementById('sbAv').textContent=(me.name||'م')[0];
document.getElementById('sbNm').textContent=me.name||'المزود';
if(document.getElementById('mobAv'))document.getElementById('mobAv').textContent=(me.name||'م')[0];
setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('ar-SA',{hour12:false});},1000);

// Helpers
async function api(path,opts={}){
  try{const r=await fetch(API+path,{headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},...opts});return await r.json();}catch{return{};}
}
let toastT;
function toast(msg,type='info'){
  document.getElementById('tIc').textContent=type==='success'?'✓':type==='error'?'✕':'i';
  document.getElementById('tIc').className=`t-ic t-${type==='success'?'s':type==='error'?'e':'i'}`;
  document.getElementById('tMsg').textContent=msg;
  document.getElementById('toast').classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>document.getElementById('toast').classList.remove('show'),3200);
}
function openM(title,body,foot,iSvg,iBg='var(--prov-l)'){
  document.getElementById('mTit').textContent=title;
  document.getElementById('mBd').innerHTML=body;
  document.getElementById('mFt').innerHTML=foot||'';
  const ic=document.getElementById('mIc');ic.innerHTML=iSvg||'';ic.style.background=iBg;
  if(iSvg){const s=ic.querySelector('svg');if(s){s.style.cssText='width:13px;height:13px;fill:none;stroke:var(--prov);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round';}}
  document.getElementById('ov').classList.add('show');
}
function closeM(){document.getElementById('ov').classList.remove('show');}
function setPage(h){document.getElementById('pg').innerHTML=h;}
function loading(){setPage(`<div class="ls"><div class="spin"></div><div class="ls-t">جاري التحميل…</div></div>`);}
function openSb(){document.getElementById('sb').classList.add('open');document.getElementById('mobOv').classList.add('show');}
function closeSb(){document.getElementById('sb').classList.remove('open');document.getElementById('mobOv').classList.remove('show');}
function logout(){localStorage.clear();location.href='auth.html';}

const TITLES={home:'الرئيسية',browse:'تصفح المشاريع',mybids:'عروضي',myprojects:'مشاريعي',reviews:'تقييماتي',profile:'الملف الشخصي',notifications:'الإشعارات'};
function go(page,btn){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.bni').forEach(n=>n.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const bnMap={home:'bn-home',browse:'bn-browse',mybids:'bn-mybids',profile:'bn-profile'};
  if(bnMap[page]){const b=document.getElementById(bnMap[page]);if(b)b.classList.add('on');}
  document.getElementById('pgT').textContent=TITLES[page]||page;
  ({home:pgHome,browse:pgBrowse,mybids:pgMyBids,myprojects:pgMyProjects,reviews:pgReviews,profile:pgProfile,notifications:pgNotifications}[page]||pgHome)();
  closeSb();window.scrollTo(0,0);
}

const S=(p,c='currentColor')=>`<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const I={
  proj:`<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>`,
  send:`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`,
  star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
  eye:`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
  chk:`<polyline points="20 6 9 17 4 12"/>`,
  x:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
  usr:`<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>`,

  tool:`<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>`,

function filterBrowse(){

function showCitySuggest(inpId,dropId){
  const q=(document.getElementById(inpId)?.value||'').toLowerCase();
  const dd=document.getElementById(dropId);if(!dd)return;
  const filtered=q?CITIES.filter(c=>c.includes(q)):CITIES;
  if(!filtered.length){dd.innerHTML='<div class="dd-item" style="color:var(--t4)">لا توجد نتائج</div>';dd.style.display='block';return;}
  dd.innerHTML=filtered.slice(0,12).map(c=>`<div class="dd-item" onclick="document.getElementById('${inpId}').value='${c}';hideDrop('${dropId}');filterBrowse()">${c}</div>`).join('');

}

    S(I.send,'var(--prov)'),'var(--prov-l)');

function fmtF(id,type){
  const el=document.getElementById(id);if(!el)return;
  const s=el.selectionStart,e=el.selectionEnd,sel=el.value.substring(s,e);
  const ins=type==='bold'?'**'+(sel||'نص عريض')+'**':'_'+(sel||'نص مائل')+'_';
  el.value=el.value.substring(0,s)+ins+el.value.substring(e);
  el.focus();el.setSelectionRange(s,s+ins.length);
}

async function submitBid(projectId){
  const price=document.getElementById('bPrice')?.value?.trim();
  const days=document.getElementById('bDays')?.value?.trim();
  const note=document.getElementById('bNote')?.value?.trim();
  if(!price||!days||!note){toast('السعر والمدة والرسالة مطلوبة','error');return;}
  const res=await api(`/api/requests/${projectId}/bids`,{method:'POST',body:JSON.stringify({price:parseFloat(price),days:parseInt(days),note})});
  if(res.message&&!res.id&&!res.bid_id){toast(res.message||'حدث خطأ','error');return;}
  closeM();toast('تم إرسال عرضك ✅','success');
}

  setPage(`
    <div class="pg-hd">
      <div><div class="pg-t">مشاريعي</div><div class="pg-s">${myProjects.length} مشروع</div></div>
    </div>
    <div class="card">
      <div class="cb">
        <div class="fbar">
          <select class="fsel" id="mpSt" onchange="filterMyProjects()">
            <option value="">كل الحالات</option>
            <option value="in_progress">جارٍ</option>
            <option value="completed">مكتمل</option>
          </select>
        </div>
        <div id="myProjList">${renderMyProjects(myProjects)}</div>
      </div>
    </div>`);
}

function filterMyProjects(){
  const st=document.getElementById('mpSt')?.value||'';
  const el=document.getElementById('myProjList');
  if(el)el.innerHTML=renderMyProjects(st?myProjects.filter(p=>p.status===st):myProjects);
}

function renderMyProjects(list){
  if(!list.length)return`<div class="es"><div class="es-ic">${S(I.proj)}</div><div class="es-t">لا يوجد مشاريع</div><div class="es-s">اقبل عروضاً لتبدأ مشاريعك</div></div>`;
  return list.map(r=>`
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;border-right:2px solid ${r.status==='in_progress'?'var(--warn)':'var(--t3)'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--t4);margin-bottom:3px">${r.project_number||'#'+r.id}</div>
          <div style="font-size:14px;font-weight:700;color:var(--t)">${r.title}</div>
        </div>
        <span class="bdg ${r.status==='in_progress'?'bdg-prog':'bdg-done'}">${r.status==='in_progress'?'جارٍ':'مكتمل'}</span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">
        ${r.city?`<span class="chip">📍 ${r.city}</span>`:''}
        ${r.category?`<span class="chip">${r.category}</span>`:''}
        ${r.price?`<span class="chip">💰 ${fpr(r.price)}</span>`:''}
      </div>
      ${r.status==='in_progress'?`<button class="btn btn-gh btn-sm" onclick="viewProjModal(${r.id})">${S(I.eye)} تفاصيل</button>`:''}
    </div>`).join('');
}

/* ══════════════════════════ REVIEWS ══════════════════════════ */
async function pgReviews(){
  loading();
  const data=await api('/api/reviews/provider/'+me.id);
  const list=data||[];
  const avg=list.length?list.reduce((s,r)=>s+(r.rating||0),0)/list.length:0;
  setPage(`
    <div class="pg-hd">
      <div><div class="pg-t">تقييماتي</div><div class="pg-s">${list.length} تقييم${avg?` • معدل ${avg.toFixed(1)} ★`:''}</div></div>
    </div>
    ${avg?`<div style="background:var(--primary);border-radius:14px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden">
      <div style="position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);top:-30px;left:-20px"></div>
      <div style="text-align:center;flex-shrink:0;position:relative">
        <div style="font-size:42px;font-weight:900;color:var(--accent);line-height:1">${avg.toFixed(1)}</div>
        <div style="font-size:18px;letter-spacing:2px;color:var(--accent);margin-top:2px">${sts(avg)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:4px">${list.length} تقييم</div>
      </div>
      <div style="flex:1;position:relative">
        ${[5,4,3,2,1].map(n=>{const cnt=list.filter(r=>Math.round(r.rating)===n).length;const pct=list.length?Math.round(cnt/list.length*100):0;return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:10px;color:rgba(255,255,255,.5);min-width:12px">${n}</span><div style="flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent);border-radius:3px"></div></div><span style="font-size:10px;color:rgba(255,255,255,.4);min-width:25px">${cnt}</span></div>`;}).join('')}
      </div>
    </div>`:''}
    <div class="card">
      <div class="cb">
        ${list.length?list.map(r=>`
          <div class="rv-card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:9px">
                <div class="rv-av" style="background:${ac(r.reviewer_id||1)}">${al(r.reviewer_name)}</div>
                <div>
                  <div class="rv-nm">${r.reviewer_name||'—'}</div>
                  <div class="rv-sb">${fdt(r.created_at)}</div>
                </div>
              </div>
              <div class="stars">${sts(r.rating)}</div>
            </div>
            ${r.comment?`<div class="rv-body">${r.comment}</div>`:''}
          </div>`).join(''):`<div class="es"><div class="es-ic">${S(I.star)}</div><div class="es-t">لا يوجد تقييمات بعد</div><div class="es-s">أنجز مشاريع لتحصل على تقييمات</div></div>`}
      </div>
    </div>`);
}

/* ══════════════════════════ PROFILE ══════════════════════════ */
async function pgProfile(){
  loading();
  const p=await api('/api/provider/profile');
  setPage(`
    <div class="pg-hd">
      <div><div class="pg-t">الملف الشخصي</div><div class="pg-s">معلوماتك كمزود خدمة</div></div>
    </div>
    <div class="c2">
      <div>
        <div class="card">
          <div class="ch">
            <div class="ch-l">
              <div class="ch-ic" style="background:var(--prov-l);color:var(--prov)">${S(I.usr,'var(--prov)')}</div>
              <div class="ch-t">معلومات شخصية</div>
            </div>
          </div>
          <div class="cb">
            <div class="fg"><label class="fl">الاسم الكامل</label><input type="text" class="fi" id="pNm" value="${p.name||''}"></div>
            <div class="fg"><label class="fl">البريد الإلكتروني</label><input type="email" class="fi" value="${p.email||''}" disabled style="background:var(--bg2);color:var(--t3)"></div>
            <div class="fg"><label class="fl">رقم الجوال</label><input type="text" class="fi" id="pPh" value="${p.phone||''}" placeholder="05xxxxxxxx"></div>
            <div class="fg"><label class="fl">المدينة</label><select class="fis" id="pCit">${cityOpts(p.city)}</select></div>
            <div class="fg"><label class="fl">نبذة عنك</label><textarea class="fta" id="pBio" style="min-height:90px">${p.bio||''}</textarea></div>
            <button class="btn btn-p btn-sm" onclick="saveProfile()">${S(I.save,'#fff')} حفظ التغييرات</button>
          </div>
        </div>
        <div class="card">
          <div class="ch">
            <div class="ch-l">
              <div class="ch-ic" style="background:var(--subtle);color:var(--t2)">${S('<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>','var(--t2)')}</div>
              <div class="ch-t">تغيير كلمة المرور</div>
            </div>
          </div>
          <div class="cb">
            <div class="fg"><label class="fl">كلمة المرور الحالية</label><input type="password" class="fi" id="pwOld"></div>
            <div class="fg"><label class="fl">كلمة المرور الجديدة</label><input type="password" class="fi" id="pwNew"></div>
            <button class="btn btn-gh btn-sm" onclick="changePw()">تغيير كلمة المرور</button>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="ch">
            <div class="ch-l">
              <div class="ch-ic" style="background:var(--accent-l);color:var(--accent)">${S(I.tool,'var(--accent)')}</div>
              <div class="ch-t">التخصصات</div>
            </div>
          </div>
          <div class="cb">
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
              ${CATS.map(c=>{const on=(p.specialties||[]).includes(c);return`<button class="spec-btn${on?' on':''}" onclick="this.classList.toggle('on')">${c}</button>`;}).join('')}
            </div>
            <button class="btn btn-gh btn-sm" onclick="saveSpecs()">حفظ التخصصات</button>
          </div>
        </div>
        <div class="card" style="margin-top:14px">
          <div class="ch">
            <div class="ch-l">
              <div class="ch-ic" style="background:var(--prov-l);color:var(--prov)">${S(I.star,'var(--prov)')}</div>
              <div class="ch-t">إحصائيات الحساب</div>
            </div>
          </div>
          <div class="cb">
            <div class="ib-bl">
              <div class="ir"><span class="ik">المشاريع المكتملة</span><span class="iv">${p.completed_projects||0}</span></div>
              <div class="ir"><span class="ik">نسبة الإنجاز</span><span class="iv">${p.completion_rate?p.completion_rate+'%':'—'}</span></div>
              <div class="ir"><span class="ik">متوسط التقييم</span><span class="iv">${p.avg_rating?Number(p.avg_rating).toFixed(1)+' ★':'—'}</span></div>
              <div class="ir"><span class="ik">الوسام</span><span class="iv">${p.badge&&p.badge!=='none'?{verified:'موثق ✓',star:'متميز ⭐',partner:'شريك 💎',top:'الأفضل 🏆'}[p.badge]||p.badge:'—'}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>`);
}

async function saveProfile(){
  const body={name:document.getElementById('pNm')?.value?.trim()||'',phone:document.getElementById('pPh')?.value||'',city:document.getElementById('pCit')?.value||'',bio:document.getElementById('pBio')?.value||''};
  await api('/api/provider/profile',{method:'PUT',body:JSON.stringify(body)});
  toast('تم حفظ التغييرات ✅','success');
}
async function saveSpecs(){
  const specs=[...document.querySelectorAll('.spec-btn.on')].map(b=>b.textContent.trim());
  await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({specialties:specs})});
  toast('تم حفظ التخصصات ✅','success');
}
async function changePw(){
  const oldPw=document.getElementById('pwOld')?.value;
  const newPw=document.getElementById('pwNew')?.value;
  if(!oldPw||!newPw){toast('اكمل البيانات','error');return;}
  const res=await api('/api/auth/change-password',{method:'PUT',body:JSON.stringify({old_password:oldPw,new_password:newPw})});
  if(res.message?.includes('success')){toast('تم تغيير كلمة المرور ✅','success');}
  else{toast(res.message||'حدث خطأ','error');}
}

/* ══════════════════════════ NOTIFICATIONS ══════════════════════════ */
async function pgNotifications(){
  loading();
  const data=await api('/api/notifications');
  const list=data||[];
  const unseen=list.filter(n=>!n.read).length;
  const nb=document.getElementById('nbNot');if(nb){nb.style.display=unseen?'flex':'none';nb.textContent=unseen;}
  const tDot=document.getElementById('tDot');if(tDot)tDot.style.display=unseen?'block':'none';
  setPage(`
    <div class="pg-hd">
      <div><div class="pg-t">الإشعارات</div><div class="pg-s">${unseen?unseen+' غير مقروء':'كل الإشعارات مقروءة'}</div></div>
      ${unseen?`<div class="pg-hd-r"><button class="btn btn-gh btn-sm" onclick="markAllRead()">تحديد الكل مقروء</button></div>`:''}
    </div>
    <div class="card">
      <div class="cb">
        ${list.length?list.map(n=>`
          <div class="notif-item ${!n.read?'':''}">
            <div class="notif-dot-ind" style="background:${!n.read?'var(--prov)':'var(--border)'}"></div>
            <div class="notif-body">
              <div class="notif-title" style="font-weight:${!n.read?'800':'600'}">${n.title}</div>
              ${n.body?`<div class="notif-sub">${n.body}</div>`:''}
            </div>
            <div class="notif-time">${fdt(n.created_at)}</div>
          </div>`).join(''):`<div class="es"><div class="es-ic">${S(I.bell)}</div><div class="es-t">لا يوجد إشعارات</div></div>`}
      </div>
    </div>`);
}

async function markAllRead(){
  await api('/api/notifications/read-all',{method:'PUT'});
  toast('تم التحديث ✅','success');
  pgNotifications();
}

// Close modal on backdrop
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeM();});

// Init
go('home',document.querySelector('.ni.on'));
</script>
