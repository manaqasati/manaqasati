<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — لوحة المزود</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1B3A6B;--p2:#142d54;--p3:#2C5282;
  --p-light:#e8eef7;--p-mid:#c5d6ee;
  --gold:#F0A500;--gold-d:#c78500;--gold-l:#fff8e7;--gold-soft:#fef3cd;
  --text:#0d1f3c;--text2:#2d4a6e;--muted:#6b85a8;--hint:#9db3cc;
  --border:#dce5f0;--border2:#b8cde4;
  --bg:#f4f7fb;--white:#fff;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ══ SIDEBAR ══ */
.side{
  width:260px;background:var(--white);
  border-left:1px solid var(--border);
  height:100vh;position:fixed;right:0;top:0;
  display:flex;flex-direction:column;z-index:100;
  box-shadow:4px 0 24px rgba(27,58,107,0.07)
}
.side-head{padding:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.side-brand{background:linear-gradient(135deg,var(--p),var(--p3));padding:18px 18px 14px;position:relative;overflow:hidden}
.side-brand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.net-svg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.25}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;position:relative;z-index:1;margin-top:2px}
.user-pill{margin:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.av{width:36px;height:36px;border-radius:10px;background:var(--gold);color:var(--p2);font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.av-name{font-size:13px;font-weight:800;color:#fff}
.av-role{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;margin-top:1px}
.nav{padding:10px 10px;flex:1;overflow-y:auto}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-sec{font-size:10px;font-weight:800;color:var(--hint);letter-spacing:.8px;padding:0 8px;margin:14px 0 6px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;margin-bottom:2px;transition:all .18s;position:relative}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.on{background:var(--p-light);color:var(--p)}
.ni.on::before{content:'';position:absolute;right:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:2px}
.ni-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni.on .ni-ic{background:var(--p);box-shadow:0 3px 10px rgba(27,58,107,.3)}
.ni.on .ni-ic svg{stroke:#fff}
.ni-ic svg{stroke:currentColor}
.badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:9px;font-weight:900;min-width:18px;height:18px;border-radius:9px;padding:0 4px;display:flex;align-items:center;justify-content:center}
.side-foot{padding:10px 12px;border-top:1px solid var(--border)}
.logoutbtn{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;border:none;background:none;width:100%;font-family:'Tajawal',sans-serif;transition:.15s}
.logoutbtn:hover{background:var(--red-l)}

/* ══ MAIN ══ */
.main{margin-right:260px;min-height:100vh;display:flex;flex-direction:column;min-width:0}

/* ══ TOPBAR ══ */
.topbar{background:var(--white);height:58px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:800;color:var(--text)}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 12px rgba(240,165,0,.3)}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px);box-shadow:0 5px 16px rgba(240,165,0,.35)}
.btn-new svg{flex-shrink:0}

/* ══ CONTENT ══ */
.content{padding:24px 28px;flex:1}
.page{display:none}.page.on{display:block}

/* ══ HERO ══ */
.hero{background:var(--p);border-radius:var(--radius-lg);padding:26px 30px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;overflow:hidden;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.hero-net{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.hero-content{position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(240,165,0,.15);border:1px solid rgba(240,165,0,.3);color:var(--gold);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.hero-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.hero-t h2{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.3}
.hero-t p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6}
.hero-btn{background:var(--gold);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .18s;flex-shrink:0;position:relative;z-index:1;box-shadow:0 4px 14px rgba(240,165,0,.35)}
.hero-btn:hover{background:var(--gold-d);transform:translateY(-2px)}

/* ══ STATS ══ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);border-radius:0 0 var(--radius) var(--radius)}
.sc.gold::after{background:var(--gold)}
.sc.navy::after{background:var(--p)}
.sc.green::after{background:var(--green)}
.sc.blue::after{background:var(--p3)}
.sc:hover{border-color:var(--p-mid);box-shadow:0 4px 16px rgba(27,58,107,.08)}
.sic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sic.a{background:var(--p-light)}.sic.a svg{stroke:var(--p)}
.sic.y{background:var(--gold-l)}.sic.y svg{stroke:var(--gold-d)}
.sic.g{background:var(--green-l)}.sic.g svg{stroke:var(--green)}
.sic.b{background:var(--p-light)}.sic.b svg{stroke:var(--p3)}
.sn{font-size:26px;font-weight:900;color:var(--text);line-height:1}
.st{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}

/* ══ CARDS ══ */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card-accent{border-top:3px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.ch-l{display:flex;align-items:center;gap:8px}
.ch-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch h3{font-size:14px;font-weight:800;color:var(--text)}
.ch-link{font-size:12px;color:var(--p);font-weight:700;background:none;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:3px}
.ch-link:hover{color:var(--p2)}

/* ══ REQUEST ITEMS - محسّنة ══ */
.ri{
  background:var(--white);
  border:1.5px solid var(--border);
  border-right:4px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
  transition:all .2s cubic-bezier(.34,1.2,.64,1);
  cursor:pointer;
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:start;
  position:relative;
  overflow:hidden
}
.ri:last-child{margin-bottom:0}
.ri:hover{
  border-color:var(--p-mid);
  border-right-color:var(--p);
  box-shadow:0 4px 16px rgba(27,58,107,.1);
  transform:translateY(-1px)
}
.ri-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:7px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ri-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.rm{
  font-size:11px;color:var(--muted);
  display:inline-flex;align-items:center;gap:3px;
  font-weight:600;
  background:var(--bg);
  padding:3px 8px;border-radius:20px;
  border:1px solid var(--border)
}
.ri-actions{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-top:11px;padding-top:10px;
  border-top:1px solid var(--border);
  grid-column:1/-1
}
.tag{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:800;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:.3px}
.tag::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-open{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}.t-open::before{background:#16a34a}
.t-prog{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}.t-prog::before{background:#2563eb}
.t-done{background:#fff8e7;color:#b45309;border:1px solid #fde68a}.t-done::before{background:#F0A500}
.t-rev{background:#fef3c7;color:#92400e;border:1px solid #fde68a}.t-rev::before{background:#d97706}

/* ══ BUTTONS ══ */
.btn-sm{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.bs-p{background:var(--p-light);color:var(--p)}.bs-p:hover{background:var(--p-mid)}
.bs-g{background:var(--green-l);color:var(--green)}.bs-g:hover{background:#bbf7d0}
.bs-r{background:var(--red-l);color:var(--red)}.bs-r:hover{background:#fecaca}
.btn-p{padding:12px 22px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .18s}
.btn-p:hover{background:var(--p2);transform:translateY(-1px)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-s{padding:12px 16px;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

/* ══ FORM ══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ff{grid-column:1/-1}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--white);transition:all .18s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.08)}
.fg textarea{min-height:100px;resize:vertical}
.form-btns{display:flex;gap:8px;margin-top:16px}

/* ══ BIDS ══ */
.bid-item{border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:10px;transition:all .2s}
.bid-item:hover{border-color:var(--p-mid)}
.bid-item.accepted{border-color:var(--green);background:linear-gradient(135deg,rgba(22,163,74,.04),rgba(22,163,74,.08))}
.bid-item.rejected{opacity:.45}
.bid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.bid-name{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.bid-price{font-size:20px;font-weight:900;color:var(--p)}
.bid-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.bid-note{font-size:12px;color:#475569;line-height:1.7;margin-bottom:10px;font-style:italic;padding:8px 12px;background:var(--bg);border-radius:8px;border-right:3px solid var(--border2)}
.bid-actions{display:flex;gap:6px}
.stars-row{color:#f59e0b;font-size:12px;letter-spacing:1px}

/* ══ CHAT ══ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 340px);min-height:260px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);border-radius:12px;margin-bottom:10px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.msg-me{background:var(--p);color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px}
.msg-other{background:var(--white);border:1px solid var(--border);align-self:flex-start;border-radius:16px 16px 16px 4px}
.msg-name{font-size:10px;font-weight:700;margin-bottom:2px;opacity:.65}
.msg-time{font-size:10px;opacity:.5;margin-top:3px;text-align:left}
.chat-input{display:flex;gap:8px}
.chat-inp{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:.18s}
.chat-inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.07)}
.chat-send{padding:11px 18px;background:var(--p);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;white-space:nowrap}
.chat-send:hover{background:var(--p2)}

/* ══ NOTIFS ══ */
.notif-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);transition:.15s;cursor:pointer}
.notif-item:hover{background:var(--bg)}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:var(--p-light)}
.notif-ic{width:38px;height:38px;border-radius:11px;background:var(--p-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.notif-title{font-size:13px;font-weight:800;margin-bottom:2px}
.notif-body{font-size:11px;color:var(--muted);line-height:1.5}
.notif-time{font-size:10px;color:var(--hint);margin-top:3px}

/* ══ DETAIL HEAD ══ */
.req-detail-head{background:var(--p);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.req-detail-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.rdh-title{font-size:20px;font-weight:900;margin-bottom:10px}
.rdh-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.8}
.rdh-meta span{display:flex;align-items:center;gap:4px}
.rdh-desc{margin-top:12px;font-size:13px;line-height:1.8;opacity:.85}

/* ══ TABS ══ */
.tab-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;background:var(--bg);border-radius:12px;padding:4px}
.tab-btn{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;background:none;color:var(--muted);transition:all .18s}
.tab-btn.on{background:var(--white);color:var(--p);box-shadow:0 2px 8px rgba(27,58,107,.1)}
.tab{display:none}.tab.on{display:block}

/* ══ OVERLAYS ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,5,30,.65);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column}
.modal-drag{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:8px;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--white)}

/* ══ AGREEMENT MODAL ══ */
.agree-modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:540px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column}
.agree-hd{background:var(--p);padding:18px 22px;text-align:center;flex-shrink:0;position:relative}
.agree-hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.agree-hd h2{color:#fff;font-size:16px;font-weight:900;margin-bottom:3px}
.agree-hd p{color:rgba(255,255,255,.55);font-size:11px}
.agree-body{padding:18px 20px;overflow-y:auto;flex:1}
.quran-box{background:linear-gradient(135deg,#fef9e7,#fef3c7);border:2px solid var(--gold);border-radius:14px;padding:16px 18px;margin-bottom:14px;text-align:center}
.quran-title{font-size:12px;font-weight:800;color:#92400e;margin-bottom:7px}
.quran-text{font-size:13px;font-weight:700;color:#78350f;line-height:2.1}
.quran-src{font-size:11px;color:#92400e;font-weight:700;margin-top:7px}
.agree-sec{background:var(--bg);border:1px solid var(--p-mid);border-right:3px solid var(--p);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:10px}
.agree-sec-t{font-size:12px;font-weight:900;color:var(--p);margin-bottom:6px}
.agree-sec p{font-size:11px;color:var(--text);line-height:2;font-weight:500}
.agree-sec strong{color:var(--p);font-weight:800}
.note-sec{background:#fef2f2;border:1px solid #fca5a5;border-right:3px solid var(--red);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:14px}
.note-sec .agree-sec-t{color:var(--red)}
.note-sec p{font-size:11px;color:#7f1d1d;line-height:2}
.agree-summary{background:var(--p-light);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.agree-sum-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(27,58,107,.1);font-size:12px;color:var(--text)}
.agree-sum-row:last-child{border-bottom:none}
.agree-sum-ic{font-size:14px;flex-shrink:0}
.agree-sum-row strong{color:var(--p)}
.agree-check{display:flex;align-items:flex-start;gap:9px;padding:12px 14px;background:var(--gold-l);border:1px solid var(--gold-soft);border-radius:11px;cursor:pointer}
.agree-check input{width:17px;height:17px;cursor:pointer;margin-top:2px;accent-color:var(--p);flex-shrink:0}
.agree-check label{font-size:11px;font-weight:700;cursor:pointer;line-height:1.8}
.agree-foot{padding:14px 20px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--white);flex-shrink:0}
.btn-agree{flex:1;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:11px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.18s;box-shadow:0 3px 12px rgba(240,165,0,.3)}
.btn-agree:hover:not(:disabled){background:var(--gold-d);transform:translateY(-1px)}
.btn-agree:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-back{padding:13px 16px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);border-radius:11px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}

/* ══ RATING ══ */
.stars-pick{display:flex;gap:10px;justify-content:center;margin:14px 0;direction:ltr}
.sp{font-size:36px;cursor:pointer;opacity:.25;transition:all .15s;filter:grayscale(1)}
.sp.on{opacity:1;filter:none;transform:scale(1.1)}

/* ══ EMPTY / LOADING ══ */
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty-ic{width:52px;height:52px;background:var(--p-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.empty-ic svg{stroke:var(--p)}
.empty h4{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty p{font-size:12px}
.loading{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.alert.ok{background:var(--green-l);color:var(--green);display:block}
.alert.err{background:var(--red-l);color:var(--red);display:block}

/* ══ PROFILE ══ */
.profile-av{width:80px;height:80px;border-radius:50%;background:var(--gold);color:var(--p2);font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:3px solid rgba(255,255,255,.2)}
.profile-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:14px;text-align:center}
.profile-stat-n{font-size:22px;font-weight:900;color:#fff}
.profile-stat-l{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}

/* ══ SKELETON ══ */
.skel{background:linear-gradient(90deg,#f4f7fb 25%,#e8eef7 50%,#f4f7fb 75%);background-size:200%;animation:sk 1.4s infinite}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ MOB HEAD ══ */
.mob-head{display:none;background:var(--p);height:54px;padding:0 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mob-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.mob-logo{font-size:18px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px}
.mob-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.mob-right{display:flex;align-items:center;gap:8px}
.mob-notif{position:relative;background:rgba(255,255,255,.12);border:none;cursor:pointer;padding:7px;color:#fff;display:flex;border-radius:9px}
.mob-notif-badge{position:absolute;top:2px;left:2px;background:var(--red);color:#fff;font-size:9px;font-weight:900;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.mob-av{width:30px;height:30px;border-radius:9px;background:var(--gold);color:var(--p2);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden}
.mob-out{background:rgba(255,255,255,.1);border:none;cursor:pointer;padding:6px;color:#fff;display:flex;border-radius:8px}

/* ══ BOTTOM NAV - محسّن ══ */
.bnav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  z-index:100;
  padding:4px 0 calc(env(safe-area-inset-bottom,0px) + 6px);
  box-shadow:0 -4px 20px rgba(27,58,107,.08)
}
.bnav::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%)
}
.bnav-inner{display:flex;align-items:flex-end}

/* أزرار التنقل العادية */
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 2px 2px;border:none;background:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;color:var(--hint);transition:.2s;position:relative
}
.bni .bic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:.2s}
.bni .bic svg{stroke:currentColor;transition:.2s}
.bni .bt{font-size:10px;font-weight:700;transition:.2s;letter-spacing:.2px}
.bni.on{color:var(--p)}
.bni.on .bt{color:var(--p)}
.bni-badge{
  position:absolute;top:4px;right:calc(50% - 22px);
  background:var(--red);color:#fff;font-size:9px;font-weight:900;
  width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  border:1.5px solid var(--white)
}

/* زر جديد FAB - محسّن */
.bni-fab{
  flex:0 0 80px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;gap:5px;
  padding-bottom:4px;
  border:none;background:none;cursor:pointer;
  font-family:'Tajawal',sans-serif;
  position:relative;
  margin-top:-22px
}
.bni-fab .fab-circle{
  width:58px;height:58px;
  background:linear-gradient(145deg,#F0A500,#c78500);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 8px 24px rgba(240,165,0,.55),
    0 3px 8px rgba(240,165,0,.35),
    0 0 0 3px var(--white),
    0 0 0 4px rgba(240,165,0,.2);
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  z-index:1
}
.bni-fab .fab-circle::before{
  content:'';
  position:absolute;inset:-6px;border-radius:50%;
  background:rgba(240,165,0,.12);
  animation:fab-ring 2.5s ease-in-out infinite
}
@keyframes fab-ring{
  0%,100%{transform:scale(1);opacity:.7}
  50%{transform:scale(1.15);opacity:.2}
}
.bni-fab .fab-circle svg{stroke:#fff;width:24px;height:24px;stroke-width:2.5;position:relative;z-index:1}
.bni-fab .fab-label{
  font-size:10px;font-weight:900;
  color:var(--gold-d);
  letter-spacing:.3px
}
.bni-fab:active .fab-circle{
  transform:scale(.9);
  box-shadow:0 4px 12px rgba(240,165,0,.4),0 0 0 3px var(--white)
}
.bni-fab:hover .fab-circle{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(240,165,0,.6),0 4px 10px rgba(240,165,0,.4),0 0 0 3px var(--white),0 0 0 5px rgba(240,165,0,.15)
}

function timeAgo(d){var diff=(new Date()-new Date(d))/1000;if(diff<60)return'الآن';if(diff<3600)return Math.floor(diff/60)+' د';if(diff<86400)return Math.floor(diff/3600)+' س';return Math.floor(diff/86400)+' يوم';}

// Toast
var _tT;
function toast(msg,type){
  var el=document.getElementById('toast');
  var ic=document.getElementById('tIc');
  var tm=document.getElementById('tMsg');
  if(!el)return;
  ic.textContent=type==='success'?'✓':type==='error'?'✕':'i';
  ic.style.background=type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--p)';
  tm.textContent=msg;
  el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tT);_tT=setTimeout(function(){el.style.opacity='0';el.style.transform='translateX(-50%) translateY(14px)';},3200);
}

// show() navigation - exact same as client
var _curPage='home';
function show(pg,el,key){
  document.querySelectorAll('.page').forEach(function(p){p.className='page';});
  document.querySelectorAll('.ni').forEach(function(m){m.className='ni';});
  document.querySelectorAll('.bni').forEach(function(m){m.className='bni';});
  var pDiv=document.getElementById('page-'+pg);
  if(pDiv)pDiv.className='page on';
  if(el)el.className='ni on';
  var bnKey={'home':'bn-home','browse':'bn-browse','myworks':'bn-myworks','profile':'bn-profile'};
  if(bnKey[pg]){var b=document.getElementById(bnKey[pg]);if(b)b.className='bni on';}
  var titles={home:'الرئيسية',browse:'تصفح المشاريع',myworks:'مشاريعي وعروضي',
    reviews:'تقييماتي',notifs:'الإشعارات',profile:'الملف الشخصي'};
  var pt=document.getElementById('pageTitle');if(pt)pt.textContent=titles[pg]||pg;
  _curPage=pg;
  window.scrollTo(0,0);
  if(pg==='home')         loadHome();
  else if(pg==='browse')  loadBrowse();
  else if(pg==='myworks') loadMyWorks();
  else if(pg==='reviews') loadReviews();
  else if(pg==='notifs')  loadNotifs();
  else if(pg==='profile') loadProfile();
}

}
function renderBrowsePage(list){
  var el=document.getElementById('browse-content');if(!el)return;

    '<div class="pghd"><div><div class="pg-t">تصفح المشاريع</div>'+

    '<div class="card card-accent"><div class="cb">'+
      '<div class="fbar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+
        '<div style="flex:1;min-width:160px;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:0 12px" id="sbox-wrap">'+
          '<svg width="13" height="13" fill="none" stroke="var(--muted)" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+
          '<input type="text" id="bQ" placeholder="ابحث في المشاريع…" oninput="filterBrowse()" style="border:none;background:transparent;font-size:12px;padding:8px 0;flex:1;outline:none;font-family:Tajawal,sans-serif">'+
        '</div>'+
        '<select id="bCat" onchange="filterBrowse()" style="padding:8px 11px;border:1px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;background:var(--bg);color:var(--p);cursor:pointer;font-family:Tajawal,sans-serif;outline:none">'+
          '<option value="">كل التصنيفات</option>'+CATS.map(function(c){return'<option>'+c+'</option>';}).join('')+
        '</select>'+
        '<select id="bCit" onchange="filterBrowse()" style="padding:8px 11px;border:1px solid var(--border);border-radius:9px;font-size:11px;font-weight:600;background:var(--bg);color:var(--p);cursor:pointer;font-family:Tajawal,sans-serif;outline:none">'+
          '<option value="">كل المدن</option>'+CITIES.map(function(c){return'<option>'+c+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div id="bList">'+renderBrowse(open)+'</div>'+
    '</div></div>';
}
function filterBrowse(){
  var q=(document.getElementById('bQ')||{}).value||'';q=q.toLowerCase();
  var cat=(document.getElementById('bCat')||{}).value||'';
  var cit=(document.getElementById('bCit')||{}).value||'';
  var f=allProjects.filter(function(p){
    return p.status==='open'&&
      (!q||p.title.toLowerCase().includes(q))&&
      (!cat||p.category===cat)&&
      (!cit||p.city===cit);
  });
  var el=document.getElementById('bList');if(el)el.innerHTML=renderBrowse(f);
}

async function loadMyWorks(){
  var el=document.getElementById('myworks-content');
  if(el)el.innerHTML='<div class="loading">جاري التحميل...</div>';

  var bids=await api('/api/provider/bids');
  var projects=await api('/api/provider/projects');
  myBids=bids||[];myProjects=projects||[];

  // جلب هاتف العميل للعروض المقبولة والمشاريع الجارية
  var items=myBids.filter(function(b){return b.status==='accepted';})
    .concat(myProjects.filter(function(p){return p.status==='in_progress';}));
  await Promise.all(items.map(async function(item){
    var key='c_'+(item.request_id||item.id);
    if(!_pGet(key).phone){
      try{var rd=await api('/api/requests/'+(item.request_id||item.id));
        if(rd&&rd.client_phone)_pSet(key,{phone:rd.client_phone,name:rd.client_name||''});}
      catch(e){}
    }
  }));

  var accCount=myBids.filter(function(b){return b.status==='accepted';}).length;
  var pendCount=myBids.filter(function(b){return b.status==='pending';}).length;
  var progCount=myProjects.filter(function(p){return p.status==='in_progress';}).length;
  var doneCount=myProjects.filter(function(p){return p.status==='completed';}).length;

  var html=

function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var bd=document.getElementById('tab-bids');
  var pd=document.getElementById('tab-projects');
  if(bd)bd.style.display=tab==='bids'?'':'none';
  if(pd)pd.style.display=tab==='projects'?'':'none';
}
function filterBids(status){
  document.querySelectorAll('._bf').forEach(function(b){
    b.classList.toggle('on',b.dataset.f===status);
  });
  var list=status==='all'?myBids:myBids.filter(function(b){return b.status===status;});
  var el=document.getElementById('bids-list');if(el)el.innerHTML=renderMyBids(list);
}
function filterProjs(status){
  document.querySelectorAll('._pf').forEach(function(b){
    b.classList.toggle('on',b.dataset.f===status);
  });
  var list=status==='all'?myProjects:myProjects.filter(function(p){return p.status===status;});
  var el=document.getElementById('projects-list');if(el)el.innerHTML=renderMyProjects(list);
}

function previewAvatar(input){
 const file=input.files[0];if(!file)return;
 if(file.size>3*1024*1024){toast('الحجم الأقصى 3MB','error');return;}
 const reader=new FileReader();
 reader.onload=async e=>{
 const img=e.target.result;
 document.getElementById('avatarPreview').innerHTML=`<img src="${img}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
 applyProviderAvatar(img);localStorage.setItem('provider_avatar_'+me.id,img);
 await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({profile_image:img})});
 toast('تم حفظ الصورة','success');
 };
 reader.readAsDataURL(file);
}
async function removeAvatar(){await api('/api/provider/profile',{method:'PUT',body:JSON.stringify({profile_image:null})});localStorage.removeItem('provider_avatar_'+me.id);applyProviderAvatar(null);toast('تم حذف الصورة','success');pgProfile();}
async function addPortfolioImgs(input){
 const files=[...input.files].slice(0,6);if(!files.length)return;
 toast('جاري الرفع...','info');
 for(let i=0;i<files.length;i++){
 const file=files[i];
 if(file.size>5*1024*1024){toast('صورة '+file.name+' أكبر من 5MB','error');continue;}
 try{const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
 const result=await api('/api/provider/profile/portfolio',{method:'POST',body:JSON.stringify({image:base64})});
 if(result.message&&!result.ok){toast(result.message,'error');break;}
 }catch{toast('فشل رفع الصورة','error');}
 }
 toast('تم رفع الصور','success');pgProfile();
}
async function removePortfolioImg(index){await api('/api/provider/profile/portfolio/'+index,{method:'DELETE'});toast('تم حذف الصورة','success');pgProfile();}

async function submitBid(projectId){
 const priceEl=document.getElementById('bPrice');const daysEl=document.getElementById('bDays');const noteEl=document.getElementById('bNote');
 const price=priceEl?.value?.trim();const days=daysEl?.value?.trim();const note=noteEl?.value?.trim();
 if(!price||parseFloat(price)<=0){toast('أدخل سعر العرض','error');priceEl?.focus();return;}
 if(!days||parseInt(days)<=0){toast('أدخل مدة التنفيذ','error');daysEl?.focus();return;}
 if(!note){toast('أدخل رسالتك للعميل','error');noteEl?.focus();return;}
 const btn=document.querySelector('#ov .btn-dk');if(btn){btn.disabled=true;btn.textContent='جاري الإرسال...';}
 const res=await api(`/api/requests/${projectId}/bids`,{method:'POST',body:JSON.stringify({price:parseFloat(price),days:parseInt(days),note})});
 if(btn){btn.disabled=false;btn.innerHTML=S(I.send)+' إرسال العرض';}
 if(res.message&&!res.id&&!res.bid_id){toast(res.message||'حدث خطأ','error');return;}
 closeM();toast('تم إرسال عرضك بنجاح','success');
}

function renderMyProjects(list){
  if(!list.length)return emptyH('لا يوجد مشاريع','');
  return list.map(function(r){
    var isProg=r.status==='in_progress';
    var grad=isProg?'135deg,#78350f,#d97706':'135deg,#0f2548,#1B3A6B';
    var stBg=isProg?'#fff8e7':'#dcfce7',stCl=isProg?'#92400e':'#15803d',stBd=isProg?'#fde68a':'#bbf7d0';
    var stTx=isProg?'⚡ جارٍ':'✓ مكتمل';
    var key='c_'+r.id;
    var _cd=_pGet(key);
    var _ph=_cd.phone||r.client_phone||'';
    var cBtns=callBtns(_ph,r.client_name||_cd.name||'العميل',r.title||'');
    return '<div style="background:#fff;border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 14px rgba(27,58,107,.09);transition:all .2s" onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 10px 28px rgba(27,58,107,.14)\'" onmouseout="this.style.transform=\'none\';this.style.boxShadow=\'0 4px 14px rgba(27,58,107,.09)\'">'
      +'<div style="background:linear-gradient('+grad+');padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:relative">'
        +'<div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#F0A500,#fbbf24)"></div>'
        +'<div style="min-width:0;flex:1">'
          +'<div style="font-size:10px;color:rgba(255,255,255,.45);margin-bottom:4px">'+(r.project_number||'#'+r.id)+'</div>'
          +'<div style="font-size:15px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(r.title)+'</div>'
        +'</div>'
        +'<span style="background:'+stBg+';color:'+stCl+';border:1.5px solid '+stBd+';padding:5px 13px;border-radius:20px;font-size:11px;font-weight:800;flex-shrink:0;margin-right:12px">'+stTx+'</span>'
      +'</div>'
      +'<div style="padding:14px 20px">'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
          +(r.city?'<span style="background:var(--p-light);color:var(--p);border:1px solid var(--p-mid);padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700">📍 '+esc(r.city)+'</span>':'')
          +(r.category?'<span style="background:var(--bg);color:var(--text2);border:1px solid var(--border);padding:4px 11px;border-radius:20px;font-size:11px">'+esc(r.category)+'</span>':'')
          +(r.price?'<span style="background:#fff8e7;color:#92400e;border:1px solid #fde68a;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:800">💰 '+fpr(r.price)+'</span>':'')
          +(r.client_name?'<span style="background:var(--bg);color:var(--muted);border:1px solid var(--border);padding:4px 11px;border-radius:20px;font-size:11px">👤 '+esc(r.client_name)+'</span>':'')
        +'</div>'
        +'<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">'
          +'<button onclick="viewProjModal('+r.id+')" style="'+BTN_S+';background:var(--p);color:#fff">'
            +'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>عرض التفاصيل'
          +'</button>'
          +cBtns
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}
