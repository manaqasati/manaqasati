<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- SEO -->
<title id="pg-title">مزود خدمة — مناقصة</title>
<meta name="description" id="pg-desc" content="مزود خدمة معتمد على منصة مناقصة السعودية">
<meta name="robots" content="index, follow">
<meta property="og:type" content="profile">
<meta property="og:site_name" content="مناقصة">
<meta property="og:title" id="og-title" content="مزود خدمة — مناقصة">
<meta property="og:description" id="og-desc" content="مزود خدمة معتمد على منصة مناقصة">
<meta property="og:image" id="og-img" content="">
<link rel="canonical" id="pg-canonical" href="">
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#16213E;--p2:#1A2F5E;--p3:#0D1829;
  --gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;
  --text:#0F172A;--text2:#374151;--muted:#8896AA;--hint:#B0BDD0;
  --border:#E6E2D9;--bg:#F5F5F0;--white:#FFFFFF;
  --green:#16A34A;--green-l:#DCFCE7;
  --shadow:0 2px 8px rgba(15,23,42,.07);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ══ NAV ══ */
.nav{background:linear-gradient(135deg,var(--p3),var(--p));padding:0 18px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:200}
.logo{font-size:20px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;cursor:pointer;text-decoration:none}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.nav-btns{display:flex;gap:8px}
.btn-login{padding:8px 16px;background:transparent;color:rgba(255,255,255,.8);border:1.5px solid rgba(255,255,255,.2);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s}
.btn-login:hover{border-color:rgba(255,255,255,.5);color:#fff}
.btn-post{padding:8px 18px;background:var(--gold);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;box-shadow:0 2px 8px rgba(201,146,10,.35);transition:.15s}
.btn-post:hover{background:var(--gold-d);transform:translateY(-1px)}

/* ══ HERO ══ */
.hero{background:linear-gradient(150deg,var(--p3) 0%,var(--p) 60%,#1e3a6e 100%);padding:30px 18px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero-inner{max-width:680px;margin:0 auto;position:relative;z-index:1}
.hero-top{display:flex;gap:18px;align-items:flex-start;margin-bottom:18px}
.av-wrap{position:relative;flex-shrink:0}
.av{width:90px;height:90px;border-radius:50%;border:3px solid var(--gold);overflow:hidden;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:var(--gold-d);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.av img{width:100%;height:100%;object-fit:cover}
.ver-dot{position:absolute;bottom:3px;left:3px;width:24px;height:24px;background:#2563EB;border-radius:50%;border:3px solid var(--p3);display:flex;align-items:center;justify-content:center}
.hero-info{flex:1;min-width:0;padding-top:4px}
.hero-name{font-size:24px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ver-badge{font-size:10px;font-weight:800;color:#93C5FD;background:rgba(37,99,235,.2);border:1px solid rgba(37,99,235,.35);padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.hero-city{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.hero-rating{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stars{font-size:18px;letter-spacing:2px;line-height:1}
.rating-num{font-size:18px;font-weight:900;color:#fff}
.review-cnt{font-size:12px;color:rgba(255,255,255,.45)}
.active-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800}
.a-now{background:rgba(22,163,74,.2);color:#4ADE80;border:1px solid rgba(22,163,74,.3)}
.a-recent{background:rgba(201,146,10,.15);color:var(--gold);border:1px solid rgba(201,146,10,.25)}
.a-old{background:rgba(136,150,170,.1);color:var(--muted);border:1px solid rgba(136,150,170,.15)}
.specs-row{display:flex;gap:6px;flex-wrap:wrap}
.spec-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}

/* ══ STATS BAR ══ */
.stats-bar{background:var(--p);border-bottom:2px solid rgba(201,146,10,.3)}
.stats-inner{max-width:680px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
.stat{padding:14px 8px;text-align:center;border-left:1px solid rgba(255,255,255,.06)}
.stat:last-child{border-left:none}
.stat-v{font-size:22px;font-weight:900;color:#fff;line-height:1}
.stat-v.gold{color:var(--gold)}
.stat-l{font-size:10px;color:rgba(255,255,255,.35);font-weight:600;margin-top:3px}

/* ══ CONTENT ══ */
.wrap{max-width:680px;margin:0 auto;padding:18px 16px 40px}

/* ══ CONTACT CARD ══ */
.contact-card{background:linear-gradient(135deg,var(--p3),var(--p));border-radius:var(--radius);padding:18px;margin-bottom:14px;border:1px solid rgba(201,146,10,.25);box-shadow:0 4px 20px rgba(13,24,41,.2)}
.contact-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.contact-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:11px;font-size:14px;font-weight:800;text-decoration:none;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;transition:all .18s}
.cbtn-call{background:var(--gold);color:#fff;box-shadow:0 3px 12px rgba(201,146,10,.35)}
.cbtn-call:hover{background:var(--gold-d);transform:translateY(-1px)}
.cbtn-wa{background:#16A34A;color:#fff;box-shadow:0 3px 12px rgba(22,163,74,.3)}
.cbtn-wa:hover{background:#15803D;transform:translateY(-1px)}
.cbtn-msg{grid-column:1/-1;background:rgba(255,255,255,.08);color:#fff;border:1.5px solid rgba(255,255,255,.15)}
.cbtn-msg:hover{background:rgba(255,255,255,.14)}
.phone-display{text-align:center;font-size:13px;color:rgba(255,255,255,.4);margin-top:4px}

/* ══ SECTION ══ */
.sec{background:var(--white);border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sec-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sec-ic{width:32px;height:32px;border-radius:9px;background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-title{font-size:14px;font-weight:900;color:var(--text)}
.sec-count{font-size:11px;color:var(--muted);font-weight:600;margin-right:auto}

/* ══ BIO ══ */
.bio-text{font-size:13px;color:var(--text2);line-height:2}
.exp-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-l);color:var(--gold-d);border:1px solid var(--gold-soft);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px}

/* ══ PORTFOLIO ══ */
.port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.port-img{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;position:relative}
.port-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.port-img:hover img{transform:scale(1.07)}
.port-img::after{content:'🔍';position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0;transition:.2s}
.port-img:hover::after{background:rgba(0,0,0,.3);opacity:1}

/* ══ REVIEWS ══ */
.rev{padding:14px 0;border-bottom:1px solid var(--border)}
.rev:last-child{border-bottom:none;padding-bottom:0}
.rev-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rev-av{width:36px;height:36px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.rev-av img{width:100%;height:100%;object-fit:cover}
.rev-name{font-size:13px;font-weight:800;color:var(--text)}
.rev-meta{font-size:10px;color:var(--muted);margin-top:1px}
.rev-stars{margin-right:auto;color:var(--gold);font-size:14px;letter-spacing:1px}
.rev-comment{font-size:12px;color:var(--text2);line-height:1.9;padding-right:46px;margin-top:4px}
.rev-req{font-size:11px;color:var(--hint);padding-right:46px;margin-top:3px}

/* ══ CTA ══ */
.cta{background:linear-gradient(135deg,var(--p3),var(--p));border-radius:var(--radius);padding:24px 20px;text-align:center;margin-bottom:14px;border:2px solid rgba(201,146,10,.3);position:relative;overflow:hidden}
.cta::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.cta-ic{width:48px;height:48px;border-radius:14px;background:rgba(201,146,10,.15);border:1.5px solid rgba(201,146,10,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
.cta h3{font-size:17px;font-weight:900;color:#fff;margin-bottom:6px}
.cta p{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px;line-height:1.8}
.cta-btn{display:inline-block;padding:13px 32px;background:var(--gold);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;text-decoration:none;box-shadow:0 4px 16px rgba(201,146,10,.4);transition:.18s}
.cta-btn:hover{background:var(--gold-d);transform:translateY(-2px)}

/* ══ IMG VIEWER ══ */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;padding:16px}
.viewer.show{display:flex}
.viewer img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.viewer-close{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(255,255,255,.12);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.viewer-close:hover{background:rgba(255,255,255,.25)}

/* ══ SKELETON ══ */
.sk{background:linear-gradient(90deg,#eef2f8 25%,#e2eaf5 50%,#eef2f8 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}

/* ══ RESPONSIVE ══ */
@media(max-width:560px){
  .hero-top{flex-direction:column;align-items:center;text-align:center}
  .hero-name{justify-content:center}
  .specs-row,.hero-rating{justify-content:center}
  .hero-city{justify-content:center}
  .contact-btns{grid-template-columns:1fr 1fr}
  .stats-inner{grid-template-columns:repeat(2,1fr)}
  .stat{border-bottom:1px solid rgba(255,255,255,.06)}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="logo" href="/"><span class="logo-dot"></span>مناقصة</a>
  <div class="nav-btns">
    <button class="btn-login" onclick="location.href='auth.html'">تسجيل الدخول</button>
    <button class="btn-post" onclick="location.href='auth.html'">أنشر مشروعاً</button>
  </div>
</nav>

<!-- HERO -->
<div id="hero-sec">
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-top">
        <div class="av-wrap">
          <div class="av sk" style="border:none"></div>
        </div>
        <div class="hero-info">
          <div class="sk" style="height:24px;width:55%;margin-bottom:10px"></div>
          <div class="sk" style="height:13px;width:35%;margin-bottom:12px"></div>
          <div class="sk" style="height:18px;width:45%"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STATS -->
<div id="stats-sec" style="display:none">
  <div class="stats-bar">
    <div class="stats-inner">
      <div class="stat"><div class="stat-v gold" id="s-avg">—</div><div class="stat-l">التقييم</div></div>
      <div class="stat"><div class="stat-v" id="s-cnt">—</div><div class="stat-l">تقييم</div></div>
      <div class="stat"><div class="stat-v" id="s-bids">—</div><div class="stat-l">عرض مقدّم</div></div>
      <div class="stat"><div class="stat-v" id="s-done">—</div><div class="stat-l">مشروع منجز</div></div>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="wrap">
  <div id="content">
    <div class="sec"><div class="sk" style="height:14px;width:30%;margin-bottom:14px"></div><div class="sk" style="height:12px;margin-bottom:7px"></div><div class="sk" style="height:12px;width:75%"></div></div>
    <div class="sec"><div class="sk" style="height:50px;margin-bottom:8px"></div><div class="sk" style="height:50px"></div></div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div class="viewer" id="viewer" onclick="if(event.target===this)closeImg()">
  <button class="viewer-close" onclick="closeImg()">✕</button>
  <img id="viewerImg" src="" alt="">
</div>

<!-- JSON-LD Schema for SEO -->
<script type="application/ld+json" id="schema-json"></script>

<script>
var API = 'https://manaqasati-production.up.railway.app';

function getId(){ return new URLSearchParams(location.search).get('id'); }

function starsHtml(n, sz){
  var h='', size=sz||'16px';
  for(var i=1;i<=5;i++) h+='<span style="color:'+(i<=Math.round(n)?'#C9920A':'rgba(255,255,255,.2)')+';font-size:'+size+'">★</span>';
  return h;
}
function starsGold(n, sz){
  var h='', size=sz||'14px';
  for(var i=1;i<=5;i++) h+='<span style="color:'+(i<=Math.round(n)?'#C9920A':'#E2E8F0')+';font-size:'+size+'">★</span>';
  return h;
}

function ago(d){
  if(!d) return '';
  var m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<2) return 'نشط الآن';
  if(m<60) return 'منذ '+m+' د';
  var h=Math.floor(m/60);
  if(h<24) return 'منذ '+h+' س';
  return 'منذ '+Math.floor(h/24)+' يوم';
}
function activeCls(d){
  if(!d) return 'a-old';
  var m=Math.floor((Date.now()-new Date(d))/60000);
  return m<60?'a-now':m<1440?'a-recent':'a-old';
}

function openImg(src){
  document.getElementById('viewerImg').src=src;
  document.getElementById('viewer').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeImg(){
  document.getElementById('viewer').classList.remove('show');
  document.body.style.overflow='';
}

function formatPhone(ph){
  if(!ph) return '';
  // normalize: remove leading 0, add 966
  var n = ph.replace(/\D/g,'');
  if(n.startsWith('966')) return '+'+n;
  if(n.startsWith('0'))   return '+966'+n.slice(1);
  return '+966'+n;
}

async function loadProfile(){
  var id = getId();
  if(!id){
    document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted);font-size:15px">لم يتم تحديد المزود</div>';
    return;
  }

  try {
    var results = await Promise.all([
      fetch(API+'/api/providers/'+id).then(function(r){return r.json();}),
      fetch(API+'/api/ratings/provider/'+id).then(function(r){return r.json();})
    ]);
    var p=results[0], rat=results[1];

    if(!p||p.message==='غير موجود'){
      document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)">المزود غير موجود</div>';
      return;
    }

    var avg    = parseFloat(p.avg_rating)||parseFloat(rat&&rat.average)||0;
    var cnt    = parseInt(p.review_count)||parseInt(rat&&rat.count)||0;
    var vrf    = !!(p.profile_image && p.bio && (p.specialties||[]).length>0 && avg>0);
    var lastA  = p.last_bumped_at || p.created_at;
    var phone  = p.phone||'';
    var waNum  = formatPhone(phone);
    var reviews= (rat&&rat.reviews)||[];
    var ports  = p.portfolio_images||[];

    // ── SEO ─────────────────────────────────────
    var pName  = p.business_name||p.name||'مزود خدمة';
    var pSpecs = (p.specialties||[]).join('، ');
    var pCity  = p.city||'السعودية';
    var pgTitle= pName + (pSpecs?' — '+pSpecs:'') + ' | مناقصة';
    var pgDesc = pName+' مزود خدمة محترف في '+pCity+(pSpecs?' متخصص في '+pSpecs:'')+(avg>0?' — تقييم '+avg.toFixed(1)+' من 5':'');

    document.getElementById('pg-title').textContent    = pgTitle;
    document.getElementById('pg-desc').content         = pgDesc;
    document.getElementById('og-title').content        = pgTitle;
    document.getElementById('og-desc').content         = pgDesc;
    document.getElementById('pg-canonical').href       = location.href;
    if(p.profile_image && !p.profile_image.startsWith('data:'))
      document.getElementById('og-img').content = p.profile_image;
    document.title = pgTitle;

    // JSON-LD
    var schema = {
      "@context":"https://schema.org",
      "@type":"LocalBusiness",
      "name": pName,
      "description": pgDesc,
      "address":{"@type":"PostalAddress","addressLocality":pCity,"addressCountry":"SA"},
      "telephone": phone||undefined,
      "aggregateRating": avg>0?{"@type":"AggregateRating","ratingValue":avg.toFixed(1),"reviewCount":cnt}:undefined,
      "url": location.href
    };
    document.getElementById('schema-json').textContent = JSON.stringify(schema);

    // ── HERO ────────────────────────────────────
    var avHtml = p.profile_image
      ? '<img src="'+p.profile_image+'" alt="'+pName+'" loading="eager">'
      : pName.charAt(0);
    var verDot   = vrf?'<div class="ver-dot"><svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>':'';
    var verBadge = vrf?'<span class="ver-badge"><svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>موثّق</span>':'';
    var specChips= (p.specialties||[]).map(function(s){return '<span class="spec-chip">'+s+'</span>';}).join('');

    document.getElementById('hero-sec').innerHTML=
      '<div class="hero"><div class="hero-inner">'
      +'<div class="hero-top">'
      +'<div class="av-wrap"><div class="av">'+avHtml+'</div>'+verDot+'</div>'
      +'<div class="hero-info">'
      +'<h1 class="hero-name">'+pName+verBadge+'</h1>'
      +'<div class="hero-city"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+pCity+'</div>'
      +(avg>0?'<div class="hero-rating">'+starsHtml(avg,'18px')+'<span class="rating-num">'+avg.toFixed(1)+'</span><span class="review-cnt">('+cnt+' تقييم)</span></div>':'')
      +'<div style="margin-bottom:8px"><span class="active-badge '+activeCls(lastA)+'">● '+ago(lastA)+'</span></div>'
      +(specChips?'<div class="specs-row">'+specChips+'</div>':'')
      +'</div></div>'
      +'</div></div>';

    // ── STATS ────────────────────────────────────
    document.getElementById('stats-sec').style.display='block';
    document.getElementById('s-avg').textContent  = avg>0?avg.toFixed(1):'—';
    document.getElementById('s-cnt').textContent  = cnt;
    document.getElementById('s-bids').textContent = p.total_bids||0;
    document.getElementById('s-done').textContent = p.completed_projects||0;

    // ── MAIN CONTENT ─────────────────────────────
    var html='';

    // ✅ أزرار التواصل
    html+='<div class="contact-card">'
      +'<div class="contact-title">تواصل مع المزود</div>'
      +'<div class="contact-btns">';

    if(phone){
      html+='<a href="tel:'+phone+'" class="cbtn cbtn-call">'
        +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 7.63 19.79 19.79 0 01.01 4 2 2 0 012 1.84h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.72 6.72l1.24-1.24a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>'
        +'اتصال</a>';
      html+='<a href="https://wa.me/'+waNum.replace('+','')+'" target="_blank" rel="noopener" class="cbtn cbtn-wa">'
        +'<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
        +'واتساب</a>';
      html+='<div class="phone-display">'+phone+'</div>';
    }else{
      html+='<button class="cbtn cbtn-call" onclick="location.href=\'auth.html\'" style="background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.2)">'
        +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 7.63"/></svg>'
        +'سجّل للاتصال</button>';
      html+='<button class="cbtn cbtn-wa" onclick="location.href=\'auth.html\'" style="background:rgba(22,163,74,.15);border:1.5px solid rgba(22,163,74,.3)">'
        +'واتساب — سجّل دخول</button>';
    }

    html+='</div>';
    // زر المحادثة
    html+='<button class="cbtn cbtn-msg" onclick="location.href=\'auth.html\'">'
      +'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'
      +'إرسال رسالة عبر المنصة</button>';
    html+='</div>';

    // نبذة
    if(p.bio){
      html+='<div class="sec">'
        +'<div class="sec-head"><div class="sec-ic"><svg width="15" height="15" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div><div class="sec-title">نبذة عن المزود</div></div>'
        +'<p class="bio-text">'+p.bio+'</p>'
        +(p.experience_years?'<div class="exp-badge"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+p.experience_years+' سنة خبرة</div>':'')
        +'</div>';
    }

    // معرض الأعمال
    if(ports.length){
      html+='<div class="sec">'
        +'<div class="sec-head"><div class="sec-ic"><svg width="15" height="15" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div class="sec-title">معرض الأعمال</div><div class="sec-count">'+ports.length+' صورة</div></div>'
        +'<div class="port-grid">';
      for(var i=0;i<ports.length;i++){
        html+='<div class="port-img" data-src="'+ports[i]+'">'
          +'<img src="'+ports[i]+'" loading="lazy" alt="عمل '+(i+1)+'">'
          +'</div>';
      }
      html+='</div></div>';
    }

    // تقييمات
    if(reviews.length){
      html+='<div class="sec">'
        +'<div class="sec-head"><div class="sec-ic"><svg width="15" height="15" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div class="sec-title">تقييمات العملاء</div><div class="sec-count">'+reviews.length+' تقييم</div></div>';
      for(var j=0;j<reviews.length;j++){
        var rv=reviews[j];
        var rvAv=rv.reviewer_image
          ?'<img src="'+rv.reviewer_image+'" alt="'+rv.reviewer_name+'">'
          :(rv.reviewer_name||'م').charAt(0);
        var rvDate=rv.created_at?new Date(rv.created_at).toLocaleDateString('ar-SA'):'';
        html+='<div class="rev">'
          +'<div class="rev-top">'
          +'<div class="rev-av">'+rvAv+'</div>'
          +'<div><div class="rev-name">'+(rv.reviewer_name||'عميل')+'</div><div class="rev-meta">'+rvDate+(rv.request_title?' · '+rv.request_title:'')+'</div></div>'
          +'<div class="rev-stars">'+starsGold(rv.rating,'14px')+'</div>'
          +'</div>'
          +(rv.comment?'<p class="rev-comment">'+rv.comment+'</p>':'')
          +'</div>';
      }
      html+='</div>';
    }

    // CTA
    html+='<div class="cta">'
      +'<div class="cta-ic">🏗️</div>'
      +'<h3>هل تحتاج خدمة مشابهة؟</h3>'
      +'<p>انشر مشروعك مجاناً واستقبل عروض من أفضل المزودين في السعودية خلال ساعات</p>'
      +'<a href="auth.html" class="cta-btn">أنشر مشروعك الآن ←</a>'
      +'</div>';

    document.getElementById('content').innerHTML=html;

    // Portfolio click events
    document.querySelectorAll('.port-img').forEach(function(el){
      el.addEventListener('click',function(){openImg(el.getAttribute('data-src'));});
    });

  }catch(e){
    console.error(e);
    document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)">تعذر تحميل الملف الشخصي</div>';
  }
}

loadProfile();
</script>
</body>
</html>
