<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>مناقصة — الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>

:root{
  --p:#1B3A6B;--p2:#142d54;--p3:#2C5282;
  --p-light:#e8eef7;--p-mid:#c5d6ee;
  --gold:#F0A500;--gold-d:#c78500;--gold-l:#fff8e7;--gold-soft:#fef3cd;
  --text:#0d1f3c;--text2:#2d4a6e;--muted:#6b85a8;--hint:#9db3cc;
  --border:#dce5f0;--border2:#b8cde4;
  --bg:#f4f7fb;--white:#fff;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --yellow:#d97706;--yellow-l:#fef3c7;
  --radius:14px;--radius-sm:10px;--radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.side{width:260px;background:var(--white);border-left:1px solid var(--border);height:100vh;position:fixed;right:0;top:0;display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px rgba(27,58,107,0.07)}
.side-head{padding:0;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.side-brand{background:linear-gradient(135deg,var(--p),var(--p3));padding:18px 18px 14px;position:relative;overflow:hidden}
.side-brand::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.net-svg{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.25}
.logo{font-size:22px;font-weight:900;color:#fff;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;position:relative;z-index:1;margin-top:2px}

/* ══ AUTH PAGE ══ */
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;background:var(--bg);}
.auth-hero{
  background:linear-gradient(135deg,var(--p),var(--p3));
  width:100%;padding:28px 20px 24px;text-align:center;
  position:relative;overflow:hidden;flex-shrink:0;
}
.auth-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);}
.auth-card{
  width:100%;max-width:440px;
  background:var(--white);
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
  box-shadow:0 8px 32px rgba(27,58,107,.12);
  overflow:hidden;
  margin-bottom:24px;
}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;gap:4px;margin:18px 18px 0;}
.auth-tab{flex:1;padding:10px;border:none;background:transparent;border-radius:9px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .18s;}
.auth-tab.on{background:var(--white);color:var(--p);box-shadow:0 2px 8px rgba(27,58,107,.1);}
.auth-body{padding:18px 18px;}
.method-row{display:flex;flex-direction:row;background:var(--bg);border-radius:10px;padding:3px;gap:3px;margin-bottom:14px;width:100%;}
.mt{flex:1;min-width:0;padding:9px 8px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
.mt svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;flex-shrink:0;}
.mt.on{background:var(--white);color:var(--p);box-shadow:0 1px 6px rgba(27,58,107,.1);}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.role{border:2px solid var(--border);border-radius:var(--radius,14px);padding:14px 12px;cursor:pointer;text-align:center;transition:all .18s;position:relative;}
.role:hover{border-color:var(--p-mid);background:var(--p-light);}
.role.on{border-color:var(--p);background:var(--p-light);}
.role.on::after{content:'✓';position:absolute;top:8px;left:10px;font-size:11px;font-weight:900;color:var(--p);width:18px;height:18px;border-radius:50%;background:rgba(27,58,107,.12);display:flex;align-items:center;justify-content:center;}
.role-ic{font-size:26px;margin-bottom:6px;line-height:1;}
.role-nm{font-size:13px;font-weight:800;color:var(--text);}
.role-ds{font-size:10px;color:var(--muted);margin-top:2px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.fi{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;background:var(--white);transition:all .18s;}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,58,107,.08);}
.fi::placeholder{color:var(--hint);}
.fi-sel{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--p);outline:none;background:var(--white);cursor:pointer;transition:all .18s;}
.fi-sel:focus{border-color:var(--p);}
.pw-wrap{position:relative;}
.pw-wrap .fi{padding-left:44px;}
.pw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--bg);border:none;cursor:pointer;color:var(--muted);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:.12s;}
.pw-eye:hover{background:var(--p-light);color:var(--p);}
.pw-eye svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.link-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:600;}
.link-btn:hover{color:var(--p);}
.back-a{display:block;text-align:center;margin:12px 0 20px;font-size:12px;color:var(--hint);font-weight:600;text-decoration:none;}
.back-a:hover{color:var(--p);}
.al{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:12px;display:none;border:1px solid;}
.al.err{display:block;background:var(--red-l);color:var(--red);border-color:#fecaca;}
.al.ok{display:block;background:var(--green-l);color:var(--green);border-color:#bbf7d0;}
.btn-new{background:var(--gold);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px;transition:all .18s;box-shadow:0 3px 12px rgba(240,165,0,.3);}
.btn-new:hover{background:var(--gold-d);transform:translateY(-1px);box-shadow:0 5px 16px rgba(240,165,0,.35);}
.btn-new:disabled{opacity:.5;cursor:not-allowed;transform:none;}
@media(max-width:400px){.auth-card{margin:0 0 24px;border-radius:0;}}
</style>
</head>
<body>
<div class="auth-page">

  <div class="auth-hero">
    <svg class="net-svg" viewBox="0 0 400 90" preserveAspectRatio="none">
      <line x1="30" y1="25" x2="130" y2="42" stroke="#fff" stroke-width="1.2"/>
      <line x1="130" y1="42" x2="230" y2="20" stroke="#fff" stroke-width="1.2"/>
      <line x1="230" y1="20" x2="360" y2="34" stroke="#fff" stroke-width="1"/>
      <line x1="130" y1="42" x2="180" y2="24" stroke="#F0A500" stroke-width="1" stroke-opacity="0.7"/>
      <circle cx="30" cy="25" r="3" fill="#fff" opacity="0.4"/>
      <circle cx="130" cy="42" r="7" fill="#fff" opacity="0.45"/>
      <circle cx="230" cy="20" r="4" fill="#fff" opacity="0.35"/>
      <circle cx="360" cy="34" r="3" fill="#fff" opacity="0.3"/>
      <circle cx="180" cy="24" r="5" fill="#F0A500" opacity="0.7"/>
    </svg>
    <div class="logo" style="justify-content:center;position:relative;z-index:1">
      <span class="logo-dot"></span>مناقصة
    </div>
    <div class="logo-sub" style="text-align:center;position:relative;z-index:1;margin-top:3px" id="hd-s">سجّل دخولك لمتابعة مشاريعك</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="setMode('login')">تسجيل الدخول</button>
      <button class="auth-tab" onclick="setMode('register')">حساب جديد</button>
    </div>
    <div class="auth-body">
      <div class="al" id="al"></div>

      <!-- طريقة الدخول -->
      <div class="method-row" id="method-row">
        <button class="mt on" id="mt-email" onclick="setMethod('email')">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
          بريد إلكتروني
        </button>
        <button class="mt" id="mt-phone" onclick="setMethod('phone')">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 015.19 15a19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 4h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 11.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          رقم الجوال
        </button>
      </div>

      <!-- ✅ نوع الحساب — أولاً -->
      <div class="roles" id="roles-wrap" style="display:none">
        <div class="role on" id="rc-c" onclick="selRole('client')">
          <div class="role-ic">👤</div>
          <div class="role-nm">عميل</div>
          <div class="role-ds">أنشر مشاريع</div>
        </div>
        <div class="role" id="rc-p" onclick="selRole('provider')">
          <div class="role-ic">🔧</div>
          <div class="role-nm">مزود خدمة</div>
          <div class="role-ds">قدّم عروض</div>
        </div>
      </div>

      <!-- ✅ الاسم الكامل — ثانياً -->
      <div class="fg" id="fg-name" style="display:none">
        <label>الاسم الكامل *</label>
        <input id="i-name" class="fi" type="text" placeholder="اسمك الكامل">
      </div>

      <!-- بريد إلكتروني -->
      <div class="fg" id="fg-email">
        <label>البريد الإلكتروني *</label>
        <input id="i-email" class="fi" type="email" placeholder="example@email.com" inputmode="email">
      </div>

      <!-- جوال (دخول) -->
      <div class="fg" id="fg-phone" style="display:none">
        <label>رقم الجوال *</label>
        <input id="i-phone" class="fi" type="tel" placeholder="05xxxxxxxx" inputmode="numeric" maxlength="10">
      </div>

      <!-- كلمة المرور -->
      <div class="fg">
        <label>كلمة المرور *</label>
        <div class="pw-wrap">
          <input id="i-pass" class="fi" type="password" placeholder="كلمة المرور">
          <button class="pw-eye" type="button" onclick="togglePw('i-pass',this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <!-- تأكيد (تسجيل) -->
      <div class="fg" id="fg-pass2" style="display:none">
        <label>تأكيد كلمة المرور *</label>
        <div class="pw-wrap">
          <input id="i-pass2" class="fi" type="password" placeholder="أعد كتابة كلمة المرور">
          <button class="pw-eye" type="button" onclick="togglePw('i-pass2',this)">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <!-- جوال (تسجيل) -->
      <div class="fg" id="fg-reg-phone" style="display:none">
        <label>رقم الجوال *</label>
        <input id="i-reg-phone" class="fi" type="tel" placeholder="05xxxxxxxx" inputmode="numeric" maxlength="10">
      </div>

      <!-- المدينة -->
      <div class="fg" id="fg-city" style="display:none">
        <label>المدينة <span style="color:var(--red)">*</span></label>
        <select id="i-city" class="fi-sel">
          <option value="">اختر مدينتك</option>
          <option>الرياض</option><option>الخرج</option><option>الدوادمي</option><option>المجمعة</option><option>القويعية</option><option>الزلفي</option><option>الدرعية</option><option>المزاحمية</option><option>جدة</option><option>مكة المكرمة</option><option>الطائف</option><option>رابغ</option><option>القنفذة</option><option>الجموم</option><option>الليث</option><option>الدمام</option><option>الخبر</option><option>الظهران</option><option>الأحساء</option><option>القطيف</option><option>الجبيل</option><option>حفر الباطن</option><option>المدينة المنورة</option><option>ينبع</option><option>العلا</option><option>بريدة</option><option>عنيزة</option><option>الرس</option><option>أبها</option><option>خميس مشيط</option><option>بيشة</option><option>النماص</option><option>تبوك</option><option>الوجه</option><option>ضباء</option><option>حائل</option><option>بقعاء</option><option>عرعر</option><option>طريف</option><option>رفحاء</option><option>سكاكا</option><option>دومة الجندل</option><option>القريات</option><option>الباحة</option><option>بلجرشي</option><option>جازان</option><option>صبيا</option><option>أبو عريش</option><option>نجران</option><option>شرورة</option><option>وادي الدواسر</option><option>السليل</option>
        </select>
      </div>

      <!-- زر الإرسال -->
      <button class="btn-new" id="btn-s" onclick="doSubmit()" style="width:100%;justify-content:center;margin-top:4px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span id="btn-t">تسجيل الدخول</span>
      </button>

      <div style="text-align:center;margin-top:11px" id="forgot-w">
        <button class="link-btn" onclick="doForgot()">نسيت كلمة المرور؟</button>
      </div>
      <p style="font-size:11px;color:var(--hint);text-align:center;margin-top:9px;display:none" id="note-reg">
        بالتسجيل توافق على <a href="terms.html" style="color:var(--p);font-weight:700;text-decoration:none">شروط الاستخدام</a>
      </p>
    </div>
  </div>

  <a href="index.html" class="back-a">← تصفح المشاريع بدون تسجيل</a>
</div>

<!-- Reset page -->
<div id="reset-pg" style="display:none;min-height:100vh;background:var(--bg);flex-direction:column">
  <div class="auth-hero">
    <svg class="net-svg" viewBox="0 0 400 90" preserveAspectRatio="none">
      <line x1="30" y1="25" x2="130" y2="42" stroke="#fff" stroke-width="1.2"/>
      <line x1="130" y1="42" x2="230" y2="20" stroke="#fff" stroke-width="1.2"/>
      <circle cx="130" cy="42" r="7" fill="#fff" opacity="0.45"/>
      <circle cx="230" cy="20" r="5" fill="#F0A500" opacity="0.7"/>
    </svg>
    <div class="logo" style="justify-content:center;position:relative;z-index:1"><span class="logo-dot"></span>مناقصة</div>
    <div class="logo-sub" style="text-align:center;position:relative;z-index:1;margin-top:3px">إعادة تعيين كلمة المرور</div>
  </div>
  <div class="auth-card">
    <div class="auth-body">
      <div class="al" id="reset-al"></div>
      <div class="fg"><label>كلمة المرور الجديدة *</label><div class="pw-wrap"><input id="rp1" class="fi" type="password" placeholder="6 أحرف على الأقل"><button class="pw-eye" type="button" onclick="togglePw('rp1',this)"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <div class="fg"><label>تأكيد كلمة المرور *</label><div class="pw-wrap"><input id="rp2" class="fi" type="password" placeholder="أعد الكتابة"><button class="pw-eye" type="button" onclick="togglePw('rp2',this)"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <button class="btn-new" onclick="doReset()" style="width:100%;justify-content:center">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        تعيين كلمة المرور
      </button>
    </div>
  </div>
  <a href="auth.html" class="back-a">← العودة لتسجيل الدخول</a>
</div>

<script>
var API='https://manaqasati-production.up.railway.app';
var MODE='login', ROLE='client', METHOD='email';

(function(){
  var t=new URLSearchParams(location.search).get('reset');
  if(!t) return;
  window._rt=t;
  document.querySelector('.auth-page').style.display='none';
  var rp=document.getElementById('reset-pg');
  rp.style.display='flex';
})();

async function apiFetch(p,o){
  return fetch(API+p,Object.assign({headers:{'Content-Type':'application/json'}},o||{}))
    .then(function(r){return r.json();}).catch(function(){return{};});
}

async function doReset(){
  var p1=document.getElementById('rp1').value,p2=document.getElementById('rp2').value,al=document.getElementById('reset-al');
  if(!p1||p1.length<6){setAl(al,'كلمة المرور 6 أحرف على الأقل','err');return;}
  if(p1!==p2){setAl(al,'كلمتا المرور غير متطابقتين','err');return;}
  var r=await apiFetch('/api/auth/reset-password',{method:'POST',body:JSON.stringify({token:window._rt,new_password:p1})});
  if(r.ok){setAl(al,'تم التعيين! جاري التحويل...','ok');setTimeout(function(){location.href='auth.html';},1800);}
  else setAl(al,r.message||'حدث خطأ','err');
}

function setAl(el,msg,t){if(!el)el=document.getElementById('al');el.textContent=msg;el.className='al '+t;}
function clearAl(){var e=document.getElementById('al');if(e){e.textContent='';e.className='al';}}
function show(id,v){var e=document.getElementById(id);if(e)e.style.display=v?'block':'none';}
function showGrid(id,v){var e=document.getElementById(id);if(e)e.style.display=v?'grid':'none';}

function setMode(m){
  MODE=m;
  var isR=m==='register';
  document.querySelectorAll('.auth-tab').forEach(function(t,i){t.classList.toggle('on',i===(isR?1:0));});
  show('method-row',!isR);
  show('fg-name',isR);
  showGrid('roles-wrap',isR);
  show('fg-pass2',isR);
  show('fg-reg-phone',isR);
  show('fg-city',isR);
  show('forgot-w',!isR);
  document.getElementById('note-reg').style.display=isR?'block':'none';
  if(isR){show('fg-email',true);show('fg-phone',false);}
  else setMethod(METHOD);
  document.getElementById('hd-s').textContent=isR?'انضم لمناقصة اليوم':'سجّل دخولك لمتابعة مشاريعك';
  document.getElementById('btn-t').textContent=isR?'إنشاء الحساب':'تسجيل الدخول';
  clearAl();
}

function setMethod(m){
  METHOD=m;
  document.getElementById('mt-email').classList.toggle('on',m==='email');
  document.getElementById('mt-phone').classList.toggle('on',m==='phone');
  show('fg-email',m==='email');
  show('fg-phone',m==='phone');
}

function selRole(r){
  ROLE=r;
  document.getElementById('rc-c').classList.toggle('on',r==='client');
  document.getElementById('rc-p').classList.toggle('on',r==='provider');
}

function togglePw(id,btn){
  var inp=document.getElementById(id);var s=inp.type==='password';inp.type=s?'text':'password';
  btn.innerHTML=s
    ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function getV(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function validatePhone(v){var d=v.replace(/[^0-9]/g,'');return d.length===10&&d.startsWith('05');}
function fmtPhone(v){var d=v.replace(/[^0-9]/g,'');if(d.startsWith('966'))return d;if(d.startsWith('0'))d=d.slice(1);return'966'+d;}

async function doSubmit(){
  clearAl();
  var pass=document.getElementById('i-pass').value;
  if(!pass||pass.length<6){setAl(null,'كلمة المرور 6 أحرف على الأقل','err');return;}
  var btn=document.getElementById('btn-s');btn.disabled=true;
  document.getElementById('btn-t').textContent='جاري...';
  try{
    var url,body;
    if(MODE==='login'){
      if(METHOD==='email'){
        var email=getV('i-email');
        if(!email||!email.includes('@')){setAl(null,'أدخل بريداً إلكترونياً صحيحاً','err');return;}
        body={email:email,password:pass};
      }else{
        var phone=getV('i-phone');
        if(!validatePhone(phone)){setAl(null,'رقم جوال سعودي صحيح (05xxxxxxxx)','err');return;}
        body={phone:fmtPhone(phone),password:pass};
      }
      url='/api/auth/login';
    }else{
      var name=getV('i-name'),em=getV('i-email'),p2=document.getElementById('i-pass2').value,rph=getV('i-reg-phone'),city=getV('i-city');
      if(!name){setAl(null,'أدخل اسمك الكامل','err');return;}
      if(!em||!em.includes('@')){setAl(null,'أدخل بريداً إلكترونياً صحيحاً','err');return;}
      if(pass!==p2){setAl(null,'كلمتا المرور غير متطابقتين','err');return;}
      if(!validatePhone(rph)){setAl(null,'رقم جوال سعودي صحيح (05xxxxxxxx)','err');return;}
      if(!city){setAl(null,'يرجى اختيار مدينتك','err');return;}
      url='/api/auth/register';
      body={name:name,email:em,password:pass,role:ROLE,city:city,phone:fmtPhone(rph)};
    }
    var d=await apiFetch(url,{method:'POST',body:JSON.stringify(body)});
    if(d.token){
      localStorage.setItem('token',d.token);
      localStorage.setItem('user',JSON.stringify(d.user));
      setAl(null,'تم بنجاح! جاري التحويل...','ok');
      setTimeout(function(){
        var rl=d.user.role;
        location.href=rl==='admin'?'dashboard-admin.html':rl==='provider'?'dashboard-provider.html':'dashboard-client.html';
      },900);
    }else setAl(null,d.message||'حدث خطأ، حاول مرة أخرى','err');
  }catch(e){
    setAl(null,'تعذر الاتصال بالسيرفر','err');
  }finally{
    btn.disabled=false;
    document.getElementById('btn-t').textContent=MODE==='login'?'تسجيل الدخول':'إنشاء الحساب';
  }
}

async function doForgot(){
  var id=METHOD==='email'?getV('i-email'):getV('i-phone');
  if(!id){setAl(null,'أدخل بريدك الإلكتروني أولاً','err');return;}
  var r=await apiFetch('/api/auth/forgot-password',{method:'POST',body:JSON.stringify({email:id})});
  setAl(null,r.message||'تم إرسال رابط إعادة التعيين','ok');
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')doSubmit();});
</script>
</body>
</html>
