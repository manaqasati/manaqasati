<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>مناقصة — الدخول</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#0f2545,#1473E6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.hd{background:linear-gradient(135deg,#0f2545,#1473E6);padding:28px 28px 22px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);top:-50px;left:-30px}
.logo{font-size:24px;font-weight:900;color:#fff;position:relative}.logo b{color:#fbbf24}
.hd-t{font-size:15px;font-weight:700;color:rgba(255,255,255,.8);margin-top:6px;position:relative}
.hd-s{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;position:relative}
.tabs{display:flex;background:#f1f5f9;padding:4px;gap:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;transition:.15s}
.tab.on{background:#fff;color:#1473E6;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.body{padding:24px 28px}
.al{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:700;margin-bottom:14px;display:none;border:1px solid}
.al.err{display:block;background:#fef2f2;color:#dc2626;border-color:#fca5a5}
.al.ok{display:block;background:#f0fdf4;color:#16a34a;border-color:#86efac}
.method-toggle{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;gap:3px;margin-bottom:16px}
.mt-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.mt-btn.on{background:#fff;color:#1473E6;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px}
.fg input,.fg select{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;font-family:inherit;outline:none;transition:.15s;background:#fff}
.fg input:focus,.fg select:focus{border-color:#1473E6;box-shadow:0 0 0 3px rgba(20,115,230,.1)}
.fg input::placeholder{color:#94a3b8}
.phone-wrap{display:flex;gap:6px}
.phone-code{width:80px;padding:11px 10px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:700;color:#374151;text-align:center;background:#f8f9fb;font-family:inherit;outline:none}
.phone-num{flex:1;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;font-family:inherit;outline:none;transition:.15s}
.phone-num:focus{border-color:#1473E6;box-shadow:0 0 0 3px rgba(20,115,230,.1)}
.pw-wrap{position:relative}
.pw-wrap input{padding-left:44px}
.pw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:#f1f5f9;border:none;cursor:pointer;color:#64748b;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:.12s}
.pw-eye:hover{background:#e2e8f0;color:#1473E6}
.pw-eye svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.role-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rc{border:2px solid #e2e8f0;border-radius:12px;padding:14px 12px;cursor:pointer;text-align:center;transition:.15s;user-select:none}
.rc:hover{border-color:#93c5fd;background:#eff6ff}
.rc.on{border-color:#1473E6;background:#EBF3FD}
.rc .ico{font-size:24px;margin-bottom:5px}
.rc .nm{font-size:13px;font-weight:800;color:#0f172a}
.rc .ds{font-size:10px;color:#64748b;margin-top:2px}
.btn-main{width:100%;padding:13px;background:#1473E6;border:none;color:#fff;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:hover{background:#0d5fc9}.btn-main:disabled{opacity:.5;cursor:not-allowed}
.link-btn{background:none;border:none;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.link-btn:hover{color:#1473E6}
.note{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px}
.note a{color:#1473E6;font-weight:700;text-decoration:none}
.bh{text-align:center;margin-top:16px;font-size:12px}
.bh a{color:rgba(255,255,255,.7);font-weight:600}

<script>
var API = 'https://manaqasati-production.up.railway.app';
var MODE = 'login';
var ROLE = 'client';
var METHOD = 'email';

// ── Reset Password ──
function checkReset() {
 var params = new URLSearchParams(location.search);
 var token = params.get('reset');
 if (!token) return;
 document.getElementById('reset-page').style.display = 'block';
 document.getElementById('auth-page').style.display = 'none';
 window._resetToken = token;
}

async function doReset() {
 var p1 = document.getElementById('rp1').value;
 var p2 = document.getElementById('rp2').value;
 var al = document.getElementById('reset-al');
 if (!p1 || p1.length < 6) { al.textContent = 'كلمة المرور 6 أحرف على الأقل'; al.className = 'al err'; return; }
 if (p1 !== p2) { al.textContent = 'كلمتا المرور غير متطابقتين'; al.className = 'al err'; return; }
 try {
 var r = await fetch(API + '/api/auth/reset-password', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ token: window._resetToken, password: p1 })
 });
 var d = await r.json();
 if (r.ok) {
 al.textContent = 'تم التعيين بنجاح! جاري التحويل...';
 al.className = 'al ok';
 setTimeout(function() { location.href = 'auth.html'; }, 2000);
 } else {
 al.textContent = d.message || 'حدث خطأ';
 al.className = 'al err';
 }
 } catch(e) { al.textContent = 'تعذر الاتصال'; al.className = 'al err'; }
}

// ── Mode ──
function setMode(m) {
 MODE = m;
 var isR = m === 'register';
 document.querySelectorAll('.tab').forEach(function(t, i) {
 t.classList.toggle('on', i === (isR ? 1 : 0));
 });
 show('method-section', !isR);
 show('fg-name', isR);
 showGrid('role-g', isR);
 show('fg-pass2', isR);
 show('fg-reg-phone', isR);
 show('fg-city', isR);
 show('forgot-wrap', !isR);
 show('note-reg', isR);
 document.getElementById('hd-t').textContent = isR ? 'إنشاء حساب جديد' : 'أهلاً بك';
 document.getElementById('hd-s').textContent = isR ? 'انضم لمناقصة اليوم' : 'سجّل دخولك لمتابعة مشاريعك';
 document.getElementById('btn-t').textContent = isR ? 'إنشاء الحساب' : 'تسجيل الدخول';
 if (isR) {
 show('fg-email', true);
 show('fg-phone', false);
 } else {
 setMethod(METHOD);
 }
 setAl('', '');
}

function show(id, visible) {
 var el = document.getElementById(id);
 if (el) el.style.display = visible ? 'block' : 'none';
}

function showGrid(id, visible) {
 var el = document.getElementById(id);
 if (el) el.style.display = visible ? 'grid' : 'none';
}

// ── Method ──
function setMethod(m) {
 METHOD = m;
 document.getElementById('mt-email').classList.toggle('on', m === 'email');
 document.getElementById('mt-phone').classList.toggle('on', m === 'phone');
 show('fg-email', m === 'email');
 show('fg-phone', m === 'phone');
}

// ── Role ──
function selRole(r) {
 ROLE = r;
 document.getElementById('rc-c').classList.toggle('on', r === 'client');
 document.getElementById('rc-p').classList.toggle('on', r === 'provider');
}

// ── Password Toggle ──
function togglePass(id, btn) {
 var inp = document.getElementById(id);
 var show = inp.type === 'password';
 inp.type = show ? 'text' : 'password';
 btn.innerHTML = show
 ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
 : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

// ── Alert ──
function setAl(msg, type) {
 var el = document.getElementById('al');
 el.textContent = msg;
 el.className = 'al' + (type ? ' ' + type : '');
}

function getVal(id) {
 var el = document.getElementById(id);
 return el ? el.value.trim() : '';
}

function formatPhone(raw) {
 // إزالة كل ما ليس رقماً
 var digits = raw.replace(/[^0-9]/g, '');
 // إذا بدأ بـ 966 نتركه، إذا بدأ بـ 0 نحذف الصفر ونضيف 966
 if (digits.startsWith('966')) return digits;
 if (digits.startsWith('0')) digits = digits.slice(1);
 return '966' + digits;
}

function validatePhone(raw) {
 var digits = raw.replace(/[^0-9]/g, '');
 // يجب أن يكون 10 أرقام ويبدأ بـ 05
 if (digits.length !== 10) return false;
 if (!digits.startsWith('05')) return false;
 return true;
}

// ── Submit ──
async function doSubmit() {
 setAl('', '');
 var pass = document.getElementById('i-pass').value;
 if (!pass || pass.length < 6) { setAl('كلمة المرور 6 أحرف على الأقل', 'err'); return; }

 var btn = document.getElementById('btn-submit');
 btn.disabled = true;
 document.getElementById('btn-t').textContent = 'جاري...';

 try {
 var url, body;

 if (MODE === 'login') {
 if (METHOD === 'email') {
 var email = getVal('i-email');
 if (!email || !email.includes('@')) { setAl('أدخل بريداً إلكترونياً صحيحاً', 'err'); return; }
 body = { email: email, password: pass };
 } else {
 var phone = getVal('i-phone');
 if (!phone) { setAl('أدخل رقم الجوال', 'err'); return; }
 if (!validatePhone(phone)) { setAl('أدخل رقم جوال سعودي صحيح (10 أرقام يبدأ بـ 05)', 'err'); return; }
 body = { phone: formatPhone(phone), password: pass };
 }
 url = API + '/api/auth/login';

 } else {
 var name = getVal('i-name');
 var email2 = getVal('i-email');
 var pass2 = document.getElementById('i-pass2').value;
 var rPhone = getVal('i-reg-phone');
 var city = getVal('i-city');

 if (!name) { setAl('أدخل اسمك الكامل', 'err'); return; }
 if (!email2 || !email2.includes('@')) { setAl('أدخل بريداً إلكترونياً صحيحاً', 'err'); return; }
 if (pass !== pass2) { setAl('كلمتا المرور غير متطابقتين', 'err'); return; }
 if (!rPhone) { setAl('رقم الجوال مطلوب', 'err'); return; }
 if (!validatePhone(rPhone)) { setAl('أدخل رقم جوال سعودي صحيح (10 أرقام يبدأ بـ 05)', 'err'); return; }
 var fPhone = formatPhone(rPhone);

 url = API + '/api/auth/register';
 body = { name: name, email: email2, password: pass, role: ROLE, city: city || null, phone: fPhone };
 }

 var r = await fetch(url, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify(body)
 });
 var d = await r.json();

 if (r.ok) {
 localStorage.setItem('token', d.token);
 localStorage.setItem('user', JSON.stringify(d.user));
 setAl('تم بنجاح! جاري التحويل...', 'ok');
 setTimeout(function() {
 var rl = d.user.role;
 location.href = rl === 'admin' ? 'dashboard-admin.html'
 : rl === 'provider' ? 'dashboard-provider.html'
 : 'dashboard-client.html';
 }, 900);
 } else {
 setAl(d.message || 'حدث خطأ، حاول مرة أخرى', 'err');
 }
 } catch(e) {
 setAl('تعذر الاتصال بالسيرفر', 'err');
 } finally {
 btn.disabled = false;
 document.getElementById('btn-t').textContent = MODE === 'login' ? 'تسجيل الدخول' : 'إنشاء الحساب';
 }
}

// ── Forgot Password ──
async function doForgot() {
 var id = METHOD === 'email' ? getVal('i-email') : getVal('i-phone');
 if (!id) { setAl('أدخل بريدك الإلكتروني أو جوالك أولاً', 'err'); return; }
 try {
 var r = await fetch(API + '/api/auth/forgot-password', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ email: id })
 });
 var d = await r.json();
 setAl(d.message || 'تم إرسال رابط إعادة التعيين', 'ok');
 } catch(e) { setAl('تعذر الاتصال', 'err'); }
}

document.addEventListener('keydown', function(e) {
 if (e.key === 'Enter') doSubmit();
});

// Init
checkReset();
setMode('login');
</script>
