<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>مناقصة — الدخول</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#0f2545,#1473E6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.hd{background:linear-gradient(135deg,#0f2545,#1473E6);padding:28px 28px 22px;text-align:center;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);top:-50px;left:-30px}
.logo{font-size:24px;font-weight:900;color:#fff;position:relative}.logo b{color:#fbbf24}
.hd-t{font-size:15px;font-weight:700;color:rgba(255,255,255,.8);margin-top:6px;position:relative}
.hd-s{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;position:relative}
.tabs{display:flex;background:#f1f5f9;padding:4px;gap:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;transition:.15s}
.tab.on{background:#fff;color:#1473E6;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.body{padding:24px 28px}
.al{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:700;margin-bottom:14px;display:none;border:1px solid}
.al.err{display:block;background:#fef2f2;color:#dc2626;border-color:#fca5a5}
.al.ok{display:block;background:#f0fdf4;color:#16a34a;border-color:#86efac}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px}
.fg input,.fg select{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;font-family:inherit;outline:none;transition:.15s}
.fg input:focus,.fg select:focus{border-color:#1473E6;box-shadow:0 0 0 3px rgba(20,115,230,.1)}
.fg input::placeholder{color:#94a3b8}
.pw-wrap{position:relative}
.pw-wrap input{padding-left:42px}
.pw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:#f1f5f9;border:none;cursor:pointer;color:#64748b;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.12s}
.pw-eye:hover{background:#e2e8f0;color:#1473E6}
.pw-eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.role-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rc{border:2px solid #e2e8f0;border-radius:12px;padding:14px 12px;cursor:pointer;text-align:center;transition:.15s;user-select:none}
.rc:hover{border-color:#93c5fd;background:#eff6ff}
.rc.on{border-color:#1473E6;background:#EBF3FD}
.rc .ico{font-size:24px;margin-bottom:5px}
.rc .nm{font-size:13px;font-weight:800;color:#0f172a}
.rc .ds{font-size:10px;color:#64748b;margin-top:2px}
.btn-main{width:100%;padding:13px;background:#1473E6;border:none;color:#fff;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:hover{background:#0d5fc9}.btn-main:disabled{opacity:.5;cursor:not-allowed}
.forgot{text-align:left;margin-top:10px}
.forgot button{background:none;border:none;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.forgot button:hover{color:#1473E6}
.note{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px}
.note a{color:#1473E6;font-weight:700;text-decoration:none}
.bh{text-align:center;margin-top:16px;font-size:12px}
.bh a{color:rgba(255,255,255,.7);font-weight:600}
.bh a:hover{color:#fff}
</style>
</head>
<body>
<div>
<div class="card">
  <div class="hd">
    <div class="logo">مناقصة<b>.</b></div>
    <div class="hd-t" id="hd-t">أهلاً بك</div>
    <div class="hd-s" id="hd-s">سجّل دخولك لمتابعة مشاريعك</div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="setMode('login')">تسجيل الدخول</button>
    <button class="tab" onclick="setMode('register')">حساب جديد</button>
  </div>
  <div class="body">
    <div class="al" id="al"></div>

    <!-- اسم (تسجيل) -->
    <div class="fg" id="fg-name" style="display:none">
      <label>الاسم الكامل *</label>
      <input id="i-name" type="text" placeholder="اسمك الكامل">
    </div>

    <!-- نوع الحساب (تسجيل) -->
    <div class="role-g" id="role-g" style="display:none">
      <div class="rc on" id="rc-c" onclick="selRole('client')">
        <div class="ico">🏗</div>
        <div class="nm">عميل</div>
        <div class="ds">أنشر مشاريع واستقبل عروض</div>
      </div>
      <div class="rc" id="rc-p" onclick="selRole('provider')">
        <div class="ico">🔧</div>
        <div class="nm">مزود خدمة</div>
        <div class="ds">قدّم عروض ونفّذ مشاريع</div>
      </div>
    </div>

    <!-- البريد -->
    <div class="fg">
      <label>البريد الإلكتروني *</label>
      <input id="i-email" type="email" placeholder="example@email.com" inputmode="email">
    </div>

    <!-- كلمة المرور -->
    <div class="fg">
      <label>كلمة المرور *</label>
      <div class="pw-wrap">
        <input id="i-pass" type="password" placeholder="كلمة المرور">
        <button class="pw-eye" type="button" onclick="togglePass('i-pass',this)" title="إظهار/إخفاء">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
      </div>
    </div>

    <!-- تأكيد كلمة المرور (تسجيل) -->
    <div class="fg" id="fg-pass2" style="display:none">
      <label>تأكيد كلمة المرور *</label>
      <div class="pw-wrap">
        <input id="i-pass2" type="password" placeholder="أعد كتابة كلمة المرور">
        <button class="pw-eye" type="button" onclick="togglePass('i-pass2',this)" title="إظهار/إخفاء">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
      </div>
    </div>

    <!-- المدينة (تسجيل) -->
    <div class="fg" id="fg-city" style="display:none">
      <label>المدينة <span style="font-weight:400;color:#94a3b8">(اختياري)</span></label>
      <select id="i-city">
        <option value="">اختر مدينتك</option>
        <option>الرياض</option><option>جدة</option><option>مكة المكرمة</option>
        <option>المدينة المنورة</option><option>الدمام</option><option>الخبر</option>
        <option>الطائف</option><option>تبوك</option><option>بريدة</option>
        <option>أبها</option><option>نجران</option><option>جيزان</option>
        <option>حائل</option><option>ينبع</option><option>الجبيل</option>
      </select>
    </div>

    <button class="btn-main" id="btn-submit" onclick="doSubmit()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span id="btn-t">تسجيل الدخول</span>
    </button>

    <div class="forgot" id="forgot-wrap">
      <button onclick="doForgot()">نسيت كلمة المرور؟</button>
    </div>

    <p class="note" id="note-reg" style="display:none">
      بالتسجيل توافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a>
    </p>
  </div>
</div>
<div class="bh"><a href="index.html">← العودة للرئيسية</a></div>
</div>

<script>
var API = 'https://manaqasati-production.up.railway.app';
var MODE = 'login', ROLE = 'client';

function setMode(m) {
  MODE = m;
  var isR = m === 'register';
  document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('on', i===(isR?1:0)); });
  document.getElementById('fg-name').style.display   = isR ? 'block' : 'none';
  document.getElementById('role-g').style.display    = isR ? 'grid'  : 'none';
  document.getElementById('fg-pass2').style.display  = isR ? 'block' : 'none';
  document.getElementById('fg-city').style.display   = isR ? 'block' : 'none';
  document.getElementById('forgot-wrap').style.display = isR ? 'none' : 'block';
  document.getElementById('note-reg').style.display  = isR ? 'block' : 'none';
  document.getElementById('hd-t').textContent  = isR ? 'إنشاء حساب جديد' : 'أهلاً بك';
  document.getElementById('hd-s').textContent  = isR ? 'انضم لمناقصة اليوم' : 'سجّل دخولك لمتابعة مشاريعك';
  document.getElementById('btn-t').textContent = isR ? 'إنشاء الحساب' : 'تسجيل الدخول';
  setAl('', '');
}

function selRole(r) {
  ROLE = r;
  document.getElementById('rc-c').classList.toggle('on', r==='client');
  document.getElementById('rc-p').classList.toggle('on', r==='provider');
}

function togglePass(id, btn) {
  var inp = document.getElementById(id);
  var isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  // عين مفتوحة = نص ظاهر | عين مشطوبة = نص مخفي
  var eyeOpen  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  var eyeClose = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  btn.innerHTML = isPass ? eyeOpen : eyeClose;
}

function setAl(msg, type) {
  var el = document.getElementById('al');
  el.textContent = msg;
  el.className = 'al' + (type ? ' '+type : '');
}

function val(id) { return (document.getElementById(id).value || '').trim(); }

async function doSubmit() {
  setAl('', '');
  var email = val('i-email');
  var pass  = document.getElementById('i-pass').value;

  if (!email || !email.includes('@')) { setAl('أدخل بريداً إلكترونياً صحيحاً', 'err'); return; }
  if (!pass || pass.length < 6)       { setAl('كلمة المرور 6 أحرف على الأقل', 'err'); return; }

  var btn = document.getElementById('btn-submit');
  btn.disabled = true;
  document.getElementById('btn-t').textContent = 'جاري...';

  try {
    var url, body;
    if (MODE === 'login') {
      url  = API + '/api/auth/login';
      body = { email: email, password: pass };
    } else {
      var name  = val('i-name');
      var pass2 = document.getElementById('i-pass2').value;
      var city  = val('i-city');
      if (!name)         { setAl('أدخل اسمك الكامل', 'err'); btn.disabled=false; document.getElementById('btn-t').textContent='إنشاء الحساب'; return; }
      if (pass !== pass2){ setAl('كلمتا المرور غير متطابقتين', 'err'); btn.disabled=false; document.getElementById('btn-t').textContent='إنشاء الحساب'; return; }
      url  = API + '/api/auth/register';
      body = { name: name, email: email, password: pass, role: ROLE, city: city || null };
    }

    var r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var d = await r.json();

    if (r.ok) {
      localStorage.setItem('token', d.token);
      localStorage.setItem('user', JSON.stringify(d.user));
      setAl('✅ تم بنجاح! جاري التحويل...', 'ok');
      setTimeout(function() {
        var rl = d.user.role;
        location.href = rl==='admin' ? 'dashboard-admin.html' : rl==='provider' ? 'dashboard-provider.html' : 'dashboard-client.html';
      }, 900);
    } else {
      setAl(d.message || 'حدث خطأ، حاول مرة أخرى', 'err');
    }
  } catch(e) {
    setAl('تعذر الاتصال بالسيرفر', 'err');
  }

  btn.disabled = false;
  document.getElementById('btn-t').textContent = MODE==='login' ? 'تسجيل الدخول' : 'إنشاء الحساب';
}

async function doForgot() {
  var email = val('i-email');
  if (!email) { setAl('أدخل بريدك الإلكتروني أولاً', 'err'); return; }
  try {
    var r = await fetch(API+'/api/auth/forgot-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: email })
    });
    var d = await r.json();
    setAl(d.message || 'تم إرسال رابط إعادة التعيين', 'ok');
  } catch(e) { setAl('تعذر الاتصال', 'err'); }
}

// Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSubmit();
});

setMode('login');
</script>
</body>
</html>
