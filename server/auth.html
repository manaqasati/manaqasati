<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مناقصة — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F8FC;--t:#1B2B4B;--t2:#2C3E60;--t3:#6B7A99;--t4:#9aa3b8;
  --primary:#1B3A6B;--accent:#D4973A;--accent-l:#FDF3E3;--accent-m:#f6c96b;
  --success:#1D9E75;--success-l:#E1F5EE;--success-m:#9FE1CB;
  --danger:#E24B4A;--danger-l:#FCEBEB;--danger-m:#F09595;
  --client:#2C5282;--client-l:#E6EEF8;--prov:#1D6A5A;--prov-l:#E1F5EE;
  --white:#fff;--border:rgba(27,58,107,0.12);
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
button,input,select,textarea{font-family:'Tajawal',sans-serif}

/* BG PATTERN */
body::before{content:'';position:fixed;inset:0;background:linear-gradient(135deg,#1B3A6B 0%,#0d2040 100%);z-index:-2}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 120%,rgba(212,151,58,.18) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at -10% 50%,rgba(29,106,90,.14) 0%,transparent 70%);z-index:-1}

.wrap{width:100%;max-width:440px}

/* LOGO */
.logo-area{text-align:center;margin-bottom:28px}
.logo{font-size:32px;font-weight:900;color:#fff}.logo span{color:var(--accent)}
.logo-tag{font-size:13px;color:rgba(255,255,255,.55);margin-top:5px;font-weight:500}

/* CARD */
.card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.tab{padding:14px;text-align:center;font-size:14px;font-weight:800;cursor:pointer;color:var(--t3);border:none;background:none;transition:.15s;position:relative}
.tab.on{color:var(--primary)}
.tab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--primary);border-radius:3px 3px 0 0}

/* BODY */
.cb{padding:24px}

/* ROLE PICKER */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.role-btn{border:2px solid var(--border);border-radius:13px;padding:14px 10px;text-align:center;cursor:pointer;transition:.15s;background:var(--white)}
.role-btn:hover{border-color:var(--accent-m)}
.role-btn.on.client{border-color:var(--client);background:var(--client-l)}
.role-btn.on.prov{border-color:var(--prov);background:var(--prov-l)}
.role-ic{font-size:26px;margin-bottom:6px}
.role-name{font-size:13px;font-weight:800;color:var(--t)}
.role-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* FORM */
.fg{margin-bottom:13px;position:relative}
.fg label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:var(--t2)}
.fg input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--t);outline:none;background:var(--white);transition:.15s}
.fg input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,58,107,.09)}
.fg input.err{border-color:var(--danger)}
.eye{position:absolute;left:12px;bottom:11px;cursor:pointer;color:var(--t4);font-size:16px;border:none;background:none;padding:0}

/* BUTTONS */
.btn-main{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;transition:.15s;margin-top:4px}
.btn-main:hover{background:#0d2040}.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-main.green{background:var(--prov)}.btn-main.green:hover{background:var(--prov-d,#0F4A3D)}

/* DIVIDER */
.div-or{display:flex;align-items:center;gap:10px;margin:16px 0}
.div-or span{font-size:11px;color:var(--t4);font-weight:600;flex-shrink:0}
.div-or::before,.div-or::after{content:'';flex:1;height:1px;background:var(--border)}

/* ALERT */
.alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:700;margin-bottom:12px;border-width:1.5px;border-style:solid;display:none}
.alert.ok{background:var(--success-l);color:#085041;border-color:var(--success-m);display:block}
.alert.err{background:var(--danger-l);color:#7f1d1d;border-color:var(--danger-m);display:block}

/* LINKS */
.lnk{color:var(--primary);font-weight:700;cursor:pointer;background:none;border:none;font-size:13px;font-family:'Tajawal',sans-serif}
.lnk:hover{text-decoration:underline}

/* BOTTOM */
.bottom-note{text-align:center;margin-top:18px;font-size:12px;color:rgba(255,255,255,.45)}

/* FORGOT */
.page{display:none}.page.on{display:block}

@media(max-width:480px){.cb{padding:18px}.role-ic{font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo">مناقصة<span>.</span></div>
    <div class="logo-tag">منصة خدمات موثوقة في المملكة</div>
  </div>

  <div class="card">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab on" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <!-- LOGIN -->
    <div class="page on" id="page-login">
      <div class="cb">
        <div class="alert" id="login-alert"></div>
        <div class="fg">
          <label>البريد الإلكتروني أو الجوال</label>
          <input id="l-id" type="text" placeholder="example@email.com أو 05xxxxxxxx" autocomplete="username">
        </div>
        <div class="fg">
          <label>كلمة المرور</label>
          <input id="l-pw" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye" id="l-eye" onclick="toggleEye('l-pw','l-eye')">👁</button>
        </div>
        <div style="text-align:left;margin-bottom:14px">
          <button class="lnk" onclick="switchTab('forgot')">نسيت كلمة المرور؟</button>
        </div>
        <button class="btn-main" id="login-btn" onclick="doLogin()">تسجيل الدخول</button>
        <div class="div-or"><span>أو</span></div>
        <div style="text-align:center;font-size:13px;color:var(--t3)">
          ليس لديك حساب؟ <button class="lnk" onclick="switchTab('register')">سجّل الآن مجاناً</button>
        </div>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="page" id="page-register">
      <div class="cb">
        <div class="alert" id="reg-alert"></div>

        <!-- Role Picker -->
        <div class="role-grid">
          <div class="role-btn client on" id="r-client" onclick="setRole('client')">
            <div class="role-ic">🏠</div>
            <div class="role-name">عميل</div>
            <div class="role-sub">أبحث عن مزود خدمة</div>
          </div>
          <div class="role-btn prov" id="r-prov" onclick="setRole('provider')">
            <div class="role-ic">🔧</div>
            <div class="role-name">مزود خدمة</div>
            <div class="role-sub">أقدم خدماتي للعملاء</div>
          </div>
        </div>

        <div class="fg">
          <label>الاسم الكامل *</label>
          <input id="r-name" type="text" placeholder="محمد أحمد الغامدي" autocomplete="name">
        </div>
        <div class="fg">
          <label>البريد الإلكتروني *</label>
          <input id="r-email" type="email" placeholder="example@email.com" autocomplete="email">
        </div>
        <div class="fg">
          <label>رقم الجوال</label>
          <input id="r-phone" type="tel" placeholder="05xxxxxxxx" autocomplete="tel" inputmode="tel">
        </div>

        <!-- تخصص للمزود فقط -->
        <div class="fg" id="spec-wrap" style="display:none">
          <label>التخصص الرئيسي</label>
          <select id="r-spec" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--t);outline:none;background:var(--white)"></select>
        </div>

        <div class="fg">
          <label>كلمة المرور *</label>
          <input id="r-pw" type="password" placeholder="8 أحرف على الأقل" autocomplete="new-password">
          <button class="eye" id="r-eye" onclick="toggleEye('r-pw','r-eye')">👁</button>
        </div>
        <div class="fg">
          <label>تأكيد كلمة المرور *</label>
          <input id="r-pw2" type="password" placeholder="أعد إدخال كلمة المرور" autocomplete="new-password">
        </div>

        <button class="btn-main green" id="reg-btn" onclick="doRegister()">إنشاء الحساب</button>
        <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--t3)">
          بالتسجيل أنت توافق على <button class="lnk" style="font-size:12px">شروط الاستخدام</button>
        </div>
      </div>
    </div>

    <!-- FORGOT -->
    <div class="page" id="page-forgot">
      <div class="cb">
        <div style="text-align:center;margin-bottom:18px">
          <div style="font-size:28px;margin-bottom:8px">🔑</div>
          <div style="font-size:16px;font-weight:800;color:var(--t)">استعادة كلمة المرور</div>
          <div style="font-size:12px;color:var(--t3);margin-top:4px">سنرسل لك رابط الاستعادة على بريدك</div>
        </div>
        <div class="alert" id="forgot-alert"></div>
        <div class="fg">
          <label>البريد الإلكتروني</label>
          <input id="f-email" type="email" placeholder="example@email.com">
        </div>
        <button class="btn-main" id="forgot-btn" onclick="doForgot()">إرسال رابط الاستعادة</button>
        <div style="text-align:center;margin-top:14px">
          <button class="lnk" onclick="switchTab('login')">← رجوع لتسجيل الدخول</button>
        </div>
      </div>
    </div>

    <!-- RESET -->
    <div class="page" id="page-reset">
      <div class="cb">
        <div style="text-align:center;margin-bottom:18px">
          <div style="font-size:28px;margin-bottom:8px">🔒</div>
          <div style="font-size:16px;font-weight:800;color:var(--t)">كلمة مرور جديدة</div>
        </div>
        <div class="alert" id="reset-alert"></div>
        <div class="fg">
          <label>كلمة المرور الجديدة</label>
          <input id="rs-pw" type="password" placeholder="8 أحرف على الأقل">
          <button class="eye" id="rs-eye" onclick="toggleEye('rs-pw','rs-eye')">👁</button>
        </div>
        <div class="fg">
          <label>تأكيد كلمة المرور</label>
          <input id="rs-pw2" type="password" placeholder="أعد الإدخال">
        </div>
        <button class="btn-main" id="reset-btn" onclick="doReset()">حفظ كلمة المرور الجديدة</button>
      </div>
    </div>

  </div>

  <div class="bottom-note">© 2025 منصة مناقصة — manaqasa.com</div>
</div>

<script>
const API = 'https://manaqasati-production.up.railway.app';
const CATS = ['تبريد وتكييف','كهرباء','سباكة','نجارة','تنظيف','نقل عفش','حدادة','ألمنيوم','مسابح (تنفيذ وصيانة)','كاميرات مراقبة وأمن','شبكات وإنترنت','مظلات وسواتر','عزل حراري وأسطح','أبواب','أعمال جبس وطباشير','مكافحة حشرات','أخرى'];

let curRole = 'client';
let resetToken = null;

// fill spec select
const specSel = document.getElementById('r-spec');
CATS.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; specSel.appendChild(o); });

// check URL for reset token
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('reset')) {
  resetToken = urlParams.get('reset');
  switchPage('reset');
}

// check if already logged in
const existing = JSON.parse(localStorage.getItem('user') || '{}');
if (existing.id && existing.role) redirect(existing.role);

function redirect(role) {
  if (role === 'admin') location.href = 'dashboard-admin.html';
  else if (role === 'provider') location.href = 'dashboard-provider.html';
  else location.href = 'dashboard-client.html';
}

function switchTab(t) {
  document.getElementById('tab-login').className = 'tab' + (t === 'login' ? ' on' : '');
  document.getElementById('tab-register').className = 'tab' + (t === 'register' ? ' on' : '');
  if (t === 'login' || t === 'register') {
    document.getElementById('tab-login').style.display = '';
    document.getElementById('tab-register').style.display = '';
  } else {
    document.getElementById('tab-login').style.display = 'none';
    document.getElementById('tab-register').style.display = 'none';
  }
  switchPage(t);
}

function switchPage(p) {
  document.querySelectorAll('.page').forEach(x => x.className = 'page');
  const el = document.getElementById('page-' + p);
  if (el) el.className = 'page on';
}

function setRole(r) {
  curRole = r;
  document.getElementById('r-client').className = 'role-btn client' + (r === 'client' ? ' on' : '');
  document.getElementById('r-prov').className = 'role-btn prov' + (r === 'provider' ? ' on' : '');
  document.getElementById('spec-wrap').style.display = r === 'provider' ? 'block' : 'none';
}

function toggleEye(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'alert ' + type;
  setTimeout(() => el.className = 'alert', 6000);
}

function setLoading(btnId, loading, text) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.textContent = loading ? text : btn.dataset.orig || btn.textContent;
  if (!loading && btn.dataset.orig) btn.textContent = btn.dataset.orig;
  else if (!btn.dataset.orig) btn.dataset.orig = btn.textContent;
}

// ── LOGIN ──
async function doLogin() {
  const id = document.getElementById('l-id').value.trim();
  const pw = document.getElementById('l-pw').value;
  if (!id || !pw) { showAlert('login-alert', 'يرجى تعبئة جميع الحقول', 'err'); return; }
  setLoading('login-btn', true, 'جاري الدخول...');
  try {
    const isPhone = /^05\d{8}$/.test(id.replace(/\s/g,''));
    const body = isPhone ? { phone: id, password: pw } : { email: id, password: pw };
    const r = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (r.ok) {
      localStorage.setItem('user', JSON.stringify(d.user));
      localStorage.setItem('token', d.token);
      showAlert('login-alert', `مرحباً ${d.user.name}! جاري التوجيه...`, 'ok');
      setTimeout(() => redirect(d.user.role), 1000);
    } else {
      showAlert('login-alert', d.message || 'البيانات غير صحيحة', 'err');
    }
  } catch { showAlert('login-alert', 'تعذر الاتصال بالسيرفر', 'err'); }
  setLoading('login-btn', false, 'تسجيل الدخول');
}

// ── REGISTER ──
async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const pw = document.getElementById('r-pw').value;
  const pw2 = document.getElementById('r-pw2').value;
  const spec = document.getElementById('r-spec').value;

  if (!name || !email || !pw) { showAlert('reg-alert', 'يرجى تعبئة الاسم والبريد وكلمة المرور', 'err'); return; }
  if (pw.length < 8) { showAlert('reg-alert', 'كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'err'); return; }
  if (pw !== pw2) { showAlert('reg-alert', 'كلمتا المرور غير متطابقتين', 'err'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('reg-alert', 'البريد الإلكتروني غير صحيح', 'err'); return; }

  setLoading('reg-btn', true, 'جاري التسجيل...');
  try {
    const body = {
      name, email, phone: phone || null, password: pw, role: curRole,
      specialties: curRole === 'provider' ? [spec] : null
    };
    const r = await fetch(API + '/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (r.ok) {
      localStorage.setItem('user', JSON.stringify(d.user));
      localStorage.setItem('token', d.token);
      showAlert('reg-alert', `تم إنشاء حسابك بنجاح! مرحباً ${d.user.name}`, 'ok');
      setTimeout(() => redirect(d.user.role), 1200);
    } else {
      showAlert('reg-alert', d.message || 'حدث خطأ أثناء التسجيل', 'err');
    }
  } catch { showAlert('reg-alert', 'تعذر الاتصال بالسيرفر', 'err'); }
  setLoading('reg-btn', false, 'إنشاء الحساب');
}

// ── FORGOT ──
async function doForgot() {
  const email = document.getElementById('f-email').value.trim();
  if (!email) { showAlert('forgot-alert', 'يرجى إدخال البريد الإلكتروني', 'err'); return; }
  setLoading('forgot-btn', true, 'جاري الإرسال...');
  try {
    const r = await fetch(API + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    showAlert('forgot-alert', 'تم إرسال رابط الاستعادة — تحقق من بريدك الإلكتروني', 'ok');
  } catch { showAlert('forgot-alert', 'تعذر الاتصال بالسيرفر', 'err'); }
  setLoading('forgot-btn', false, 'إرسال رابط الاستعادة');
}

// ── RESET ──
async function doReset() {
  const pw = document.getElementById('rs-pw').value;
  const pw2 = document.getElementById('rs-pw2').value;
  if (!pw || pw.length < 8) { showAlert('reset-alert', 'كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'err'); return; }
  if (pw !== pw2) { showAlert('reset-alert', 'كلمتا المرور غير متطابقتين', 'err'); return; }
  setLoading('reset-btn', true, 'جاري الحفظ...');
  try {
    const r = await fetch(API + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, new_password: pw })
    });
    const d = await r.json();
    if (r.ok) {
      showAlert('reset-alert', 'تم تغيير كلمة المرور بنجاح! جاري التوجيه لتسجيل الدخول...', 'ok');
      setTimeout(() => { window.history.replaceState({}, '', window.location.pathname); switchTab('login'); }, 2000);
    } else {
      showAlert('reset-alert', d.message || 'رابط منتهي الصلاحية', 'err');
    }
  } catch { showAlert('reset-alert', 'تعذر الاتصال بالسيرفر', 'err'); }
  setLoading('reset-btn', false, 'حفظ كلمة المرور الجديدة');
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.page.on')?.id;
  if (active === 'page-login') doLogin();
  else if (active === 'page-register') doRegister();
  else if (active === 'page-forgot') doForgot();
  else if (active === 'page-reset') doReset();
});
</script>
</body>
</html>
