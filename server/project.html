<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>مشروع — مناقصة</title>
<meta name="description" content="مشروع على منصة مناقصة السعودية">
<meta name="robots" content="index,follow">
<script type="application/ld+json" id="ld"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--p:#16213E;--p2:#1A2F5E;--p3:#0D1829;--gold:#C9920A;--gold-d:#A87000;--gold-l:#FFF8E6;--gold-soft:#FFE5A0;--text:#0F172A;--text2:#374151;--muted:#8896AA;--border:#E6E2D9;--bg:#F0F2F5;--white:#FFFFFF;--green:#16A34A;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--p);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.back{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;border:none;background:none;font-family:inherit;cursor:pointer;padding:6px 10px;border-radius:8px}
.logo{font-size:17px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px;text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
.nav-in{padding:7px 16px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit}
/* COVER */
.cover{height:180px;background:linear-gradient(135deg,#0D1829,#16213E,#1e3560);position:relative;overflow:hidden}
.cover svg{position:absolute;inset:0;width:100%;height:100%}
.cover-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
/* PROFILE TOP */
.profile-sec{max-width:680px;margin:0 auto;padding:0 16px;position:relative;z-index:2}
.profile-top{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-50px;margin-bottom:14px;gap:12px;flex-wrap:wrap;position:relative;z-index:2}
.proj-icon{width:100px;height:100px;border-radius:16px;border:4px solid #fff;background:linear-gradient(135deg,#0D1829,#16213E);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:var(--shadow-md);flex-shrink:0;position:relative;z-index:3}
.proj-ic-emoji{font-size:30px}
.proj-ic-lbl{font-size:9px;font-weight:800;color:rgba(255,255,255,.45);text-align:center;padding:0 4px;line-height:1.3}
.proj-actions{display:flex;gap:8px;padding-bottom:8px;flex-wrap:wrap}
.btn-bid{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--gold);color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 2px 8px rgba(201,146,10,.3)}
.btn-msg{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--white);color:var(--p);border:1.5px solid var(--p);border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.btn-share{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--white);color:var(--muted);border:1.5px solid var(--border);border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
/* WRAP */
.wrap{max-width:680px;margin:0 auto;padding:0 16px 40px}
/* CARDS */
.card{background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-ic{width:32px;height:32px;border-radius:9px;background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:14px;font-weight:900;color:var(--text)}
/* INFO */
.proj-title{font-size:21px;font-weight:900;color:var(--text);line-height:1.3;margin-bottom:8px}
.info-row{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);margin-bottom:5px}
.cat-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-l);border:1px solid var(--gold-soft);color:var(--gold-d);font-size:12px;font-weight:800;padding:4px 14px;border-radius:20px;margin-bottom:10px}
.st-open{background:rgba(22,163,74,.1);color:#16A34A;border:1px solid rgba(22,163,74,.2);font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.st-prog{background:rgba(37,99,235,.1);color:#2563EB;border:1px solid rgba(37,99,235,.2);font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.st-done{background:var(--bg);color:var(--muted);border:1px solid var(--border);font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:24px;font-weight:900;line-height:1.1}
.stat-unit{font-size:12px;font-weight:700;margin-top:1px}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:5px}
/* CLIENT CARD */
.client-card{background:var(--p);border-radius:16px;padding:18px;margin-bottom:12px;border-bottom:3px solid var(--gold);box-shadow:0 4px 20px rgba(13,24,41,.15)}
.client-av{width:50px;height:50px;border-radius:50%;background:rgba(201,146,10,.15);border:2px solid rgba(201,146,10,.35);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--gold);flex-shrink:0}
.cc-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.8px;text-align:center;margin-bottom:10px;text-transform:uppercase}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cbtn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;border-radius:12px;font-size:13px;font-weight:800;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
.c-call{background:var(--gold);color:#fff}
.c-wa{background:#16A34A;color:#fff}
.c-msg{grid-column:1/-1;background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.12)}
/* PORTFOLIO */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pimg{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;border:1px solid var(--border);background:var(--bg)}
.pimg img{width:100%;height:100%;object-fit:cover}
/* BIDS */
.bid{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.bid:last-child{margin-bottom:0}
.bid-av{width:38px;height:38px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.bid-av img{width:100%;height:100%;object-fit:cover}
.bid-lock{display:inline-flex;align-items:center;gap:5px;background:var(--p);color:#fff;font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;cursor:pointer;text-decoration:none;margin-top:8px}
/* CTA */
.cta{background:linear-gradient(135deg,var(--p3),var(--p));border-radius:16px;padding:22px 18px;text-align:center;margin-bottom:14px;border-bottom:3px solid var(--gold);box-shadow:var(--shadow-md)}
.cta-btn{display:inline-block;padding:12px 28px;background:var(--gold);color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 4px 14px rgba(201,146,10,.4)}
/* BID MODAL */
.bid-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;padding:16px}
.bid-overlay.on{display:flex}
.bid-modal{background:#fff;border-radius:20px;width:100%;max-width:500px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.bid-modal-head{background:linear-gradient(135deg,#0D1829,#16213E);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold)}
.bid-modal-body{padding:20px}
.bid-fg{margin-bottom:14px}
.bid-fg label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px}
.bid-fg input,.bid-fg textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;background:var(--bg)}
.bid-fg input:focus,.bid-fg textarea:focus{outline:none;border-color:var(--p)}
.bid-submit{width:100%;padding:14px;background:var(--p);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:4px}
.bid-submit:hover{background:var(--p2)}

/* VIEWER */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:16px}
.viewer.on{display:flex}
.viewer img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.vcl{position:absolute;top:14px;right:14px;width:40px;height:40px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* SK */
.sk{background:linear-gradient(90deg,#eef2f8 25%,#e2eaf4 50%,#eef2f8 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:12px}
@media(max-width:480px){.cover{height:140px}.proj-icon{width:80px;height:80px}.proj-ic-emoji{font-size:24px}}
</style>
</head>
<body>
<nav class="nav">
  <button class="back" onclick="location.href='/'"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>الرئيسية</button>
  <a class="logo" href="/"><span class="logo-dot"></span>مناقصة</a>
  <button class="nav-in" onclick="location.href='/auth.html'">دخول</button>
</nav>

<div class="cover">
  <svg viewBox="0 0 800 180" preserveAspectRatio="none" opacity=".1" style="position:absolute;inset:0;z-index:0">
    <line x1="50" y1="40" x2="200" y2="90" stroke="#fff" stroke-width="1.5"/>
    <line x1="200" y1="90" x2="380" y2="45" stroke="#fff" stroke-width="1.5"/>
    <line x1="380" y1="45" x2="580" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="580" y1="80" x2="750" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="90" x2="260" y2="55" stroke="#C9920A" stroke-width="1.5" stroke-opacity=".9"/>
    <circle cx="200" cy="90" r="8" fill="#fff" opacity=".4"/>
    <circle cx="260" cy="55" r="6" fill="#C9920A" opacity=".8"/>
  </svg>
  <div class="cover-bar"></div>
</div>

<div class="profile-sec">
  <div class="profile-top" id="profile-top">
    <div class="proj-icon sk" style="border:4px solid #fff"></div>
    <div class="proj-actions">
      <div class="sk" style="width:110px;height:38px;border-radius:22px"></div>
      <div class="sk" style="width:80px;height:38px;border-radius:22px"></div>
    </div>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="card"><div class="sk" style="height:20px;width:70%;margin-bottom:10px"></div><div class="sk" style="height:14px;width:45%"></div></div>
  <div class="sk" style="height:80px;border-radius:14px;margin-bottom:12px"></div>
</div>

<!-- BID MODAL -->
<div class="bid-overlay" id="bid-overlay" onclick="if(event.target===this)closeBidModal()">
  <div class="bid-modal">
    <div class="bid-modal-head">
      <span style="font-size:15px;font-weight:900;color:#fff">تقديم عرض</span>
      <button onclick="closeBidModal()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">&#10005;</button>
    </div>
    <div class="bid-modal-body">
      <div id="bid-proj-title" style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px;padding:10px 12px;background:var(--bg);border-radius:10px;border-right:3px solid var(--gold)"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="bid-fg"><label>السعر (ر.س) *</label><input id="bid-price" type="number" placeholder="5,000"></div>
        <div class="bid-fg"><label>مدة التنفيذ (أيام) *</label><input id="bid-days" type="number" placeholder="7"></div>
      </div>
      <div class="bid-fg"><label>رسالتك للعميل *</label><textarea id="bid-note" rows="4" placeholder="اشرح خبرتك وكيف ستنفذ المشروع..."></textarea></div>
      <button class="bid-submit" id="bid-submit-btn" onclick="submitBidFromPage()">إرسال العرض</button>
    </div>
  </div>
</div>

<div class="viewer" id="viewer" onclick="if(event.target===this)cImg()">
  <button class="vcl" onclick="cImg()">&#10005;</button>
  <img id="vi" src="" alt="">
</div>

<script>
var API='https://manaqasati-production.up.railway.app';
function getId(){var s=decodeURIComponent(location.pathname.split('/').pop());var m=s.match(/(\d+)$/);if(m)return m[1];return new URLSearchParams(location.search).get('id')||'';}
function oImg(s){document.getElementById('vi').src=s;document.getElementById('viewer').classList.add('on');document.body.style.overflow='hidden';}
function cImg(){document.getElementById('viewer').classList.remove('on');document.body.style.overflow='';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtMoney(v){if(!v)return 'مفتوح';return Number(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')+' ر.س';}
function fmtDate(d){if(!d)return '';var dt=new Date(d);var m=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear();}
function ago(d){if(!d)return '';var m=Math.floor((Date.now()-new Date(d))/60000);if(m<2)return 'الآن';if(m<60)return 'منذ '+m+' دقيقة';var h=Math.floor(m/60);if(h<24)return 'منذ '+h+' ساعة';return 'منذ '+Math.floor(h/24)+' يوم';}
function ph966(p){if(!p)return '';var n=p.replace(/\D/g,'');if(n.startsWith('966'))return n;if(n.startsWith('0'))return '966'+n.slice(1);return '966'+n;}
function mkStars(n){var h='';for(var i=1;i<=5;i++)h+='<span style="color:'+(i<=Math.round(n)?'#C9920A':'#E6E2D9')+';font-size:12px">&#9733;</span>';return h;}
function blurText(t){if(!t)return '';var w=t.trim().split(/\s+/);var v=w.slice(0,5).join(' ');var h=w.slice(5).join(' ');if(!h)return esc(v);return esc(v)+' <span style="filter:blur(4px);user-select:none;color:var(--muted)">'+esc(h)+'</span>';}
var catIcons={'تبريد وتكييف':'❄️','كهرباء':'⚡','سباكة':'🔧','نجارة':'🪚','تنظيف':'🧹','نقل عفش':'🚚','بناء':'🏗️','تصميم':'🎨','كاميرات مراقبة':'📷','مسابح':'🏊','مكافحة حشرات':'🦟','عزل حراري':'🌡️','مظلات وسواتر':'⛺','حدادة':'⚙️'};

function render(req, bids){
  var title=req.title||'مشروع', cat=req.category||'', city=req.city||'السعودية';
  var desc=req.description||'', budget=req.budget||req.budget_max||'';
  var deadline=req.deadline||'', status=req.status||'open';
  var imgs=req.images||[], client=req.client||{}, ph=client.phone||'';
  var url=location.href, rid=getId();

  // SEO
  var pgT=title+(cat?' — '+cat:'')+(city?' في '+city:'')+' | مناقصة';
  document.title=pgT;
  document.querySelector('meta[name="description"]').content=title+' في '+city+'. قدّم عرضك الآن على منصة مناقصة.';

  // PROFILE TOP
  var catIc=catIcons[cat]||'📋';
  document.getElementById('profile-top').innerHTML=
    '<div class="proj-icon"><div class="proj-ic-emoji">'+catIc+'</div><div class="proj-ic-lbl">'+esc(cat)+'</div></div>'
    +'<div class="proj-actions">'
    +'<button class="btn-bid" id="bidbtn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>تقديم عرض</button>'
    +'<button class="btn-msg" id="msgbtn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>رسالة</button>'
    +'<button class="btn-share" id="sharebtn"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>مشاركة</button>'
    +'</div>';

  var html='';

  // 1. INFO CARD
  html+='<div class="card">';
  if(status==='open') html+='<div class="st-open">&#9679; مفتوح للعروض</div>';
  else if(status==='in_progress') html+='<div class="st-prog">&#9679; قيد التنفيذ</div>';
  else html+='<div class="st-done">&#9679; مكتمل</div>';
  if(cat) html+='<div class="cat-badge">'+esc(cat)+'</div>';
  html+='<h1 class="proj-title">'+esc(title)+'</h1>';
  html+='<div class="info-row"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+esc(city)+'</div>';
  html+='<div class="info-row"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>نُشر '+ago(req.created_at)+'</div>';
  if(deadline) html+='<div class="info-row"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>الموعد النهائي: '+fmtDate(deadline)+'</div>';
  html+='</div>';

  // 2. STATS
  html+='<div class="stats-row">'
    +'<div class="stat-box"><div class="stat-val" style="color:var(--gold)">'+(budget?Number(budget).toString().replace(/\B(?=(\d{3})+(?!\d))/g,','):'—')+'</div>'+(budget?'<div class="stat-unit" style="color:var(--gold-d)">ر.س</div>':'')+'<div class="stat-lbl">الميزانية</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+bids.length+'</div><div class="stat-lbl">عروض مقدمة</div></div>'
  +'</div>';

  // 3. DESC
  if(desc){
    html+='<div class="card">';
    html+='<div class="card-head"><div class="card-ic"><svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="card-title">وصف المشروع</div></div>';
    html+='<p style="font-size:13px;color:var(--text2);line-height:2;white-space:pre-line">'+esc(desc)+'</p>';
    html+='</div>';
  }

  // 4. IMAGES
  if(imgs.length){
    html+='<div class="card">';
    html+='<div class="card-head"><div class="card-ic"><svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><div class="card-title">صور المشروع</div><span style="font-size:11px;color:var(--muted);font-weight:600;margin-right:auto">'+imgs.length+' صورة</span></div>';
    html+='<div class="pgrid">';

function openBidModal(){
  var u=null;try{u=JSON.parse(localStorage.getItem('user')||'null');}catch(e){}
  var t=localStorage.getItem('token')||'';
  if(!u||!t){
    // حفظ المشروع ثم التسجيل
    localStorage.setItem('mnq_auto_bid',getId());
    location.href='/auth.html?redirect=provider';
    return;
  }
  if(u.role!=='provider'){
    alert('هذه الخاصية للمزودين فقط. سجّل كمزود خدمة.');
    return;
  }
  document.getElementById('bid-proj-title').textContent=document.title.replace(' | مناقصة','');
  document.getElementById('bid-price').value='';
  document.getElementById('bid-days').value='';
  document.getElementById('bid-note').value='';
  document.getElementById('bid-overlay').classList.add('on');
  document.body.style.overflow='hidden';
  document.getElementById('bid-price').focus();
}
function closeBidModal(){
  document.getElementById('bid-overlay').classList.remove('on');
  document.body.style.overflow='';
}
async function submitBidFromPage(){
  var price=document.getElementById('bid-price').value;
  var days=document.getElementById('bid-days').value;
  var note=document.getElementById('bid-note').value.trim();
  var t=localStorage.getItem('token')||'';
  var id=getId();
  if(!price||!days||!note){alert('يرجى تعبئة جميع الحقول');return;}
  var btn=document.getElementById('bid-submit-btn');
  btn.disabled=true;btn.textContent='جاري الإرسال...';
  try{
    var r=await fetch('https://manaqasati-production.up.railway.app/api/requests/'+id+'/bids',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},
      body:JSON.stringify({price:parseInt(price),days:parseInt(days),note:note})
    });
    var d=await r.json();
    if(d.id||d.request_id){
      closeBidModal();
      // تحديث عدد العروض
      var bidsEl=document.querySelector('.stat-box:last-child .stat-val');
      if(bidsEl) bidsEl.textContent=parseInt(bidsEl.textContent||0)+1;
      alert('تم إرسال عرضك بنجاح! سيتواصل معك العميل قريباً.');
    } else {
      alert(d.message||'تعذر إرسال العرض');
      btn.disabled=false;btn.textContent='إرسال العرض';
    }
  }catch(e){
    alert('تعذر الاتصال بالسيرفر');
    btn.disabled=false;btn.textContent='إرسال العرض';
  }
}

(function(){
  var id=getId();
  if(!id){document.getElementById('wrap').innerHTML='<p style="padding:40px;text-align:center;color:var(--muted)">رابط غير صحيح</p>';return;}
  var d1=null,d2=null,done=0,rendered=false;
  function tryRender(){done++;if(done<2||rendered)return;rendered=true;if(!d1||d1.message){document.getElementById('wrap').innerHTML='<p style="padding:40px;text-align:center;color:var(--muted)">المشروع غير موجود</p>';return;}render(d1,d2||[]);}
  setTimeout(function(){if(rendered)return;rendered=true;if(d1)render(d1,d2||[]);else document.getElementById('wrap').innerHTML='<p style="padding:40px;text-align:center;color:var(--muted)">تعذر التحميل</p>';},8000);
  var x1=new XMLHttpRequest();x1.open('GET',API+'/api/requests/public/'+id,true);x1.timeout=10000;
  x1.onload=function(){try{d1=JSON.parse(x1.responseText);}catch(e){d1=null;}tryRender();};
  x1.onerror=x1.ontimeout=function(){tryRender();};x1.send();
  var x2=new XMLHttpRequest();x2.open('GET',API+'/api/bids/public/'+id,true);x2.timeout=10000;
  x2.onload=function(){try{d2=JSON.parse(x2.responseText);}catch(e){d2=[];}tryRender();};
  x2.onerror=x2.ontimeout=function(){d2=[];tryRender();};x2.send();
})();
