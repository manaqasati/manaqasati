<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>مشروع — مناقصة</title>
<meta name="description" content="مشروع على منصة مناقصة السعودية">
<meta name="robots" content="index,follow">
<script type="application/ld+json" id="ld"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="alternate icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<style>
:root{--p:#1e3a8a;--p2:#1e40af;--p3:#172554;--gold:#1d4ed8;--gold-d:#1e40af;--gold-l:#eff4ff;--gold-soft:#bfdbfe;--text:#1e293b;--text2:#374151;--muted:#64748b;--hint:#94a3b8;--border:#e6eefb;--bg:#f0f5ff;--white:#FFFFFF;--green:#16A34A;--green-l:#DCFCE7;--red:#DC2626;--sky:#0ea5e9;--star:#F0A500;--shadow:0 2px 8px rgba(37,99,235,.05);--shadow-md:0 4px 16px rgba(37,99,235,.1);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* NAV */
.nav{background:var(--p3);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--sky)}
.back-btn{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.78);font-size:13px;font-weight:700;border:none;background:none;font-family:inherit;cursor:pointer;padding:6px 10px;border-radius:8px}
.back-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.logo{font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;color:#fff;display:flex;align-items:center;gap:5px;text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--sky)}
.nav-in{padding:7px 16px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
.nav-in:hover{filter:brightness(1.08)}
/* COVER */
.cover{height:200px;position:relative;overflow:hidden;background:linear-gradient(135deg,#172554,#1e3a8a,#2952a3)}
.cover-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(23,37,84,.3),rgba(23,37,84,.7))}
.cover-net{position:absolute;inset:0;pointer-events:none;opacity:.2}
.cover-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--sky),transparent)}
/* PROFILE TOP */
.wrap{max-width:680px;margin:0 auto;padding:0 16px}
.profile-top{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-48px;margin-bottom:14px;gap:10px;flex-wrap:wrap;position:relative;z-index:2}
.proj-icon{width:96px;height:96px;border-radius:16px;border:4px solid #fff;background:linear-gradient(135deg,#172554,#1e3a8a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:var(--shadow-md);flex-shrink:0;overflow:hidden}
.proj-icon img{width:100%;height:100%;object-fit:cover}
.proj-ic-emoji{font-size:28px}
.proj-ic-lbl{font-size:9px;font-weight:800;color:rgba(255,255,255,.55);text-align:center;padding:0 4px}
.proj-actions{display:flex;gap:8px;padding-bottom:6px;flex-wrap:wrap}
.btn-bid{display:flex;align-items:center;gap:6px;padding:10px 18px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 2px 8px rgba(29,78,216,.3)}
.btn-bid:hover{filter:brightness(1.08);transform:translateY(-1px)}
/* CARDS */
.card{background:var(--white);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-ic{width:30px;height:30px;border-radius:8px;background:var(--p);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;color:var(--p);flex:1}
/* PROJECT INFO */
.proj-title{font-family:'Cairo',sans-serif;font-size:20px;font-weight:900;color:var(--p);line-height:1.3;margin-bottom:8px}
.cat-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-l);border:1px solid var(--gold-soft);color:var(--p);font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:8px}
.info-row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.desc-text{font-size:13px;line-height:1.85;color:var(--text2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);white-space:pre-wrap;word-wrap:break-word}
/* STATUS */
.st{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;margin-bottom:8px}
.st::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.st-open{background:rgba(22,163,74,.1);color:#16A34A;border:1px solid rgba(22,163,74,.2)}
.st-prog{background:rgba(37,99,235,.1);color:#2563EB;border:1px solid rgba(37,99,235,.2)}
.st-done{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:22px;font-weight:900;line-height:1.1}
.stat-unit{font-size:11px;font-weight:700;color:var(--muted);margin-top:1px}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:600;margin-top:4px}
/* CLIENT CARD */
.client-card{background:linear-gradient(135deg,var(--p3),var(--p));border-radius:16px;padding:18px;margin-bottom:12px;border-bottom:3px solid var(--sky);box-shadow:0 4px 20px rgba(23,37,84,.18)}
.client-av{width:48px;height:48px;border-radius:50%;background:rgba(14,165,233,.18);border:2px solid rgba(14,165,233,.35);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.client-av img{width:100%;height:100%;object-fit:cover}
.cc-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.8px;text-align:center;margin-bottom:10px;text-transform:uppercase}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cbtn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;border-radius:12px;font-size:13px;font-weight:800;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.c-call{background:var(--sky);color:#fff}
.c-call:hover{filter:brightness(1.08)}
.c-wa{background:#16A34A;color:#fff}
.c-wa:hover{background:#15803D}
.c-msg{grid-column:1/-1;background:rgba(255,255,255,.1);color:rgba(255,255,255,.9);border:1.5px solid rgba(255,255,255,.18)}
.c-msg:hover{background:rgba(255,255,255,.18)}
/* BIDS */
.bid{background:var(--white);border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border);box-shadow:var(--shadow)}
.bid:last-child{margin-bottom:0}
.bid-head{background:linear-gradient(135deg,#172554,#1e3a8a);padding:14px 16px;display:flex;align-items:center;gap:12px}
.bid-av{width:46px;height:46px;border-radius:50%;background:rgba(14,165,233,.18);border:2px solid var(--sky);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.bid-av img{width:100%;height:100%;object-fit:cover}
.bid-name{font-size:14px;font-weight:900;color:#fff;margin-bottom:3px}
.bid-stars{display:flex;align-items:center;gap:2px}
.bid-city{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.bid-price{text-align:center;flex-shrink:0}
.bid-price-val{font-size:20px;font-weight:900;color:#34d399;line-height:1}
.bid-price-unit{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.bid-days{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.bid-body{padding:13px 15px}
.bid-note{font-size:12px;color:var(--text2);background:var(--bg);padding:10px 12px;border-radius:9px;border-right:3px solid var(--p);line-height:1.8;margin-bottom:11px}
.bid-note-empty{font-size:12px;color:var(--hint);font-style:italic;margin-bottom:11px}
.bid-actions{display:flex;gap:7px;flex-wrap:wrap}
.bid-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.bid-btn-wa{background:#16A34A;color:#fff}
.bid-btn-wa:hover{background:#15803D}
.bid-btn-call{background:var(--sky);color:#fff}
.bid-btn-call:hover{filter:brightness(1.08)}
.bid-btn-pro{background:var(--bg);color:var(--p);border:1px solid var(--border)}
.bid-btn-pro:hover{background:var(--p);color:#fff}
/* PORTFOLIO */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pimg{border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;background:var(--bg)}
.pimg img{width:100%;height:100%;object-fit:cover;transition:.3s}
.pimg:hover img{transform:scale(1.05)}
/* CTA */
.cta{background:linear-gradient(135deg,var(--p3),var(--p));border-radius:16px;padding:22px 18px;text-align:center;margin-bottom:12px;border-bottom:3px solid var(--sky)}
.cta-btn{display:inline-flex;align-items:center;gap:7px;padding:13px 28px;background:linear-gradient(135deg,var(--sky),var(--p2));color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 4px 14px rgba(14,165,233,.4);transition:.15s}
.cta-btn:hover{filter:brightness(1.08);transform:translateY(-2px)}
/* MODAL */
.bid-overlay{display:none;position:fixed;inset:0;background:rgba(13,25,55,.6);z-index:999;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.bid-overlay.on{display:flex}
.bid-modal{background:#fff;border-radius:20px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 60px rgba(23,37,84,.3)}
.bm-head{background:linear-gradient(135deg,#172554,#1e3a8a);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--sky)}
.bm-body{padding:18px 20px}
.bm-fg{margin-bottom:13px}
.bm-fg label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px}
.bm-fg input,.bm-fg textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;outline:none;background:var(--bg);transition:.15s}
.bm-fg input:focus,.bm-fg textarea:focus{border-color:var(--p)}
.bm-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.bm-submit:hover{filter:brightness(1.08)}
/* VIEWER */
.viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:16px}
.viewer.on{display:flex}
.viewer img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.vcl{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* QUESTIONS & CLARIFICATIONS */
.q-list{display:flex;flex-direction:column;gap:12px;margin-bottom:6px}
.q-item{background:var(--bg);border-radius:12px;padding:14px}
.q-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.q-av{width:34px;height:34px;border-radius:50%;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--p);font-size:14px;flex-shrink:0}
.q-name{font-size:13px;font-weight:800;color:var(--text)}
.q-time{font-size:11px;color:var(--muted)}
.q-text{font-size:13px;color:var(--text2);line-height:1.7}
.q-answer{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:11px;margin-top:9px;border-right:3px solid var(--p)}
.q-answer-lbl{font-size:11px;font-weight:800;color:var(--p);margin-bottom:4px}
.q-ask{border-top:1px solid var(--border);padding-top:16px;margin-top:14px}
.q-ask-t{font-size:13px;font-weight:800;color:var(--text);margin-bottom:9px}
.q-textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text2);outline:none;min-height:74px;resize:vertical;transition:border-color .2s;background:var(--bg)}
.q-textarea:focus{border-color:var(--p)}
.btn-ask{margin-top:9px;width:100%;padding:12px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:11px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif}
.btn-ask:hover{filter:brightness(1.08)}
/* SORT TABS */
.sort-tab{font-size:10px;font-weight:700;color:var(--muted);background:none;border:none;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:'Tajawal',sans-serif;transition:.15s}
.sort-tab.on{color:#fff;background:var(--p);font-weight:800}
/* NEW BID CARD */
.bid-x{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:9px;position:relative}
.bid-x:last-child{margin-bottom:0}
.bid-x-best{border:2px solid var(--sky);box-shadow:0 4px 16px rgba(14,165,233,.12)}
.bid-x-badge{position:absolute;top:-9px;right:13px;background:var(--sky);color:#fff;font-size:9px;font-weight:900;padding:3px 11px;border-radius:20px}
.bid-x-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--sky));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.bid-x-av img{width:100%;height:100%;object-fit:cover}
/* SKELETON */
.sk{background:linear-gradient(90deg,#eaf1fc 25%,#dbe6fa 50%,#eaf1fc 75%);background-size:200%;animation:sk 1.3s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
.foot{text-align:center;font-size:11px;color:var(--muted);padding:16px;margin-bottom:70px}
@media(max-width:480px){.cover{height:160px}.proj-icon{width:80px;height:80px}.proj-ic-emoji{font-size:22px}.stats-row{grid-template-columns:1fr 1fr}}

</style>
</head>
<body>

<nav class="nav">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='/'">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    رجوع
  </button>
  <a href="/" class="logo"><span class="logo-dot"></span>مناقصة</a>
  <button class="nav-in" id="navBtn" onclick="goLogin()">دخول</button>
</nav>

<div class="cover" id="cover">
  <svg class="cover-net" viewBox="0 0 680 200" preserveAspectRatio="none">
    <line x1="50" y1="40" x2="180" y2="70" stroke="#fff" stroke-width="1.2"/>
    <line x1="180" y1="70" x2="320" y2="35" stroke="#fff" stroke-width="1.2"/>
    <line x1="320" y1="35" x2="480" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="60" x2="630" y2="38" stroke="#fff" stroke-width="1"/>
    <line x1="180" y1="70" x2="240" y2="45" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity=".8"/>
    <circle cx="180" cy="70" r="7" fill="#fff" opacity=".4"/>
    <circle cx="240" cy="45" r="5" fill="#0ea5e9" opacity=".8"/>
  </svg>
  <div class="cover-overlay"></div>
  <div class="cover-bar"></div>
</div>

<div style="padding-bottom:90px">
  <div class="wrap">

    <div class="profile-top">
      <div class="proj-icon" id="projIcon">
        
        <span class="proj-ic-lbl">مشروع</span>
      </div>
      <div class="proj-actions">
        <a href="#bids-section" class="btn-bid" id="bidBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          قدّم عرضك
        </a>
      </div>
    </div>

    <div id="main-content">
      <div class="card sk" style="height:180px"></div>
      <div class="card sk" style="height:120px"></div>
    </div>

  </div>
</div>

<!-- BID MODAL -->
<div class="bid-overlay" id="bidOverlay">
  <div class="bid-modal">
    <div class="bm-head">
      <span style="font-size:14px;font-weight:900;color:#fff">تقديم عرض</span>
      <button onclick="closeBid()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:16px"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="bm-body">
      <div id="bid-al" style="display:none;padding:10px;border-radius:9px;font-size:12px;font-weight:700;margin-bottom:12px"></div>
      <div class="bm-fg"><label>سعر العرض (ر.س) *</label><input type="number" id="bid-price" placeholder="مثال: 2500" min="1"></div>
      <div class="bm-fg"><label>مدة التنفيذ (أيام) *</label><input type="number" id="bid-days" placeholder="مثال: 7" min="1"></div>
      <div class="bm-fg"><label>رسالتك للعميل</label><textarea id="bid-note" placeholder="اشرح كيف ستنفذ المشروع..." style="min-height:80px;resize:vertical"></textarea></div>
      <button class="bm-submit" onclick="submitBid(this)">إرسال العرض</button>
    </div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<!-- CHAT MODAL -->
<div id="chatOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)">
  <div style="background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column">
    <div style="background:linear-gradient(135deg,#172554,#1e3a8a);padding:14px 18px;border-radius:22px 22px 0 0;border-bottom:3px solid #0ea5e9;display:flex;align-items:center;justify-content:space-between">
      <div id="chat-modal-title" style="font-size:14px;font-weight:900;color:#fff">رسالة</div>
      <button onclick="closeChat()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:16px"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="chat-msgs-wrap" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:#f0f5ff;min-height:200px;max-height:50vh">
      <div style="text-align:center;color:#64748b;font-size:12px;padding:20px">جاري التحميل...</div>
    </div>
    <div style="padding:12px;border-top:1px solid #e6eefb;display:flex;gap:8px;background:#fff">
      <input id="chat-input" placeholder="اكتب رسالتك..." style="flex:1;padding:11px 13px;border:1.5px solid #e6eefb;border-radius:11px;font-family:Tajawal,sans-serif;font-size:13px;outline:none" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg();}">
      <button onclick="sendChatMsg()" style="padding:11px 18px;background:#1e3a8a;color:#fff;border:none;border-radius:11px;font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;cursor:pointer">إرسال</button>
    </div>
  </div>
</div>

<script>
var API = 'https://manaqasati-production.up.railway.app';

var _req = null, _bids = [], _rid = null;

// ═══ HELPERS ═══
function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function fmtN(n){return n?Number(n).toLocaleString('en-US'):'0';}
function fmtDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('ar-SA',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function ago(d){var s=(Date.now()-new Date(d))/1000;if(s<3600)return Math.floor(s/60)+' دقيقة';if(s<86400)return Math.floor(s/3600)+' ساعة';if(s<2592000)return Math.floor(s/86400)+' يوم';return fmtDate(d);}
function ph966(p){if(!p)return'';var n=String(p).replace(/[^0-9]/g,'');if(n.startsWith('966'))return'+'+n;if(n.startsWith('0'))return'+966'+n.slice(1);return'+966'+n;}
function mkStars(n){var s='';for(var i=1;i<=5;i++){var f=i<=Math.round(n)?'#F0A500':'rgba(255,255,255,.2)';s+='<svg width="12" height="12" fill="'+f+'" viewBox="0 0 24 24" style="display:inline-block"><polygon points="12 2 15 9 22 9 17 14 19 21 12 17 5 21 7 14 2 9 9 9"/></svg>';}return s;}
function isImg(s){return !!(s&&(s.startsWith('http')||s.startsWith('data:')));}
function getUser(){try{var t=localStorage.getItem('token');var u=JSON.parse(localStorage.getItem('user')||'null');return(t&&u)?u:null;}catch(e){return null;}}
function getToken(){return localStorage.getItem('token')||'';}



// ═══ ID FROM URL ═══
function getReqId(){
  var path=decodeURIComponent(location.pathname);
  var nums=path.match(/\d+/g);
  if(nums&&nums.length)return parseInt(nums[nums.length-1]);
  var p=new URLSearchParams(location.search);
  if(p.get('id'))return parseInt(p.get('id'));
  return null;
}

// ═══ NAV STATE ═══
(function initNav(){
  var u=getUser();
  var btn=document.getElementById('navBtn');
  if(u&&btn){
    var dash=u.role==='provider'?'/dashboard-provider.html':'/dashboard-client.html';
    btn.textContent='لوحة التحكم';
    btn.onclick=function(){location.href=dash;};  // مسار نظيف بدون hash
    btn.style.background='var(--p2)';
  }
})();

function goLogin(){
  localStorage.setItem('_after_login',location.href);
  location.href='/auth.html';
}

// ═══ LOAD PAGE ═══
async function load(){
  _rid = getReqId();
  if(!_rid){
    document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:32px;margin-bottom:12px"></div><div style="font-size:14px;font-weight:700">مشروع غير موجود</div></div>';
    return;
  }
  try{
    var rr=await fetch(API+'/api/requests/public/'+_rid);
    if(!rr.ok) throw new Error('not found');
    _req=await rr.json();
    var br=await fetch(API+'/api/bids/public/'+_rid);
    _bids=br.ok?await br.json():[];
    if(!Array.isArray(_bids))_bids=[];
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:14px;font-weight:700;color:var(--red)"> تعذر تحميل المشروع</div><div style="margin-top:12px"><button onclick="load()" style="padding:9px 18px;background:var(--p);color:#fff;border:none;border-radius:9px;font-family:Tajawal;font-size:13px;font-weight:700;cursor:pointer">إعادة المحاولة</button></div></div>';
  }
}

// ═══ UPGRADE HELPERS ═══
var _bidSort='best';
function _bidRating(b){return parseFloat(b.avg_rating||b.provider_rating)||0;}
function _bidStats(){
  var prices=_bids.map(function(b){return Number(b.price)||0;}).filter(function(x){return x>0;});
  if(!prices.length)return null;
  var sum=prices.reduce(function(a,c){return a+c;},0);
  return {min:Math.min.apply(null,prices),max:Math.max.apply(null,prices),avg:Math.round(sum/prices.length)};
}
function _bestBid(){
  if(!_bids.length)return null;
  var s=_bids.slice().sort(function(a,b){
    var ra=_bidRating(a),rb=_bidRating(b);
    if(rb!==ra)return rb-ra;
    return (Number(a.price)||0)-(Number(b.price)||0);
  });
  return s[0];
}
function _sortedBids(mode){
  var arr=_bids.slice();
  if(mode==='cheap'){arr.sort(function(a,b){return (Number(a.price)||0)-(Number(b.price)||0);});}
  else if(mode==='rating'){arr.sort(function(a,b){var d=_bidRating(b)-_bidRating(a);if(d)return d;return (parseInt(b.review_count||b.provider_reviews||0))-(parseInt(a.review_count||a.provider_reviews||0));});}
  else{ // best: rating desc, tiebreak price asc
    arr.sort(function(a,b){var d=_bidRating(b)-_bidRating(a);if(d)return d;return (Number(a.price)||0)-(Number(b.price)||0);});
  }
  return arr;
}
function _stepper(status){
  var steps=['نشر الطلب','مراجعة الفريق','استقبال العروض','اختيار المزود','إتمام الصفقة'];
  var active=2; // open -> استقبال العروض
  if(status==='in_progress')active=3;
  else if(status==='completed'||status==='done')active=5; // all done
  var pct=active>=5?100:(active/(steps.length-1))*100;
  var s='<div class="card" style="padding:16px 14px"><div style="font-family:\'Cairo\',sans-serif;font-size:12px;font-weight:800;color:var(--p);margin-bottom:14px">📊 مراحل المشروع</div>';
  s+='<div style="position:relative;display:flex;justify-content:space-between">';
  s+='<div style="position:absolute;top:11px;right:10%;left:10%;height:3px;background:var(--p-mid,#bfdbfe);border-radius:2px"></div>';
  s+='<div style="position:absolute;top:11px;right:10%;width:'+(pct*0.8)+'%;height:3px;background:linear-gradient(90deg,var(--p),var(--sky));border-radius:2px"></div>';
  for(var i=0;i<steps.length;i++){
    var done=i<active,cur=i===active;
    var bg=done?'var(--p)':(cur?'var(--sky)':'#fff');
    var bd=cur?'border:3px solid #c7e9fb;':(done?'':'border:2px solid var(--border);');
    var col=done?'#fff':(cur?'#fff':'var(--hint)');
    var inner=done?'<svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':(i+1);
    var lblCol=done?'var(--p)':(cur?'var(--sky)':'var(--hint)');
    var lblW=cur||done?'800':'600';
    s+='<div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative;z-index:1">';
    s+='<div style="width:22px;height:22px;border-radius:50%;background:'+bg+';'+bd+'color:'+col+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900">'+inner+'</div>';
    s+='<div style="font-size:8.5px;font-weight:'+lblW+';color:'+lblCol+';text-align:center;line-height:1.3">'+steps[i]+'</div>';
    s+='</div>';
  }
  s+='</div></div>';
  return s;
}
function _miniMetrics(price,days,rating){
  var h='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:11px">';
  h+='<div style="background:#f0fdf4;border-radius:9px;padding:8px 4px;text-align:center"><div style="font-size:14px;font-weight:900;color:var(--green)">'+fmtN(price)+'</div><div style="font-size:8px;color:var(--green);font-weight:700">السعر ر.س</div></div>';
  h+='<div style="background:var(--bg);border-radius:9px;padding:8px 4px;text-align:center"><div style="font-size:14px;font-weight:900;color:var(--p)">'+(days||'—')+'</div><div style="font-size:8px;color:var(--muted);font-weight:700">أيام</div></div>';
  h+='<div style="background:#fffbeb;border-radius:9px;padding:8px 4px;text-align:center"><div style="font-size:14px;font-weight:900;color:#d97706">'+(rating>0?rating.toFixed(1):'—')+'</div><div style="font-size:8px;color:#92400e;font-weight:700">التقييم</div></div>';
  h+='</div>';
  return h;
}
function _bidCard(b,isBest,isOwner,reqStatus){
  var avg=_bidRating(b);
  var name=b.provider_name||'مزود';
  var provImg=isImg(b.provider_image)?b.provider_image:null;
  var provId=String(b.provider_id||b.user_id||'');
  var provSlug=encodeURIComponent(name.replace(/\s+/g,'-'))+'-'+provId;
  var proUrl=provId?'/pro/'+provSlug+'?id='+provId:'#';
  var provPhone=ph966(b.provider_phone||'');
  var reviews=parseInt(b.review_count||b.provider_reviews||0);
  var verified=!!(b.provider_verified||b.is_verified);
  var starsHtml='';for(var i=1;i<=5;i++){starsHtml+='<span style="color:'+(i<=Math.round(avg)?'#F0A500':'var(--border)')+';font-size:11px">★</span>';}

  var h='<div class="bid-x'+(isBest?' bid-x-best':'')+'">';
  if(isBest)h+='<div class="bid-x-badge">الأفضل ⭐</div>';
  h+='<div style="display:flex;align-items:center;gap:11px">';
  h+=provImg?'<div class="bid-x-av"><img src="'+provImg+'" loading="lazy" alt="'+esc(name)+'"></div>':'<div class="bid-x-av">'+esc(name.charAt(0))+'</div>';
  h+='<div style="flex:1;min-width:0">';
  h+='<div style="font-size:14px;font-weight:900;color:var(--p);display:flex;align-items:center;gap:5px;flex-wrap:wrap">'+esc(name)+(verified?'<span style="background:rgba(14,165,233,.12);color:var(--sky);font-size:8px;font-weight:800;padding:1px 7px;border-radius:10px">موثّق</span>':'')+'</div>';
  h+='<div style="margin-top:2px">'+starsHtml+'<span style="font-size:10px;color:var(--hint);margin-right:4px">'+(avg>0?avg.toFixed(1)+' ':'')+'('+reviews+')</span></div>';
  if(b.provider_city)h+='<div style="font-size:10px;color:var(--muted);margin-top:1px">'+esc(b.provider_city)+'</div>';
  h+='</div></div>';
  h+=_miniMetrics(b.price,b.days,avg);
  // note
  var note=b.proposal||b.note||'';
  if(note)h+='<div class="bid-note" style="margin-top:11px;margin-bottom:0">'+esc(note)+'</div>';
  // actions
  h+='<div class="bid-actions" style="margin-top:11px">';
  if(provPhone){
    h+='<a href="https://wa.me/'+provPhone.replace('+','')+'" class="bid-btn bid-btn-wa" target="_blank" rel="noopener"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>واتساب</a>';
    h+='<a href="tel:'+provPhone+'" class="bid-btn bid-btn-call"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.86 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012.77 0h3a2 2 0 012 1.72c.18.97.44 1.9.7 2.81a2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l.91-.91a2 2 0 012.11-.45c.91.26 1.84.52 2.81.7A2 2 0 0122 15.16z"/></svg>اتصال</a>';
  }
  if(provId){
    h+='<a href="'+proUrl+'" class="bid-btn bid-btn-pro"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>عرض الملف</a>';
  }
  if(isOwner&&reqStatus==='open'){
    var isAcc=b.status==='accepted',isRej=b.status==='rejected';
    if(isAcc){
      h+='<span style="display:inline-flex;align-items:center;gap:4px;padding:7px 13px;background:var(--green-l);color:var(--green);border-radius:10px;font-size:11px;font-weight:800;border:1px solid #bbf7d0"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-1px"><polyline points="20 6 9 17 4 12"/></svg> مقبول</span>';
    } else if(isRej){
      h+='<span style="display:inline-flex;align-items:center;gap:4px;padding:7px 13px;background:#FEF2F2;color:var(--red);border-radius:10px;font-size:11px;font-weight:800;border:1px solid #fecaca"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> مرفوض</span>';
    } else {
      h+='<button onclick="acceptBid('+b.id+')" style="display:inline-flex;align-items:center;gap:4px;padding:8px 14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="display:inline-block;vertical-align:-1px"><polyline points="20 6 9 17 4 12"/></svg> قبول</button>';
      h+='<button onclick="rejectBid('+b.id+')" style="display:inline-flex;align-items:center;gap:4px;padding:8px 12px;background:#FEF2F2;color:var(--red);border:1px solid #fecaca;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> رفض</button>';
    }
  }
  h+='</div></div>';
  return h;
}
function _renderBidsList(mode){
  var wrap=document.getElementById('bids-list');
  if(!wrap)return;
  var u=getUser();
  var req=_req||{};
  var isOwner=u&&u.role==='client'&&(String(u.id)===String(req.client_id)||String(u.id)===String(req.client&&req.client.id));
  var best=_bestBid();
  var bestId=best&&best.id;
  var arr=_sortedBids(mode);
  var html='';
  arr.forEach(function(b){html+=_bidCard(b,String(b.id)===String(bestId),isOwner,req.status);});
  wrap.innerHTML=html;
}
function _setSort(mode){
  _bidSort=mode;
  ['best','cheap','rating'].forEach(function(m){
    var el=document.getElementById('sort'+m.charAt(0).toUpperCase()+m.slice(1));
    if(el)el.className='sort-tab'+(m===mode?' on':'');
  });
  _renderBidsList(mode);
}

// ═══ RENDER ═══
function render(){
  var req=_req;
  if(!req||!req.id) return;

  var u=getUser();
  var isOwner=u&&u.role==='client'&&(String(u.id)===String(req.client_id)||String(u.id)===String(req.client&&req.client.id));
  var isProvider=u&&u.role==='provider';
  var client=req.client||{};
  var clientPhone=ph966(client.phone||req.client_phone||'');
  var clientName=esc(client.name||req.client_name||'صاحب المشروع');

  // Cover image
  var imgs=req.images||[];
  var coverImg=req.thumbnail||(imgs.length&&imgs[0])||req.image_url||null;
  if(isImg(coverImg)){
    var ci=document.createElement('img');
    ci.src=coverImg;ci.className='cover-img';
    document.getElementById('cover').appendChild(ci);
  }

  // Project icon
  var icon=document.getElementById('projIcon');
  if(isImg(coverImg)){
    icon.innerHTML='<img src="'+coverImg+'" alt="مشروع">';
  } else {
    icon.innerHTML='<div style="color:#fff">'+catSvg(req.category,32)+'</div><span class="proj-ic-lbl">'+esc(req.category||'مشروع')+'</span>';
  }

  // ── Immersive hero overlay on cover ──
  var coverEl=document.getElementById('cover');
  if(coverEl&&!coverEl.querySelector('.hero-ov')){
    var stColor=req.status==='open'?'rgba(22,163,74,.92)':(req.status==='in_progress'?'rgba(37,99,235,.92)':'rgba(100,116,139,.92)');
    var stTxt=req.status==='open'?'مفتوح للعروض':(req.status==='in_progress'?'قيد التنفيذ':'مكتمل');
    var stEl=document.createElement('div');
    stEl.className='hero-ov';
    stEl.style.cssText='position:absolute;top:12px;right:14px;z-index:3';
    stEl.innerHTML='<span style="background:'+stColor+';color:#fff;font-size:10px;font-weight:800;padding:4px 11px;border-radius:20px">● '+stTxt+'</span>';
    coverEl.appendChild(stEl);
    var hov=document.createElement('div');
    hov.className='hero-ov';
    hov.style.cssText='position:absolute;bottom:0;right:0;left:0;padding:16px;z-index:3';
    var catChip=req.category?'<span style="display:inline-block;background:rgba(14,165,233,.88);color:#fff;font-size:10px;font-weight:800;padding:3px 11px;border-radius:20px;margin-bottom:8px">'+esc(req.category)+(req.city?' · '+esc(req.city):'')+'</span>':'';
    hov.innerHTML=catChip+'<div style="font-family:\'Cairo\',sans-serif;font-size:19px;font-weight:900;color:#fff;line-height:1.35;text-shadow:0 2px 12px rgba(0,0,0,.45)">'+esc(req.title||'مشروع')+'</div>';

// ═══ ACTIONS ═══
function openBid(){
  var u=getUser();
  if(!u){goLogin();return;}
  if(u.role!=='provider'){alert('هذا الزر للمزودين فقط — يرجى تسجيل الدخول كمزود');return;}
  document.getElementById('bidOverlay').classList.add('on');
}
function closeBid(){document.getElementById('bidOverlay').classList.remove('on');}

async function submitBid(btn){
  var u=getUser();
  if(!u){goLogin();return;}
  var price=document.getElementById('bid-price').value;
  var days=document.getElementById('bid-days').value;
  var note=document.getElementById('bid-note').value.trim();
  var al=document.getElementById('bid-al');
  if(!price||!days){al.textContent='السعر والمدة مطلوبان';al.style.cssText='display:block;background:#FEF2F2;color:var(--red)';return;}
  btn.disabled=true;btn.textContent='جاري الإرسال...';
  try{
    var r=await fetch(API+'/api/requests/'+_rid+'/bids',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},
      body:JSON.stringify({price:Number(price),days:Number(days),note:note})
    });
    var d=await r.json();
    if(r.ok){
      al.textContent='تم إرسال عرضك بنجاح!';al.style.cssText='display:block;background:var(--green-l);color:var(--green)';
      setTimeout(function(){closeBid();load();},1500);
    } else {
      al.textContent=d.message||'حدث خطأ';al.style.cssText='display:block;background:#FEF2F2;color:var(--red)';
      btn.disabled=false;btn.textContent='إرسال العرض';
    }
  }catch(e){
    al.textContent='تعذر الإرسال';al.style.cssText='display:block;background:#FEF2F2;color:var(--red)';
    btn.disabled=false;btn.textContent='إرسال العرض';
  }
}

var _chatReqId=null,_chatMsgs=[],_chatReceiver=null;

function doMsg(){
  var u=getUser();
  if(!u){goLogin();return;}
  // العميل صاحب المشروع لا يحتاج يراسل نفسه
  var ownerId=(_req&&_req.client_id)||(_req&&_req.client&&_req.client.id);
  if(u.role==='client'&&String(u.id)===String(ownerId)){
    alert('هذا مشروعك — يمكنك التواصل مع المزودين عبر العروض');return;
  }
  var clientName=(_req&&_req.client&&_req.client.name)||(_req&&_req.client_name)||'صاحب المشروع';
  document.getElementById('chat-modal-title').textContent='رسالة إلى '+clientName;
  document.getElementById('chatOverlay').style.display='flex';
  openChatRoom();
}

function closeChat(){
  document.getElementById('chatOverlay').style.display='none';
}

async function openChatRoom(){
  var u=getUser();if(!u)return;
  var wrap=document.getElementById('chat-msgs-wrap');
  wrap.innerHTML='<div style="text-align:center;color:#64748b;font-size:12px;padding:20px">جاري التحميل...</div>';
  // الطرف الآخر = صاحب المشروع (العميل)
  var ownerId=(_req&&_req.client_id)||(_req&&_req.client&&_req.client.id);
  _chatReceiver=ownerId;
  try{
    // direct-message يستخدم provider_id كمعرّف الطرف الآخر
    var r=await fetch(API+'/api/direct-message',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},
      body:JSON.stringify({provider_id:ownerId})
    });
    var d=await r.json();
    _chatReqId=d.request_id||_rid;
    loadChatMsgs();
  }catch(e){
    _chatReqId=_rid;
    loadChatMsgs();
  }
}

async function loadChatMsgs(){
  if(!_chatReqId)return;
  var wrap=document.getElementById('chat-msgs-wrap');
  try{
    var r=await fetch(API+'/api/messages/'+_chatReqId,{
      headers:{'Authorization':'Bearer '+getToken()}
    });
    var msgs=await r.json();
    _chatMsgs=Array.isArray(msgs)?msgs:[];
    renderMsgs(wrap);
  }catch(e){
    wrap.innerHTML='<div style="text-align:center;color:#64748b;font-size:12px;padding:20px">لا توجد رسائل بعد — ابدأ المحادثة</div>';
  }
}

function renderMsgs(wrap){
  var u=getUser();
  if(!_chatMsgs.length){
    wrap.innerHTML='<div style="text-align:center;color:#64748b;font-size:12px;padding:20px">لا توجد رسائل — ابدأ المحادثة</div>';
    return;
  }
  wrap.innerHTML=_chatMsgs.map(function(m){
    var isMe=u&&String(m.sender_id)===String(u.id);
    return '<div style="max-width:75%;padding:10px 13px;border-radius:'+(isMe?'14px 14px 4px 14px':'14px 14px 14px 4px')+';background:'+(isMe?'#1e3a8a':'#fff')+';color:'+(isMe?'#fff':'#1e293b')+';align-self:'+(isMe?'flex-end':'flex-start')+';font-size:13px;line-height:1.6;border:1px solid #e6eefb">'
      +esc(m.content)
      +'<div style="font-size:10px;opacity:.45;margin-top:3px">'+ago(m.created_at)+'</div>'
      +'</div>';
  }).join('');
  wrap.scrollTop=wrap.scrollHeight;
}

async function sendChatMsg(){
  var inp=document.getElementById('chat-input');
  var msg=(inp.value||'').trim();
  if(!msg||!_chatReqId)return;
  if(!_chatReceiver){alert('تعذر تحديد المستلم');return;}
  inp.value='';
  try{
    var r=await fetch(API+'/api/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},
      body:JSON.stringify({request_id:_chatReqId,receiver_id:_chatReceiver,content:msg})
    });
    if(!r.ok){throw new Error('HTTP '+r.status);}
    var m=await r.json();
    if(m&&m.id){_chatMsgs.push(m);renderMsgs(document.getElementById('chat-msgs-wrap'));}
  }catch(e){inp.value=msg;alert('تعذر الإرسال');}
}

function openViewer(src){
  document.getElementById('viewerImg').src=src;
  document.getElementById('viewer').classList.add('on');
}

function shareProject(){
  if(navigator.share){navigator.share({title:_req&&_req.title||'مشروع',url:location.href});}
  else{navigator.clipboard&&navigator.clipboard.writeText(location.href).then(function(){alert('تم نسخ الرابط');});}
}

// ═══ OWNER BID ACTIONS ═══
async function acceptBid(bidId){
  if(!confirm('هل تؤكد قبول هذا العرض؟'))return;
  try{
    var r=await fetch(API+'/api/bids/'+bidId+'/accept',{method:'PUT',headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'}});
    if(r.ok){alert('تم قبول العرض');load();}
    else{var d=await r.json();alert(d.message||'تعذر القبول');}
  }catch(e){alert('تعذر الاتصال');}
}
async function rejectBid(bidId){
  if(!confirm('هل تؤكد رفض هذا العرض؟'))return;
  try{
    var r=await fetch(API+'/api/bids/'+bidId+'/reject',{method:'PUT',headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'}});
    if(r.ok){alert('تم الرفض');load();}
    else{var d=await r.json();alert(d.message||'تعذر الرفض');}
  }catch(e){alert('تعذر الاتصال');}
}

// ═══ QUESTIONS & CLARIFICATIONS (الأسئلة والتوضيحات) ═══
function loadQuestions(id){
  var el=document.getElementById('questions-wrap');
  if(!el)return;
  el.innerHTML='<div class="card"><div style="text-align:center;padding:18px;color:var(--muted);font-size:13px">جاري تحميل الأسئلة...</div></div>';
  var opts={};var tk=getToken();
  if(tk)opts.headers={'Authorization':'Bearer '+tk};
  fetch(API+'/api/requests/'+id+'/questions',opts)
    .then(function(r){return r.ok?r.json():[];})
    .then(function(qs){renderQuestions(Array.isArray(qs)?qs:(qs&&qs.data)?qs.data:[]);})
    .catch(function(){renderQuestions([]);});
}
function renderQuestions(qs){
  var el=document.getElementById('questions-wrap');
  if(!el)return;
  var u=getUser();
  var list='';
  if(!qs.length){
    list='<div style="text-align:center;padding:24px 14px"><div style="width:48px;height:48px;background:var(--p-light,#dbeafe);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 11px;font-size:22px">❓</div><div style="font-size:13px;font-weight:800;color:var(--text)">لا توجد أسئلة بعد</div><div style="font-size:11.5px;color:var(--muted);margin-top:4px">اسأل صاحب المشروع عن أي تفاصيل قبل تقديم عرضك</div></div>';
  } else {
    list=qs.map(function(q){
      var nm=q.asker_name||q.provider_name||q.name||'مزود';
      var ans=q.answer||q.reply||'';
      return '<div class="q-item">'
        +'<div class="q-head"><div class="q-av">'+esc(nm.charAt(0))+'</div>'
        +'<div><div class="q-name">'+esc(nm)+'</div><div class="q-time">'+ago(q.created_at)+'</div></div></div>'
        +'<div class="q-text">'+esc(q.question||q.body||q.text||'')+'</div>'
        +(ans?'<div class="q-answer"><div class="q-answer-lbl">ردّ صاحب الطلب:</div>'+esc(ans)+'</div>':'')
        +'</div>';
    }).join('');
  }
  var askBox='<div class="q-ask"><div class="q-ask-t">🙋 اسأل أو أضف توضيحاً</div>'
    +'<textarea id="q-input" class="q-textarea" placeholder="'+(u?'اكتب سؤالك أو توضيحك هنا...':'سجّل الدخول لإضافة سؤال أو توضيح')+'"></textarea>'
    +'<button class="btn-ask" onclick="submitQuestion()">إرسال</button></div>';
  el.innerHTML='<div class="card"><div style="font-family:\'Cairo\',sans-serif;font-size:13px;font-weight:900;color:var(--p);margin-bottom:13px">❓ الأسئلة والتوضيحات</div>'
    +'<div class="q-list">'+list+'</div>'+askBox+'</div>';
}
function submitQuestion(){
  var u=getUser();
  if(!u){goLogin();return;}
  var inp=document.getElementById('q-input');if(!inp)return;
  var txt=(inp.value||'').trim();
  if(!txt){alert('اكتب نصاً أولاً');return;}
  fetch(API+'/api/requests/'+_rid+'/questions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},body:JSON.stringify({body:txt})})
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(){inp.value='';loadQuestions(_rid);})
    .catch(function(){alert('تعذر الإرسال، حاول لاحقاً');});
}

// ═══ START ═══
load();

</script>
